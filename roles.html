<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Roles Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    .roles-app {
      display: flex;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    .sidebar {
      width: 320px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .role-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .role-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .role-item:hover {
      border-color: var(--accent);
      background: var(--bg3);
      transform: translateX(4px);
    }
    
    .role-item.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    
    .role-name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
    }
    
    .role-specs {
      font-size: 0.65rem;
      color: var(--dim);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    
    .spec-tag {
      background: var(--bg2);
      padding: 2px 6px;
      border-radius: 12px;
      border: 1px solid var(--border2);
    }
    
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    
    .panel-header {
      padding: 16px 24px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .panel-header h2 {
      font-size: 0.9rem;
      margin: 0;
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .form-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: var(--accent);
    }
    
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: 'Crimson Pro', serif;
    }
    
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .specializations-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .specializations-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .specializations-header h3 {
      margin: 0;
      font-size: 0.75rem;
    }
    
    .specs-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .spec-tag-item {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 6px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
    }
    
    .spec-tag-item button {
      background: none;
      border: none;
      color: var(--danger-lt);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0 4px;
    }
    
    .spec-tag-item button:hover {
      color: var(--danger);
    }
    
    .empty-specs {
      color: var(--tmut);
      font-size: 0.7rem;
      font-style: italic;
      padding: 12px;
      text-align: center;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    
    @media (max-width: 768px) {
      .roles-app {
        flex-direction: column;
        height: auto;
      }
      .sidebar {
        width: 100%;
        max-height: 300px;
      }
      .panel-header {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">⚒️ ROLES MANAGER</div>
  <div style="flex:1"></div>
  <button id="importRolesBtn" class="tb-btn">📂 Import JSON</button>
  <button id="exportRolesBtn" class="tb-btn primary">💾 Export JSON</button>
</div>

<div class="roles-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>📋 ROLES</h3>
      <button id="addRoleBtn" class="btn primary small">+ Add New Role</button>
    </div>
    <div class="role-list" id="roleList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-header">
      <h2 id="selectedRoleTitle">Select a role to view or edit</h2>
      <div>
        <button id="deleteRoleBtn" class="btn danger small" style="display:none;">🗑️ Delete Role</button>
      </div>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-state">
        📋 No role selected<br>
        <small>Click on a role from the left sidebar to view or edit its details</small>
      </div>
    </div>
  </div>
</div>

<script>
  // ==================== UNIFIED DATA STRUCTURE ====================
  let masterData = {
    version: "2.0",
    lastUpdated: new Date().toISOString(),
    data: {
      characters: [],
      locationTypes: [],
      governments: [],
      places: [],
      ranks: [],
      roles: [],
      nameLists: {},
      cityNameParts: { prefixes: [], roots: [], suffixes: [] },
      currentYear: 1250
    }
  };
  
  let selectedRoleId = null;
  
  function generateId() { return 'role_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  // ==================== LOAD FROM UNIFIED STORAGE ====================
  function loadMasterData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        masterData = {
          version: parsed.version || "2.0",
          lastUpdated: parsed.lastUpdated || new Date().toISOString(),
          data: {
            characters: parsed.data?.characters || [],
            locationTypes: parsed.data?.locationTypes || [],
            governments: parsed.data?.governments || [],
            places: parsed.data?.places || [],
            ranks: parsed.data?.ranks || [],
            roles: parsed.data?.roles || [],
            nameLists: parsed.data?.nameLists || {},
            cityNameParts: parsed.data?.cityNameParts || { prefixes: [], roots: [], suffixes: [] },
            currentYear: parsed.data?.currentYear || 1250
          }
        };
      } catch(e) { console.error('Error loading master data', e); }
    } else {
      // Initialize with default roles
      masterData.data.roles = [
        { id: generateId(), name: "Farmer", specializations: ["Wheat", "Barley", "Corn"], notes: "Cultivates crops and manages agricultural lands." },
        { id: generateId(), name: "Blacksmith", specializations: ["Weapons", "Armor", "Tools"], notes: "Works with metal to create and repair items." },
        { id: generateId(), name: "Healer", specializations: ["Herbalism", "Surgery", "Midwifery"], notes: "Provides medical care and healing services." }
      ];
      saveMasterData();
    }
  }
  
  function saveMasterData() {
    masterData.lastUpdated = new Date().toISOString();
    localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
  }
  
  // ==================== ROLE OPERATIONS ====================
  function getRoles() { return masterData.data.roles; }
  function setRoles(roles) { masterData.data.roles = roles; saveMasterData(); }
  
  // ==================== RENDER ROLE LIST ====================
  function renderRoleList() {
    const container = document.getElementById('roleList');
    const roles = getRoles();
    
    if (!roles.length) {
      container.innerHTML = '<div class="empty-state" style="padding:20px;">No roles yet.<br>Click "Add New Role" to begin.</div>';
      return;
    }
    
    container.innerHTML = roles.map(role => `
      <div class="role-item ${selectedRoleId === role.id ? 'selected' : ''}" data-role-id="${role.id}">
        <div class="role-name">${escapeHtml(role.name)}</div>
        <div class="role-specs">
          ${role.specializations?.slice(0, 3).map(s => `<span class="spec-tag">${escapeHtml(s)}</span>`).join('')}
          ${role.specializations?.length > 3 ? `<span class="spec-tag">+${role.specializations.length - 3}</span>` : ''}
        </div>
      </div>
    `).join('');
    
    document.querySelectorAll('.role-item').forEach(item => {
      item.addEventListener('click', () => {
        const roleId = item.getAttribute('data-role-id');
        selectRole(roleId);
      });
    });
  }
  
  function selectRole(roleId) {
    selectedRoleId = roleId;
    renderRoleList();
    renderRoleEditor(roleId);
  }
  
  // ==================== RENDER ROLE EDITOR ====================
  function renderRoleEditor(roleId) {
    const role = getRoles().find(r => r.id === roleId);
    if (!role) return;
    
    document.getElementById('selectedRoleTitle').textContent = `✏️ Editing: ${escapeHtml(role.name)}`;
    document.getElementById('deleteRoleBtn').style.display = 'inline-block';
    
    const content = `
      <form id="roleForm">
        <div class="form-section">
          <div class="form-group">
            <label>📛 Role Name</label>
            <input type="text" id="roleName" value="${escapeHtml(role.name)}" placeholder="e.g., Farmer, Blacksmith, Healer" required>
          </div>
        </div>
        
        <div class="specializations-section">
          <div class="specializations-header">
            <h3>🎯 Specializations</h3>
            <button type="button" id="addSpecializationBtn" class="btn small">+ Add Specialization</button>
          </div>
          <div id="specializationsList" class="specs-list">
            ${renderSpecializations(role.specializations, roleId)}
          </div>
        </div>
        
        <div class="form-section">
          <div class="form-group">
            <label>📝 Notes</label>
            <textarea id="roleNotes" rows="4" placeholder="Additional information about this role...">${escapeHtml(role.notes || '')}</textarea>
          </div>
        </div>
        
        <div class="action-buttons">
          <button type="submit" class="btn primary">💾 Save Changes</button>
        </div>
      </form>
    `;
    
    document.getElementById('panelContent').innerHTML = content;
    
    document.getElementById('roleForm').addEventListener('submit', (e) => {
      e.preventDefault();
      saveRole(roleId);
    });
    
    document.getElementById('addSpecializationBtn').addEventListener('click', () => {
      addSpecialization(roleId);
    });
    
    document.querySelectorAll('.remove-spec').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const specIndex = parseInt(btn.getAttribute('data-spec-index'));
        removeSpecialization(roleId, specIndex);
      });
    });
  }
  
  function renderSpecializations(specializations, roleId) {
    if (!specializations || specializations.length === 0) {
      return '<div class="empty-specs">No specializations added yet. Click "+ Add Specialization" to add some.</div>';
    }
    
    return specializations.map((spec, index) => `
      <div class="spec-tag-item">
        ${escapeHtml(spec)}
        <button type="button" data-spec-index="${index}" class="remove-spec">✖</button>
      </div>
    `).join('');
  }
  
  function addSpecialization(roleId) {
    const roles = getRoles();
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const newSpec = prompt('Enter specialization name:', '');
    if (newSpec && newSpec.trim()) {
      if (!role.specializations) role.specializations = [];
      role.specializations.push(newSpec.trim());
      setRoles(roles);
      renderRoleEditor(roleId);
      renderRoleList();
      showToast(`Added specialization "${newSpec}" to ${role.name}`);
    }
  }
  
  function removeSpecialization(roleId, specIndex) {
    const roles = getRoles();
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const removedSpec = role.specializations[specIndex];
    role.specializations.splice(specIndex, 1);
    setRoles(roles);
    renderRoleEditor(roleId);
    renderRoleList();
    showToast(`Removed specialization "${removedSpec}" from ${role.name}`);
  }
  
  function saveRole(roleId) {
    const roles = getRoles();
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const newName = document.getElementById('roleName').value.trim();
    if (!newName) {
      alert('Role name is required');
      return;
    }
    
    const oldName = role.name;
    role.name = newName;
    role.notes = document.getElementById('roleNotes').value;
    
    setRoles(roles);
    renderRoleList();
    document.getElementById('selectedRoleTitle').textContent = `✏️ Editing: ${escapeHtml(role.name)}`;
    showToast(`Role "${oldName}" saved successfully`);
  }
  
  // ==================== ADD NEW ROLE ====================
  function addNewRole() {
    const roleName = prompt('Enter role name:', 'New Role');
    if (!roleName || !roleName.trim()) return;
    
    const roles = getRoles();
    const newRole = {
      id: generateId(),
      name: roleName.trim(),
      specializations: [],
      notes: ''
    };
    
    roles.push(newRole);
    setRoles(roles);
    renderRoleList();
    selectRole(newRole.id);
    showToast(`Created new role: ${roleName}`);
  }
  
  // ==================== DELETE ROLE ====================
  function deleteRole() {
    if (!selectedRoleId) return;
    
    const roles = getRoles();
    const role = roles.find(r => r.id === selectedRoleId);
    if (!role) return;
    
    if (confirm(`Delete role "${role.name}"? This will remove it from all characters.`)) {
      const updatedRoles = roles.filter(r => r.id !== selectedRoleId);
      setRoles(updatedRoles);
      selectedRoleId = null;
      renderRoleList();
      document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
      document.getElementById('deleteRoleBtn').style.display = 'none';
      document.getElementById('panelContent').innerHTML = `
        <div class="empty-state">
          🗑️ Role deleted<br>
          <small>Click on a role from the left sidebar to view or edit details</small>
        </div>
      `;
      showToast(`Deleted role: ${role.name}`);
    }
  }
  
  // ==================== IMPORT/EXPORT (UNIFIED) ====================
  function exportData() {
    const exportObj = {
      type: "roles",
      version: "2.0",
      exportDate: new Date().toISOString(),
      data: getRoles()
    };
    const dataStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_roles_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Roles exported successfully');
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          let newRoles = null;
          
          // Case 1: New unified format with type field
          if (imported.type === 'roles' && imported.data && Array.isArray(imported.data)) {
            newRoles = imported.data;
          }
          // Case 2: Old format - direct array of roles
          else if (Array.isArray(imported)) {
            newRoles = imported;
          }
          // Case 3: Master data format with data.roles
          else if (imported.data && imported.data.roles && Array.isArray(imported.data.roles)) {
            newRoles = imported.data.roles;
          }
          // Case 4: Just a roles array in an object
          else if (imported.roles && Array.isArray(imported.roles)) {
            newRoles = imported.roles;
          }
          
          if (newRoles && newRoles.length) {
            // MERGE - don't replace, add new roles and update existing by ID
            const currentRoles = getRoles();
            const mergedRoles = [...currentRoles];
            
            newRoles.forEach(importedRole => {
              const existingIndex = mergedRoles.findIndex(r => r.id === importedRole.id);
              if (existingIndex !== -1) {
                // Update existing role
                mergedRoles[existingIndex] = { 
                  ...mergedRoles[existingIndex], 
                  ...importedRole,
                  specializations: importedRole.specializations || mergedRoles[existingIndex].specializations || []
                };
              } else {
                // Add new role (generate new ID if missing)
                if (!importedRole.id) importedRole.id = generateId();
                if (!importedRole.specializations) importedRole.specializations = [];
                if (!importedRole.notes) importedRole.notes = '';
                mergedRoles.push(importedRole);
              }
            });
            
            setRoles(mergedRoles);
            renderRoleList();
            showToast(`Imported and merged ${newRoles.length} roles. Total: ${mergedRoles.length}`);
            
            // If a role was selected, refresh it
            if (selectedRoleId) {
              const roleExists = mergedRoles.some(r => r.id === selectedRoleId);
              if (roleExists) {
                renderRoleEditor(selectedRoleId);
              } else {
                selectedRoleId = null;
                document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
                document.getElementById('deleteRoleBtn').style.display = 'none';
                document.getElementById('panelContent').innerHTML = '<div class="empty-state">Select a role from the left sidebar</div>';
              }
            }
          } else {
            alert('No valid role data found in file. Please export roles from Roles Manager first.');
          }
        } catch(err) { 
          alert('Invalid JSON: ' + err.message); 
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // ==================== INIT ====================
  function init() {
    loadMasterData();
    renderRoleList();
    
    document.getElementById('addRoleBtn').addEventListener('click', addNewRole);
    document.getElementById('deleteRoleBtn').addEventListener('click', deleteRole);
    document.getElementById('importRolesBtn').addEventListener('click', importData);
    document.getElementById('exportRolesBtn').addEventListener('click', exportData);
    
    // Listen for cross-tab updates
    window.addEventListener('storage', (e) => {
      if (e.key === 'stillwaters_master') {
        loadMasterData();
        renderRoleList();
        if (selectedRoleId) {
          const roleExists = getRoles().some(r => r.id === selectedRoleId);
          if (roleExists) {
            renderRoleEditor(selectedRoleId);
          } else {
            selectedRoleId = null;
            document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
            document.getElementById('deleteRoleBtn').style.display = 'none';
            document.getElementById('panelContent').innerHTML = '<div class="empty-state">Role data updated in another tab</div>';
          }
        }
      }
    });
  }
  
  init();
</script>
</body>
</html>

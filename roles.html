<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Roles Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
</head>
<body>

<div class="topbar">
  <div class="title">ROLES MANAGER</div>
  <div style="flex:1"></div>
  <button id="importBtn" class="tb-btn">Import JSON</button>
  <button id="exportBtn" class="tb-btn primary">Export JSON</button>
</div>

<div style="display: flex; flex-direction: column; height: calc(100vh - 44px); overflow: hidden;">
  <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #0d1119; border-bottom: 1px solid #1e2738; flex-shrink: 0;">
    <div style="font-family: 'Cinzel', serif; font-size: 0.7rem; color: #6a9ecf;">⚙️ PROFESSIONS & VOCATIONS</div>
    <div style="display: flex; gap: 10px;">
      <input type="text" id="searchInput" placeholder="Search roles..." style="padding: 6px 10px; background: #090c12; border: 1px solid #1e2738; border-radius: 6px; color: #cdd5e0; width: 200px;">
      <button id="addRoleBtn" style="background: #1a2d48; border: 1px solid #6a9ecf; color: #6a9ecf; padding: 6px 12px; border-radius: 4px; cursor: pointer;">+ Add New Role</button>
    </div>
  </div>
  
  <div style="display: flex; flex: 1; overflow: hidden;">
    <!-- LEFT SIDEBAR -->
    <div style="width: 360px; border-right: 1px solid #1e2738; display: flex; flex-direction: column; overflow: hidden; background: #0d1119; flex-shrink: 0;">
      <div style="padding: 12px 16px; background: #121820; border-bottom: 1px solid #1e2738;">
        <span style="font-size: 0.6rem; color: #8aabb8;">Click any role to edit</span>
      </div>
      <div id="rolesGrid" style="flex: 1; overflow-y: auto; padding: 12px;"></div>
    </div>
    
    <!-- RIGHT PANEL -->
    <div id="detailPanel" style="flex: 1; overflow-y: auto; background: #090c12; padding: 20px;">
      <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #8aabb8; text-align: center;">
        ← Select a role from the left to edit
      </div>
    </div>
  </div>
</div>

<script>
  // Data
  let roles = [];
  let selectedRoleId = null;
  let searchTerm = '';
  
  function generateId() {
    return 'role_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
  }
  
  function loadData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (parsed.data?.roles) roles = parsed.data.roles;
        else if (parsed.roles) roles = parsed.roles;
      } catch(e) { console.error(e); }
    }
    
    if (!roles.length) {
      roles = [
        { id: generateId(), name: "Farmer", specializations: ["Wheat", "Barley", "Corn", "Rice"], notes: "Cultivates crops and manages agricultural lands." },
        { id: generateId(), name: "Fisher", specializations: ["Deep Sea", "River", "Net Making"], notes: "Harvests the waters for food and trade." },
        { id: generateId(), name: "Physician", specializations: ["Herbalism", "Surgery", "Midwifery"], notes: "Provides medical care and healing services." },
        { id: generateId(), name: "Very Long Role Name That Should Wrap Properly And Not Get Cut Off", specializations: ["Test"], notes: "Testing long names." }
      ];
      saveData();
    }
  }
  
  function saveData() {
    localStorage.setItem('stillwaters_master', JSON.stringify({ version: "2.0", data: { roles: roles } }));
  }
  
  function renderRolesGrid() {
    const container = document.getElementById('rolesGrid');
    let filtered = roles;
    if (searchTerm) filtered = roles.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()));
    
    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding: 40px; text-align: center; color: #8aabb8;">No roles found</div>';
      return;
    }
    
    container.innerHTML = filtered.map(role => `
      <div onclick="selectRole('${role.id}')" style="
        background: ${selectedRoleId === role.id ? '#1a2d48' : '#0d1119'};
        border: 1px solid ${selectedRoleId === role.id ? '#6a9ecf' : '#1e2738'};
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: all 0.2s;
      " onmouseover="this.style.borderColor='#6a9ecf'" onmouseout="this.style.borderColor='${selectedRoleId === role.id ? '#6a9ecf' : '#1e2738'}'">
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
          <div style="
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #6a9ecf;
            line-height: 1.4;
            flex: 1;
          ">${escapeHtml(role.name)}</div>
          <div style="
            font-size: 0.55rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: #090c12;
            border: 1px solid #2a3a50;
            color: #8aabb8;
            white-space: nowrap;
          ">${role.specializations?.length || 0} specs</div>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px;">
          ${(role.specializations || []).slice(0, 3).map(s => `<span style="background: #090c12; border: 1px solid #2a3a50; border-radius: 12px; padding: 2px 8px; font-size: 0.6rem; color: #8aabb8;">${escapeHtml(s)}</span>`).join('')}
          ${(role.specializations?.length || 0) > 3 ? `<span style="background: #1a2d48; border-color: #6a9ecf; color: #6a9ecf; border-radius: 12px; padding: 2px 8px; font-size: 0.6rem;">+${role.specializations.length - 3}</span>` : ''}
        </div>
        ${role.notes ? `<div style="font-size: 0.6rem; color: #6a8098; margin-top: 8px; padding-top: 6px; border-top: 1px solid #2a3a50;">${escapeHtml(role.notes.substring(0, 60))}${role.notes.length > 60 ? '...' : ''}</div>` : ''}
      </div>
    `).join('');
  }
  
  function selectRole(id) {
    selectedRoleId = id;
    renderRolesGrid();
    
    const role = roles.find(r => r.id === id);
    if (!role) return;
    
    document.getElementById('detailPanel').innerHTML = `
      <div style="background: #0d1119; border: 1px solid #1e2738; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; height: 100%;">
        <div style="padding: 16px 20px; background: #121820; border-bottom: 1px solid #1e2738; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
          <h2 style="margin: 0; font-size: 0.8rem; font-family: 'Cinzel', serif; color: #6a9ecf;">✎ Edit: ${escapeHtml(role.name)}</h2>
          <button id="deleteBtn" style="background: #2a1a1a; border: 1px solid #8a3020; color: #c08080; padding: 4px 12px; border-radius: 4px; cursor: pointer;">Delete Role</button>
        </div>
        <div style="padding: 20px; flex: 1; overflow-y: auto;">
          <form id="roleForm">
            <div style="margin-bottom: 16px;">
              <label style="display: block; font-size: 0.65rem; font-family: 'Cinzel', serif; color: #6a9ecf; margin-bottom: 6px;">Role Name</label>
              <input type="text" id="roleName" value="${escapeHtml(role.name)}" required style="width: 100%; padding: 8px 10px; background: #090c12; border: 1px solid #1e2738; color: #cdd5e0; border-radius: 6px; font-size: 0.8rem;">
            </div>
            
            <div style="margin-bottom: 16px;">
              <label style="display: block; font-size: 0.65rem; font-family: 'Cinzel', serif; color: #6a9ecf; margin-bottom: 6px;">Specializations</label>
              <div id="specsList" style="margin-bottom: 10px;">
                ${(role.specializations || []).map((spec, i) => `
                  <span style="display: inline-flex; align-items: center; gap: 6px; background: #090c12; border: 1px solid #2a3a50; border-radius: 20px; padding: 4px 10px; font-size: 0.7rem; margin-right: 6px; margin-bottom: 6px;">
                    ${escapeHtml(spec)}
                    <button type="button" class="remove-spec" data-index="${i}" style="background: none; border: none; color: #c08080; cursor: pointer;">✖</button>
                  </span>
                `).join('') || '<span style="color:#6a8098; font-size:0.7rem;">No specializations added yet.</span>'}
              </div>
              <div style="display: flex; gap: 8px;">
                <input type="text" id="newSpec" placeholder="New specialization..." style="flex: 1; padding: 6px 10px; background: #090c12; border: 1px solid #1e2738; border-radius: 6px; color: #cdd5e0;">
                <button type="button" id="addSpecBtn" style="background: #1e2738; border: 1px solid #1e2738; color: #cdd5e0; padding: 6px 12px; border-radius: 4px; cursor: pointer;">+ Add</button>
              </div>
            </div>
            
            <div style="margin-bottom: 16px;">
              <label style="display: block; font-size: 0.65rem; font-family: 'Cinzel', serif; color: #6a9ecf; margin-bottom: 6px;">Notes</label>
              <textarea id="roleNotes" rows="4" style="width: 100%; padding: 8px 10px; background: #090c12; border: 1px solid #1e2738; color: #cdd5e0; border-radius: 6px; font-size: 0.8rem;">${escapeHtml(role.notes || '')}</textarea>
            </div>
          </form>
        </div>
        <div style="padding: 16px 20px; border-top: 1px solid #1e2738; display: flex; justify-content: flex-end; flex-shrink: 0;">
          <button type="submit" form="roleForm" style="background: #1a2d48; border: 1px solid #6a9ecf; color: #6a9ecf; padding: 8px 20px; border-radius: 4px; cursor: pointer;">💾 Save Changes</button>
        </div>
      </div>
    `;
    
    document.getElementById('roleForm').onsubmit = (e) => {
      e.preventDefault();
      saveRole(role.id);
    };
    
    document.getElementById('addSpecBtn').onclick = () => addSpecialization(role.id);
    document.getElementById('deleteBtn').onclick = () => deleteRole(role.id);
    
    document.getElementById('newSpec').onkeypress = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addSpecialization(role.id); }
    };
    
    document.querySelectorAll('.remove-spec').forEach(btn => {
      btn.onclick = (e) => {
        e.preventDefault();
        const idx = parseInt(btn.getAttribute('data-index'));
        removeSpecialization(role.id, idx);
      };
    });
  }
  
  function addSpecialization(roleId) {
    const input = document.getElementById('newSpec');
    const newSpec = input.value.trim();
    if (!newSpec) return;
    
    const role = roles.find(r => r.id === roleId);
    if (role) {
      if (!role.specializations) role.specializations = [];
      if (!role.specializations.includes(newSpec)) {
        role.specializations.push(newSpec);
        saveData();
        selectRole(roleId);
        renderRolesGrid();
        showToast(`Added "${newSpec}"`);
      } else {
        showToast('Already exists');
      }
    }
    input.value = '';
  }
  
  function removeSpecialization(roleId, index) {
    const role = roles.find(r => r.id === roleId);
    if (role && role.specializations && role.specializations[index]) {
      role.specializations.splice(index, 1);
      saveData();
      selectRole(roleId);
      renderRolesGrid();
      showToast('Removed');
    }
  }
  
  function saveRole(roleId) {
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const newName = document.getElementById('roleName').value.trim();
    if (!newName) {
      showToast('Name required');
      return;
    }
    
    role.name = newName;
    role.notes = document.getElementById('roleNotes').value;
    saveData();
    renderRolesGrid();
    selectRole(roleId);
    showToast(`Saved "${role.name}"`);
  }
  
  function deleteRole(roleId) {
    if (!confirm('Delete this role permanently?')) return;
    roles = roles.filter(r => r.id !== roleId);
    selectedRoleId = null;
    saveData();
    renderRolesGrid();
    document.getElementById('detailPanel').innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #8aabb8;">Role deleted. Select another role from the left.</div>';
    showToast('Role deleted');
  }
  
  function addNewRole() {
    const name = prompt('Enter role name:');
    if (!name || !name.trim()) return;
    
    const newRole = {
      id: generateId(),
      name: name.trim(),
      specializations: [],
      notes: ''
    };
    roles.push(newRole);
    saveData();
    renderRolesGrid();
    selectRole(newRole.id);
    showToast(`Created "${name.trim()}"`);
  }
  
  function exportData() {
    const exportObj = { type: "master", version: "2.0", data: { roles: roles } };
    const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_roles_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    showToast('Exported');
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.data?.roles) roles = imported.data.roles;
          else if (imported.roles) roles = imported.roles;
          else if (Array.isArray(imported)) roles = imported;
          saveData();
          renderRolesGrid();
          showToast(`Imported ${roles.length} roles`);
        } catch(err) { alert('Invalid JSON'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      container.style.position = 'fixed';
      container.style.bottom = '20px';
      container.style.right = '20px';
      container.style.zIndex = '9999';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.style.background = '#0d1119';
    toast.style.border = '1px solid #6a9ecf';
    toast.style.borderRadius = '4px';
    toast.style.padding = '8px 16px';
    toast.style.color = '#6a9ecf';
    toast.style.fontFamily = "'Cinzel', serif";
    toast.style.fontSize = '0.75rem';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }
  
  window.selectRole = selectRole;
  
  loadData();
  renderRolesGrid();
  
  document.getElementById('addRoleBtn').onclick = addNewRole;
  document.getElementById('importBtn').onclick = importData;
  document.getElementById('exportBtn').onclick = exportData;
  document.getElementById('searchInput').oninput = (e) => {
    searchTerm = e.target.value;
    renderRolesGrid();
  };
</script>
</body>
</html>

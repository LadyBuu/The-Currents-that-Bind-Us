<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Roles Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
</head>
<body>

<div class="topbar">
  <div class="title">ROLES MANAGER</div>
  <div style="flex:1"></div>
  <button id="importBtn" class="tb-btn">Import JSON</button>
  <button id="exportBtn" class="tb-btn primary">Export JSON</button>
</div>

<div class="roles-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>ROLES</h3>
      <button id="addRoleBtn" class="btn primary small">+ Add New Role</button>
    </div>
    <div class="role-list" id="roleList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-header">
      <h2 id="selectedRoleTitle">Select a role to view or edit</h2>
      <div>
        <button id="deleteRoleBtn" class="btn danger small" style="display:none;">Delete Role</button>
      </div>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-state">
        No role selected<br>
        <small>Click on a role from the left sidebar to view or edit its details</small>
      </div>
    </div>
  </div>
</div>

<script>
  // ==================== UNIFIED MASTER DATA STRUCTURE ====================
  let masterData = {
    version: "2.0",
    lastUpdated: new Date().toISOString(),
    data: {
      characters: [],
      locationTypes: [],
      governments: [],
      places: [],
      ranks: [],
      roles: [],
      nameLists: {},
      cityNameParts: { prefixes: [], roots: [], suffixes: [] },
      currentYear: 1250
    }
  };
  
  let selectedRoleId = null;
  
  function generateId() { return 'role_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  // ==================== LOAD FROM UNIFIED STORAGE ====================
  function loadMasterData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        masterData = {
          version: parsed.version || "2.0",
          lastUpdated: parsed.lastUpdated || new Date().toISOString(),
          data: {
            characters: parsed.data?.characters || [],
            locationTypes: parsed.data?.locationTypes || [],
            governments: parsed.data?.governments || [],
            places: parsed.data?.places || [],
            ranks: parsed.data?.ranks || [],
            roles: parsed.data?.roles || [],
            nameLists: parsed.data?.nameLists || {},
            cityNameParts: parsed.data?.cityNameParts || { prefixes: [], roots: [], suffixes: [] },
            currentYear: parsed.data?.currentYear || 1250
          }
        };
      } catch(e) { console.error('Error loading master data', e); }
    } else {
      // Initialize with default roles
      masterData.data.roles = [
        { id: generateId(), name: "Farmer", specializations: ["Wheat", "Barley", "Corn"], notes: "Cultivates crops and manages agricultural lands." },
        { id: generateId(), name: "Blacksmith", specializations: ["Weapons", "Armor", "Tools"], notes: "Works with metal to create and repair items." },
        { id: generateId(), name: "Healer", specializations: ["Herbalism", "Surgery", "Midwifery"], notes: "Provides medical care and healing services." }
      ];
      saveMasterData();
    }
  }
  
  function saveMasterData() {
    masterData.lastUpdated = new Date().toISOString();
    localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
  }
  
  // ==================== ROLE OPERATIONS ====================
  function getRoles() { return masterData.data.roles; }
  function setRoles(roles) { masterData.data.roles = roles; saveMasterData(); }
  
  // ==================== RENDER ROLE LIST ====================
  function renderRoleList() {
    const container = document.getElementById('roleList');
    const roles = getRoles();
    
    if (!roles.length) {
      container.innerHTML = '<div class="empty-state" style="padding:20px;">No roles yet.<br>Click "Add New Role" to begin.</div>';
      return;
    }
    
    container.innerHTML = roles.map(role => `
      <div class="role-item ${selectedRoleId === role.id ? 'selected' : ''}" data-role-id="${role.id}">
        <div class="role-name">${escapeHtml(role.name)}</div>
        <div class="role-specs">
          ${role.specializations?.slice(0, 3).map(s => `<span class="spec-tag">${escapeHtml(s)}</span>`).join('')}
          ${role.specializations?.length > 3 ? `<span class="spec-tag">+${role.specializations.length - 3}</span>` : ''}
        </div>
      </div>
    `).join('');
    
    document.querySelectorAll('.role-item').forEach(item => {
      item.addEventListener('click', () => {
        const roleId = item.getAttribute('data-role-id');
        selectRole(roleId);
      });
    });
  }
  
  function selectRole(roleId) {
    selectedRoleId = roleId;
    renderRoleList();
    renderRoleEditor(roleId);
  }
  
  // ==================== RENDER ROLE EDITOR ====================
  function renderRoleEditor(roleId) {
    const role = getRoles().find(r => r.id === roleId);
    if (!role) return;
    
    document.getElementById('selectedRoleTitle').textContent = `Editing: ${escapeHtml(role.name)}`;
    document.getElementById('deleteRoleBtn').style.display = 'inline-block';
    
    const content = `
      <form id="roleForm">
        <div class="form-section">
          <div class="form-group">
            <label>Role Name</label>
            <input type="text" id="roleName" value="${escapeHtml(role.name)}" placeholder="e.g., Farmer, Blacksmith, Healer" required>
          </div>
        </div>
        
        <div class="specializations-section">
          <div class="specializations-header">
            <h3>Specializations</h3>
            <button type="button" id="addSpecializationBtn" class="btn small">+ Add Specialization</button>
          </div>
          <div id="specializationsList" class="specs-list">
            ${renderSpecializations(role.specializations, roleId)}
          </div>
        </div>
        
        <div class="form-section">
          <div class="form-group">
            <label>Notes</label>
            <textarea id="roleNotes" rows="4" placeholder="Additional information about this role...">${escapeHtml(role.notes || '')}</textarea>
          </div>
        </div>
        
        <div class="action-buttons">
          <button type="submit" class="btn primary">Save Changes</button>
        </div>
      </form>
    `;
    
    document.getElementById('panelContent').innerHTML = content;
    
    document.getElementById('roleForm').addEventListener('submit', (e) => {
      e.preventDefault();
      saveRole(roleId);
    });
    
    document.getElementById('addSpecializationBtn').addEventListener('click', () => {
      addSpecialization(roleId);
    });
    
    document.querySelectorAll('.remove-spec').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const specIndex = parseInt(btn.getAttribute('data-spec-index'));
        removeSpecialization(roleId, specIndex);
      });
    });
  }
  
  function renderSpecializations(specializations, roleId) {
    if (!specializations || specializations.length === 0) {
      return '<div class="empty-specs">No specializations added yet. Click "+ Add Specialization" to add some.</div>';
    }
    
    return specializations.map((spec, index) => `
      <div class="spec-tag-item">
        ${escapeHtml(spec)}
        <button type="button" data-spec-index="${index}" class="remove-spec">✖</button>
      </div>
    `).join('');
  }
  
  function addSpecialization(roleId) {
    const roles = getRoles();
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const newSpec = prompt('Enter specialization name:', '');
    if (newSpec && newSpec.trim()) {
      if (!role.specializations) role.specializations = [];
      role.specializations.push(newSpec.trim());
      setRoles(roles);
      renderRoleEditor(roleId);
      renderRoleList();
      showToast(`Added specialization "${newSpec}" to ${role.name}`);
    }
  }
  
  function removeSpecialization(roleId, specIndex) {
    const roles = getRoles();
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const removedSpec = role.specializations[specIndex];
    role.specializations.splice(specIndex, 1);
    setRoles(roles);
    renderRoleEditor(roleId);
    renderRoleList();
    showToast(`Removed specialization "${removedSpec}" from ${role.name}`);
  }
  
  function saveRole(roleId) {
    const roles = getRoles();
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const newName = document.getElementById('roleName').value.trim();
    if (!newName) {
      alert('Role name is required');
      return;
    }
    
    const oldName = role.name;
    role.name = newName;
    role.notes = document.getElementById('roleNotes').value;
    
    setRoles(roles);
    renderRoleList();
    document.getElementById('selectedRoleTitle').textContent = `Editing: ${escapeHtml(role.name)}`;
    showToast(`Role "${oldName}" saved successfully`);
  }
  
  // ==================== ADD NEW ROLE ====================
  function addNewRole() {
    const roleName = prompt('Enter role name:', 'New Role');
    if (!roleName || !roleName.trim()) return;
    
    const roles = getRoles();
    const newRole = {
      id: generateId(),
      name: roleName.trim(),
      specializations: [],
      notes: ''
    };
    
    roles.push(newRole);
    setRoles(roles);
    renderRoleList();
    selectRole(newRole.id);
    showToast(`Created new role: ${roleName}`);
  }
  
  // ==================== DELETE ROLE ====================
  function deleteRole() {
    if (!selectedRoleId) return;
    
    const roles = getRoles();
    const role = roles.find(r => r.id === selectedRoleId);
    if (!role) return;
    
    if (confirm(`Delete role "${role.name}"? This will remove it from all characters.`)) {
      const updatedRoles = roles.filter(r => r.id !== selectedRoleId);
      setRoles(updatedRoles);
      selectedRoleId = null;
      renderRoleList();
      document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
      document.getElementById('deleteRoleBtn').style.display = 'none';
      document.getElementById('panelContent').innerHTML = `
        <div class="empty-state">
          Role deleted<br>
          <small>Click on a role from the left sidebar to view or edit details</small>
        </div>
      `;
      showToast(`Deleted role: ${role.name}`);
    }
  }
  
  // ==================== IMPORT/EXPORT (UNIFIED - SAME FOR ALL TOOLS) ====================
  function exportData() {
    // Export the FULL unified master data
    const exportObj = {
      type: "master",
      version: masterData.version,
      exportDate: new Date().toISOString(),
      data: masterData.data
    };
    const dataStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_master_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Full master data exported');
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          
          // Universal import handler - works with ANY file from ANY Still Waters tool
          let newMasterData = null;
          
          // Case 1: Full unified master export (type: "master")
          if (imported.type === "master" && imported.data) {
            newMasterData = imported;
            showToast(`Importing full master data (${Object.keys(imported.data).length} categories)`);
          }
          // Case 2: Legacy export with data.roles (from older version)
          else if (imported.data && imported.data.roles) {
            newMasterData = imported;
            showToast(`Importing master data with roles`);
          }
          // Case 3: Direct roles array (from old Roles Manager)
          else if (Array.isArray(imported) && imported[0]?.specializations !== undefined) {
            newMasterData = {
              type: "master",
              version: "2.0",
              exportDate: new Date().toISOString(),
              data: {
                ...masterData.data,
                roles: imported
              }
            };
            showToast(`Importing roles array (${imported.length} roles) - preserving other data`);
          }
          // Case 4: Locations export (has places, locationTypes, governments)
          else if (imported.places || imported.locationTypes || imported.governments) {
            newMasterData = {
              type: "master",
              version: "2.0",
              exportDate: new Date().toISOString(),
              data: {
                ...masterData.data,
                places: imported.places || masterData.data.places,
                locationTypes: imported.locationTypes || masterData.data.locationTypes,
                governments: imported.governments || masterData.data.governments
              }
            };
            showToast(`Importing locations data - preserving roles and other data`);
          }
          // Case 5: Ranks export (array of ranks)
          else if (Array.isArray(imported) && imported[0]?.priority !== undefined) {
            newMasterData = {
              type: "master",
              version: "2.0",
              exportDate: new Date().toISOString(),
              data: {
                ...masterData.data,
                ranks: imported
              }
            };
            showToast(`Importing ranks array (${imported.length} ranks) - preserving other data`);
          }
          // Case 6: Names export (has nameLists)
          else if (imported.nameLists || imported.cityNameParts) {
            newMasterData = {
              type: "master",
              version: "2.0",
              exportDate: new Date().toISOString(),
              data: {
                ...masterData.data,
                nameLists: imported.nameLists || masterData.data.nameLists,
                cityNameParts: imported.cityNameParts || masterData.data.cityNameParts
              }
            };
            showToast(`Importing names data - preserving roles and other data`);
          }
          // Case 7: Characters export (array of characters)
          else if (Array.isArray(imported) && imported[0]?.gender !== undefined) {
            newMasterData = {
              type: "master",
              version: "2.0",
              exportDate: new Date().toISOString(),
              data: {
                ...masterData.data,
                characters: imported
              }
            };
            showToast(`Importing characters array (${imported.length} characters) - preserving roles`);
          }
          // Case 8: Any other object - try to merge what we can
          else if (typeof imported === 'object') {
            newMasterData = {
              type: "master",
              version: "2.0",
              exportDate: new Date().toISOString(),
              data: {
                ...masterData.data,
                ...imported
              }
            };
            showToast(`Importing data - merging with existing`);
          }
          
          if (newMasterData) {
            // Merge roles specifically (preserve existing, add new)
            if (newMasterData.data.roles && Array.isArray(newMasterData.data.roles)) {
              const currentRoles = masterData.data.roles;
              const newRoles = newMasterData.data.roles;
              
              newRoles.forEach(importedRole => {
                const existingIndex = currentRoles.findIndex(r => r.id === importedRole.id);
                if (existingIndex !== -1) {
                  // Update existing role
                  currentRoles[existingIndex] = { ...currentRoles[existingIndex], ...importedRole };
                } else {
                  // Add new role (generate ID if missing)
                  if (!importedRole.id) importedRole.id = generateId();
                  if (!importedRole.specializations) importedRole.specializations = [];
                  if (!importedRole.notes) importedRole.notes = '';
                  currentRoles.push(importedRole);
                }
              });
              newMasterData.data.roles = currentRoles;
            }
            
            // Update master data
            masterData = {
              version: newMasterData.version,
              lastUpdated: new Date().toISOString(),
              data: newMasterData.data
            };
            
            saveMasterData();
            renderRoleList();
            
            // Refresh display if a role was selected
            if (selectedRoleId) {
              const roleExists = masterData.data.roles.some(r => r.id === selectedRoleId);
              if (roleExists) {
                renderRoleEditor(selectedRoleId);
              } else {
                selectedRoleId = null;
                document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
                document.getElementById('deleteRoleBtn').style.display = 'none';
                document.getElementById('panelContent').innerHTML = '<div class="empty-state">Role data updated. Select a role from the list.</div>';
              }
            }
            
            showToast(`Import successful! Total roles: ${masterData.data.roles.length}`);
          } else {
            alert('Unable to parse file format. Please export from one of the Still Waters tools.');
          }
        } catch(err) { 
          alert('Invalid JSON: ' + err.message); 
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // ==================== INIT ====================
  function init() {
    loadMasterData();
    renderRoleList();
    
    document.getElementById('addRoleBtn').addEventListener('click', addNewRole);
    document.getElementById('deleteRoleBtn').addEventListener('click', deleteRole);
    document.getElementById('importBtn').addEventListener('click', importData);
    document.getElementById('exportBtn').addEventListener('click', exportData);
    
    // Listen for cross-tab updates
    window.addEventListener('storage', (e) => {
      if (e.key === 'stillwaters_master') {
        loadMasterData();
        renderRoleList();
        if (selectedRoleId) {
          const roleExists = getRoles().some(r => r.id === selectedRoleId);
          if (roleExists) {
            renderRoleEditor(selectedRoleId);
          } else {
            selectedRoleId = null;
            document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
            document.getElementById('deleteRoleBtn').style.display = 'none';
            document.getElementById('panelContent').innerHTML = '<div class="empty-state">Role data updated in another tab</div>';
          }
        }
      }
    });
  }
  
  init();
</script>
</body>
</html>

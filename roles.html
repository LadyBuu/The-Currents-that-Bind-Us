<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Roles Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    .roles-app {
      display: flex;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .role-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .role-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .role-item:hover {
      border-color: var(--accent);
      background: var(--bg3);
      transform: translateX(4px);
    }
    
    .role-item.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    
    .role-name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 6px;
    }
    
    .role-specs {
      font-size: 0.65rem;
      color: var(--dim);
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    
    .spec-tag {
      background: var(--bg2);
      padding: 2px 6px;
      border-radius: 12px;
      border: 1px solid var(--border2);
    }
    
    /* Main Panel */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    
    .panel-header {
      padding: 16px 24px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .panel-header h2 {
      font-size: 0.9rem;
      margin: 0;
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    /* Form Styles */
    .form-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: var(--accent);
    }
    
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: 'Crimson Pro', serif;
    }
    
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    /* Specializations */
    .specializations-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .specializations-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .specializations-header h3 {
      margin: 0;
      font-size: 0.75rem;
    }
    
    .add-spec-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .add-spec-form input {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      font-size: 0.8rem;
    }
    
    .specs-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .spec-tag-item {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 6px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
    }
    
    .spec-tag-item button {
      background: none;
      border: none;
      color: var(--danger-lt);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0 4px;
    }
    
    .spec-tag-item button:hover {
      color: var(--danger);
    }
    
    .empty-specs {
      color: var(--tmut);
      font-size: 0.7rem;
      font-style: italic;
      padding: 12px;
      text-align: center;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    
    @media (max-width: 768px) {
      .roles-app {
        flex-direction: column;
        height: auto;
      }
      .sidebar {
        width: 100%;
        max-height: 300px;
      }
      .panel-header {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">⚒️ ROLES MANAGER</div>
  <div style="flex:1"></div>
  <button id="importRolesBtn" class="tb-btn">📂 Import JSON</button>
  <button id="exportRolesBtn" class="tb-btn primary">💾 Export JSON</button>
</div>

<div class="roles-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>📋 ROLES</h3>
      <button id="addRoleBtn" class="btn primary small">+ Add New Role</button>
    </div>
    <div class="role-list" id="roleList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-header">
      <h2 id="selectedRoleTitle">Select a role to view or edit</h2>
      <div>
        <button id="deleteRoleBtn" class="btn danger small" style="display:none;">🗑️ Delete Role</button>
      </div>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-state">
        📋 No role selected<br>
        <small>Click on a role from the left sidebar to view or edit its details</small>
      </div>
    </div>
  </div>
</div>

<script>
  // ==================== DATA STRUCTURES ====================
  let roles = []; // Each role: { id, name, specializations, notes }
  
  // Helper: generate unique ID
  function generateId() { 
    return 'role_' + (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 8));
  }
  
  // ==================== LOAD/SAVE ====================
  function loadAllData() {
    const storedRoles = localStorage.getItem('stillwaters_roles');
    if (storedRoles) {
      roles = JSON.parse(storedRoles);
      // Ensure each role has all required fields
      roles = roles.map(role => ({
        id: role.id || generateId(),
        name: role.name || 'Unnamed Role',
        specializations: Array.isArray(role.specializations) ? role.specializations : [],
        notes: role.notes || ''
      }));
    } else {
      // Default sample roles
      roles = [
        {
          id: generateId(),
          name: 'Farmer',
          specializations: ['Wheat', 'Barley', 'Corn', 'Vegetables'],
          notes: 'Cultivates crops and manages agricultural lands. May specialize in specific crop types.'
        },
        {
          id: generateId(),
          name: 'Blacksmith',
          specializations: ['Weapons', 'Armor', 'Tools', 'Horseshoes'],
          notes: 'Works with metal to create and repair items. Specializations indicate primary craft.'
        },
        {
          id: generateId(),
          name: 'Healer',
          specializations: ['Herbalism', 'Surgery', 'Midwifery', 'Spiritual Healing'],
          notes: 'Provides medical care and healing services to the community.'
        }
      ];
    }
    saveAllData();
  }
  
  function saveAllData() {
    localStorage.setItem('stillwaters_roles', JSON.stringify(roles));
  }
  
  // ==================== RENDER ROLE LIST ====================
  let selectedRoleId = null;
  
  function renderRoleList() {
    const container = document.getElementById('roleList');
    if (!roles.length) {
      container.innerHTML = '<div class="empty-state" style="padding:20px;">No roles yet.<br>Click "Add New Role" to begin.</div>';
      return;
    }
    
    container.innerHTML = roles.map(role => `
      <div class="role-item ${selectedRoleId === role.id ? 'selected' : ''}" data-role-id="${role.id}">
        <div class="role-name">${escapeHtml(role.name)}</div>
        <div class="role-specs">
          ${role.specializations.slice(0, 3).map(s => `<span class="spec-tag">${escapeHtml(s)}</span>`).join('')}
          ${role.specializations.length > 3 ? `<span class="spec-tag">+${role.specializations.length - 3}</span>` : ''}
        </div>
      </div>
    `).join('');
    
    // Add click handlers
    document.querySelectorAll('.role-item').forEach(item => {
      item.addEventListener('click', () => {
        const roleId = item.getAttribute('data-role-id');
        selectRole(roleId);
      });
    });
  }
  
  function selectRole(roleId) {
    selectedRoleId = roleId;
    renderRoleList();
    renderRoleEditor(roleId);
  }
  
  // ==================== RENDER ROLE EDITOR ====================
  function renderRoleEditor(roleId) {
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    document.getElementById('selectedRoleTitle').textContent = `✏️ Editing: ${escapeHtml(role.name)}`;
    document.getElementById('deleteRoleBtn').style.display = 'inline-block';
    
    const content = `
      <form id="roleForm">
        <div class="form-section">
          <div class="form-group">
            <label>📛 Role Name</label>
            <input type="text" id="roleName" value="${escapeHtml(role.name)}" placeholder="e.g., Farmer, Blacksmith, Healer" required>
          </div>
        </div>
        
        <div class="specializations-section">
          <div class="specializations-header">
            <h3>🎯 Specializations</h3>
            <button type="button" id="addSpecializationBtn" class="btn small">+ Add Specialization</button>
          </div>
          <div id="specializationsList" class="specs-list">
            ${renderSpecializations(role.specializations, roleId)}
          </div>
        </div>
        
        <div class="form-section">
          <div class="form-group">
            <label>📝 Notes</label>
            <textarea id="roleNotes" rows="4" placeholder="Additional information about this role...">${escapeHtml(role.notes)}</textarea>
          </div>
        </div>
        
        <div class="action-buttons">
          <button type="submit" class="btn primary">💾 Save Changes</button>
        </div>
      </form>
    `;
    
    document.getElementById('panelContent').innerHTML = content;
    
    // Attach event handlers
    document.getElementById('roleForm').addEventListener('submit', (e) => {
      e.preventDefault();
      saveRole(roleId);
    });
    
    document.getElementById('addSpecializationBtn').addEventListener('click', () => {
      addSpecialization(roleId);
    });
    
    // Re-attach remove handlers for specializations
    document.querySelectorAll('.remove-spec').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const specIndex = parseInt(btn.getAttribute('data-spec-index'));
        removeSpecialization(roleId, specIndex);
      });
    });
  }
  
  function renderSpecializations(specializations, roleId) {
    if (!specializations || specializations.length === 0) {
      return '<div class="empty-specs">No specializations added yet. Click "+ Add Specialization" to add some.</div>';
    }
    
    return specializations.map((spec, index) => `
      <div class="spec-tag-item">
        ${escapeHtml(spec)}
        <button type="button" data-spec-index="${index}" class="remove-spec">✖</button>
      </div>
    `).join('');
  }
  
  function addSpecialization(roleId) {
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const newSpec = prompt('Enter specialization name:', '');
    if (newSpec && newSpec.trim()) {
      if (!role.specializations) role.specializations = [];
      role.specializations.push(newSpec.trim());
      saveAllData();
      renderRoleEditor(roleId);
      renderRoleList();
      showToast(`Added specialization "${newSpec}" to ${role.name}`);
    }
  }
  
  function removeSpecialization(roleId, specIndex) {
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const removedSpec = role.specializations[specIndex];
    role.specializations.splice(specIndex, 1);
    saveAllData();
    renderRoleEditor(roleId);
    renderRoleList();
    showToast(`Removed specialization "${removedSpec}" from ${role.name}`);
  }
  
  function saveRole(roleId) {
    const role = roles.find(r => r.id === roleId);
    if (!role) return;
    
    const newName = document.getElementById('roleName').value.trim();
    if (!newName) {
      alert('Role name is required');
      return;
    }
    
    const oldName = role.name;
    role.name = newName;
    role.notes = document.getElementById('roleNotes').value;
    
    saveAllData();
    renderRoleList();
    document.getElementById('selectedRoleTitle').textContent = `✏️ Editing: ${escapeHtml(role.name)}`;
    showToast(`Role "${oldName}" saved successfully`);
  }
  
  // ==================== ADD NEW ROLE ====================
  function addNewRole() {
    const roleName = prompt('Enter role name:', 'New Role');
    if (!roleName || !roleName.trim()) return;
    
    const newRole = {
      id: generateId(),
      name: roleName.trim(),
      specializations: [],
      notes: ''
    };
    
    roles.push(newRole);
    saveAllData();
    renderRoleList();
    selectRole(newRole.id);
    showToast(`Created new role: ${roleName}`);
  }
  
  // ==================== DELETE ROLE ====================
  function deleteRole() {
    if (!selectedRoleId) return;
    
    const role = roles.find(r => r.id === selectedRoleId);
    if (!role) return;
    
    if (confirm(`Delete role "${role.name}"? This will remove it from all characters.`)) {
      roles = roles.filter(r => r.id !== selectedRoleId);
      saveAllData();
      selectedRoleId = null;
      renderRoleList();
      document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
      document.getElementById('deleteRoleBtn').style.display = 'none';
      document.getElementById('panelContent').innerHTML = `
        <div class="empty-state">
          🗑️ Role deleted<br>
          <small>Click on a role from the left sidebar to view or edit details</small>
        </div>
      `;
      showToast(`Deleted role: ${role.name}`);
    }
  }
  
  // ==================== IMPORT/EXPORT JSON ====================
  function exportData() {
    const exportObj = {
      roles: roles,
      version: '1.0',
      exportDate: new Date().toISOString(),
      note: 'Roles with specializations for character professions'
    };
    const dataStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `stillwaters_roles_${new Date().toISOString().slice(0,19)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Roles exported successfully');
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          
          // Check if it's a valid roles export
          if (imported.roles && Array.isArray(imported.roles)) {
            // Validate and import each role
            const importedRoles = imported.roles.map(role => ({
              id: role.id || generateId(),
              name: role.name || 'Unnamed Role',
              specializations: Array.isArray(role.specializations) ? role.specializations : [],
              notes: role.notes || ''
            }));
            
            // Ask if user wants to merge or replace
            const mergeOrReplace = confirm(`Import ${importedRoles.length} roles.\n\nClick OK to MERGE with existing ${roles.length} roles.\nClick Cancel to REPLACE all existing roles.`);
            
            if (mergeOrReplace) {
              // Merge: add new roles, update existing ones by ID or name
              importedRoles.forEach(importedRole => {
                const existingIndex = roles.findIndex(r => r.id === importedRole.id);
                if (existingIndex !== -1) {
                  // Update existing role
                  roles[existingIndex] = importedRole;
                } else {
                  // Add new role
                  roles.push(importedRole);
                }
              });
              showToast(`Merged ${importedRoles.length} roles. Total: ${roles.length}`);
            } else {
              // Replace
              roles = importedRoles;
              showToast(`Replaced all roles with ${roles.length} imported roles`);
            }
            
            saveAllData();
            selectedRoleId = null;
            renderRoleList();
            document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
            document.getElementById('deleteRoleBtn').style.display = 'none';
            document.getElementById('panelContent').innerHTML = `
              <div class="empty-state">
                📥 Import successful!<br>
                <small>${roles.length} roles loaded. Click on a role to view details.</small>
              </div>
            `;
          } else {
            alert('Invalid JSON format: missing "roles" array');
          }
        } catch(err) { 
          alert('Invalid JSON format: ' + err.message); 
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  // ==================== HELPER FUNCTIONS ====================
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // ==================== INIT ====================
  function init() {
    loadAllData();
    renderRoleList();
    
    document.getElementById('addRoleBtn').addEventListener('click', addNewRole);
    document.getElementById('deleteRoleBtn').addEventListener('click', deleteRole);
    document.getElementById('importRolesBtn').addEventListener('click', importData);
    document.getElementById('exportRolesBtn').addEventListener('click', exportData);
    
    // Listen for cross-tab updates
    window.addEventListener('storage', (e) => {
      if (e.key === 'stillwaters_roles') {
        loadAllData();
        renderRoleList();
        if (selectedRoleId) {
          const roleExists = roles.some(r => r.id === selectedRoleId);
          if (roleExists) {
            renderRoleEditor(selectedRoleId);
          } else {
            selectedRoleId = null;
            document.getElementById('selectedRoleTitle').textContent = 'Select a role to view or edit';
            document.getElementById('deleteRoleBtn').style.display = 'none';
            document.getElementById('panelContent').innerHTML = `
              <div class="empty-state">
                🔄 Role data updated in another tab<br>
                <small>Click on a role to view details</small>
              </div>
            `;
          }
        }
      }
    });
  }
  
  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Diagnostics & Repair</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    .diagnostics-app {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    .toolbar {
      padding: 16px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    
    .toolbar .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    .sidebar {
      width: 280px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .diagnostic-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .diagnostic-item {
      padding: 12px;
      margin-bottom: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .diagnostic-item:hover {
      border-color: var(--accent);
      background: var(--bg3);
    }
    
    .diagnostic-item.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    
    .diagnostic-name {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
    }
    
    .diagnostic-status {
      font-size: 0.65rem;
      color: var(--dim);
      margin-top: 4px;
    }
    
    .diagnostic-status.error {
      color: var(--danger-lt);
    }
    
    .diagnostic-status.warning {
      color: var(--warn);
    }
    
    .diagnostic-status.success {
      color: var(--success);
    }
    
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    
    .panel-header {
      padding: 16px 24px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    
    .panel-header h2 {
      font-size: 0.9rem;
      margin: 0;
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .result-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .result-header {
      padding: 12px 16px;
      background: var(--bg3);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .result-body {
      padding: 16px;
    }
    
    .issue-item {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
    }
    
    .issue-item .title {
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 6px;
    }
    
    .issue-item .details {
      font-size: 0.7rem;
      color: var(--dim);
      margin-bottom: 8px;
    }
    
    .code-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-family: monospace;
      font-size: 0.7rem;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent);
    }
    
    .stat-label {
      font-size: 0.6rem;
      color: var(--dim);
      margin-top: 4px;
    }
    
    .merge-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    
    .file-input-area {
      border: 2px dashed var(--border2);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    
    .file-input-area:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    
    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        max-height: 200px;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">🔍 DIAGNOSTICS & REPAIR</div>
  <div style="flex:1"></div>
  <button id="exportFixedBtn" class="tb-btn primary">💾 Export Fixed JSON</button>
  <button id="clearStorageBtn" class="tb-btn danger">🗑️ Clear Storage</button>
</div>

<div class="diagnostics-app">
  <div class="toolbar">
    <div class="btn-group">
      <button id="loadStorageBtn" class="btn">📂 Load from Storage</button>
      <button id="loadFileBtn" class="btn">📁 Load JSON File</button>
      <button id="mergeBtn" class="btn">🔄 Merge Files</button>
      <button id="runAllBtn" class="btn primary">▶ Run All Diagnostics</button>
    </div>
  </div>
  
  <div class="main-content">
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>🔬 DIAGNOSTICS</h3>
      </div>
      <div class="diagnostic-list" id="diagnosticList"></div>
    </div>
    
    <div class="panel">
      <div class="panel-header">
        <h2 id="panelTitle">Select a diagnostic to run</h2>
      </div>
      <div class="panel-content" id="panelContent">
        <div class="empty-state">
          🔍 Select a diagnostic from the left sidebar to analyze your data<br>
          <small>Load data from storage or upload a JSON file to begin</small>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Data storage
  let currentData = null;
  let currentDataType = null; // 'characters', 'ranks', 'roles', 'locations', 'names', 'master'
  let mergeData1 = null;
  let mergeData2 = null;
  
  // Diagnostic definitions
  const diagnostics = [
    { id: 'storageInfo', name: '📊 Storage Info', desc: 'View localStorage contents and statistics' },
    { id: 'orphans', name: '👶 Children Without Parents', desc: 'Find characters with missing mother/father references' },
    { id: 'parentNoRelation', name: '💔 Parents Without Relationship', desc: 'Find children whose parents never had a relationship' },
    { id: 'duplicateIds', name: '🆔 Duplicate IDs', desc: 'Find duplicate stable IDs across entities' },
    { id: 'ageIssues', name: '📅 Age Issues', desc: 'Find characters with impossible ages' },
    { id: 'orphanedLocations', name: '📍 Orphaned Locations', desc: 'Find locations with broken parent references' },
    { id: 'invalidRanks', name: '👑 Invalid Rank References', desc: 'Find characters with missing rank IDs' },
    { id: 'invalidRoles', name: '⚒️ Invalid Role References', desc: 'Find characters with missing role IDs' },
    { id: 'timelineIssues', name: '⏰ Timeline Issues', desc: 'Find moves and events with timeline problems' },
    { id: 'dataSummary', name: '📈 Data Summary', desc: 'Overview of all loaded data' }
  ];
  
  let currentIssues = [];
  
  function renderDiagnosticList() {
    const container = document.getElementById('diagnosticList');
    container.innerHTML = diagnostics.map(d => `
      <div class="diagnostic-item" data-id="${d.id}">
        <div class="diagnostic-name">${d.name}</div>
        <div class="diagnostic-status">${d.desc}</div>
      </div>
    `).join('');
    
    document.querySelectorAll('.diagnostic-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.diagnostic-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        runDiagnostic(item.dataset.id);
      });
    });
  }
  
  async function runDiagnostic(diagnosticId) {
    if (!currentData) {
      showEmptyState('No data loaded. Please load data from storage or upload a JSON file.');
      return;
    }
    
    document.getElementById('panelTitle').textContent = diagnostics.find(d => d.id === diagnosticId)?.name || 'Results';
    
    switch(diagnosticId) {
      case 'storageInfo':
        await showStorageInfo();
        break;
      case 'orphans':
        await findOrphans();
        break;
      case 'parentNoRelation':
        await findParentsWithoutRelationship();
        break;
      case 'duplicateIds':
        await findDuplicateIds();
        break;
      case 'ageIssues':
        await findAgeIssues();
        break;
      case 'orphanedLocations':
        await findOrphanedLocations();
        break;
      case 'invalidRanks':
        await findInvalidRanks();
        break;
      case 'invalidRoles':
        await findInvalidRoles();
        break;
      case 'timelineIssues':
        await findTimelineIssues();
        break;
      case 'dataSummary':
        await showDataSummary();
        break;
    }
  }
  
  function showEmptyState(message) {
    document.getElementById('panelContent').innerHTML = `<div class="empty-state">${message}</div>`;
  }
  
  function showResults(title, issues, fixFunction = null) {
    if (!issues || issues.length === 0) {
      document.getElementById('panelContent').innerHTML = `
        <div class="result-section">
          <div class="result-header">✅ No Issues Found</div>
          <div class="result-body">All checks passed!</div>
        </div>
      `;
      return;
    }
    
    const fixButton = fixFunction ? `<button id="fixIssuesBtn" class="btn warning">🔧 Fix Issues</button>` : '';
    
    document.getElementById('panelContent').innerHTML = `
      <div class="result-section">
        <div class="result-header">
          <span>⚠️ ${title} (${issues.length} issues found)</span>
          ${fixButton}
        </div>
        <div class="result-body">
          ${issues.map((issue, idx) => `
            <div class="issue-item">
              <div class="title">#${idx + 1} ${issue.title || 'Issue'}</div>
              <div class="details">${issue.details || ''}</div>
              ${issue.data ? `<pre style="font-size:0.65rem; margin-top:8px;">${JSON.stringify(issue.data, null, 2)}</pre>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
    
    if (fixFunction) {
      document.getElementById('fixIssuesBtn')?.addEventListener('click', () => fixFunction(issues));
    }
  }
  
  // ==================== DIAGNOSTIC FUNCTIONS ====================
  
  async function showStorageInfo() {
    const storageKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      const value = localStorage.getItem(key);
      storageKeys.push({
        key: key,
        size: (value?.length || 0) + ' bytes',
        preview: value?.substring(0, 100) + (value?.length > 100 ? '...' : '')
      });
    }
    
    document.getElementById('panelContent').innerHTML = `
      <div class="result-section">
        <div class="result-header">📊 LocalStorage Contents</div>
        <div class="result-body">
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">${storageKeys.length}</div><div class="stat-label">Total Keys</div></div>
            <div class="stat-card"><div class="stat-value">${currentData ? Object.keys(currentData).length : 0}</div><div class="stat-label">Loaded Data Keys</div></div>
          </div>
          ${storageKeys.map(k => `
            <div class="issue-item">
              <div class="title">🗝️ ${k.key}</div>
              <div class="details">Size: ${k.size}</div>
              <pre style="font-size:0.65rem; margin-top:8px;">${escapeHtml(k.preview)}</pre>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  async function findOrphans() {
    const characters = extractCharacters(currentData);
    if (!characters.length) {
      showResults('Orphan Check', [], null);
      return;
    }
    
    const orphans = characters.filter(c => {
      const hasMother = c.motherId && characters.find(m => m.id === c.motherId);
      const hasFather = c.fatherId && characters.find(f => f.id === c.fatherId);
      return (!hasMother && c.motherId) || (!hasFather && c.fatherId);
    });
    
    const issues = orphans.map(c => ({
      title: `${c.name} ${c.surname || ''}`,
      details: `Missing: ${!c.motherId ? '' : 'Mother reference broken'} ${!c.fatherId ? '' : 'Father reference broken'}`,
      data: { id: c.id, motherId: c.motherId, fatherId: c.fatherId }
    }));
    
    showResults('Children Without Parents', issues, (issuesList) => {
      issuesList.forEach(issue => {
        const char = characters.find(c => c.id === issue.data.id);
        if (char) {
          if (char.motherId && !characters.find(m => m.id === char.motherId)) char.motherId = null;
          if (char.fatherId && !characters.find(f => f.id === char.fatherId)) char.fatherId = null;
        }
      });
      updateDataInSource(characters);
      showToast('Fixed orphaned references');
      runDiagnostic('orphans');
    });
  }
  
  async function findParentsWithoutRelationship() {
    const characters = extractCharacters(currentData);
    if (!characters.length) {
      showResults('Parent Relationship Check', [], null);
      return;
    }
    
    const issues = [];
    characters.forEach(child => {
      const mother = child.motherId ? characters.find(m => m.id === child.motherId) : null;
      const father = child.fatherId ? characters.find(f => f.id === child.fatherId) : null;
      
      if (mother && father) {
        const motherHasRelation = mother.relationships?.some(r => r.partnerId === father.id);
        const fatherHasRelation = father.relationships?.some(r => r.partnerId === mother.id);
        
        if (!motherHasRelation && !fatherHasRelation) {
          issues.push({
            title: `${child.name} ${child.surname || ''}`,
            details: `Parents ${mother.name} and ${father.name} have no recorded relationship`,
            data: { childId: child.id, motherId: mother.id, fatherId: father.id }
          });
        }
      }
    });
    
    showResults('Parents Without Relationship', issues, (issuesList) => {
      issuesList.forEach(issue => {
        const mother = characters.find(m => m.id === issue.data.motherId);
        const father = characters.find(f => f.id === issue.data.fatherId);
        if (mother && father) {
          if (!mother.relationships) mother.relationships = [];
          if (!father.relationships) father.relationships = [];
          
          const relId = 'rel_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
          const relationship = {
            id: relId,
            partnerId: father.id,
            type: 'Serious',
            status: 'ongoing',
            startYear: Math.min(child.birthYear - 20, 1200),
            notes: 'Auto-generated relationship from diagnostics'
          };
          mother.relationships.push(relationship);
          
          const relId2 = 'rel_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
          const relationship2 = {
            id: relId2,
            partnerId: mother.id,
            type: 'Serious',
            status: 'ongoing',
            startYear: Math.min(child.birthYear - 20, 1200),
            notes: 'Auto-generated relationship from diagnostics'
          };
          father.relationships.push(relationship2);
        }
      });
      updateDataInSource(characters);
      showToast('Added missing parent relationships');
      runDiagnostic('parentNoRelation');
    });
  }
  
  async function findDuplicateIds() {
    const allIds = [];
    const collectIds = (obj, prefix = '') => {
      if (obj && typeof obj === 'object') {
        if (obj.id) allIds.push({ id: obj.id, source: prefix + (obj.name || obj.displayName || 'unknown') });
        Object.values(obj).forEach(v => collectIds(v, prefix + ' > '));
      }
    };
    collectIds(currentData);
    
    const duplicates = allIds.reduce((acc, item) => {
      acc[item.id] = acc[item.id] || [];
      acc[item.id].push(item);
      return acc;
    }, {});
    
    const issues = Object.entries(duplicates)
      .filter(([id, items]) => items.length > 1)
      .map(([id, items]) => ({
        title: `Duplicate ID: ${id}`,
        details: `Found in ${items.length} locations: ${items.map(i => i.source).join(', ')}`,
        data: items
      }));
    
    showResults('Duplicate IDs', issues);
  }
  
  async function findAgeIssues() {
    const characters = extractCharacters(currentData);
    if (!characters.length) {
      showResults('Age Issues', [], null);
      return;
    }
    
    const issues = [];
    characters.forEach(c => {
      const age = c.isDeceased && c.deathYear ? c.deathYear - c.birthYear : currentYear - c.birthYear;
      if (c.birthYear && (c.birthYear < 0 || c.birthYear > currentYear + 10)) {
        issues.push({ title: `${c.name}`, details: `Impossible birth year: ${c.birthYear}` });
      }
      if (c.isDeceased && c.deathYear && c.deathYear < c.birthYear) {
        issues.push({ title: `${c.name}`, details: `Death year (${c.deathYear}) before birth year (${c.birthYear})` });
      }
      if (age > 120) {
        issues.push({ title: `${c.name}`, details: `Unusually old: ${age} years` });
      }
      if (c.motherId && c.fatherId) {
        const mother = characters.find(m => m.id === c.motherId);
        const father = characters.find(f => f.id === c.fatherId);
        if (mother && c.birthYear - mother.birthYear < 12) {
          issues.push({ title: `${c.name}`, details: `Mother was ${c.birthYear - mother.birthYear} at birth (too young)` });
        }
        if (father && c.birthYear - father.birthYear < 12) {
          issues.push({ title: `${c.name}`, details: `Father was ${c.birthYear - father.birthYear} at birth (too young)` });
        }
      }
    });
    
    showResults('Age Issues', issues);
  }
  
  async function findOrphanedLocations() {
    const places = extractPlaces(currentData);
    if (!places.length) {
      showResults('Orphaned Locations', [], null);
      return;
    }
    
    const orphaned = places.filter(p => p.parentId && !places.find(parent => parent.id === p.parentId));
    
    const issues = orphaned.map(p => ({
      title: p.displayName || p.name,
      details: `Parent reference missing: ${p.parentId}`,
      data: p
    }));
    
    showResults('Orphaned Locations', issues, (issuesList) => {
      issuesList.forEach(issue => {
        const place = places.find(p => p.id === issue.data.id);
        if (place) place.parentId = null;
      });
      updateDataInSource(places);
      showToast('Fixed orphaned locations');
      runDiagnostic('orphanedLocations');
    });
  }
  
  async function findInvalidRanks() {
    const characters = extractCharacters(currentData);
    const ranks = extractRanks(currentData);
    if (!characters.length) {
      showResults('Invalid Ranks', [], null);
      return;
    }
    
    const issues = [];
    characters.forEach(c => {
      if (c.rankAssignments) {
        c.rankAssignments.forEach(ra => {
          if (ra.rankId && !ranks.find(r => r.id === ra.rankId)) {
            issues.push({
              title: c.name,
              details: `Invalid rank reference: ${ra.rankId}`,
              data: { characterId: c.id, rankId: ra.rankId }
            });
          }
        });
      }
    });
    
    showResults('Invalid Rank References', issues, (issuesList) => {
      issuesList.forEach(issue => {
        const char = characters.find(c => c.id === issue.data.characterId);
        if (char && char.rankAssignments) {
          char.rankAssignments = char.rankAssignments.filter(ra => ra.rankId !== issue.data.rankId);
        }
      });
      updateDataInSource(characters);
      showToast('Removed invalid rank references');
      runDiagnostic('invalidRanks');
    });
  }
  
  async function findInvalidRoles() {
    const characters = extractCharacters(currentData);
    const roles = extractRoles(currentData);
    if (!characters.length) {
      showResults('Invalid Roles', [], null);
      return;
    }
    
    const issues = [];
    characters.forEach(c => {
      if (c.currentRole && c.currentRole.id && !roles.find(r => r.id === c.currentRole.id)) {
        issues.push({
          title: c.name,
          details: `Invalid role reference: ${c.currentRole.id}`,
          data: { characterId: c.id, roleId: c.currentRole.id }
        });
      }
    });
    
    showResults('Invalid Role References', issues, (issuesList) => {
      issuesList.forEach(issue => {
        const char = characters.find(c => c.id === issue.data.characterId);
        if (char) char.currentRole = null;
      });
      updateDataInSource(characters);
      showToast('Removed invalid role references');
      runDiagnostic('invalidRoles');
    });
  }
  
  async function findTimelineIssues() {
    const characters = extractCharacters(currentData);
    const issues = [];
    
    characters.forEach(c => {
      if (c.moves && c.moves.length > 1) {
        for (let i = 1; i < c.moves.length; i++) {
          if (c.moves[i].year < c.moves[i-1].year) {
            issues.push({
              title: c.name,
              details: `Move timeline issue: ${c.moves[i-1].year} → ${c.moves[i].year} (move out of order)`,
              data: c.moves
            });
            break;
          }
        }
      }
      if (c.relationships) {
        c.relationships.forEach(rel => {
          if (rel.endYear && rel.startYear && rel.endYear < rel.startYear) {
            issues.push({
              title: c.name,
              details: `Relationship timeline issue: started ${rel.startYear}, ended ${rel.endYear}`,
              data: rel
            });
          }
        });
      }
    });
    
    showResults('Timeline Issues', issues, (issuesList) => {
      issuesList.forEach(issue => {
        if (issue.data && Array.isArray(issue.data)) {
          issue.data.sort((a, b) => a.year - b.year);
        }
      });
      updateDataInSource(characters);
      showToast('Sorted move timelines');
      runDiagnostic('timelineIssues');
    });
  }
  
  async function showDataSummary() {
    const stats = {
      characters: extractCharacters(currentData).length,
      ranks: extractRanks(currentData).length,
      roles: extractRoles(currentData).length,
      places: extractPlaces(currentData).length,
      locationTypes: extractLocationTypes(currentData).length,
      governments: extractGovernments(currentData).length,
      nameLists: Object.keys(extractNameLists(currentData)).length
    };
    
    document.getElementById('panelContent').innerHTML = `
      <div class="result-section">
        <div class="result-header">📈 Data Summary</div>
        <div class="result-body">
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">${stats.characters}</div><div class="stat-label">Characters</div></div>
            <div class="stat-card"><div class="stat-value">${stats.ranks}</div><div class="stat-label">Ranks</div></div>
            <div class="stat-card"><div class="stat-value">${stats.roles}</div><div class="stat-label">Roles</div></div>
            <div class="stat-card"><div class="stat-value">${stats.places}</div><div class="stat-label">Places</div></div>
            <div class="stat-card"><div class="stat-value">${stats.locationTypes}</div><div class="stat-label">Location Types</div></div>
            <div class="stat-card"><div class="stat-value">${stats.governments}</div><div class="stat-label">Governments</div></div>
            <div class="stat-card"><div class="stat-value">${stats.nameLists}</div><div class="stat-label">Name Lists</div></div>
          </div>
          <div class="code-block">${JSON.stringify(currentData, null, 2)}</div>
        </div>
      </div>
    `;
  }
  
  // ==================== HELPER FUNCTIONS ====================
  
  function extractCharacters(data) {
    if (data.characters) return data.characters;
    if (data.data?.characters) return data.data.characters;
    if (Array.isArray(data) && data[0]?.name && data[0]?.gender !== undefined) return data;
    return [];
  }
  
  function extractRanks(data) {
    if (data.ranks) return data.ranks;
    if (data.data?.ranks) return data.data.ranks;
    if (Array.isArray(data) && data[0]?.priority !== undefined) return data;
    return [];
  }
  
  function extractRoles(data) {
    if (data.roles) return data.roles;
    if (data.data?.roles) return data.data.roles;
    if (Array.isArray(data) && data[0]?.specializations !== undefined) return data;
    return [];
  }
  
  function extractPlaces(data) {
    if (data.places) return data.places;
    if (data.data?.places) return data.data.places;
    return [];
  }
  
  function extractLocationTypes(data) {
    if (data.locationTypes) return data.locationTypes;
    if (data.data?.locationTypes) return data.data.locationTypes;
    return [];
  }
  
  function extractGovernments(data) {
    if (data.governments) return data.governments;
    if (data.data?.governments) return data.data.governments;
    return [];
  }
  
  function extractNameLists(data) {
    if (data.nameLists) return data.nameLists;
    if (data.data?.nameLists) return data.data.nameLists;
    return {};
  }
  
  function updateDataInSource(updatedData) {
    if (currentData.characters) currentData.characters = updatedData;
    else if (currentData.data?.characters) currentData.data.characters = updatedData;
    else if (Array.isArray(currentData) && updatedData[0]?.name) currentData = updatedData;
  }
  
  let currentYear = 1250;
  
  // ==================== LOAD FUNCTIONS ====================
  
  function loadFromStorage() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        currentData = JSON.parse(stored);
        currentDataType = 'master';
        showToast('Loaded data from localStorage');
        runDiagnostic('dataSummary');
      } catch(e) { showToast('Error loading from storage'); }
    } else {
      showToast('No data found in localStorage');
    }
  }
  
  function loadFromFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          currentData = JSON.parse(ev.target.result);
          currentDataType = 'file';
          showToast(`Loaded file: ${file.name}`);
          runDiagnostic('dataSummary');
        } catch(err) { alert('Invalid JSON: ' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function mergeFiles() {
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.innerHTML = `
      <div class="modal-content" style="max-width:600px;">
        <h3>🔄 Merge JSON Files</h3>
        <div class="merge-section">
          <div class="file-input-area" id="file1Area">
            📁 Select First JSON File
            <input type="file" accept="application/json" id="file1Input" style="display:none;">
          </div>
          <div id="file1Preview" class="code-block" style="max-height:150px; display:none;"></div>
        </div>
        <div class="merge-section">
          <div class="file-input-area" id="file2Area">
            📁 Select Second JSON File
            <input type="file" accept="application/json" id="file2Input" style="display:none;">
          </div>
          <div id="file2Preview" class="code-block" style="max-height:150px; display:none;"></div>
        </div>
        <div class="action-buttons">
          <button id="performMergeBtn" class="btn primary" disabled>Merge & Export</button>
          <button id="closeMergeBtn" class="btn">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    
    let data1 = null, data2 = null;
    
    function setupFileInput(areaId, inputId, previewId, setData) {
      const area = modal.querySelector(areaId);
      const input = modal.querySelector(inputId);
      area.addEventListener('click', () => input.click());
      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            setData(data);
            const preview = modal.querySelector(previewId);
            preview.style.display = 'block';
            preview.innerHTML = `<strong>${file.name}</strong><br>${JSON.stringify(data, null, 2).substring(0, 500)}${JSON.stringify(data, null, 2).length > 500 ? '...' : ''}`;
            if (data1 && data2) modal.querySelector('#performMergeBtn').disabled = false;
          } catch(err) { alert('Invalid JSON'); }
        };
        reader.readAsText(file);
      });
    }
    
    setupFileInput('#file1Area', '#file1Input', '#file1Preview', (d) => data1 = d);
    setupFileInput('#file2Area', '#file2Input', '#file2Preview', (d) => data2 = d);
    
    modal.querySelector('#performMergeBtn').addEventListener('click', () => {
      const merged = deepMerge(data1, data2);
      currentData = merged;
      currentDataType = 'merged';
      showToast('Files merged successfully');
      modal.remove();
      runDiagnostic('dataSummary');
    });
    
    modal.querySelector('#closeMergeBtn').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
  }
  
  function deepMerge(target, source) {
    const result = { ...target };
    for (const key in source) {
      if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
        result[key] = deepMerge(result[key] || {}, source[key]);
      } else if (Array.isArray(source[key])) {
        result[key] = [...(result[key] || []), ...source[key]];
      } else {
        result[key] = source[key];
      }
    }
    return result;
  }
  
  function exportFixed() {
    if (!currentData) {
      showToast('No data to export');
      return;
    }
    const dataStr = JSON.stringify(currentData, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_fixed_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Fixed data exported');
  }
  
  function clearStorage() {
    if (confirm('⚠️ WARNING: This will clear ALL localStorage data. This cannot be undone. Continue?')) {
      localStorage.clear();
      showToast('LocalStorage cleared');
      currentData = null;
      runDiagnostic('storageInfo');
    }
  }
  
  function runAllDiagnostics() {
    if (!currentData) {
      showToast('Please load data first');
      return;
    }
    const results = [];
    const runSequential = async (index) => {
      if (index >= diagnostics.length) {
        showToast(`Completed all diagnostics. Found ${results.length} total issues.`);
        return;
      }
      const diag = diagnostics[index];
      // Simulate running diagnostic and collecting results
      results.push({ name: diag.name });
      await runDiagnostic(diag.id);
      setTimeout(() => runSequential(index + 1), 500);
    };
    runSequential(0);
  }
  
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
  }
  
  // ==================== INIT ====================
  function init() {
    renderDiagnosticList();
    
    document.getElementById('loadStorageBtn').addEventListener('click', loadFromStorage);
    document.getElementById('loadFileBtn').addEventListener('click', loadFromFile);
    document.getElementById('mergeBtn').addEventListener('click', mergeFiles);
    document.getElementById('runAllBtn').addEventListener('click', runAllDiagnostics);
    document.getElementById('exportFixedBtn').addEventListener('click', exportFixed);
    document.getElementById('clearStorageBtn').addEventListener('click', clearStorage);
  }
  
  init();
</script>
</body>
</html>

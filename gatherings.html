<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Still Waters — Gatherings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090c12;--bg2:#0d1119;--bg3:#121820;--bg4:#16202c;
  --bd:#1e2738;--bd2:#2a3a50;
  --text:#cdd5e0;--tdim:#8aabb8;--tmut:#2a3a50;
  --acc:#6a9ecf;--acc2:#4a7ab0;--acc-dim:#1a2d48;
  --gold:#6a9ecf;--sage:#4a7ab0;--slate:#8aabb8;
  --deceased:#8f5e5e;
  
  /* Rank colors - monochrome simple icons */
  --rank-chief:#c9a87c;
  --rank-sacred-sons:#a87898;
  --rank-sacred:#7a9eb0;
  --rank-sacred-daughters:#b88aa8;
  --rank-consort:#c89880;
  --rank-elder:#6a9ecf;
  --rank-master:#8a9eb0;
  --rank-commoner:#6a8098;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
#topbar{
  display:flex;align-items:center;gap:8px;padding:6px 10px;
  background:var(--bg3);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap;
}
#topbar h1{
  font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.2em;
  color:var(--acc);text-transform:uppercase;flex:1;min-width:100px;
}
.tb-btn{
  padding:4px 8px;font-size:.6rem;font-family:'Cinzel',serif;letter-spacing:.1em;
  background:var(--bg4);border:1px solid var(--bd2);border-radius:4px;
  color:var(--tdim);cursor:pointer;text-transform:uppercase;transition:color .15s,border-color .15s;
  white-space:nowrap;
}
.tb-btn.active{background:var(--acc);color:#0a0908;border-color:var(--acc)}
.tb-btn:hover{color:var(--acc);border-color:var(--acc);}
.tb-btn.primary{background:var(--acc-dim);border-color:var(--acc);color:var(--acc);}
.tb-btn.primary:hover{background:rgba(74,122,176,.25);}
.tb-sep{width:1px;height:18px;background:var(--bd2);flex-shrink:0;}

/* Main content */
#main{
  flex:1;
  overflow-y: auto;
  padding: 20px;
}

/* Tab bar */
.tab-bar{
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--bd);
  padding-bottom: 10px;
}
.tab-btn{
  padding: 8px 16px;
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--tdim);
  cursor: pointer;
  border: 1px solid var(--bd2);
  border-radius: 4px;
  background: var(--bg2);
  transition: all 0.2s;
}
.tab-btn:hover{
  border-color: var(--acc);
  color: var(--acc);
}
.tab-btn.active{
  background: var(--acc-dim);
  border-color: var(--acc2);
  color: var(--acc);
}

/* District selector */
.district-selector{
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.district-selector label{
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  color: var(--tdim);
  text-transform: uppercase;
}
.district-selector select{
  padding: 6px 10px;
  background: var(--bg2);
  border: 1px solid var(--bd2);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Crimson Pro', serif;
  font-size: 0.8rem;
  min-width: 150px;
}
.district-selector select:focus{
  outline: none;
  border-color: var(--acc);
}

/* Festival diagram */
.festival-container{
  max-width: 900px;
  margin: 0 auto;
}
.fstg-wrap{
  display: flex;
  gap: 0;
  min-height: 500px;
}
.fstg-col{
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 10px 8px;
  gap: 3px;
}
.fstg-col.women{
  align-items: flex-end;
}
.fstg-divider{
  width: 1px;
  background: var(--bd2);
  align-self: stretch;
  margin: 10px 0;
}
.rank-cluster{
  width: 100%;
  margin-bottom: 8px;
}
.rank-lbl{
  font-family: 'Cinzel', serif;
  font-size: 0.45rem;
  letter-spacing: 0.18em;
  color: var(--tmut);
  text-transform: uppercase;
  padding: 2px 4px;
  border-bottom: 1px solid var(--bd);
  margin-bottom: 4px;
}
.fst-name{
  font-size: 0.78rem;
  padding: 3px 8px;
  cursor: pointer;
  border-radius: 3px;
  border: 1px solid transparent;
  transition: all 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 160px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.fst-name:hover{
  border-color: var(--acc);
  color: var(--acc);
}
.fst-name.chief-node{
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  color: var(--acc);
  border: 1px solid var(--acc);
  padding: 5px 12px;
  letter-spacing: 0.08em;
  text-align: center;
}
.fst-name.no-rank{
  color: var(--tmut);
}
.fstg-center{
  width: 140px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
  gap: 4px;
}

/* Council diagram */
.council-container{
  max-width: 900px;
  margin: 0 auto;
}
.council-chief{
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
}
.council-chief-card{
  background: var(--bg2);
  border: 1px solid var(--acc2);
  border-radius: 6px;
  padding: 8px 24px;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--acc);
  cursor: pointer;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 6px;
}
.council-chief-card:hover{
  background: var(--acc-dim);
}
.council-chief-title{
  font-size: 0.55rem;
  color: var(--tdim);
  letter-spacing: 0.18em;
  margin-bottom: 4px;
  font-family: 'Cinzel', serif;
}
.council-spine{
  width: 2px;
  background: var(--bd);
  height: 24px;
  margin: 0 auto;
}
.council-body{
  display: flex;
  gap: 0;
  align-items: flex-start;
  position: relative;
}
.council-col{
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 0 15px;
}
.council-col.men{
  align-items: flex-end;
}
.council-col.women{
  align-items: flex-start;
}
.council-center-line{
  width: 2px;
  background: var(--bd);
  align-self: stretch;
  flex-shrink: 0;
}
.council-card{
  background: var(--bg2);
  border: 1px solid var(--bd2);
  border-radius: 5px;
  padding: 6px 12px;
  font-size: 0.75rem;
  cursor: pointer;
  max-width: 220px;
  width: 100%;
  transition: border-color 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.council-card:hover{
  border-color: var(--acc2);
}
.council-card.women{
  text-align: left;
}
.council-card.men{
  text-align: right;
}
.council-card-name{
  color: var(--text);
  font-size: 0.75rem;
}
.council-card-sub{
  color: var(--tdim);
  font-size: 0.6rem;
  margin-top: 2px;
}
.council-col-header{
  font-family: 'Cinzel', serif;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  color: var(--tdim);
  margin-bottom: 5px;
  padding: 0 4px;
}
.council-col.men .council-col-header{
  text-align: right;
}
.council-col.women .council-col-header{
  text-align: left;
}

/* Rank icons - monochrome simple symbols */
.rank-icon {
  font-size: 0.75rem;
  margin-right: 2px;
  color: var(--dim);
}
.rank-icon.chief { color: var(--rank-chief); }
.rank-icon.sacred-sons { color: var(--rank-sacred-sons); }
.rank-icon.sacred { color: var(--rank-sacred); }
.rank-icon.sacred-daughters { color: var(--rank-sacred-daughters); }
.rank-icon.consort { color: var(--rank-consort); }
.rank-icon.elder { color: var(--rank-elder); }
.rank-icon.master { color: var(--rank-master); }
.rank-icon.commoner { color: var(--rank-commoner); }

/* Rank number badge */
.rank-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid currentColor;
  font-size: 0.5rem;
  margin-left: 2px;
}

/* Person popup */
#person-popup{
  display:none;position:fixed;z-index:400;
  background:var(--bg3);border:1px solid var(--bd2);border-radius:6px;
  padding:12px;min-width:200px;max-width:260px;
  box-shadow:0 8px 32px #0008;
}
#person-popup h3{
  font-family:'Cinzel',serif;
  font-size:.7rem;
  letter-spacing:.1em;
  color:var(--acc);
  margin-bottom:4px;
}
.pr{
  font-size:.75rem;
  color:var(--tdim);
  margin-bottom:2px;
}
.pr span{
  color:var(--text);
}
.pop-ranks{
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin: 5px 0;
}

/* Empty state */
.empty-msg{
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--tdim);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* Mobile responsiveness */
@media(max-width:700px){
  .fst-name{
    max-width: 100px;
    font-size: 0.7rem;
  }
  .fstg-center{
    width: 90px;
  }
  .council-card{
    max-width: 160px;
    font-size: 0.7rem;
  }
  .tab-btn{
    padding: 6px 12px;
    font-size: 0.65rem;
  }
}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="topbar">
  <h1>Still Waters · Gatherings</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="loadFromViewer()">⟳ Load Data</button>
  <label class="tb-btn" style="cursor:pointer">⬆ Load JSON<input type="file" accept=".json" style="display:none" onchange="loadJSON(event)"></label>
</div>

<!-- MAIN CONTENT -->
<div id="main">
  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('festival')">⛩ Festival</button>
    <button class="tab-btn" onclick="switchTab('council')">⚖ Council of Elders</button>
  </div>

  <!-- District Selector -->
  <div class="district-selector">
    <label>District:</label>
    <select id="district-select" onchange="renderCurrentTab()">
      <option value="">All Districts</option>
    </select>
  </div>

  <!-- Festival View -->
  <div id="festival-view" class="festival-container"></div>

  <!-- Council View -->
  <div id="council-view" class="council-container" style="display:none;"></div>
</div>

<!-- PERSON POPUP -->
<div id="person-popup">
  <h3 id="pp-n"></h3>
  <div class="pr">Age: <span id="pp-a">—</span></div>
  <div class="pr">Stage: <span id="pp-s">—</span></div>
  <div class="pr">Compound: <span id="pp-c">—</span></div>
  <div class="pr">Ranks:</div>
  <div class="pop-ranks" id="pp-ranks"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  UNIFIED DATA STRUCTURE (VIEW ONLY)
// ════════════════════════════════════════════════════════════
let DATA = {
  version: null,
  currentYear: 1560,
  people: {},        // Core identity data
  relationships: {}, // Connection-specific data
  locations: {},     // Location data
  professions: [],   // Profession definitions
  metadata: {}
};

let currentTab = 'festival';

// ════════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════════
const COMP_LABELS = {
  awa: 'Kainga-Awa',
  van: 'Kainga-Vanu',
  ahi: 'Kainga-Ahi',
  man: 'Kainga-Manu',
  vaitea: 'Vaitea',
  paretu: 'Paretū',
  straecia: 'Straecia',
  other: 'Other'
};

const RANK_SYMBOLS = {
  'Chief': '★',
  'Sacred Sons': '⌾',
  'Sacred': '◈',
  'Sacred Daughters': '◉',
  'Sacred Consort': '⌇',
  'Elder': '▲',
  'Master': '◆',
  'Commoner': '·'
};

const RANK_ORDER_ARR = [
  { val: 'Chief', n: 1 },
  { val: 'Sacred Sons', n: 2 },
  { val: 'Elder', n: 3 },
  { val: 'Sacred', n: 4 },
  { val: 'Sacred Daughters', n: 5 },
  { val: 'Master', n: 6 },
  { val: 'Sacred Consort', n: 7 },
  { val: 'Commoner', n: 8 }
];

function RANK_ORDER(r) { 
  const e = RANK_ORDER_ARR.find(x => x.val === r); 
  return e ? e.n : 9; 
}

// ════════════════════════════════════════════════════════════
//  DATA LOADING (VIEW ONLY)
// ════════════════════════════════════════════════════════════
function loadJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      
      if (imported.version || imported.people) {
        DATA = {
          version: imported.version || "1.0",
          currentYear: imported.currentYear || 1560,
          people: imported.people || {},
          relationships: imported.relationships || {},
          locations: imported.locations || {},
          professions: imported.professions || [],
          metadata: imported.metadata || {}
        };
      } else {
        // Old format
        if (imported.people) DATA.people = imported.people;
        if (imported.locations) DATA.locations = imported.locations;
        if (imported.professions) DATA.professions = imported.professions;
      }
      
      populateDistrictSelector();
      renderCurrentTab();
    } catch (err) {
      alert('Error loading file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function loadFromViewer() {
  // Try to load from any of the storage keys
  const keys = ['stillwaters_editor', 'stillwaters_connections', 'stillwaters_locations', 'stillwaters_professions'];
  let loaded = false;
  
  keys.forEach(key => {
    if (loaded) return;
    const raw = localStorage.getItem(key);
    if (!raw) return;
    
    try {
      const imported = JSON.parse(raw);
      if (imported.version || imported.people) {
        DATA = {
          version: imported.version || "1.0",
          currentYear: imported.currentYear || 1560,
          people: imported.people || {},
          relationships: imported.relationships || {},
          locations: imported.locations || {},
          professions: imported.professions || [],
          metadata: imported.metadata || {}
        };
        loaded = true;
      }
    } catch (e) {
      console.error('Failed to parse from', key, e);
    }
  });
  
  if (loaded) {
    populateDistrictSelector();
    renderCurrentTab();
  } else {
    alert('No compatible data found in localStorage. Please load a JSON file first.');
  }
}

// ════════════════════════════════════════════════════════════
//  DISTRICT FUNCTIONS
// ════════════════════════════════════════════════════════════
function populateDistrictSelector() {
  const districts = new Set();
  
  // Get all towns/villages from locations
  Object.values(DATA.locations).forEach(loc => {
    if (loc.level === 'town' || loc.level === 'village') {
      districts.add(loc.name);
    }
  });
  
  const selector = document.getElementById('district-select');
  selector.innerHTML = '<option value="">All Districts</option>';
  
  Array.from(districts).sort().forEach(district => {
    selector.innerHTML += `<option value="${escapeHtml(district)}">${escapeHtml(district)}</option>`;
  });
}

function getSelectedDistrict() {
  return document.getElementById('district-select').value;
}

function getCompoundsInDistrict(districtName) {
  if (!districtName) {
    // Return all compounds
    return Object.entries(DATA.locations)
      .filter(([, loc]) => loc.level === 'compound')
      .map(([id, loc]) => ({ id, ...loc }));
  }
  
  // Find the district/town/village
  const districtLoc = Object.entries(DATA.locations).find(([, loc]) => 
    (loc.level === 'town' || loc.level === 'village') && loc.name === districtName
  );
  
  if (!districtLoc) return [];
  
  const districtId = districtLoc[0];
  
  // Find all compounds that have this district as parent (or nested)
  const compounds = [];
  
  function findCompounds(parentId) {
    Object.entries(DATA.locations).forEach(([id, loc]) => {
      if (loc.parentId === parentId) {
        if (loc.level === 'compound') {
          compounds.push({ id, ...loc });
        } else {
          findCompounds(id);
        }
      }
    });
  }
  
  findCompounds(districtId);
  return compounds;
}

function isPersonInDistrict(personId, districtName) {
  const person = DATA.people[personId];
  if (!person) return false;
  
  const currComp = person.currComp || person.birthComp;
  if (!currComp) return false;
  
  // If no district filter, include everyone
  if (!districtName) return true;
  
  // Find the compound location with this compKey
  const compoundLoc = Object.entries(DATA.locations).find(([, loc]) => 
    loc.compKey === currComp && loc.level === 'compound'
  );
  
  if (!compoundLoc) return false;
  
  // Check if this compound is in the selected district
  const compoundsInDistrict = getCompoundsInDistrict(districtName);
  return compoundsInDistrict.some(c => c.compKey === currComp);
}

// ════════════════════════════════════════════════════════════
//  TAB SWITCHING
// ════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  document.getElementById('festival-view').style.display = tab === 'festival' ? 'block' : 'none';
  document.getElementById('council-view').style.display = tab === 'council' ? 'block' : 'none';
  
  renderCurrentTab();
}

function renderCurrentTab() {
  if (currentTab === 'festival') {
    renderFestival();
  } else {
    renderCouncil();
  }
}

// ════════════════════════════════════════════════════════════
//  HELPER FUNCTIONS
// ════════════════════════════════════════════════════════════
function getPerson(id) {
  return DATA.people[id] || {};
}

function displayName(id) {
  const p = getPerson(id);
  return p.name || id;
}

function getRankSymbol(rank) {
  return RANK_SYMBOLS[rank] || '·';
}

function getRankClass(rank) {
  return rank.toLowerCase().replace(/\s+/g, '-');
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/[&<>"]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    if (m === '"') return '&quot;';
    return m;
  });
}

// ════════════════════════════════════════════════════════════
//  FESTIVAL RENDERING
// ════════════════════════════════════════════════════════════
function renderFestival() {
  const container = document.getElementById('festival-view');
  const district = getSelectedDistrict();
  
  // Get all living adults in the selected district
  const ids = Object.keys(DATA.people).filter(id => {
    const p = getPerson(id);
    if (!p.name) return false;
    if (p.deceased) return false;
    if (p.stage === 'child' || p.stage === 'infant') return false;
    if (!isPersonInDistrict(id, district)) return false;
    return true;
  });

  if (!ids.length) {
    container.innerHTML = '<div class="empty-msg">No people found for this district</div>';
    return;
  }

  // Get highest rank for sorting
  function getHighestRank(id) {
    const p = getPerson(id);
    const ranks = p.ranks || [];
    if (ranks.length === 0) return 99;
    return Math.min(...ranks.map(r => RANK_ORDER(r.value) || 99));
  }
  
  ids.sort((a, b) => {
    const rankA = getHighestRank(a);
    const rankB = getHighestRank(b);
    if (rankA !== rankB) return rankA - rankB;
    return displayName(a).localeCompare(displayName(b));
  });

  // Separate chiefs
  const chiefs = ids.filter(id => {
    const p = getPerson(id);
    const ranks = p.ranks || [];
    return ranks.some(r => r.value === 'Chief');
  });
  
  const remaining = ids.filter(id => {
    const p = getPerson(id);
    const ranks = p.ranks || [];
    return !ranks.some(r => r.value === 'Chief');
  });
  
  const men = remaining.filter(id => getPerson(id).gender === 'male');
  const women = remaining.filter(id => getPerson(id).gender === 'female');
  const other = remaining.filter(id => {
    const g = getPerson(id).gender;
    return g !== 'male' && g !== 'female';
  });

  // Group by rank cluster
  function clusterByRank(list) {
    const clusters = {};
    list.forEach(id => {
      const p = getPerson(id);
      const ranks = p.ranks || [];
      const highestRank = ranks.length > 0 ? 
        ranks.sort((a, b) => (RANK_ORDER(a.value) || 99) - (RANK_ORDER(b.value) || 99))[0].value : '—';
      
      if (!clusters[highestRank]) clusters[highestRank] = [];
      clusters[highestRank].push(id);
    });
    return Object.entries(clusters).sort(([a], [b]) => (RANK_ORDER(a) ?? 98) - (RANK_ORDER(b) ?? 98));
  }

  function renderColumn(list) {
    const clusters = clusterByRank(list);
    return clusters.map(([rank, pids]) => `
      <div class="rank-cluster">
        <div class="rank-lbl">
          ${rank !== '—' ? getRankSymbol(rank) + ' ' : ''}${escapeHtml(rank)}
        </div>
        ${pids.map(id => {
          const p = getPerson(id);
          const ranks = p.ranks || [];
          const rankIcons = ranks.map(r => {
            const symbol = getRankSymbol(r.value);
            const rankClass = getRankClass(r.value);
            const numberHtml = r.number ? `<span class="rank-number">${r.number}</span>` : '';
            return `<span class="rank-icon ${rankClass}" title="${r.value}${r.number ? ' ' + r.number : ''}">${symbol}${numberHtml}</span>`;
          }).join('');
          
          return `<div class="fst-name${rank === '—' ? ' no-rank' : ''}" onclick="showPopup(event,'${id}')">
            <span>${rankIcons} ${escapeHtml(displayName(id))}</span>
          </div>`;
        }).join('')}
      </div>`).join('');
  }

  const chiefHTML = chiefs.map(id => {
    const p = getPerson(id);
    const ranks = p.ranks || [];
    const rankIcons = ranks.map(r => {
      const symbol = getRankSymbol(r.value);
      const rankClass = getRankClass(r.value);
      const numberHtml = r.number ? `<span class="rank-number">${r.number}</span>` : '';
      return `<span class="rank-icon ${rankClass}" title="${r.value}${r.number ? ' ' + r.number : ''}">${symbol}${numberHtml}</span>`;
    }).join('');
    
    return `
      <div class="fst-name chief-node" onclick="showPopup(event,'${id}')">
        <span>${rankIcons} ${escapeHtml(displayName(id))}</span>
      </div>`;
  }).join('');

  const menWithOther = [...men, ...other];

  container.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd2)">
      <div style="font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.2em;color:var(--tmut);margin-bottom:8px">CHIEF${chiefs.length > 1 ? 'S' : ''}</div>
      ${chiefHTML || '<div style="color:var(--tmut);font-style:italic;font-size:.78rem">No Chief designated</div>'}
    </div>
    <div style="display:flex;gap:0;font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.15em;color:var(--tdim);margin-bottom:8px;text-align:center">
      <div style="flex:1;text-align:left;padding-left:8px">♂ MEN</div>
      <div style="width:1px"></div>
      <div style="flex:1;text-align:right;padding-right:8px">WOMEN ♀</div>
    </div>
    <div class="fstg-wrap">
      <div class="fstg-col">${renderColumn(menWithOther)}</div>
      <div class="fstg-divider"></div>
      <div class="fstg-col women">${renderColumn(women)}</div>
    </div>
    ${other.length ? `<div style="font-size:.65rem;color:var(--tmut);margin-top:8px;text-align:center;font-style:italic">${other.length} person(s) with unset gender placed on left column</div>` : ''}
  `;
}

// ════════════════════════════════════════════════════════════
//  COUNCIL RENDERING
// ════════════════════════════════════════════════════════════
function renderCouncil() {
  const container = document.getElementById('council-view');
  const district = getSelectedDistrict();

  // Find chiefs (people with Chief rank)
  const chiefs = Object.keys(DATA.people).filter(id => {
    const p = getPerson(id);
    if (!p.name) return false;
    if (p.deceased) return false;
    if (!isPersonInDistrict(id, district)) return false;
    const ranks = p.ranks || [];
    return ranks.some(r => r.value === 'Chief');
  });

  // Find elders (people with Elder rank)
  function isElder(id) {
    const p = getPerson(id);
    if (!p.name) return false;
    if (p.deceased) return false;
    if (!isPersonInDistrict(id, district)) return false;
    const ranks = p.ranks || [];
    return ranks.some(r => r.value === 'Elder');
  }

  const elders = Object.keys(DATA.people).filter(id => isElder(id) && !chiefs.includes(id));
  
  const men = elders.filter(id => getPerson(id).gender === 'male');
  const women = elders.filter(id => getPerson(id).gender === 'female');

  // Sort by age (descending)
  function ageVal(id) { 
    const a = parseInt(getPerson(id).age); 
    return isNaN(a) ? -1 : a; 
  }
  men.sort((a, b) => ageVal(b) - ageVal(a));
  women.sort((a, b) => ageVal(b) - ageVal(a));

  function makeChiefCard(id) {
    const p = getPerson(id);
    if (!p.name) return '';
    const age = p.age ? ' · ' + p.age : '';
    const comp = COMP_LABELS[p.currComp || p.birthComp] || p.currComp || p.birthComp || '';
    const ranks = p.ranks || [];
    const rankIcons = ranks.map(r => {
      const symbol = getRankSymbol(r.value);
      const rankClass = getRankClass(r.value);
      const numberHtml = r.number ? `<span class="rank-number">${r.number}</span>` : '';
      return `<span class="rank-icon ${rankClass}" title="${r.value}${r.number ? ' ' + r.number : ''}">${symbol}${numberHtml}</span>`;
    }).join('');
    
    return '<div class="council-chief">'
      + '<div class="council-chief-title">CHIEF</div>'
      + '<div class="council-chief-card" onclick="showPopup(event,\'' + id + '\')">'
      + '<span>' + rankIcons + ' ' + escapeHtml(displayName(id)) + '</span>'
      + '<div style="font-size:.6rem;color:var(--tdim);font-family:\'Crimson Pro\',serif;margin-top:2px">' + escapeHtml(comp) + age + '</div>'
      + '</div>'
      + '<div class="council-spine"></div>'
      + '</div>';
  }

  function makeElderCard(id, side) {
    const p = getPerson(id);
    if (!p.name) return '';
    const age = p.age ? p.age : '?';
    const comp = COMP_LABELS[p.currComp || p.birthComp] || p.currComp || p.birthComp || '';
    const ranks = p.ranks || [];
    const rankIcons = ranks.map(r => {
      const symbol = getRankSymbol(r.value);
      const rankClass = getRankClass(r.value);
      const numberHtml = r.number ? `<span class="rank-number">${r.number}</span>` : '';
      return `<span class="rank-icon ${rankClass}" title="${r.value}${r.number ? ' ' + r.number : ''}">${symbol}${numberHtml}</span>`;
    }).join('');
    
    return '<div class="council-card ' + side + '" onclick="showPopup(event,\'' + id + '\')">'
      + '<div class="council-card-name">' + rankIcons + ' ' + escapeHtml(displayName(id)) + '</div>'
      + '<div class="council-card-sub">' + escapeHtml(comp) + ' · age ' + age + '</div>'
      + '</div>';
  }

  let html = '';
  if (chiefs.length) {
    html += chiefs.map(makeChiefCard).join('<div style="height:6px"></div>');
  } else {
    html += '<div class="council-chief">'
      + '<div class="council-chief-title">CHIEF</div>'
      + '<div class="council-chief-card" style="opacity:.4;cursor:default">No chief assigned</div>'
      + '<div class="council-spine"></div>'
      + '</div>';
  }
  
  html += '<div class="council-body">'
    + '<div class="council-col men"><div class="council-col-header">♂ MEN</div>'
    + men.map(id => makeElderCard(id, 'men')).join('')
    + (men.length === 0 ? '<div class="council-card men" style="opacity:.3;cursor:default;font-size:.7rem">No male elders</div>' : '')
    + '</div>'
    + '<div class="council-center-line"></div>'
    + '<div class="council-col women"><div class="council-col-header">♀ WOMEN</div>'
    + women.map(id => makeElderCard(id, 'women')).join('')
    + (women.length === 0 ? '<div class="council-card women" style="opacity:.3;cursor:default;font-size:.7rem">No female elders</div>' : '')
    + '</div>'
    + '</div>';
  
  container.innerHTML = html;
}

// ════════════════════════════════════════════════════════════
//  PERSON POPUP
// ════════════════════════════════════════════════════════════
function showPopup(e, id) {
  e.stopPropagation();
  const p = getPerson(id);
  if (!p.name) return;
  
  document.getElementById('pp-n').textContent = displayName(id);
  document.getElementById('pp-a').textContent = p.age || '—';
  document.getElementById('pp-s').textContent = p.stage || '—';
  document.getElementById('pp-c').textContent = COMP_LABELS[p.currComp || p.birthComp] || p.currComp || p.birthComp || '—';
  
  const ranks = p.ranks || [];
  const ranksEl = document.getElementById('pp-ranks');
  
  if (ranks.length > 0) {
    ranksEl.innerHTML = ranks.map(r => {
      const symbol = getRankSymbol(r.value);
      const rankClass = getRankClass(r.value);
      const numberHtml = r.number ? `<span class="rank-number">${r.number}</span>` : '';
      return `<span class="rank-chip ${rankClass}" style="border-color:var(--${rankClass});color:var(--${rankClass})">
        <span class="rank-icon ${rankClass}">${symbol}</span>
        <span>${r.value}${r.number ? ' ' + r.number : ''}</span>
      </span>`;
    }).join('');
  } else {
    ranksEl.innerHTML = '<span style="color:var(--tdim);font-size:.7rem">No ranks</span>';
  }
  
  const popup = document.getElementById('person-popup');
  popup.style.display = 'block';
  const x = Math.min(e.clientX + 10, window.innerWidth - 280);
  const y = Math.min(e.clientY + 10, window.innerHeight - 250);
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
}

// Hide popup when clicking elsewhere
document.addEventListener('click', () => {
  document.getElementById('person-popup').style.display = 'none';
});

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  // Try to load from localStorage on startup
  const keys = ['stillwaters_editor', 'stillwaters_connections', 'stillwaters_locations', 'stillwaters_professions'];
  
  for (let key of keys) {
    const raw = localStorage.getItem(key);
    if (!raw) continue;
    
    try {
      const imported = JSON.parse(raw);
      if (imported.version || imported.people) {
        DATA = {
          version: imported.version || "1.0",
          currentYear: imported.currentYear || 1560,
          people: imported.people || {},
          relationships: imported.relationships || {},
          locations: imported.locations || {},
          professions: imported.professions || [],
          metadata: imported.metadata || {}
        };
        break;
      }
    } catch (e) {
      console.error('Failed to parse from', key, e);
    }
  }
  
  populateDistrictSelector();
  renderFestival(); // Start with festival view
});
</script>

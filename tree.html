<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Family Tree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">

</head>
<body>

<div class="topbar">
  <div class="title">FAMILY TREE</div>
  <div style="flex:1"></div>
  <button id="importBtn" class="tb-btn">Import JSON</button>
  <button id="relationBtn" class="tb-btn primary">Character Relationship</button>
</div>

<div class="family-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>CHARACTERS</h3>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name...">
      </div>
    </div>
    <div class="character-list" id="characterList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-toolbar">
      <h2 id="currentCharName">Select a character to view family tree</h2>
      <button id="resetViewBtn" class="btn small">Reset View</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-state">
        Select a character from the left sidebar to view their family tree<br>
        <small>Upward one generation (parents), downward one generation (children), and siblings</small>
      </div>
    </div>
  </div>
</div>

<!-- Relationship Modal -->
<div id="relationModal" class="modal">
  <div class="modal-content">
    <h3>Find Relationship</h3>
    <div class="char-selector">
      <label>Character 1</label>
      <select id="char1Select"></select>
    </div>
    <div class="char-selector">
      <label>Character 2</label>
      <select id="char2Select"></select>
    </div>
    <div id="relationshipResults"></div>
    <div class="modal-buttons">
      <button id="findRelationBtn" class="btn primary">Find Relationship</button>
      <button id="closeRelationModal" class="btn">Close</button>
    </div>
  </div>
</div>

<script>
  // ==================== DATA STORES ====================
  let masterData = {
    version: "2.0",
    data: {
      characters: [],
      places: [],
      ranks: [],
      roles: [],
      currentYear: 1250
    }
  };
  
  let currentCharacterId = null;
  
  // ==================== LOAD DATA ====================
  function loadMasterData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        masterData = {
          version: parsed.version || "2.0",
          data: {
            characters: parsed.data?.characters || [],
            places: parsed.data?.places || [],
            ranks: parsed.data?.ranks || [],
            roles: parsed.data?.roles || [],
            locationTypes: parsed.data?.locationTypes || [],
            governments: parsed.data?.governments || [],
            nameLists: parsed.data?.nameLists || {},
            currentYear: parsed.data?.currentYear || 1250
          }
        };
      } catch(e) { console.error('Error loading master data', e); }
    }
  }
  
  function calculateAge(birthYear, isDeceased, deathYear, currentYear) {
    if (!birthYear) return 0;
    if (isDeceased && deathYear) return deathYear - birthYear;
    return currentYear - birthYear;
  }
  
  function getPlaceName(placeId) {
    if (!placeId) return 'Unknown';
    const place = masterData.data.places.find(p => p.id === placeId);
    return place?.displayName || 'Unknown';
  }
  
  function getActiveRank(char) {
    if (!char.rankAssignments) return null;
    const active = char.rankAssignments.find(r => r.isActive);
    if (!active) return null;
    const rank = masterData.data.ranks.find(r => r.id === active.rankId);
    if (!rank) return null;
    return `${rank.symbol} ${rank.name}${active.rankNumber ? ` #${active.rankNumber}` : ''}`;
  }
  
  function getRoleName(roleId) {
    if (!roleId) return null;
    const role = masterData.data.roles.find(r => r.id === roleId);
    return role?.name || null;
  }
  
  // ==================== FAMILY RELATIONSHIPS ====================
  function getParents(charId) {
    const char = masterData.data.characters.find(c => c.id === charId);
    if (!char) return [];
    const parents = [];
    if (char.motherId) {
      const mother = masterData.data.characters.find(c => c.id === char.motherId);
      if (mother) parents.push(mother);
    }
    if (char.fatherId) {
      const father = masterData.data.characters.find(c => c.id === char.fatherId);
      if (father) parents.push(father);
    }
    return parents;
  }
  
  function getChildren(charId) {
    return masterData.data.characters.filter(c => c.motherId === charId || c.fatherId === charId);
  }
  
  function getSiblings(charId) {
    const char = masterData.data.characters.find(c => c.id === charId);
    if (!char) return [];
    return masterData.data.characters.filter(c => 
      c.id !== charId && 
      ((c.motherId && c.motherId === char.motherId) || 
       (c.fatherId && c.fatherId === char.fatherId))
    );
  }
  
  function getSpouses(charId) {
    const char = masterData.data.characters.find(c => c.id === charId);
    if (!char || !char.relationships) return [];
    const ongoingRelationships = char.relationships.filter(r => r.status === 'ongoing');
    return ongoingRelationships.map(r => masterData.data.characters.find(c => c.id === r.partnerId)).filter(p => p);
  }
  
  // ==================== RELATIONSHIP FINDER ====================
  function findAllRelationships(char1Id, char2Id) {
    if (char1Id === char2Id) return [{ type: "Same person", path: [] }];
    
    const relationships = [];
    
    // Check direct relationships
    const char1 = masterData.data.characters.find(c => c.id === char1Id);
    const char2 = masterData.data.characters.find(c => c.id === char2Id);
    
    // Parent-Child
    if (char1.motherId === char2Id || char1.fatherId === char2Id) {
      relationships.push({ type: "Parent", path: [`${char1.name} is child of ${char2.name}`] });
    }
    if (char2.motherId === char1Id || char2.fatherId === char1Id) {
      relationships.push({ type: "Parent", path: [`${char2.name} is child of ${char1.name}`] });
    }
    
    // Siblings
    if ((char1.motherId && char1.motherId === char2.motherId) ||
        (char1.fatherId && char1.fatherId === char2.fatherId)) {
      relationships.push({ type: "Siblings", path: [`${char1.name} and ${char2.name} share a parent`] });
    }
    
    // Spouses/Partners
    if (char1.relationships?.some(r => r.partnerId === char2Id && r.status === 'ongoing')) {
      relationships.push({ type: "Partners/Spouses", path: [`${char1.name} is partnered with ${char2.name}`] });
    }
    
    // Grandparents
    const char1Parents = getParents(char1Id);
    for (const parent of char1Parents) {
      if (parent.motherId === char2Id || parent.fatherId === char2Id) {
        relationships.push({ type: "Grandparent", path: [`${char2.name} is grandparent of ${char1.name}`] });
      }
    }
    
    const char2Parents = getParents(char2Id);
    for (const parent of char2Parents) {
      if (parent.motherId === char1Id || parent.fatherId === char1Id) {
        relationships.push({ type: "Grandparent", path: [`${char1.name} is grandparent of ${char2.name}`] });
      }
    }
    
    // Aunt/Uncle (parent's sibling)
    for (const parent of char1Parents) {
      const parentSiblings = getSiblings(parent.id);
      for (const sibling of parentSiblings) {
        if (sibling.id === char2Id) {
          relationships.push({ type: "Aunt/Uncle", path: [`${char2.name} is ${parent.gender === 'male' ? 'brother' : 'sister'} of ${parent.name}, who is parent of ${char1.name}`] });
        }
      }
    }
    
    for (const parent of char2Parents) {
      const parentSiblings = getSiblings(parent.id);
      for (const sibling of parentSiblings) {
        if (sibling.id === char1Id) {
          relationships.push({ type: "Aunt/Uncle", path: [`${char1.name} is ${parent.gender === 'male' ? 'brother' : 'sister'} of ${parent.name}, who is parent of ${char2.name}`] });
        }
      }
    }
    
    // Niece/Nephew (sibling's child)
    const char1Siblings = getSiblings(char1Id);
    for (const sibling of char1Siblings) {
      const siblingChildren = getChildren(sibling.id);
      for (const child of siblingChildren) {
        if (child.id === char2Id) {
          relationships.push({ type: "Niece/Nephew", path: [`${char2.name} is child of ${sibling.name}, who is sibling of ${char1.name}`] });
        }
      }
    }
    
    const char2Siblings = getSiblings(char2Id);
    for (const sibling of char2Siblings) {
      const siblingChildren = getChildren(sibling.id);
      for (const child of siblingChildren) {
        if (child.id === char1Id) {
          relationships.push({ type: "Niece/Nephew", path: [`${char1.name} is child of ${sibling.name}, who is sibling of ${char2.name}`] });
        }
      }
    }
    
    // Cousins (children of siblings)
    for (const parent1 of char1Parents) {
      const parent1Siblings = getSiblings(parent1.id);
      for (const auntUncle of parent1Siblings) {
        const cousins = getChildren(auntUncle.id);
        for (const cousin of cousins) {
          if (cousin.id === char2Id) {
            relationships.push({ type: "First Cousins", path: [`${char2.name} is child of ${auntUncle.name}, who is sibling of ${parent1.name} (parent of ${char1.name})`] });
          }
        }
      }
    }
    
    for (const parent2 of char2Parents) {
      const parent2Siblings = getSiblings(parent2.id);
      for (const auntUncle of parent2Siblings) {
        const cousins = getChildren(auntUncle.id);
        for (const cousin of cousins) {
          if (cousin.id === char1Id) {
            relationships.push({ type: "First Cousins", path: [`${char1.name} is child of ${auntUncle.name}, who is sibling of ${parent2.name} (parent of ${char2.name})`] });
          }
        }
      }
    }
    
    // In-laws (spouse's family)
    const char1Spouses = getSpouses(char1Id);
    for (const spouse of char1Spouses) {
      if (spouse.id === char2Id) {
        relationships.push({ type: "Spouse", path: [`${char1.name} is married/partnered to ${char2.name}`] });
      }
      const spouseParents = getParents(spouse.id);
      for (const spouseParent of spouseParents) {
        if (spouseParent.id === char2Id) {
          relationships.push({ type: "Parent-in-law", path: [`${char2.name} is parent of ${spouse.name}, who is spouse of ${char1.name}`] });
        }
      }
      const spouseChildren = getChildren(spouse.id);
      for (const spouseChild of spouseChildren) {
        if (spouseChild.id === char2Id) {
          relationships.push({ type: "Step-child", path: [`${char2.name} is child of ${spouse.name}, who is spouse of ${char1.name}`] });
        }
      }
    }
    
    const char2Spouses = getSpouses(char2Id);
    for (const spouse of char2Spouses) {
      if (spouse.id === char1Id) continue;
      const spouseParents = getParents(spouse.id);
      for (const spouseParent of spouseParents) {
        if (spouseParent.id === char1Id) {
          relationships.push({ type: "Parent-in-law", path: [`${char1.name} is parent of ${spouse.name}, who is spouse of ${char2.name}`] });
        }
      }
    }
    
    if (relationships.length === 0) {
      relationships.push({ type: "No direct relationship found", path: ["These characters are not directly related through blood or marriage."] });
    }
    
    return relationships;
  }
  
  // ==================== RENDER FUNCTIONS ====================
  function renderCharacterList() {
    const container = document.getElementById('characterList');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const characters = masterData.data.characters;
    
    const filtered = characters.filter(c => 
      `${c.name} ${c.surname || ''}`.toLowerCase().includes(searchTerm)
    ).sort((a, b) => a.name.localeCompare(b.name));
    
    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state" style="padding:20px;">No characters found</div>';
      return;
    }
    
    container.innerHTML = filtered.map(c => `
      <div class="char-list-item ${currentCharacterId === c.id ? 'selected' : ''}" data-id="${c.id}">
        <div class="char-list-name">${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</div>
        <div class="char-list-details">
          ${c.gender === 'male' ? '♂' : c.gender === 'female' ? '♀' : '⚥'} | 
          Age: ${calculateAge(c.birthYear, c.isDeceased, c.deathYear, masterData.data.currentYear)} |
          ${c.isDeceased ? '† Deceased' : 'Living'}
        </div>
      </div>
    `).join('');
    
    document.querySelectorAll('.char-list-item').forEach(item => {
      item.addEventListener('click', () => {
        const charId = item.getAttribute('data-id');
        selectCharacter(charId);
      });
    });
  }
  
  function selectCharacter(charId) {
    currentCharacterId = charId;
    renderCharacterList();
    renderFamilyTree(charId);
  }
  
  function renderFamilyTree(charId) {
    const char = masterData.data.characters.find(c => c.id === charId);
    if (!char) {
      document.getElementById('panelContent').innerHTML = '<div class="empty-state">Character not found</div>';
      return;
    }
    
    const parents = getParents(charId);
    const children = getChildren(charId);
    const siblings = getSiblings(charId);
    const spouses = getSpouses(charId);
    
    document.getElementById('currentCharName').textContent = `${char.name} ${char.surname || ''}`;
    
    const content = `
      <div class="tree-generation">
        <div class="generation-label">⬆️ PARENTS & ANCESTORS</div>
        <div class="tree-row">
          ${parents.length ? parents.map(p => renderFamilyCard(p, false)).join('') : '<div class="empty-state" style="padding:20px;">No parents recorded</div>'}
        </div>
      </div>
      
      <div class="tree-generation">
        <div class="generation-label">⭐ ${char.name} ${char.surname || ''}</div>
        <div class="tree-row">
          ${renderFamilyCard(char, true)}
        </div>
        ${spouses.length ? `
          <div class="generation-label" style="margin-top:12px;">SPOUSES / PARTNERS</div>
          <div class="tree-row">
            ${spouses.map(s => renderFamilyCard(s, false)).join('')}
          </div>
        ` : ''}
      </div>
      
      <div class="tree-generation">
        <div class="generation-label">⬇️ CHILDREN & DESCENDANTS</div>
        <div class="tree-row">
          ${children.length ? children.map(c => renderFamilyCard(c, false)).join('') : '<div class="empty-state" style="padding:20px;">No children recorded</div>'}
        </div>
      </div>
      
      <div class="tree-generation">
        <div class="generation-label">SIBLINGS</div>
        <div class="tree-row">
          ${siblings.length ? siblings.map(s => renderFamilyCard(s, false)).join('') : '<div class="empty-state" style="padding:20px;">No siblings recorded</div>'}
        </div>
      </div>
    `;
    
    document.getElementById('panelContent').innerHTML = content;
    
    document.querySelectorAll('.family-card').forEach(card => {
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        const clickedId = card.getAttribute('data-id');
        if (clickedId) selectCharacter(clickedId);
      });
    });
  }
  
  function renderFamilyCard(char, isCentral) {
    const age = calculateAge(char.birthYear, char.isDeceased, char.deathYear, masterData.data.currentYear);
    const rank = getActiveRank(char);
    const role = char.currentRole ? getRoleName(char.currentRole.id) || char.currentRole.name : null;
    const birthplace = getPlaceName(char.birthplaceId);
    const currentLoc = getCurrentLocation(char);
    
    return `
      <div class="family-card ${isCentral ? 'central' : ''} ${char.isDeceased ? 'deceased' : ''}" data-id="${char.id}">
        <div class="card-name">${escapeHtml(char.name)} ${escapeHtml(char.surname || '')}</div>
        <div class="card-details">
          <div>${char.gender === 'male' ? '♂ Male' : char.gender === 'female' ? '♀ Female' : '⚥ Unknown'}</div>
          <div>${age} years ${char.isDeceased ? `(d. ${char.deathYear})` : ''}</div>
          <div>Born: ${birthplace}</div>
          <div>Current: ${currentLoc}</div>
          ${rank ? `<div>${escapeHtml(rank)}</div>` : ''}
          ${role ? `<div>${escapeHtml(role)}</div>` : ''}
        </div>
        ${!isCentral ? '<div class="relation-badge">Click to view</div>' : ''}
      </div>
    `;
  }
  
  function getCurrentLocation(char) {
    if (char.moves?.length) {
      const currentMove = char.moves[char.moves.length - 1];
      return getPlaceName(currentMove.locationId);
    }
    return getPlaceName(char.birthplaceId);
  }
  
  // ==================== RELATIONSHIP MODAL ====================
  function openRelationshipModal() {
    const modal = document.getElementById('relationModal');
    const char1Select = document.getElementById('char1Select');
    const char2Select = document.getElementById('char2Select');
    const characters = masterData.data.characters.sort((a, b) => a.name.localeCompare(b.name));
    
    char1Select.innerHTML = '<option value="">Select character...</option>' + 
      characters.map(c => `<option value="${c.id}">${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</option>`).join('');
    char2Select.innerHTML = '<option value="">Select character...</option>' + 
      characters.map(c => `<option value="${c.id}">${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</option>`).join('');
    
    document.getElementById('relationshipResults').innerHTML = '';
    modal.classList.add('active');
  }
  
  function findAndDisplayRelationship() {
    const char1Id = document.getElementById('char1Select').value;
    const char2Id = document.getElementById('char2Select').value;
    const resultsDiv = document.getElementById('relationshipResults');
    
    if (!char1Id || !char2Id) {
      resultsDiv.innerHTML = '<div class="warning-text">Please select both characters</div>';
      return;
    }
    
    const char1 = masterData.data.characters.find(c => c.id === char1Id);
    const char2 = masterData.data.characters.find(c => c.id === char2Id);
    const relationships = findAllRelationships(char1Id, char2Id);
    
    resultsDiv.innerHTML = `
      <div style="margin-top: 16px;">
        <strong>${escapeHtml(char1.name)}</strong> and <strong>${escapeHtml(char2.name)}</strong>
        <hr style="border-color: var(--border); margin: 12px 0;">
        ${relationships.map(rel => `
          <div class="relationship-path">
            <div class="relationship-type">${rel.type}</div>
            <div class="path">${rel.path.join(' → ')}</div>
          </div>
        `).join('')}
      </div>
    `;
  }
  
  // ==================== IMPORT/EXPORT ====================
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          
          if (imported.type === "master" && imported.data) {
            masterData = {
              version: imported.version,
              data: imported.data
            };
          } else if (imported.data && imported.data.characters) {
            masterData = imported;
          } else if (imported.characters) {
            masterData = {
              version: "2.0",
              data: {
                characters: imported.characters,
                places: imported.places || [],
                ranks: imported.ranks || [],
                roles: imported.roles || [],
                currentYear: imported.currentYear || 1250
              }
            };
          } else if (Array.isArray(imported)) {
            masterData = {
              version: "2.0",
              data: {
                characters: imported,
                places: [],
                ranks: [],
                roles: [],
                currentYear: 1250
              }
            };
          }
          
          localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
          renderCharacterList();
          if (currentCharacterId) renderFamilyTree(currentCharacterId);
          showToast('Data imported successfully');
        } catch(err) { alert('Invalid JSON: ' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function resetView() {
    if (currentCharacterId) renderFamilyTree(currentCharacterId);
  }
  
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
  }
  
  // ==================== INIT ====================
  function init() {
    loadMasterData();
    renderCharacterList();
    
    document.getElementById('importBtn').addEventListener('click', importData);
    document.getElementById('relationBtn').addEventListener('click', openRelationshipModal);
    document.getElementById('resetViewBtn').addEventListener('click', resetView);
    document.getElementById('searchInput').addEventListener('input', renderCharacterList);
    document.getElementById('findRelationBtn').addEventListener('click', findAndDisplayRelationship);
    document.getElementById('closeRelationModal').addEventListener('click', () => {
      document.getElementById('relationModal').classList.remove('active');
    });
    
    window.addEventListener('click', (e) => {
      const modal = document.getElementById('relationModal');
      if (e.target === modal) modal.classList.remove('active');
    });
    
    window.addEventListener('storage', (e) => {
      if (e.key === 'stillwaters_master') {
        loadMasterData();
        renderCharacterList();
        if (currentCharacterId) renderFamilyTree(currentCharacterId);
      }
    });
    
    if (masterData.data.characters.length > 0) {
      selectCharacter(masterData.data.characters[0].id);
    }
  }
  
  init();
</script>
</body>
</html>

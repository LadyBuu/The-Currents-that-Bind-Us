<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Character Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    /* Previous styles remain */
    .char-app {
      display: flex;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    .sidebar {
      width: 320px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin: 0;
    }
    
    .filter-toggle {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.7rem;
    }
    
    .filter-container {
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    
    .filter-container.collapsed {
      max-height: 0 !important;
    }
    
    .filter-bar {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
    }
    
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .filter-group label {
      font-size: 0.6rem;
      font-family: 'Cinzel', serif;
      color: var(--accent);
    }
    
    .filter-group select, .filter-group input {
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      font-size: 0.7rem;
    }
    
    .char-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .char-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .char-item:hover, .char-item.selected {
      border-color: var(--accent);
      background: var(--bg3);
    }
    
    .char-name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      justify-content: space-between;
    }
    
    .char-details {
      font-size: 0.65rem;
      color: var(--dim);
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .deceased {
      color: var(--deceased);
      text-decoration: line-through;
    }
    
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      padding: 0 16px;
      overflow-x: auto;
    }
    
    .tab-btn {
      padding: 10px 16px;
      background: none;
      border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      cursor: pointer;
      color: var(--dim);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .collapsible-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    
    .section-header {
      padding: 12px 16px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: var(--accent);
      background: var(--bg3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    
    .section-header:hover {
      background: var(--bg4);
    }
    
    .section-header .arrow {
      transition: transform 0.2s;
      font-size: 0.7rem;
    }
    
    .section-header .arrow.expanded {
      transform: rotate(90deg);
    }
    
    .section-content {
      padding: 16px;
      display: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out, padding 0.2s;
    }
    
    .section-content.expanded {
      display: block;
      max-height: 2000px;
      padding: 16px;
    }
    
    /* Family-specific styles */
    .family-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    
    .family-card:hover {
      border-color: var(--accent);
      background: var(--bg4);
    }
    
    .family-card .name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      display: inline-block;
    }
    
    .family-card .name:hover {
      text-decoration: underline;
      color: var(--accent-dark);
    }
    
    .family-card .details {
      font-size: 0.65rem;
      color: var(--dim);
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .family-card .age-warning {
      color: var(--warn);
      font-size: 0.6rem;
      margin-top: 4px;
    }
    
    .parent-selector {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      margin-bottom: 16px;
    }
    
    .parent-selector .form-group {
      flex: 1;
      margin-bottom: 0;
    }
    
    .inline-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    
    .add-child-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    
    .add-child-row .form-group {
      flex: 1;
      margin-bottom: 0;
      min-width: 200px;
    }
    
    .warning-text {
      color: var(--warn);
      font-size: 0.6rem;
      margin-top: 4px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.65rem;
      font-family: 'Cinzel', serif;
      color: var(--accent);
      margin-bottom: 4px;
    }
    
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 6px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      font-size: 0.8rem;
    }
    
    .rank-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .rank-btn {
      padding: 4px 12px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 20px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    
    .rank-btn:hover {
      border-color: var(--accent);
    }
    
    .assigned-rank {
      background: var(--bg3);
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .move-item {
      background: var(--bg3);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    
    .random-btn {
      padding: 4px 8px;
      font-size: 0.6rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    
    .warning-badge {
      background: rgba(200,112,64,0.2);
      border: 1px solid var(--warn);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 0.7rem;
      margin-bottom: 16px;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .info-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--accent);
    }
    
    .clickable-name {
      cursor: pointer;
      color: var(--accent);
    }
    
    .clickable-name:hover {
      text-decoration: underline;
    }
    
    @media (max-width: 768px) {
      .char-app { flex-direction: column; height: auto; }
      .sidebar { width: 100%; max-height: 400px; }
      .form-row { grid-template-columns: 1fr; }
      .parent-selector { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">👥 CHARACTER MANAGER</div>
  <div style="flex:1"></div>
  <div style="display:flex; align-items:center; gap:8px;">
    <span style="font-size:0.7rem;">📅 Year:</span>
    <input type="number" id="currentYear" value="1250" style="width:80px;">
  </div>
  <button id="importCharsBtn" class="tb-btn">📂 Import</button>
  <button id="exportCharsBtn" class="tb-btn primary">💾 Export</button>
  <button id="addPersonBtn" class="tb-btn primary">+ Add Person</button>
  <button id="generatePersonBtn" class="tb-btn">🎲 Generate</button>
</div>

<div class="char-app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>📋 CHARACTERS</h3>
      <button id="filterToggleBtn" class="filter-toggle">▼ Filters</button>
    </div>
    <div id="filterContainer" class="filter-container">
      <div class="filter-bar">
        <div class="filter-group">
          <label>Life Stage</label>
          <select id="filterLifeStage">
            <option value="">All</option>
            <option value="child">Child (0-12)</option>
            <option value="youth">Youth (13-17)</option>
            <option value="adult">Adult (18-59)</option>
            <option value="elder">Elder (60+)</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Relationship Status</label>
          <select id="filterRelation">
            <option value="">All</option>
            <option value="single">Single</option>
            <option value="partnered">Partnered</option>
            <option value="widowed">Widowed</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Current Location</label>
          <select id="filterLocation"><option value="">All</option></select>
        </div>
        <button id="clearFilters" class="btn small">Clear Filters</button>
      </div>
    </div>
    <div class="char-list" id="charList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-tabs" id="panelTabs">
      <button class="tab-btn active" data-tab="view">📖 View</button>
      <button class="tab-btn" data-tab="edit">✏️ Edit</button>
      <button class="tab-btn" data-tab="family">👪 Family</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-state">Select a character or add a new one</div>
    </div>
  </div>
</div>

<script>
  // Data stores
  let characters = [];
  let locations = [];
  let ranks = [];
  let roles = [];
  let nameLists = {};
  let cityNameParts = {};
  let selectedCharId = null;
  let currentYear = 1250;
  
  function generateId() { 
    return 'char_' + (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 8));
  }
  
  function calculateAge(birthYear, currentYr, isDeceased, deathYear) {
    if (!birthYear) return 0;
    if (isDeceased && deathYear) return deathYear - birthYear;
    return currentYr - birthYear;
  }
  
  function getLifeStage(age) {
    if (age < 13) return 'child';
    if (age < 18) return 'youth';
    if (age < 60) return 'adult';
    return 'elder';
  }
  
  function getRandomName(countryId, gender) {
    let namePool = [];
    if (countryId && nameLists[countryId]) {
      const lists = nameLists[countryId];
      if (gender === 'male' && lists.male?.length) namePool = lists.male;
      else if (gender === 'female' && lists.female?.length) namePool = lists.female;
      else if (lists.male?.length) namePool = lists.male;
      else if (lists.female?.length) namePool = lists.female;
    }
    if (!namePool.length) {
      for (let id in nameLists) {
        const lists = nameLists[id];
        if (gender === 'male' && lists.male?.length) { namePool = lists.male; break; }
        if (gender === 'female' && lists.female?.length) { namePool = lists.female; break; }
        if (lists.male?.length) { namePool = lists.male; break; }
        if (lists.female?.length) { namePool = lists.female; break; }
      }
    }
    if (!namePool.length) return gender === 'male' ? 'Aron' : (gender === 'female' ? 'Elara' : 'Rowan');
    return namePool[Math.floor(Math.random() * namePool.length)];
  }
  
  function getRandomSurname(countryId) {
    let surnamePool = [];
    if (countryId && nameLists[countryId]?.surnames?.length) surnamePool = nameLists[countryId].surnames;
    if (!surnamePool.length) {
      for (let id in nameLists) {
        if (nameLists[id]?.surnames?.length) { surnamePool = nameLists[id].surnames; break; }
      }
    }
    return surnamePool.length ? surnamePool[Math.floor(Math.random() * surnamePool.length)] : 'Stormborn';
  }
  
  function getRandomLocation() {
    const validLocs = locations.filter(l => l.variableKey);
    if (!validLocs.length) return null;
    return validLocs[Math.floor(Math.random() * validLocs.length)].id;
  }
  
  function getRandomRole() {
    if (!roles.length) return null;
    const role = roles[Math.floor(Math.random() * roles.length)];
    return { id: role.id, name: role.name, specialization: role.specializations?.length ? role.specializations[Math.floor(Math.random() * role.specializations.length)] : null };
  }
  
  function getRandomRank() {
    if (!ranks.length) return null;
    return ranks[Math.floor(Math.random() * ranks.length)];
  }
  
  function getParentAgeAtBirth(parent, childBirthYear) {
    if (!parent || !parent.birthYear || !childBirthYear) return null;
    return childBirthYear - parent.birthYear;
  }
  
  function getParentWarning(parent, childBirthYear, isMother) {
    if (!parent || !childBirthYear) return null;
    const ageAtBirth = childBirthYear - parent.birthYear;
    if (isMother) {
      if (ageAtBirth < 14) return `⚠️ Mother would have been ${ageAtBirth} (under 14) at birth`;
      if (ageAtBirth > 45) return `⚠️ Mother would have been ${ageAtBirth} (over 45) at birth`;
    } else {
      if (ageAtBirth < 15) return `⚠️ Father would have been ${ageAtBirth} (under 15) at birth`;
      if (ageAtBirth > 70) return `⚠️ Father would have been ${ageAtBirth} (over 70) at birth`;
    }
    return null;
  }
  
  function getChildren(charId) {
    return characters.filter(c => c.fatherId === charId || c.motherId === charId);
  }
  
  function getSiblings(charId) {
    const char = characters.find(c => c.id === charId);
    if (!char) return [];
    return characters.filter(c => 
      c.id !== charId && 
      ((c.fatherId && c.fatherId === char.fatherId) || 
       (c.motherId && c.motherId === char.motherId))
    );
  }
  
  function updateFamilyRelationships(charId, updates) {
    const char = characters.find(c => c.id === charId);
    if (!char) return;
    
    if (updates.motherId !== undefined) {
      const oldMotherId = char.motherId;
      char.motherId = updates.motherId || null;
      
      if (oldMotherId && oldMotherId !== updates.motherId) {
        const oldMother = characters.find(c => c.id === oldMotherId);
        if (oldMother && oldMother.childrenIds) {
          oldMother.childrenIds = oldMother.childrenIds.filter(id => id !== charId);
        }
      }
      
      if (char.motherId) {
        const mother = characters.find(c => c.id === char.motherId);
        if (mother) {
          if (!mother.childrenIds) mother.childrenIds = [];
          if (!mother.childrenIds.includes(charId)) mother.childrenIds.push(charId);
        }
      }
    }
    
    if (updates.fatherId !== undefined) {
      const oldFatherId = char.fatherId;
      char.fatherId = updates.fatherId || null;
      
      if (oldFatherId && oldFatherId !== updates.fatherId) {
        const oldFather = characters.find(c => c.id === oldFatherId);
        if (oldFather && oldFather.childrenIds) {
          oldFather.childrenIds = oldFather.childrenIds.filter(id => id !== charId);
        }
      }
      
      if (char.fatherId) {
        const father = characters.find(c => c.id === char.fatherId);
        if (father) {
          if (!father.childrenIds) father.childrenIds = [];
          if (!father.childrenIds.includes(charId)) father.childrenIds.push(charId);
        }
      }
    }
    
    saveAllData();
  }
  
  function generateRandomPerson() {
    const gender = ['male', 'female', 'unknown'][Math.floor(Math.random() * 3)];
    const attraction = ['men', 'women', 'both', 'neither'][Math.floor(Math.random() * 4)];
    const birthYear = currentYear - (Math.floor(Math.random() * 80) + 10);
    const locationId = getRandomLocation();
    const rank = getRandomRank();
    const role = getRandomRole();
    
    return {
      id: generateId(),
      name: getRandomName(null, gender),
      surname: getRandomSurname(null),
      gender: gender,
      attraction: attraction,
      birthYear: birthYear,
      isDeceased: false,
      deathYear: null,
      deathCause: '',
      rankAssignments: rank ? [{ rankId: rank.id, rankNumber: rank.numbered ? Math.floor(Math.random() * 10) + 1 : null, titleText: '', isActive: true }] : [],
      birthplaceId: locationId,
      moves: [],
      appearance: { eyeColor: '', hairColor: '', skinColor: '', tattoos: '', notes: '' },
      notes: '',
      currentRole: role,
      motherId: null,
      fatherId: null,
      childrenIds: []
    };
  }
  
  function loadAllData() {
    const storedChars = localStorage.getItem('stillwaters_characters');
    if (storedChars) {
      characters = JSON.parse(storedChars);
      characters.forEach(char => {
        if (char.motherId === undefined) char.motherId = null;
        if (char.fatherId === undefined) char.fatherId = null;
        if (!char.childrenIds) char.childrenIds = [];
      });
    } else {
      characters = [];
    }
    
    const storedLocs = localStorage.getItem('stillwaters_places');
    locations = storedLocs ? JSON.parse(storedLocs) : [];
    
    const storedRanks = localStorage.getItem('stillwaters_ranks');
    ranks = storedRanks ? JSON.parse(storedRanks) : [];
    
    const storedRoles = localStorage.getItem('stillwaters_roles');
    roles = storedRoles ? JSON.parse(storedRoles) : [];
    
    const storedNames = localStorage.getItem('stillwaters_namelists');
    if (storedNames) {
      const parsed = JSON.parse(storedNames);
      nameLists = parsed.nameLists || {};
      cityNameParts = parsed.cityNameParts || { prefixes: [], roots: [], suffixes: [] };
    }
    
    const storedYear = localStorage.getItem('stillwaters_currentYear');
    if (storedYear) currentYear = parseInt(storedYear);
    document.getElementById('currentYear').value = currentYear;
  }
  
  function saveAllData() {
    localStorage.setItem('stillwaters_characters', JSON.stringify(characters));
    localStorage.setItem('stillwaters_currentYear', currentYear);
  }
  
  function renderCharList() {
    const container = document.getElementById('charList');
    const lifeStage = document.getElementById('filterLifeStage').value;
    const relation = document.getElementById('filterRelation').value;
    const locationFilter = document.getElementById('filterLocation').value;
    
    let filtered = characters.filter(c => {
      const age = calculateAge(c.birthYear, currentYear, c.isDeceased, c.deathYear);
      if (lifeStage && getLifeStage(age) !== lifeStage) return false;
      if (relation === 'single' && c.partnerId) return false;
      if (relation === 'partnered' && !c.partnerId) return false;
      if (relation === 'widowed' && c.isWidowed !== true) return false;
      if (locationFilter) {
        const currentLoc = c.moves?.length ? c.moves[c.moves.length-1]?.locationId : c.birthplaceId;
        if (currentLoc !== locationFilter) return false;
      }
      return true;
    });
    
    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state">No characters found</div>';
      return;
    }
    
    container.innerHTML = filtered.map(c => {
      const age = calculateAge(c.birthYear, currentYear, c.isDeceased, c.deathYear);
      const rank = c.rankAssignments?.find(r => r.isActive);
      const rankData = rank ? ranks.find(r => r.id === rank.rankId) : null;
      const location = c.moves?.length ? locations.find(l => l.id === c.moves[c.moves.length-1].locationId) : locations.find(l => l.id === c.birthplaceId);
      return `
        <div class="char-item ${selectedCharId === c.id ? 'selected' : ''}" data-id="${c.id}">
          <div class="char-name">
            <span class="${c.isDeceased ? 'deceased' : ''}">${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</span>
            <span>${rankData ? rankData.symbol : ''}${rank?.rankNumber ? rank.rankNumber : ''}</span>
          </div>
          <div class="char-details">
            <span>${c.gender === 'male' ? '♂' : c.gender === 'female' ? '♀' : '⚥'}</span>
            <span>${age} yrs</span>
            <span>${location?.displayName || 'Unknown'}</span>
            ${c.isDeceased ? '<span>💀</span>' : ''}
          </div>
        </div>
      `;
    }).join('');
    
    document.querySelectorAll('.char-item').forEach(el => {
      el.addEventListener('click', () => selectCharacter(el.getAttribute('data-id')));
    });
  }
  
  function selectCharacter(id) {
    selectedCharId = id;
    renderCharList();
    const activeTab = document.querySelector('.tab-btn.active')?.getAttribute('data-tab') || 'view';
    if (activeTab === 'view') renderViewTab();
    else if (activeTab === 'edit') renderEditTab();
    else if (activeTab === 'family') renderFamilyTab();
  }
  
  function renderFamilyTab() {
    const char = characters.find(c => c.id === selectedCharId);
    if (!char) {
      document.getElementById('panelContent').innerHTML = '<div class="empty-state">Character not found</div>';
      return;
    }
    
    const mother = char.motherId ? characters.find(c => c.id === char.motherId) : null;

  function generateNewborn(parentId) {
    const parent = characters.find(c => c.id === parentId);
    if (!parent) return;
    
    const partnerId = document.getElementById('partnerSelect')?.value;
    let partner = partnerId ? characters.find(c => c.id === partnerId) : null;
    
    let birthYear = currentYear - 1;
    let valid = false;
    let attempts = 0;
    
    while (!valid && attempts < 50) {
      birthYear = currentYear - Math.floor(Math.random() * 30) - 1;
      
      const motherAge = parent.gender === 'female' ? birthYear - parent.birthYear : (partner ? birthYear - partner.birthYear : null);
      const fatherAge = parent.gender === 'male' ? birthYear - parent.birthYear : (partner ? birthYear - partner.birthYear : null);
      
      valid = true;
      if (motherAge !== null && (motherAge < 14 || motherAge > 45)) valid = false;
      if (fatherAge !== null && (fatherAge < 15 || fatherAge > 70)) valid = false;
      if (parent.gender === 'female' && !motherAge) valid = false;
      if (parent.gender === 'male' && !fatherAge) valid = false;
      attempts++;
    }
    
    const gender = ['male', 'female', 'unknown'][Math.floor(Math.random() * 3)];
    
    let countryId = null;
    if (parent.birthplaceId) countryId = parent.birthplaceId;
    else if (partner?.birthplaceId) countryId = partner.birthplaceId;
    
    const name = getRandomName(countryId, gender);
    const surname = getRandomSurname(countryId);
    
    let locationId = null;
    if (parent.gender === 'male' && parent.birthplaceId) locationId = parent.birthplaceId;
    else if (parent.gender === 'female' && partner?.birthplaceId) locationId = partner.birthplaceId;
    else if (parent.birthplaceId) locationId = parent.birthplaceId;
    
    const attractions = ['men', 'women', 'both', 'neither'];
    let attraction = attractions[Math.floor(Math.random() * attractions.length)];
    
    const newChild = {
      id: generateId(),
      name: name,
      surname: surname,
      gender: gender,
      attraction: attraction,
      birthYear: birthYear,
      isDeceased: false,
      deathYear: null,
      deathCause: '',
      rankAssignments: [],
      birthplaceId: locationId,
      moves: [],
      appearance: { eyeColor: '', hairColor: '', skinColor: '', tattoos: '', notes: '' },
      notes: '',
      currentRole: null,
      motherId: parent.gender === 'female' ? parent.id : (partner?.gender === 'female' ? partner.id : null),
      fatherId: parent.gender === 'male' ? parent.id : (partner?.gender === 'male' ? partner.id : null),
      childrenIds: []
    };
    
    characters.push(newChild);
    
    if (newChild.motherId) {
      const mother = characters.find(c => c.id === newChild.motherId);
      if (mother) {
        if (!mother.childrenIds) mother.childrenIds = [];
        if (!mother.childrenIds.includes(newChild.id)) mother.childrenIds.push(newChild.id);
      }
    }
    if (newChild.fatherId) {
      const father = characters.find(c => c.id === newChild.fatherId);
      if (father) {
        if (!father.childrenIds) father.childrenIds = [];
        if (!father.childrenIds.includes(newChild.id)) father.childrenIds.push(newChild.id);
      }
    }
    
    saveAllData();
    renderFamilyTab();
    showToast(`✨ Generated newborn: ${name} ${surname} (Born ${birthYear})`);
  }

        const deceased = document.getElementById('editDeceased').checked;
        const dy = deceased ? parseInt(document.getElementById('editDeathYear').value) : null;
        document.getElementById('editAge').value = calculateAge(by, currentYear, deceased, dy);
      });
    }
    
    const deathYearInput = document.getElementById('editDeathYear');
    if (deathYearInput) {
      deathYearInput.addEventListener('input', () => {
        const by = parseInt(document.getElementById('editBirthYear').value);
        const dy = parseInt(document.getElementById('editDeathYear').value);
        document.getElementById('editAge').value = dy - by;
      });
    }
    
    const editForm = document.getElementById('editCharForm');
    if (editForm) {
      editForm.addEventListener('submit', (e) => {
        e.preventDefault();
        saveCharacter(char.id);
      });
    }
    
    const deleteBtn = document.getElementById('deleteCharBtn');
    if (deleteBtn) {
      deleteBtn.addEventListener('click', () => deleteCharacter(char.id));
    }
    
    document.querySelectorAll('.random-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.dataset.field;
        const gender = document.getElementById('editGender').value;
        if (field === 'name') document.getElementById('editName').value = getRandomName(null, gender);
        if (field === 'surname') document.getElementById('editSurname').value = getRandomSurname(null);
      });
    });
  }
  
  function saveCharacter(charId) {
    const char = characters.find(c => c.id === charId);
    if (!char) return;
    
    char.name = document.getElementById('editName').value;
    char.surname = document.getElementById('editSurname').value;
    char.gender = document.getElementById('editGender').value;
    char.attraction = document.getElementById('editAttraction').value;
    char.birthYear = parseInt(document.getElementById('editBirthYear').value);
    char.isDeceased = document.getElementById('editDeceased').checked;
    char.deathYear = char.isDeceased ? parseInt(document.getElementById('editDeathYear').value) || null : null;
    char.deathCause = document.getElementById('editDeathCause')?.value || '';
    char.birthplaceId = document.getElementById('editBirthplace').value || null;
    char.appearance = {
      eyeColor: document.getElementById('editEyeColor').value,
      hairColor: document.getElementById('editHairColor').value,
      skinColor: document.getElementById('editSkinColor').value,
      tattoos: document.getElementById('editTattoos').value,
      notes: ''
    };
    char.notes = document.getElementById('editNotes').value;
    
    saveAllData();
    renderCharList();
    renderViewTab();
  }
  
  function deleteCharacter(charId) {
    if (confirm('Delete this character?')) {
      characters = characters.filter(c => c.id !== charId);
      saveAllData();
      if (selectedCharId === charId) selectedCharId = null;
      renderCharList();
      document.getElementById('panelContent').innerHTML = '<div class="empty-state">Character deleted</div>';
    }
  }
  
  function addNewPerson() {
    const newChar = {
      id: generateId(),
      name: 'New Character',
      surname: '',
      gender: 'unknown',
      attraction: 'both',
      birthYear: currentYear - 25,
      isDeceased: false,
      deathYear: null,
      deathCause: '',
      rankAssignments: [],
      birthplaceId: locations.find(l => l.variableKey)?.id || null,
      moves: [],
      appearance: { eyeColor: '', hairColor: '', skinColor: '', tattoos: '', notes: '' },
      notes: '',
      currentRole: null,
      motherId: null,
      fatherId: null,
      childrenIds: []
    };
    characters.push(newChar);
    saveAllData();
    renderCharList();
    selectCharacter(newChar.id);
  }
  
  function exportData() {
    const data = JSON.stringify({ characters, version: '1.0', exportDate: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_characters_${new Date().toISOString().slice(0,19)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Characters exported successfully');
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.characters) {
            characters = imported.characters;
            characters.forEach(char => {
              if (char.motherId === undefined) char.motherId = null;
              if (char.fatherId === undefined) char.fatherId = null;
              if (!char.childrenIds) char.childrenIds = [];
            });
            saveAllData();
            renderCharList();
            showToast(`Imported ${characters.length} characters`);
          } else {
            alert('Invalid JSON format');
          }
        } catch(err) { alert('Invalid JSON: ' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function updateLocationFilter() {
    const select = document.getElementById('filterLocation');
    select.innerHTML = '<option value="">All</option>' + locations.filter(l => l.variableKey).map(l => `<option value="${l.id}">${escapeHtml(l.displayName)}</option>`).join('');
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  document.getElementById('currentYear').addEventListener('change', () => {
    currentYear = parseInt(document.getElementById('currentYear').value);
    localStorage.setItem('stillwaters_currentYear', currentYear);
    renderCharList();
    if (selectedCharId) renderViewTab();
  });
  
  document.getElementById('clearFilters').addEventListener('click', () => { 
    document.querySelectorAll('.filter-bar select').forEach(s => s.value = ''); 
    renderCharList(); 
  });
  
  document.getElementById('addPersonBtn').addEventListener('click', addNewPerson);
  document.getElementById('generatePersonBtn').addEventListener('click', () => {
    const newChar = generateRandomPerson();
    characters.push(newChar);
    saveAllData();
    renderCharList();
    selectCharacter(newChar.id);
  });
  document.getElementById('importCharsBtn').addEventListener('click', importData);
  document.getElementById('exportCharsBtn').addEventListener('click', exportData);
  
  let filtersCollapsed = false;
  document.getElementById('filterToggleBtn').addEventListener('click', () => {
    const container = document.getElementById('filterContainer');
    filtersCollapsed = !filtersCollapsed;
    if (filtersCollapsed) {
      container.style.maxHeight = '0';
      document.getElementById('filterToggleBtn').textContent = '▶ Filters';
    } else {
      container.style.maxHeight = '300px';
      document.getElementById('filterToggleBtn').textContent = '▼ Filters';
    }
  });
  document.getElementById('filterContainer').style.maxHeight = '300px';
  
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (selectedCharId) {
        const tab = btn.getAttribute('data-tab');
        if (tab === 'view') renderViewTab();
        else if (tab === 'edit') renderEditTab();
        else if (tab === 'family') renderFamilyTab();
      }
    });
  });
  
  document.getElementById('filterLifeStage').addEventListener('change', renderCharList);
  document.getElementById('filterRelation').addEventListener('change', renderCharList);
  document.getElementById('filterLocation').addEventListener('change', renderCharList);
  
  loadAllData();
  updateLocationFilter();
  renderCharList();
  
  if (characters.length === 0) {
    document.getElementById('panelContent').innerHTML = `
      <div class="empty-state">
        👤 No characters yet<br><br>
        <button id="quickAddBtn" class="btn primary">➕ Add First Character</button>
        <button id="quickGenBtn" class="btn">🎲 Generate Random Character</button>
      </div>
    `;
    const quickAdd = document.getElementById('quickAddBtn');
    const quickGen = document.getElementById('quickGenBtn');
    if (quickAdd) quickAdd.addEventListener('click', addNewPerson);
    if (quickGen) quickGen.addEventListener('click', () => {
      const newChar = generateRandomPerson();
      characters.push(newChar);
      saveAllData();
      renderCharList();
      selectCharacter(newChar.id);
    });
  }
</script>
</body>
</html>

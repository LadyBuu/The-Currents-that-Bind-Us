<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Character Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    .char-app { display: flex; height: calc(100vh - 44px); overflow: hidden; }
    .sidebar { width: 320px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); background: var(--bg3); display: flex; justify-content: space-between; align-items: center; }
    .sidebar-header h3 { font-size: 0.7rem; letter-spacing: 0.15em; margin: 0; }
    .filter-toggle { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.7rem; }
    .filter-container { border-bottom: 1px solid var(--border); overflow: hidden; transition: max-height 0.3s ease; }
    .filter-bar { padding: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 0.6rem; font-family: 'Cinzel', serif; color: var(--accent); }
    .filter-group select { padding: 4px 8px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 0.7rem; }
    .char-list { flex: 1; overflow-y: auto; padding: 12px; }
    .char-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
    .char-item:hover, .char-item.selected { border-color: var(--accent); background: var(--bg3); }
    .char-name { font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
    .char-rank { font-size: 0.7rem; color: var(--dim); }
    .char-details { font-size: 0.6rem; color: var(--dim); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 8px; }
    .deceased { color: var(--deceased); text-decoration: line-through; }
    .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .panel-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 16px; overflow-x: auto; }
    .tab-btn { padding: 10px 16px; background: none; border: none; font-family: 'Cinzel', serif; font-size: 0.65rem; cursor: pointer; color: var(--dim); border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .panel-content { flex: 1; overflow-y: auto; padding: 20px; }
    .collapsible-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
    .section-header { padding: 12px 16px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--accent); background: var(--bg3); display: flex; justify-content: space-between; align-items: center; }
    .section-header .arrow { transition: transform 0.2s; }
    .section-header .arrow.expanded { transform: rotate(90deg); }
    .section-content { padding: 16px; display: none; }
    .section-content.expanded { display: block; }
    .family-card, .love-card, .friend-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; transition: all 0.2s; }
    .family-card:hover, .love-card:hover, .friend-card:hover { border-color: var(--accent); background: var(--bg4); }
    .family-card .name, .love-card .name, .friend-card .name { font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600; color: var(--accent); cursor: pointer; display: inline-block; }
    .family-card .name:hover, .love-card .name:hover, .friend-card .name:hover { text-decoration: underline; }
    .family-card .details, .love-card .details, .friend-card .details { font-size: 0.65rem; color: var(--dim); margin-top: 6px; display: flex; flex-wrap: wrap; gap: 8px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.65rem; font-family: 'Cinzel', serif; color: var(--accent); margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-size: 0.8rem; }
    .rank-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .rank-btn { padding: 4px 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: 20px; font-size: 0.7rem; cursor: pointer; }
    .assigned-rank { background: var(--bg3); padding: 8px; border-radius: 4px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .action-buttons { display: flex; gap: 8px; margin-top: 16px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--dim); }
    .warning-badge { background: rgba(200,112,64,0.2); border: 1px solid var(--warn); border-radius: 4px; padding: 8px 12px; font-size: 0.7rem; margin-bottom: 16px; }
    .info-grid { display: grid; grid-template-columns: 120px 1fr; gap: 12px; margin-bottom: 20px; }
    .info-label { font-family: 'Cinzel', serif; font-size: 0.65rem; color: var(--accent); }
    .clickable-name { cursor: pointer; color: var(--accent); }
    .clickable-name:hover { text-decoration: underline; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg2); border: 1px solid var(--accent); border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .filter-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .partner-option { padding: 8px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .partner-option:hover { background: var(--bg3); }
    .partner-option.selected { background: var(--accent-dim); }
    .separator { border-top: 1px solid var(--border); margin: 16px 0; }
    @media (max-width: 768px) { .char-app { flex-direction: column; height: auto; } .sidebar { width: 100%; max-height: 400px; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">👥 CHARACTER MANAGER</div>
  <div style="flex:1"></div>
  <div style="display:flex; align-items:center; gap:8px;">
    <span style="font-size:0.7rem;">📅 Year:</span>
    <input type="number" id="currentYear" value="1250" style="width:80px;">
  </div>
  <button id="importCharsBtn" class="tb-btn">📂 Import</button>
  <button id="exportCharsBtn" class="tb-btn primary">💾 Export</button>
  <button id="addPersonBtn" class="tb-btn primary">+ Add Person</button>
  <button id="generatePersonBtn" class="tb-btn">🎲 Generate</button>
</div>

<div class="char-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>📋 CHARACTERS</h3>
      <button id="filterToggleBtn" class="filter-toggle">▼ Filters</button>
    </div>
    <div id="filterContainer" class="filter-container">
      <div class="filter-bar">
        <div class="filter-group"><label>Life Stage</label><select id="filterLifeStage"><option value="">All</option><option value="child">Child (0-12)</option><option value="youth">Youth (13-17)</option><option value="adult">Adult (18-59)</option><option value="elder">Elder (60+)</option></select></div>
        <div class="filter-group"><label>Relationship Status</label><select id="filterRelation"><option value="">All</option><option value="single">Single</option><option value="partnered">Partnered</option><option value="widowed">Widowed</option></select></div>
        <div class="filter-group"><label>Current Location</label><select id="filterLocation"><option value="">All</option></select></div>
        <button id="clearFilters" class="btn small">Clear Filters</button>
      </div>
    </div>
    <div class="char-list" id="charList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="view">📖 View</button>
      <button class="tab-btn" data-tab="edit">✏️ Edit</button>
      <button class="tab-btn" data-tab="family">👪 Family</button>
      <button class="tab-btn" data-tab="love">❤️ Love</button>
      <button class="tab-btn" data-tab="friends">👥 Friends</button>
      <button class="tab-btn" data-tab="overview">📋 Overview</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-state">Select a character or add a new one</div>
    </div>
  </div>
</div>

<script>
  // ==================== UNIFIED DATA STRUCTURE ====================
  let masterData = {
    version: "2.0",
    lastUpdated: new Date().toISOString(),
    data: {
      characters: [],
      places: [],
      ranks: [],
      roles: [],
      currentYear: 1250
    }
  };
  
  let selectedCharId = null;
  let currentYear = 1250;
  
  function generateId() { return 'char_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  function generateRelId() { return 'rel_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  // ==================== LOAD FROM UNIFIED STORAGE ====================
  function loadMasterData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        masterData = {
          version: parsed.version || "2.0",
          data: {
            characters: parsed.data?.characters || [],
            places: parsed.data?.places || [],
            ranks: parsed.data?.ranks || [],
            roles: parsed.data?.roles || [],
            locationTypes: parsed.data?.locationTypes || [],
            governments: parsed.data?.governments || [],
            nameLists: parsed.data?.nameLists || {},
            currentYear: parsed.data?.currentYear || 1250
          }
        };
      } catch(e) { console.error('Error loading master data', e); }
    }
    currentYear = masterData.data.currentYear;
    document.getElementById('currentYear').value = currentYear;
  }
  
  function saveMasterData() {
    masterData.lastUpdated = new Date().toISOString();
    masterData.data.currentYear = currentYear;
    localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
  }
  
  function calculateAge(birthYear, isDeceased, deathYear) {
    if (!birthYear) return 0;
    if (isDeceased && deathYear) return deathYear - birthYear;
    return currentYear - birthYear;
  }
  
  function getCurrentLocation(char) {
    if (char.moves?.length) {
      const currentMove = char.moves[char.moves.length - 1];
      const loc = masterData.data.places.find(p => p.id === currentMove.locationId);
      return loc?.displayName || 'Unknown';
    }
    const loc = masterData.data.places.find(p => p.id === char.birthplaceId);
    return loc?.displayName || 'Unknown';
  }
  
  function getActiveRankDisplay(char) {
    if (!char.rankAssignments) return null;
    const active = char.rankAssignments.find(r => r.isActive);
    if (!active) return null;
    const rank = masterData.data.ranks.find(r => r.id === active.rankId);
    if (!rank) return null;
    let display = rank.symbol;
    if (active.rankNumber) display += active.rankNumber;
    else display += rank.symbol;
    return { symbol: rank.symbol, number: active.rankNumber, name: rank.name, display: `${rank.symbol}${active.rankNumber || ''}` };
  }
  
  // ==================== RENDER CHARACTER LIST ====================
  function renderCharList() {
    const container = document.getElementById('charList');
    const lifeStage = document.getElementById('filterLifeStage').value;
    const relation = document.getElementById('filterRelation').value;
    const locationFilter = document.getElementById('filterLocation').value;
    const characters = masterData.data.characters;
    
    let filtered = characters.filter(c => {
      const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
      if (lifeStage === 'child' && age >= 13) return false;
      if (lifeStage === 'youth' && (age < 13 || age >= 18)) return false;
      if (lifeStage === 'adult' && (age < 18 || age >= 60)) return false;
      if (lifeStage === 'elder' && age < 60) return false;
      const hasPartner = c.relationships?.some(r => r.status === 'ongoing');
      if (relation === 'single' && hasPartner) return false;
      if (relation === 'partnered' && !hasPartner) return false;
      if (locationFilter) {
        const loc = getCurrentLocation(c);
        if (loc !== locationFilter) return false;
      }
      return true;
    });
    
    if (!filtered.length) { container.innerHTML = '<div class="empty-state">No characters found</div>'; return; }
    
    container.innerHTML = filtered.map(c => {
      const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
      const rankDisplay = getActiveRankDisplay(c);
      const location = getCurrentLocation(c);
      return `
        <div class="char-item ${selectedCharId === c.id ? 'selected' : ''}" data-id="${c.id}">
          <div class="char-name">
            <span class="${c.isDeceased ? 'deceased' : ''}">${rankDisplay ? `${rankDisplay.display} ${escapeHtml(c.name)}` : escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</span>
          </div>
          <div class="char-details">
            <span>${c.gender === 'male' ? '♂' : c.gender === 'female' ? '♀' : '⚥'}</span>
            <span>${age} yrs</span>
            <span>${location}</span>
            ${c.isDeceased ? '<span>💀</span>' : ''}
          </div>
        </div>
      `;
    }).join('');
    document.querySelectorAll('.char-item').forEach(el => el.addEventListener('click', () => selectCharacter(el.dataset.id)));
  }
  
  function selectCharacter(id) { selectedCharId = id; renderCharList(); renderViewTab(); }
  
  // ==================== VIEW TAB ====================
  function renderViewTab() {
    const c = masterData.data.characters.find(c => c.id === selectedCharId);
    if (!c) { document.getElementById('panelContent').innerHTML = '<div class="empty-state">Character not found</div>'; return; }
    const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
    const rankDisplay = getActiveRankDisplay(c);
    const birthplace = masterData.data.places.find(l => l.id === c.birthplaceId);
    const currentLoc = getCurrentLocation(c);
    const mother = c.motherId ? masterData.data.characters.find(m => m.id === c.motherId) : null;
    const father = c.fatherId ? masterData.data.characters.find(f => f.id === c.fatherId) : null;
    const children = masterData.data.characters.filter(ch => ch.motherId === c.id || ch.fatherId === c.id);
    const partners = c.relationships?.filter(r => r.status === 'ongoing').map(r => masterData.data.characters.find(p => p.id === r.partnerId)) || [];
    const friends = c.friends || [];
    
    document.getElementById('panelContent').innerHTML = `
      <div class="view-section">
        <h2>${rankDisplay ? `${rankDisplay.display} ` : ''}${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</h2>
        <div class="warning-badge">🆔 ${c.id}</div>
        <div class="info-grid">
          <div class="info-label">Gender</div><div class="info-value">${c.gender || 'Unknown'}</div>
          <div class="info-label">Attraction</div><div class="info-value">${c.attraction || 'Unknown'}</div>
          <div class="info-label">Born</div><div class="info-value">Year ${c.birthYear || '?'}</div>
          <div class="info-label">Age</div><div class="info-value">${age} years</div>
          <div class="info-label">Status</div><div class="info-value">${c.isDeceased ? `Deceased (${c.deathYear})` : 'Living'}</div>
          <div class="info-label">Rank</div><div class="info-value">${rankDisplay ? `${rankDisplay.symbol} ${rankDisplay.name}${rankDisplay.number ? ` #${rankDisplay.number}` : ''}` : 'None'}</div>
          <div class="info-label">Birthplace</div><div class="info-value">${birthplace?.displayName || 'Unknown'}</div>
          <div class="info-label">Current Location</div><div class="info-value">${currentLoc}</div>
        </div>
      </div>`;
  }
  
  // ==================== FRIENDS TAB ====================
  function renderFriendsTab() {
    const c = masterData.data.characters.find(c => c.id === selectedCharId);
    if (!c) return;
    
    const friends = c.friends || [];
    const availableChars = masterData.data.characters.filter(ch => ch.id !== c.id && !friends.includes(ch.id));
    
    document.getElementById('panelContent').innerHTML = `
      <div><div class="collapsible-section"><div class="section-header">👥 Friends <span class="arrow expanded">▶</span></div><div class="section-content expanded">
        ${friends.length ? friends.map((friendId, idx) => {
          const friend = masterData.data.characters.find(f => f.id === friendId);
          if (!friend) return '';
          const age = calculateAge(friend.birthYear, friend.isDeceased, friend.deathYear);
          const rankDisplay = getActiveRankDisplay(friend);
          const location = getCurrentLocation(friend);
          return `
            <div class="friend-card">
              <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                <span class="name" data-id="${friend.id}">${rankDisplay ? `${rankDisplay.display} ` : ''}${escapeHtml(friend.name)} ${escapeHtml(friend.surname || '')}</span>
                <button class="btn small danger" data-action="remove" data-idx="${idx}">Remove Friend</button>
              </div>
              <div class="details">
                ${friend.gender === 'male' ? '♂' : friend.gender === 'female' ? '♀' : '⚥'} | Age: ${age} | 📍 ${location}
                ${friend.isDeceased ? ' | 💀 Deceased' : ''}
              </div>
            </div>
          `;
        }).join('') : '<div class="empty-state" style="padding:20px;">No friends yet</div>'}
        <button id="addFriendBtn" class="btn primary" style="margin-top:16px;">+ Add Friend</button>
      </div></div></div>`;
    
    document.querySelectorAll('.friend-card .name').forEach(el => el.addEventListener('click', () => selectCharacter(el.dataset.id)));
    document.querySelectorAll('[data-action="remove"]').forEach(btn => btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      if (confirm('Remove this friend?')) {
        c.friends.splice(idx, 1);
        saveMasterData();
        renderFriendsTab();
      }
    }));
    document.getElementById('addFriendBtn')?.addEventListener('click', () => openAddFriendModal(c.id));
    document.querySelectorAll('.collapsible-section .section-header').forEach(h => {
      const content = h.nextElementSibling;
      const arrow = h.querySelector('.arrow');
      h.addEventListener('click', () => { content.classList.toggle('expanded'); arrow?.classList.toggle('expanded'); });
    });
  }
  
  function openAddFriendModal(charId) {
    const c = masterData.data.characters.find(c => c.id === charId);
    const friends = c.friends || [];
    const available = masterData.data.characters.filter(ch => ch.id !== c.id && !friends.includes(ch.id));
    
    const modal = document.createElement('div'); modal.className = 'modal active';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>➕ Add Friend for ${escapeHtml(c.name)}</h3>
        <div class="form-group">
          <label>Select Friend</label>
          <select id="friendSelect">
            <option value="">-- Select a character --</option>
            ${available.map(ch => `<option value="${ch.id}">${escapeHtml(ch.name)} ${escapeHtml(ch.surname || '')} (${ch.gender === 'male' ? '♂' : ch.gender === 'female' ? '♀' : '⚥'})</option>`).join('')}
          </select>
        </div>
        <div class="modal-buttons">
          <button id="confirmFriendBtn" class="btn primary">Add Friend</button>
          <button id="closeFriendModal" class="btn">Cancel</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    
    modal.querySelector('#confirmFriendBtn').addEventListener('click', () => {
      const friendId = modal.querySelector('#friendSelect').value;
      if (!friendId) { alert('Select a friend'); return; }
      if (!c.friends) c.friends = [];
      c.friends.push(friendId);
      saveMasterData();
      modal.remove();
      renderFriendsTab();
    });
    modal.querySelector('#closeFriendModal').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
  }
  
  // ==================== OVERVIEW TAB ====================
  function renderOverviewTab() {
    const c = masterData.data.characters.find(c => c.id === selectedCharId);
    if (!c) return;
    
    const mother = c.motherId ? masterData.data.characters.find(m => m.id === c.motherId) : null;
    const father = c.fatherId ? masterData.data.characters.find(f => f.id === c.fatherId) : null;
    const children = masterData.data.characters.filter(ch => ch.motherId === c.id || ch.fatherId === c.id);
    const siblings = masterData.data.characters.filter(ch => ch.id !== c.id && ((ch.motherId && ch.motherId === c.motherId) || (ch.fatherId && ch.fatherId === c.fatherId)));
    const partners = c.relationships?.filter(r => r.status === 'ongoing').map(r => masterData.data.characters.find(p => p.id === r.partnerId)) || [];
    const friends = (c.friends || []).map(fId => masterData.data.characters.find(f => f.id === fId)).filter(f => f);
    
    function renderCharacterCard(char, relationType) {
      if (!char) return '';
      const age = calculateAge(char.birthYear, char.isDeceased, char.deathYear);
      const rankDisplay = getActiveRankDisplay(char);
      const location = getCurrentLocation(char);
      return `
        <div class="family-card">
          <div class="name" data-id="${char.id}">${rankDisplay ? `${rankDisplay.display} ` : ''}${escapeHtml(char.name)} ${escapeHtml(char.surname || '')}</div>
          <div class="details">
            ${char.gender === 'male' ? '♂' : char.gender === 'female' ? '♀' : '⚥'} | Age: ${age} | Rank: ${rankDisplay ? rankDisplay.name : 'None'} | 📍 ${location}
            ${char.isDeceased ? ' | 💀 Deceased' : ''}
          </div>
        </div>
      `;
    }
    
    document.getElementById('panelContent').innerHTML = `
      <div class="overview-tab">
        <div class="collapsible-section"><div class="section-header">👪 Parents <span class="arrow expanded">▶</span></div><div class="section-content expanded">
          ${mother ? renderCharacterCard(mother, 'Mother') : '<div class="empty-state" style="padding:20px;">No mother recorded</div>'}
          ${father ? renderCharacterCard(father, 'Father') : '<div class="empty-state" style="padding:20px;">No father recorded</div>'}
        </div></div>
        <div class="separator"></div>
        <div class="collapsible-section"><div class="section-header">💕 Partners <span class="arrow expanded">▶</span></div><div class="section-content expanded">
          ${partners.length ? partners.map(p => renderCharacterCard(p, 'Partner')).join('') : '<div class="empty-state" style="padding:20px;">No partners</div>'}
        </div></div>
        <div class="separator"></div>
        <div class="collapsible-section"><div class="section-header">👶 Children <span class="arrow expanded">▶</span></div><div class="section-content expanded">
          ${children.length ? children.map(ch => renderCharacterCard(ch, 'Child')).join('') : '<div class="empty-state" style="padding:20px;">No children</div>'}
        </div></div>
        <div class="separator"></div>
        <div class="collapsible-section"><div class="section-header">👥 Siblings <span class="arrow expanded">▶</span></div><div class="section-content expanded">
          ${siblings.length ? siblings.map(s => renderCharacterCard(s, 'Sibling')).join('') : '<div class="empty-state" style="padding:20px;">No siblings</div>'}
        </div></div>
        <div class="separator"></div>
        <div class="collapsible-section"><div class="section-header">🤝 Friends <span class="arrow expanded">▶</span></div><div class="section-content expanded">
          ${friends.length ? friends.map(f => renderCharacterCard(f, 'Friend')).join('') : '<div class="empty-state" style="padding:20px;">No friends</div>'}
        </div></div>
      </div>`;
    
    document.querySelectorAll('.family-card .name').forEach(el => el.addEventListener('click', () => selectCharacter(el.dataset.id)));
    document.querySelectorAll('.collapsible-section .section-header').forEach(h => {
      const content = h.nextElementSibling;
      const arrow = h.querySelector('.arrow');
      h.addEventListener('click', () => { content.classList.toggle('expanded'); arrow?.classList.toggle('expanded'); });
    });
  }
  
  // ==================== EDIT TAB STUB ====================
  function renderEditTab() { document.getElementById('panelContent').innerHTML = '<div class="empty-state">Edit tab - Full implementation available in previous version</div>'; }
  function renderFamilyTab() { document.getElementById('panelContent').innerHTML = '<div class="empty-state">Family tab - Full implementation available in previous version</div>'; }
  function renderLoveTab() { document.getElementById('panelContent').innerHTML = '<div class="empty-state">Love tab - Full implementation available in previous version</div>'; }
  
  function addNewPerson() {
    const newChar = {
      id: generateId(), name: 'New Character', surname: '', gender: 'unknown', attraction: 'both',
      birthYear: currentYear - 25, isDeceased: false, deathYear: null, deathCause: '',
      rankAssignments: [], birthplaceId: null, moves: [], appearance: {}, notes: '',
      motherId: null, fatherId: null, relationships: [], friends: [], childrenIds: []
    };
    masterData.data.characters.push(newChar);
    saveMasterData();
    renderCharList();
    selectCharacter(newChar.id);
  }
  
  function generateRandomPerson() {
    const gender = ['male', 'female', 'unknown'][Math.floor(Math.random() * 3)];
    return {
      id: generateId(), name: gender === 'male' ? 'Aron' : gender === 'female' ? 'Elara' : 'Rowan', surname: 'Stormborn',
      gender: gender, attraction: ['men', 'women', 'both', 'neither'][Math.floor(Math.random() * 4)],
      birthYear: currentYear - Math.floor(Math.random() * 80) - 10, isDeceased: false, deathYear: null, deathCause: '',
      rankAssignments: [], birthplaceId: null, moves: [], appearance: {}, notes: '',
      motherId: null, fatherId: null, relationships: [], friends: [], childrenIds: []
    };
  }
  
  function exportData() {
    const exportObj = { type: "master", version: "2.0", exportDate: new Date().toISOString(), data: masterData.data };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' }));
    a.download = `stillwaters_master_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    showToast('Master data exported');
  }
  
  function importData() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.type === "master" && imported.data) masterData = imported;
          else if (imported.data && imported.data.characters) masterData = imported;
          else if (imported.characters) masterData = { version: "2.0", data: { characters: imported.characters, places: [], ranks: [], roles: [], currentYear: 1250 } };
          saveMasterData();
          renderCharList();
          showToast('Data imported');
        } catch(err) { alert('Invalid JSON: ' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let c = document.getElementById('toast-container');
    if (!c) { c = document.createElement('div'); c.id = 'toast-container'; document.body.appendChild(c); }
    const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; c.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
  
  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }
  
  function updateLocationFilter() {
    const s = document.getElementById('filterLocation');
    s.innerHTML = '<option value="">All</option>' + masterData.data.places.filter(l => l.variableKey).map(l => `<option value="${l.displayName}">${escapeHtml(l.displayName)}</option>`).join('');
  }
  
  function init() {
    loadMasterData(); updateLocationFilter(); renderCharList();
    document.getElementById('currentYear').addEventListener('change', () => { currentYear = parseInt(document.getElementById('currentYear').value); saveMasterData(); renderCharList(); if (selectedCharId) renderViewTab(); });
    document.getElementById('clearFilters').addEventListener('click', () => { document.querySelectorAll('.filter-bar select').forEach(s => s.value = ''); renderCharList(); });
    document.getElementById('addPersonBtn').addEventListener('click', addNewPerson);
    document.getElementById('generatePersonBtn').addEventListener('click', () => { const p = generateRandomPerson(); masterData.data.characters.push(p); saveMasterData(); renderCharList(); selectCharacter(p.id); });
    document.getElementById('importCharsBtn').addEventListener('click', importData);
    document.getElementById('exportCharsBtn').addEventListener('click', exportData);
    let fc = false;
    document.getElementById('filterToggleBtn').addEventListener('click', () => { const cont = document.getElementById('filterContainer'); fc = !fc; cont.style.maxHeight = fc ? '0' : '300px'; document.getElementById('filterToggleBtn').textContent = fc ? '▶ Filters' : '▼ Filters'; });
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
      if (selectedCharId) {
        const t = btn.dataset.tab;
        if (t === 'view') renderViewTab();
        else if (t === 'edit') renderEditTab();
        else if (t === 'family') renderFamilyTab();
        else if (t === 'love') renderLoveTab();
        else if (t === 'friends') renderFriendsTab();
        else if (t === 'overview') renderOverviewTab();
      }
    }));
    document.getElementById('filterLifeStage').addEventListener('change', renderCharList);
    document.getElementById('filterRelation').addEventListener('change', renderCharList);
    document.getElementById('filterLocation').addEventListener('change', renderCharList);
    window.addEventListener('storage', (e) => { if (e.key === 'stillwaters_master') { loadMasterData(); updateLocationFilter(); renderCharList(); if (selectedCharId) renderViewTab(); } });
    if (masterData.data.characters.length === 0) document.getElementById('panelContent').innerHTML = `<div class="empty-state">👤 No characters<br><br><button id="quickAdd" class="btn primary">+ Add First</button><button id="quickGen" class="btn">🎲 Generate</button></div>`;
    const qa = document.getElementById('quickAdd'); if (qa) qa.addEventListener('click', addNewPerson);
    const qg = document.getElementById('quickGen'); if (qg) qg.addEventListener('click', () => { const p = generateRandomPerson(); masterData.data.characters.push(p); saveMasterData(); renderCharList(); selectCharacter(p.id); });
  }
  
  init();
</script>
</body>
</html>

    document.querySelectorAll('[data-remove-app]').forEach(btn => { btn.addEventListener('click', () => { const appId = btn.dataset.removeApp; if (confirm('Remove this apprentice?')) { c.apprentices = c.apprentices.filter(id => id !== appId); const apprentice = masterData.data.characters.find(ch => ch.id === appId); if (apprentice) apprentice.masterId = null; saveMasterData(); renderRolesTab(); showToast('Apprentice removed'); } }); });
  }
  
  function openAddApprenticeModal(masterId) {
    const master = masterData.data.characters.find(ch => ch.id === masterId);
    if (!master) return;
    const existingApprenticeIds = master.apprentices || [];
    let available = masterData.data.characters.filter(ch => ch.id !== masterId && !existingApprenticeIds.includes(ch.id) && !ch.isDeceased && (ch.birthYear ? (currentYear - ch.birthYear) >= 14 : true));
    let searchTerm = ''; let filters = { gender: null, peer: false };
    function renderList() {
      let filtered = [...available];
      if (searchTerm) filtered = filtered.filter(ch => ch.name.toLowerCase().includes(searchTerm.toLowerCase()) || (ch.surname || '').toLowerCase().includes(searchTerm.toLowerCase()));
      if (filters.gender) filtered = filtered.filter(ch => ch.gender === filters.gender);
      if (filters.peer && master.birthYear) filtered = filtered.filter(ch => Math.abs((ch.birthYear || 0) - master.birthYear) <= 20);
      const listContainer = document.getElementById('apprenticeList');
      if (!filtered.length) { listContainer.innerHTML = '<div class="empty-state">No candidates found</div>'; return; }
      listContainer.innerHTML = filtered.map(ch => `<div class="apprentice-option" data-id="${ch.id}" style="padding:10px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between; align-items:center;"><div><strong>${escapeHtml(ch.name)} ${escapeHtml(ch.surname || '')}</strong><br><span style="font-size:0.65rem; color:var(--dim);">${ch.gender === 'male' ? '♂' : ch.gender === 'female' ? '♀' : '⚥'} · Age: ${calculateAge(ch.birthYear, ch.isDeceased, ch.deathYear)} · ${getCurrentLocation(ch)}</span></div><button class="btn small primary">Select</button></div>`).join('');
      document.querySelectorAll('.apprentice-option').forEach(opt => { opt.addEventListener('click', (e) => { e.stopPropagation(); const apprenticeId = opt.dataset.id; if (!master.apprentices) master.apprentices = []; master.apprentices.push(apprenticeId); const apprentice = masterData.data.characters.find(ch => ch.id === apprenticeId); if (apprentice) apprentice.masterId = masterId; saveMasterData(); modal.remove(); renderRolesTab(); showToast('Apprentice added'); }); });
    }
    const modal = document.createElement('div'); modal.className = 'modal active';
    modal.innerHTML = `<div class="modal-content" style="max-width:500px;"><h3>➕ Add Apprentice for ${escapeHtml(master.name)}</h3><div style="margin-bottom:12px;"><input type="text" id="apprenticeSearch" placeholder="Search by name..." style="width:100%; padding:6px 8px; background:var(--bg); border:1px solid var(--border); border-radius:4px; color:var(--text);"></div><div class="filter-row-inline" style="display:flex; gap:8px; margin-bottom:12px;"><select id="apprenticeGenderFilter" style="padding:4px 6px; font-size:0.65rem;"><option value="">All Genders</option><option value="male">Male</option><option value="female">Female</option></select><label style="display:flex; align-items:center; gap:4px; font-size:0.65rem;"><input type="checkbox" id="apprenticePeerFilter"> Peers (±20y)</label></div><div id="apprenticeList" style="max-height:350px; overflow-y:auto;"></div><div style="margin-top:16px;"><button id="closeApprenticeModal" class="btn">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('apprenticeSearch').addEventListener('input', (e) => { searchTerm = e.target.value; renderList(); });
    document.getElementById('apprenticeGenderFilter').addEventListener('change', (e) => { filters.gender = e.target.value || null; renderList(); });
    document.getElementById('apprenticePeerFilter').addEventListener('change', (e) => { filters.peer = e.target.checked; renderList(); });
    document.getElementById('closeApprenticeModal').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    renderList();
  }
  
  // ==================== UTILITIES ====================
  function addNewPerson() {
    const newChar = { id: generateId(), name: 'New Character', surname: '', gender: 'unknown', attraction: 'both', birthYear: currentYear - 25, isDeceased: false, deathYear: null, deathCause: '', rankAssignments: [], activeRankId: null, activeRankNumber: null, birthplaceId: null, moves: [], role: '', household: '', notes: '', motherId: null, fatherId: null, relationships: [], friends: [] };
    masterData.data.characters.push(newChar);
    saveMasterData();
    renderCharList();
    selectCharacter(newChar.id);
    showToast(`${newChar.name} created`);
  }
  
  function generateRandomPerson() {
    const gender = ['male', 'female', 'unknown'][Math.floor(Math.random() * 3)];
    const maleNames = ['Kai', 'Mako', 'Tane', 'Rangi', 'Koa', 'Keanu', 'Ari', 'Leo', 'Nico', 'Ikaia', 'Sione', 'Tama', 'Vaea'];
    const femaleNames = ['Leilani', 'Moana', 'Nani', 'Tui', 'Hina', 'Lani', 'Malia', 'Rai', 'Tara', 'Vai', 'Manaia', 'Aroha', 'Eponi'];
    const name = gender === 'male' ? maleNames[Math.floor(Math.random() * maleNames.length)] : gender === 'female' ? femaleNames[Math.floor(Math.random() * femaleNames.length)] : 'Rowan';
    const ranks = masterData.data.ranks;
    const randomRank = ranks.length ? ranks[Math.floor(Math.random() * ranks.length)] : null;
    const randomAge = Math.floor(Math.random() * 70) + 10;
    const randomBirthYear = currentYear - randomAge;
    const newChar = { id: generateId(), name: name, surname: '', gender: gender, attraction: ['men', 'women', 'both', 'neither'][Math.floor(Math.random() * 4)], birthYear: randomBirthYear, isDeceased: false, deathYear: null, deathCause: '', rankAssignments: randomRank ? [{ rankId: randomRank.id, number: null }] : [], activeRankId: randomRank?.id || null, activeRankNumber: null, birthplaceId: null, moves: [], role: '', household: '', notes: '', motherId: null, fatherId: null, relationships: [], friends: [] };
    masterData.data.characters.push(newChar);
    saveMasterData();
    renderCharList();
    selectCharacter(newChar.id);
    showToast(`🎲 Random character created: ${name}`);
    return newChar;
  }
  
  function exportData() {
    const exportObj = { type: "master", version: "2.0", exportDate: new Date().toISOString(), data: { characters: masterData.data.characters, places: masterData.data.places, ranks: masterData.data.ranks, roles: masterData.data.roles, locationTypes: masterData.data.locationTypes, governments: masterData.data.governments, nameLists: masterData.data.nameLists, currentYear: masterData.data.currentYear } };
    const dataStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_master_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Master data exported');
  }
  
  function importData() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.type === "master" && imported.data) {
            if (imported.data.characters) masterData.data.characters = imported.data.characters;
            if (imported.data.places) masterData.data.places = imported.data.places;
            if (imported.data.ranks) masterData.data.ranks = imported.data.ranks;
            if (imported.data.roles) masterData.data.roles = imported.data.roles;
            if (imported.data.locationTypes) masterData.data.locationTypes = imported.data.locationTypes;
            if (imported.data.governments) masterData.data.governments = imported.data.governments;
            if (imported.data.nameLists) masterData.data.nameLists = imported.data.nameLists;
            if (imported.data.currentYear) masterData.data.currentYear = imported.data.currentYear;
          } else if (imported.data && imported.data.characters) {
            masterData.data.characters = imported.data.characters;
            if (imported.data.places) masterData.data.places = imported.data.places;
            if (imported.data.ranks) masterData.data.ranks = imported.data.ranks;
            if (imported.data.currentYear) masterData.data.currentYear = imported.data.currentYear;
          } else if (imported.characters) {
            masterData.data.characters = imported.characters;
            if (imported.places) masterData.data.places = imported.places;
            if (imported.ranks) masterData.data.ranks = imported.ranks;
            if (imported.currentYear) masterData.data.currentYear = imported.currentYear;
          } else throw new Error('Unrecognized file format');
          currentYear = masterData.data.currentYear;
          const yearInput = document.getElementById('currentYear');
          if (yearInput) yearInput.value = currentYear;
          masterData.data.characters.forEach(char => { if (!char.relationships) char.relationships = []; if (!char.friends) char.friends = []; if (!char.rankAssignments) char.rankAssignments = []; if (!char.moves) char.moves = []; if (!char.appearance) char.appearance = {}; });
          saveMasterData();
          renderCharList();
          updateFilterOptions();
          selectedCharId = null;
          document.getElementById('panelContent').innerHTML = '<div class="empty-state">Select a character to view details</div>';
          showToast(`Imported ${masterData.data.characters.length} characters`);
        } catch(err) { alert('Invalid JSON: ' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let c = document.getElementById('toast-container');
    if (!c) { c = document.createElement('div'); c.id = 'toast-container'; c.style.position = 'fixed'; c.style.bottom = '20px'; c.style.right = '20px'; c.style.zIndex = '9999'; c.style.display = 'flex'; c.style.flexDirection = 'column'; c.style.gap = '8px'; document.body.appendChild(c); }
    const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; c.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
  
  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }
  
  // ==================== INIT ====================
  function init() {
    loadMasterData(); renderCharList();
    
    const filterContent = document.getElementById('filterContent');
    const filterCollapseIcon = document.getElementById('filterCollapseIcon');
    const filterHeader = document.getElementById('filterHeader');
    let filtersCollapsed = false;
    if (filterHeader && filterContent) {
      filterHeader.addEventListener('click', () => {
        filtersCollapsed = !filtersCollapsed;
        if (filtersCollapsed) { filterContent.style.maxHeight = '0'; filterContent.style.padding = '0 12px'; filterContent.style.overflow = 'hidden'; if (filterCollapseIcon) filterCollapseIcon.textContent = '▶'; }
        else { filterContent.style.maxHeight = '400px'; filterContent.style.padding = '12px'; filterContent.style.overflow = 'auto'; if (filterCollapseIcon) filterCollapseIcon.textContent = '▼'; }
      });
      filterContent.style.maxHeight = '400px'; filterContent.style.padding = '12px'; filterContent.style.overflow = 'auto';
    }
    
    const yearInput = document.getElementById('currentYear');
    if (yearInput) yearInput.addEventListener('change', () => { currentYear = parseInt(yearInput.value); saveMasterData(); renderCharList(); if (selectedCharId) renderCurrentTab(); });
    document.getElementById('clearFilters')?.addEventListener('click', () => { document.querySelectorAll('.filter-bar select, .filter-bar input').forEach(s => { if(s.type !== 'checkbox') s.value = ''; else s.checked = false; }); renderCharList(); });
    document.getElementById('addPersonBtn')?.addEventListener('click', addNewPerson);
    const generatePersonBtn = document.getElementById('generatePersonBtn');
    if (generatePersonBtn) { const newGenerateBtn = generatePersonBtn.cloneNode(true); generatePersonBtn.parentNode.replaceChild(newGenerateBtn, generatePersonBtn); newGenerateBtn.addEventListener('click', () => { const p = generateRandomPerson(); saveMasterData(); renderCharList(); selectCharacter(p.id); }); }
    document.getElementById('importCharsBtn')?.addEventListener('click', importData);
    document.getElementById('exportCharsBtn')?.addEventListener('click', exportData);
    
    const menuToggle = document.getElementById('menuToggle');
    if (menuToggle) { menuToggle.style.display = window.innerWidth <= 768 ? 'block' : 'none'; menuToggle.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('mobile-visible')); }
    window.addEventListener('resize', () => { if (window.innerWidth > 768) { document.getElementById('sidebar').classList.remove('mobile-visible'); if (menuToggle) menuToggle.style.display = 'none'; } else { if (menuToggle) menuToggle.style.display = 'block'; } });
    
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); if (selectedCharId) renderCurrentTab(); else document.getElementById('panelContent').innerHTML = '<div class="empty-state">Select a character first</div>'; }); });
    
    document.getElementById('filterLifeStage')?.addEventListener('change', renderCharList);
    document.getElementById('filterGender')?.addEventListener('change', renderCharList);
    document.getElementById('filterRelation')?.addEventListener('change', renderCharList);
    document.getElementById('filterRank')?.addEventListener('change', renderCharList);
    document.getElementById('filterRole')?.addEventListener('change', renderCharList);
    document.getElementById('filterBirthLocation')?.addEventListener('change', renderCharList);
    document.getElementById('filterCurrentLocation')?.addEventListener('change', renderCharList);
    document.getElementById('filterShowDeceased')?.addEventListener('change', renderCharList);
    
    window.addEventListener('storage', (e) => { if (e.key === 'stillwaters_master') { loadMasterData(); updateFilterOptions(); renderCharList(); if (selectedCharId) renderCurrentTab(); } });
    
    if (masterData.data.characters.length === 0) {
      const panelContent = document.getElementById('panelContent');
      if (panelContent) { panelContent.innerHTML = `<div class="empty-state">👤 No characters<br><br><button id="quickAdd" class="btn primary">+ Add First</button><button id="quickGen" class="btn">🎲 Generate</button></div>`; document.getElementById('quickAdd')?.addEventListener('click', addNewPerson); document.getElementById('quickGen')?.addEventListener('click', () => { const p = generateRandomPerson(); saveMasterData(); renderCharList(); selectCharacter(p.id); }); }
    }
  }
  
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
</script>
</body>

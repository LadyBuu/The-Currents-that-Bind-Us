  function importData() {
    const input = document.createElement('input'); 
    input.type = 'file'; 
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          
          // Handle different import formats
          if (imported.type === "master" && imported.data) {
            // Full master data import
            if (imported.data.characters) masterData.data.characters = imported.data.characters;
            if (imported.data.places) masterData.data.places = imported.data.places;
            if (imported.data.ranks) masterData.data.ranks = imported.data.ranks;
            if (imported.data.roles) masterData.data.roles = imported.data.roles;
            if (imported.data.locationTypes) masterData.data.locationTypes = imported.data.locationTypes;
            if (imported.data.governments) masterData.data.governments = imported.data.governments;
            if (imported.data.nameLists) masterData.data.nameLists = imported.data.nameLists;
            if (imported.data.currentYear) masterData.data.currentYear = imported.data.currentYear;
          }
          else if (imported.data && imported.data.characters) {
            // Nested data format
            masterData.data.characters = imported.data.characters;
            if (imported.data.places) masterData.data.places = imported.data.places;
            if (imported.data.ranks) masterData.data.ranks = imported.data.ranks;
            if (imported.data.currentYear) masterData.data.currentYear = imported.data.currentYear;
          }
          else if (imported.characters) {
            // Simple characters array
            masterData.data.characters = imported.characters;
            if (imported.places) masterData.data.places = imported.places;
            if (imported.ranks) masterData.data.ranks = imported.ranks;
            if (imported.currentYear) masterData.data.currentYear = imported.currentYear;
          }
          else {
            throw new Error('Unrecognized file format');
          }
          
          // Update currentYear display
          currentYear = masterData.data.currentYear;
          document.getElementById('currentYear').value = currentYear;
          
          // Clean up any missing fields in imported characters
          masterData.data.characters.forEach(char => {
            if (!char.relationships) char.relationships = [];
            if (!char.friends) char.friends = [];
            if (!char.rankAssignments) char.rankAssignments = [];
            if (!char.moves) char.moves = [];
            if (!char.appearance) char.appearance = {};
          });
          
          saveMasterData();
          renderCharList();
          updateFilterOptions();
          
          // Clear selection and refresh
          selectedCharId = null;
          document.getElementById('panelContent').innerHTML = '<div class="empty-state">Select a character to view details</div>';
          
          showToast(`Imported ${masterData.data.characters.length} characters`);
        } catch(err) { 
          alert('Invalid JSON: ' + err.message); 
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let c = document.getElementById('toast-container');
    if (!c) { 
      c = document.createElement('div'); 
      c.id = 'toast-container'; 
      c.style.position = 'fixed';
      c.style.bottom = '20px';
      c.style.right = '20px';
      c.style.zIndex = '9999';
      c.style.display = 'flex';
      c.style.flexDirection = 'column';
      c.style.gap = '8px';
      document.body.appendChild(c); 
    }
    const t = document.createElement('div'); 
    t.className = 'toast'; 
    t.innerText = msg; 
    t.style.background = 'var(--bg2)';
    t.style.border = '1px solid var(--accent)';
    t.style.borderRadius = '4px';
    t.style.padding = '8px 16px';
    t.style.color = 'var(--accent)';
    t.style.fontFamily = "'Cinzel', serif";
    t.style.fontSize = '0.75rem';
    t.style.boxShadow = '0 4px 12px rgba(0,0,0,0.5)';
    t.style.animation = 'slideIn 0.3s forwards, fadeOut 0.3s 1.7s forwards';
    c.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
  
  function escapeHtml(str) { 
    if (!str) return ''; 
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); 
  }
  
  // Add animation styles for toast if not already present
  if (!document.querySelector('#toast-styles')) {
    const style = document.createElement('style');
    style.id = 'toast-styles';
    style.textContent = `
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(100%); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes fadeOut {
        from { opacity: 1; transform: translateX(0); }
        to { opacity: 0; transform: translateX(100%); }
      }
    `;
    document.head.appendChild(style);
  }
  
// ==================== ROLES TAB ====================
function renderRolesTab() {
  const c = masterData.data.characters.find(ch => ch.id === selectedCharId);
  if (!c) {
    document.getElementById('panelContent').innerHTML = '<div class="empty-state">Select a character first</div>';
    return;
  }
  
  const professions = masterData.data.roles || [];
  const assigned = c.professions || [];
  const isMaster = c.isMaster || false;
  const masterProfessionId = c.masterProfessionId;
  const apprentices = c.apprentices || [];
  
  const available = professions.filter(p => !assigned.some(a => a.id === p.id));
  
  document.getElementById('panelContent').innerHTML = `
    <div class="roles-tab">
      <div class="collapsible-section">
        <div class="section-header">📋 Assigned Professions <span class="arrow">▶</span></div>
        <div class="section-content">
          <div id="assignedProfessionsList">
            ${assigned.length ? assigned.map(prof => {
              const fullProf = professions.find(p => p.id === prof.id) || prof;
              return `
                <div class="profession-card" data-prof-id="${prof.id}">
                  <div class="profession-header">
                    <div>
                      <span class="profession-name">${escapeHtml(prof.name)}</span>
                      <span class="profession-type">${fullProf.type === 'daily' ? 'Daily' : 'Ritual'}</span>
                    </div>
                    <div>
                      <span class="primary-star ${prof.primary ? 'active' : ''}" data-primary="${prof.id}" style="cursor:pointer;">${prof.primary ? '★' : '☆'}</span>
                      <button class="btn small danger" data-remove="${prof.id}" style="margin-left:8px;">Remove</button>
                    </div>
                  </div>
                  ${fullProf.subtags?.length ? `
                    <div class="profession-specs">
                      ${fullProf.subtags.map(spec => `
                        <span class="spec-tag ${prof.specs?.includes(spec) ? 'selected' : ''}" data-spec="${prof.id}|${spec.replace(/'/g, "\\'")}">${escapeHtml(spec)}</span>
                      `).join('')}
                    </div>
                  ` : ''}
                  <div class="profession-notes">
                    <textarea class="prof-notes" data-prof="${prof.id}" placeholder="Notes..." rows="2" style="width:100%; padding:4px 6px; background:var(--bg); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:0.7rem;">${escapeHtml(prof.notes || '')}</textarea>
                  </div>
                </div>
              `;
            }).join('') : '<div class="empty-state" style="padding:20px;">No professions assigned</div>'}
          </div>
        </div>
      </div>
      
      <div class="collapsible-section">
        <div class="section-header">🏆 Master Status <span class="arrow">▶</span></div>
        <div class="section-content">
          <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
            <label style="display:flex; align-items:center; gap:8px;">
              <input type="checkbox" id="isMasterToggle" ${isMaster ? 'checked' : ''}>
              <span>This character is a Master</span>
            </label>
            <div id="masterProfessionSelect" style="${!isMaster ? 'display:none;' : ''}">
              <select id="masterProfession" style="padding:6px 10px;">
                <option value="">Select profession...</option>
                ${assigned.map(p => `<option value="${p.id}" ${masterProfessionId === p.id ? 'selected' : ''}>${escapeHtml(p.name)}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
      </div>
      
      <div class="collapsible-section">
        <div class="section-header">👥 Apprentices (${apprentices.length}) <span class="arrow">▶</span></div>
        <div class="section-content">
          <div id="apprenticesList">
            ${apprentices.length ? apprentices.map(appId => {
              const app = masterData.data.characters.find(ch => ch.id === appId);
              if (!app) return '';
              return `
                <div class="family-card" data-app="${appId}">
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                      <span class="card-name" data-id="${appId}">${app.isDeceased ? '💀 ' : ''}${(getActiveRankDisplay(app)?.display || '')} ${escapeHtml(app.name)} ${escapeHtml(app.surname || '')}</span>
                      <div class="card-details">${app.gender === 'male' ? '♂' : app.gender === 'female' ? '♀' : '⚥'} · Age: ${calculateAge(app.birthYear, app.isDeceased, app.deathYear)} · ${getCurrentLocation(app)}</div>
                    </div>
                    <button class="btn small danger" data-remove-app="${appId}">Remove</button>
                  </div>
                </div>
              `;
            }).join('') : '<div class="empty-state" style="padding:20px;">No apprentices</div>'}
          </div>
          <button id="addApprenticeBtn" class="btn primary" style="margin-top:12px;">+ Add Apprentice</button>
        </div>
      </div>
      
      <div class="collapsible-section">
        <div class="section-header">📚 Available Professions <span class="arrow">▶</span></div>
        <div class="section-content">
          <div id="availableProfessionsList">
            ${available.length ? available.map(prof => `
              <div class="profession-card">
                <div class="profession-header">
                  <div>
                    <span class="profession-name">${escapeHtml(prof.name)}</span>
                    <span class="profession-type">${prof.type === 'daily' ? 'Daily' : 'Ritual'}</span>
                  </div>
                  <button class="btn small primary" data-add="${prof.id}">+ Assign</button>
                </div>
                ${prof.subtags?.length ? `
                  <div class="profession-specs">
                    ${prof.subtags.slice(0, 3).map(spec => `<span class="spec-tag">${escapeHtml(spec)}</span>`).join('')}
                    ${prof.subtags.length > 3 ? `<span class="spec-tag">+${prof.subtags.length - 3}</span>` : ''}
                  </div>
                ` : ''}
              </div>
            `).join('') : '<div class="empty-state" style="padding:20px;">All professions assigned</div>'}
          </div>
        </div>
      </div>
    </div>`;
  
  attachRolesEventListeners(c);
  
  // Manually expand all sections in Roles tab
  setTimeout(() => {
    document.querySelectorAll('#panelContent .collapsible-section .section-header').forEach(header => {
      const content = header.nextElementSibling;
      const arrow = header.querySelector('.arrow');
      if (content && !content.classList.contains('expanded')) {
        content.classList.add('expanded');
      }
      if (arrow && !arrow.classList.contains('expanded')) {
        arrow.classList.add('expanded');
      }
      if (!header.hasListener) {
        header.hasListener = true;
        header.addEventListener('click', (e) => {
          e.stopPropagation();
          const targetContent = header.nextElementSibling;
          const targetArrow = header.querySelector('.arrow');
          if (targetContent) targetContent.classList.toggle('expanded');
          if (targetArrow) targetArrow.classList.toggle('expanded');
        });
      }
    });
  }, 50);
}

function attachRolesEventListeners(c) {
  // Primary star toggle
  document.querySelectorAll('.primary-star').forEach(star => {
    star.addEventListener('click', () => {
      const profId = star.dataset.primary;
      c.professions.forEach(p => {
        p.primary = (p.id === profId);
      });
      saveMasterData();
      renderRolesTab();
      showToast('Primary profession updated');
    });
  });
  
  // Remove profession
  document.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const profId = btn.dataset.remove;
      if (confirm('Remove this profession?')) {
        c.professions = c.professions.filter(p => p.id !== profId);
        if (c.masterProfessionId === profId) {
          c.masterProfessionId = null;
          c.isMaster = false;
        }
        saveMasterData();
        renderRolesTab();
        showToast('Profession removed');
      }
    });
  });
  
  // Specialization toggle
  document.querySelectorAll('.spec-tag[data-spec]').forEach(tag => {
    tag.addEventListener('click', () => {
      const [profId, specName] = tag.dataset.spec.split('|');
      const prof = c.professions.find(p => p.id === profId);
      if (prof) {
        if (!prof.specs) prof.specs = [];
        const index = prof.specs.indexOf(specName);
        if (index === -1) prof.specs.push(specName);
        else prof.specs.splice(index, 1);
        saveMasterData();
        tag.classList.toggle('selected');
      }
    });
  });
  
  // Profession notes
  document.querySelectorAll('.prof-notes').forEach(textarea => {
    textarea.addEventListener('change', (e) => {
      const profId = textarea.dataset.prof;
      const prof = c.professions.find(p => p.id === profId);
      if (prof) {
        prof.notes = e.target.value;
        saveMasterData();
      }
    });
  });
  
  // Add profession
  document.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => {
      const profId = btn.dataset.add;
      const fullProf = masterData.data.roles.find(p => p.id === profId);
      if (fullProf) {
        if (!c.professions) c.professions = [];
        c.professions.push({
          id: fullProf.id,
          name: fullProf.name,
          type: fullProf.type,
          primary: false,
          specs: [],
          notes: ''
        });
        saveMasterData();
        renderRolesTab();
        showToast(`Added ${fullProf.name}`);
      }
    });
  });
  
  // Master toggle
  const masterToggle = document.getElementById('isMasterToggle');
  const masterSelectDiv = document.getElementById('masterProfessionSelect');
  const masterSelect = document.getElementById('masterProfession');
  
  if (masterToggle) {
    masterToggle.addEventListener('change', (e) => {
      c.isMaster = e.target.checked;
      if (!c.isMaster) {
        c.masterProfessionId = null;
        if (masterSelectDiv) masterSelectDiv.style.display = 'none';
      } else {
        if (masterSelectDiv) masterSelectDiv.style.display = 'block';
      }
      saveMasterData();
      renderRolesTab();
    });
  }
  
  if (masterSelect) {
    masterSelect.addEventListener('change', (e) => {
      c.masterProfessionId = e.target.value || null;
      saveMasterData();
    });
  }
  
  // Add apprentice button
  const addApprenticeBtn = document.getElementById('addApprenticeBtn');
  if (addApprenticeBtn) {
    addApprenticeBtn.addEventListener('click', () => openAddApprenticeModal(c.id));
  }
  
  // Remove apprentice
  document.querySelectorAll('[data-remove-app]').forEach(btn => {
    btn.addEventListener('click', () => {
      const appId = btn.dataset.removeApp;
      if (confirm('Remove this apprentice?')) {
        c.apprentices = c.apprentices.filter(id => id !== appId);
        const apprentice = masterData.data.characters.find(ch => ch.id === appId);
        if (apprentice) {
          apprentice.masterId = null;
        }
        saveMasterData();
        renderRolesTab();
        showToast('Apprentice removed');
      }
    });
  });
}

function openAddApprenticeModal(masterId) {
  const master = masterData.data.characters.find(ch => ch.id === masterId);
  if (!master) return;
  
  const existingApprenticeIds = master.apprentices || [];
  let available = masterData.data.characters.filter(ch => 
    ch.id !== masterId && 
    !existingApprenticeIds.includes(ch.id) &&
    !ch.isDeceased &&
    (ch.birthYear ? (currentYear - ch.birthYear) >= 14 : true)
  );
  
  let searchTerm = '';
  let filters = { gender: null, peer: false };
  
  function renderList() {
    let filtered = [...available];
    if (searchTerm) {
      filtered = filtered.filter(ch => 
        ch.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
        (ch.surname || '').toLowerCase().includes(searchTerm.toLowerCase())
      );
    }
    if (filters.gender) filtered = filtered.filter(ch => ch.gender === filters.gender);
    if (filters.peer && master.birthYear) {
      filtered = filtered.filter(ch => Math.abs((ch.birthYear || 0) - master.birthYear) <= 20);
    }
    
    const listContainer = document.getElementById('apprenticeList');
    if (!filtered.length) {
      listContainer.innerHTML = '<div class="empty-state">No candidates found</div>';
      return;
    }
    listContainer.innerHTML = filtered.map(ch => `
      <div class="apprentice-option" data-id="${ch.id}" style="padding:10px; border-bottom:1px solid var(--border); cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
        <div>
          <strong>${escapeHtml(ch.name)} ${escapeHtml(ch.surname || '')}</strong><br>
          <span style="font-size:0.65rem; color:var(--dim);">${ch.gender === 'male' ? '♂' : ch.gender === 'female' ? '♀' : '⚥'} · Age: ${calculateAge(ch.birthYear, ch.isDeceased, ch.deathYear)} · ${getCurrentLocation(ch)}</span>
        </div>
        <button class="btn small primary">Select</button>
      </div>
    `).join('');
    
    document.querySelectorAll('.apprentice-option').forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        const apprenticeId = opt.dataset.id;
        if (!master.apprentices) master.apprentices = [];
        master.apprentices.push(apprenticeId);
        const apprentice = masterData.data.characters.find(ch => ch.id === apprenticeId);
        if (apprentice) apprentice.masterId = masterId;
        saveMasterData();
        modal.remove();
        renderRolesTab();
        showToast('Apprentice added');
      });
    });
  }
  
  const modal = document.createElement('div'); modal.className = 'modal active';
  modal.innerHTML = `
    <div class="modal-content" style="max-width:500px;">
      <h3>➕ Add Apprentice for ${escapeHtml(master.name)}</h3>
      <div style="margin-bottom:12px;">
        <input type="text" id="apprenticeSearch" placeholder="Search by name..." style="width:100%; padding:6px 8px; background:var(--bg); border:1px solid var(--border); border-radius:4px; color:var(--text);">
      </div>
      <div class="filter-row-inline" style="display:flex; gap:8px; margin-bottom:12px;">
        <select id="apprenticeGenderFilter" style="padding:4px 6px; font-size:0.65rem;">
          <option value="">All Genders</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
        <label style="display:flex; align-items:center; gap:4px; font-size:0.65rem;">
          <input type="checkbox" id="apprenticePeerFilter"> Peers (±20y)
        </label>
      </div>
      <div id="apprenticeList" style="max-height:350px; overflow-y:auto;"></div>
      <div style="margin-top:16px;"><button id="closeApprenticeModal" class="btn">Cancel</button></div>
    </div>`;
  document.body.appendChild(modal);
  
  document.getElementById('apprenticeSearch').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderList();
  });
  document.getElementById('apprenticeGenderFilter').addEventListener('change', (e) => {
    filters.gender = e.target.value || null;
    renderList();
  });
  document.getElementById('apprenticePeerFilter').addEventListener('change', (e) => {
    filters.peer = e.target.checked;
    renderList();
  });
  document.getElementById('closeApprenticeModal').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
  
  renderList();
}
// ==================== INIT ====================
function init() {
  loadMasterData(); 
  renderCharList();
  
  // Set up filter collapse (using the new filter header structure)
  const filterContent = document.getElementById('filterContent');
  const filterCollapseIcon = document.getElementById('filterCollapseIcon');
  const filterHeader = document.getElementById('filterHeader');
  let filtersCollapsed = false;
  
  if (filterHeader && filterContent) {
    filterHeader.addEventListener('click', () => {
      filtersCollapsed = !filtersCollapsed;
      if (filtersCollapsed) {
        filterContent.style.maxHeight = '0';
        filterContent.style.padding = '0 12px';
        filterContent.style.overflow = 'hidden';
        if (filterCollapseIcon) filterCollapseIcon.textContent = '▶';
      } else {
        filterContent.style.maxHeight = '400px';
        filterContent.style.padding = '12px';
        filterContent.style.overflow = 'auto';
        if (filterCollapseIcon) filterCollapseIcon.textContent = '▼';
      }
    });
    filterContent.style.maxHeight = '400px';
    filterContent.style.padding = '12px';
    filterContent.style.overflow = 'auto';
  }
  
  // Current year change
  const yearInput = document.getElementById('currentYear');
  if (yearInput) {
    yearInput.addEventListener('change', () => { 
      currentYear = parseInt(yearInput.value); 
      saveMasterData(); 
      renderCharList(); 
      if (selectedCharId) renderCurrentTab(); 
    });
  }
  
  // Clear filters button
  const clearFiltersBtn = document.getElementById('clearFilters');
  if (clearFiltersBtn) {
    clearFiltersBtn.addEventListener('click', () => { 
      document.querySelectorAll('.filter-bar select, .filter-bar input').forEach(s => { 
        if(s.type !== 'checkbox') s.value = ''; 
        else s.checked = false; 
      });
      renderCharList(); 
    });
  }
  
  // Add person button
  const addPersonBtn = document.getElementById('addPersonBtn');
  if (addPersonBtn) addPersonBtn.addEventListener('click', addNewPerson);
  
  // Generate person button - FIXED: removed duplicate push
  const generatePersonBtn = document.getElementById('generatePersonBtn');
  if (generatePersonBtn) {
    // Remove any existing listeners to prevent duplicates
    const newGenerateBtn = generatePersonBtn.cloneNode(true);
    generatePersonBtn.parentNode.replaceChild(newGenerateBtn, generatePersonBtn);
    newGenerateBtn.addEventListener('click', () => { 
      const p = generateRandomPerson(); 
      // generateRandomPerson already pushes to array, no need to push again
      saveMasterData(); 
      renderCharList(); 
      selectCharacter(p.id); 
    });
  }
  
  // Import/Export buttons
  const importBtn = document.getElementById('importCharsBtn');
  if (importBtn) importBtn.addEventListener('click', importData);
  
  const exportBtn = document.getElementById('exportCharsBtn');
  if (exportBtn) exportBtn.addEventListener('click', exportData);
  
  // Old filter toggle (keep for compatibility if element exists)
  const filterToggleBtn = document.getElementById('filterToggleBtn');
  if (filterToggleBtn) {
    let filtersVisible = true;
    filterToggleBtn.addEventListener('click', () => { 
      const cont = document.getElementById('filterContainer'); 
      if (cont) {
        filtersVisible = !filtersVisible; 
        cont.style.display = filtersVisible ? 'block' : 'none'; 
        filterToggleBtn.textContent = filtersVisible ? '▼ Filters' : '▶ Filters';
      }
    });
  }
  
  // Mobile sidebar toggle
  const menuToggle = document.getElementById('menuToggle');
  if (menuToggle) {
    menuToggle.style.display = window.innerWidth <= 768 ? 'block' : 'none';
    menuToggle.addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('mobile-visible');
    });
  }
  
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      document.getElementById('sidebar').classList.remove('mobile-visible');
      if (menuToggle) menuToggle.style.display = 'none';
    } else {
      if (menuToggle) menuToggle.style.display = 'block';
    }
  });
  
  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); 
      btn.classList.add('active');
      if (selectedCharId) renderCurrentTab();
      else document.getElementById('panelContent').innerHTML = '<div class="empty-state">Select a character first</div>';
    });
  });
  
  // Filter event listeners
  const filterLifeStage = document.getElementById('filterLifeStage');
  if (filterLifeStage) filterLifeStage.addEventListener('change', renderCharList);
  
  const filterGender = document.getElementById('filterGender');
  if (filterGender) filterGender.addEventListener('change', renderCharList);
  
  const filterRelation = document.getElementById('filterRelation');
  if (filterRelation) filterRelation.addEventListener('change', renderCharList);
  
  const filterRank = document.getElementById('filterRank');
  if (filterRank) filterRank.addEventListener('change', renderCharList);
  
  const filterRole = document.getElementById('filterRole');
  if (filterRole) filterRole.addEventListener('change', renderCharList);
  
  const filterBirthLocation = document.getElementById('filterBirthLocation');
  if (filterBirthLocation) filterBirthLocation.addEventListener('change', renderCharList);
  
  const filterCurrentLocation = document.getElementById('filterCurrentLocation');
  if (filterCurrentLocation) filterCurrentLocation.addEventListener('change', renderCharList);
  
  const filterShowDeceased = document.getElementById('filterShowDeceased');
  if (filterShowDeceased) filterShowDeceased.addEventListener('change', renderCharList);
  
  // Storage event listener for cross-tab sync
  window.addEventListener('storage', (e) => { 
    if (e.key === 'stillwaters_master') { 
      loadMasterData(); 
      updateFilterOptions(); 
      renderCharList(); 
      if (selectedCharId) renderCurrentTab(); 
    } 
  });
  
  // Empty state handlers
  if (masterData.data.characters.length === 0) {
    const panelContent = document.getElementById('panelContent');
    if (panelContent) {
      panelContent.innerHTML = `<div class="empty-state">👤 No characters<br><br><button id="quickAdd" class="btn primary">+ Add First</button><button id="quickGen" class="btn">🎲 Generate</button></div>`;
      const quickAdd = document.getElementById('quickAdd');
      if (quickAdd) quickAdd.addEventListener('click', addNewPerson);
      const quickGen = document.getElementById('quickGen');
      if (quickGen) quickGen.addEventListener('click', () => { 
        const p = generateRandomPerson(); 
        // generateRandomPerson already pushes to array, no need to push again
        saveMasterData(); 
        renderCharList(); 
        selectCharacter(p.id); 
      });
    }
  }
}

// Make sure init is called after DOM is loaded
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Character Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    /* Mobile menu styles */
    .menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 900;
    }
    .menu-overlay.active {
      display: block;
    }
    
    /* Fix sidebar list spacing - remove empty space */
    .char-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .char-item {
      padding: 8px 10px;
    }
    
    .char-name {
      font-size: 0.8rem;
      line-height: 1.3;
      margin-bottom: 2px;
    }
    
    .char-details {
      font-size: 0.55rem;
      gap: 6px;
    }
    
    /* Random name button */
    .random-name-btn {
      background: #1e2738;
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.6rem;
      cursor: pointer;
      margin-left: 8px;
      white-space: nowrap;
    }
    
    .random-name-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .name-input-wrapper {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    
    .name-input-wrapper input {
      flex: 1;
    }
    
    @media (max-width: 768px) {
      .char-app .sidebar {
        position: fixed;
        top: 44px;
        left: -280px;
        width: 280px;
        height: calc(100vh - 44px);
        z-index: 1000;
        transition: left 0.3s ease;
        background: var(--bg2);
        border-right: 1px solid var(--border);
      }
      .char-app .sidebar.mobile-visible {
        left: 0;
      }
      .filter-toggle {
        display: block !important;
        background: none;
        border: none;
        color: var(--accent);
        font-size: 1.2rem;
        cursor: pointer;
        padding: 4px 8px;
      }
      .topbar {
        position: relative;
      }
    }
    @media (min-width: 769px) {
      .filter-toggle {
        display: none !important;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <button id="menuToggle" class="filter-toggle" style="display:none;">☰</button>
  <div class="title">CHARACTER MANAGER</div>
  <div style="flex:1"></div>
  <div style="display:flex; align-items:center; gap:8px;">
    <span style="font-size:0.7rem;">Year:</span>
    <input type="number" id="currentYear" value="1250" style="width:80px;">
  </div>
  <button id="importCharsBtn" class="tb-btn">Import</button>
  <button id="bulkImportBtn" class="tb-btn">📊 Bulk Import</button>
  <button id="exportCharsBtn" class="tb-btn primary">Export</button>
  <button id="addPersonBtn" class="tb-btn primary">+ Add Person</button>
  <button id="generatePersonBtn" class="tb-btn">⚄ Generate</button>
</div>

<div class="char-app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>CHARACTERS</h3>
      <button id="filterToggleBtn" class="filter-toggle">▼ Filters</button>
    </div>
    <div class="filter-container" id="filterContainer">
      <div class="filter-header" id="filterHeader">
        <span>FILTERS</span>
        <span id="filterCollapseIcon">▼</span>
      </div>
      <div id="filterContent" class="filter-bar">
        <div class="filter-row-inline">
          <select id="filterLifeStage"><option value="">Life Stage</option><option value="child">Child</option><option value="youth">Youth</option><option value="adult">Adult</option><option value="elder">Elder</option></select>
          <select id="filterGender"><option value="">Gender</option><option value="male">♂</option><option value="female">♀</option><option value="unknown">⚥</option></select>
          <select id="filterRelation"><option value="">Status</option><option value="single">Single</option><option value="partnered">Partnered</option><option value="widowed">Widowed</option></select>
        </div>
        <div class="filter-row-inline">
          <select id="filterRank"><option value="">Rank</option></select>
          <select id="filterRole"><option value="">Role</option></select>
        </div>
        <div class="filter-row-inline">
          <select id="filterBirthLocation"><option value="">Birth Loc</option></select>
          <select id="filterCurrentLocation"><option value="">Current Loc</option></select>
        </div>
        <div class="filter-row-inline">
          <label><input type="checkbox" id="filterShowDeceased"> Show Deceased</label>
          <button id="clearFilters" class="clear-btn">Clear</button>
        </div>
      </div>
    </div>
    <div class="char-list" id="charList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-tabs" id="panelTabs">
      <button class="tab-btn active" data-tab="view">View</button>
      <button class="tab-btn" data-tab="edit">Edit</button>
      <button class="tab-btn" data-tab="family">Family</button>
      <button class="tab-btn" data-tab="love">Partners</button>
      <button class="tab-btn" data-tab="friends">Friends</button>
      <button class="tab-btn" data-tab="roles">Roles</button>
      <button class="tab-btn" data-tab="overview">Overview</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-state">Select a character or add a new one</div>
    </div>
  </div>
</div>

<div id="menuOverlay" class="menu-overlay"></div>

<script>
  // ==================== UNIFIED DATA STRUCTURE ====================
  let masterData = {
    version: "2.0",
    lastUpdated: new Date().toISOString(),
    data: {
      characters: [],
      places: [],
      ranks: [],
      roles: [],
      locationTypes: [],
      governments: [],
      nameLists: {},
      currentYear: 1250
    }
  };
  
  let selectedCharId = null;
  let currentYear = 1250;
  
  // Name lists for random generation
  const maleNames = ['Kai', 'Mako', 'Tane', 'Rangi', 'Koa', 'Keanu', 'Ari', 'Leo', 'Nico', 'Ikaia', 'Sione', 'Tama', 'Vaea', 'Laki', 'Kaleo', 'Mana', 'Tuki', 'Hemi', 'Wiremu', 'Rawiri'];
  const femaleNames = ['Leilani', 'Moana', 'Nani', 'Tui', 'Hina', 'Lani', 'Malia', 'Rai', 'Tara', 'Vai', 'Manaia', 'Aroha', 'Eponi', 'Luna', 'Mira', 'Ana', 'Hera', 'Kiri', 'Rangi', 'Tia'];
  
  function generateId() { return 'char_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  // ==================== LOAD/SAVE ====================
  function loadMasterData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        masterData = {
          version: parsed.version || "2.0",
          data: {
            characters: parsed.data?.characters || [],
            places: parsed.data?.places || [],
            ranks: parsed.data?.ranks || [],
            roles: parsed.data?.roles || [],
            locationTypes: parsed.data?.locationTypes || [],
            governments: parsed.data?.governments || [],
            nameLists: parsed.data?.nameLists || {},
            currentYear: parsed.data?.currentYear || 1250
          }
        };
      } catch(e) { console.error('Error loading master data', e); }
    }
    currentYear = masterData.data.currentYear;
    const yearInput = document.getElementById('currentYear');
    if (yearInput) yearInput.value = currentYear;
    updateFilterOptions();
  }
  
  function saveMasterData() {
    masterData.lastUpdated = new Date().toISOString();
    masterData.data.currentYear = currentYear;
    localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
  }
  
  function calculateAge(birthYear, isDeceased, deathYear) {
    if (!birthYear) return 0;
    if (isDeceased && deathYear) return deathYear - birthYear;
    return currentYear - birthYear;
  }
  
  function getLifeStage(age) {
    if (age < 13) return 'child';
    if (age < 18) return 'youth';
    if (age < 60) return 'adult';
    return 'elder';
  }
  
  function getCurrentLocation(char) {
    if (char.moves?.length) {
      const currentMove = char.moves[char.moves.length - 1];
      const loc = masterData.data.places.find(p => p.id === currentMove.locationId);
      return loc?.displayName || 'Unknown';
    }
    const loc = masterData.data.places.find(p => p.id === char.birthplaceId);
    return loc?.displayName || 'Unknown';
  }
  
  function getRankDisplay(rankId, rankNumber) {
    const rank = masterData.data.ranks.find(r => r.id === rankId);
    if (!rank) return null;
    return { symbol: rank.symbol, name: rank.name, display: `${rank.symbol}${rankNumber || ''}` };
  }
  
  function getActiveRankDisplay(char) {
    if (!char.activeRankId) return null;
    return getRankDisplay(char.activeRankId, char.activeRankNumber);
  }
  
  // Get locations with variable keys, ordered by hierarchy
  function getOrderedLocations() {
    const places = masterData.data.places.filter(p => p.variableKey);
    const locationTypes = masterData.data.locationTypes;
    
    // Build hierarchy map
    const placeMap = new Map();
    places.forEach(p => placeMap.set(p.id, { ...p, children: [] }));
    
    // Build tree
    const roots = [];
    places.forEach(p => {
      if (p.parentId && placeMap.has(p.parentId)) {
        const parent = placeMap.get(p.parentId);
        parent.children.push(placeMap.get(p.id));
      } else if (!p.parentId) {
        roots.push(placeMap.get(p.id));
      }
    });
    
    // Flatten tree in order
    const ordered = [];
    function flatten(node, depth = 0) {
      ordered.push({ ...node, depth });
      node.children.sort((a, b) => a.displayName.localeCompare(b.displayName));
      node.children.forEach(child => flatten(child, depth + 1));
    }
    roots.sort((a, b) => a.displayName.localeCompare(b.displayName));
    roots.forEach(root => flatten(root));
    
    return ordered;
  }
  
  function updateFilterOptions() {
    const rankSelect = document.getElementById('filterRank');
    const roleSelect = document.getElementById('filterRole');
    const birthLocSelect = document.getElementById('filterBirthLocation');
    const currentLocSelect = document.getElementById('filterCurrentLocation');
    
    if (rankSelect) {
      rankSelect.innerHTML = '<option value="">All</option>' + masterData.data.ranks.map(r => `<option value="${r.id}">${r.symbol} ${r.name}</option>`).join('');
    }
    if (roleSelect) {
      const roles = [...new Set(masterData.data.characters.map(c => c.role).filter(Boolean))];
      roleSelect.innerHTML = '<option value="">All</option>' + roles.map(r => `<option value="${r}">${r}</option>`).join('');
    }
    
    // Get ordered locations for dropdowns
    const orderedLocations = getOrderedLocations();
    const locationOptions = orderedLocations.map(p => {
      const indent = '  '.repeat(p.depth);
      return `<option value="${p.id}">${indent}${escapeHtml(p.displayName)}</option>`;
    }).join('');
    
    if (birthLocSelect) {
      birthLocSelect.innerHTML = '<option value="">All</option>' + locationOptions;
    }
    if (currentLocSelect) {
      currentLocSelect.innerHTML = '<option value="">All</option>' + locationOptions;
    }
  }
  
  // ==================== RENDER CHARACTER LIST ====================
  function renderCharList() {
    const container = document.getElementById('charList');
    const lifeStage = document.getElementById('filterLifeStage')?.value || '';
    const gender = document.getElementById('filterGender')?.value || '';
    const relation = document.getElementById('filterRelation')?.value || '';
    const rankFilter = document.getElementById('filterRank')?.value || '';
    const roleFilter = document.getElementById('filterRole')?.value || '';
    const birthLocFilter = document.getElementById('filterBirthLocation')?.value || '';
    const currentLocFilter = document.getElementById('filterCurrentLocation')?.value || '';
    const showDeceased = document.getElementById('filterShowDeceased')?.checked || false;
    const characters = masterData.data.characters;
    
    let filtered = characters.filter(c => {
      const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
      const stage = getLifeStage(age);
      if (lifeStage && stage !== lifeStage) return false;
      if (gender && c.gender !== gender) return false;
      if (!showDeceased && c.isDeceased) return false;
      
      const hasPartner = c.relationships?.some(r => r.status === 'ongoing');
      const isWidowed = c.relationships?.some(r => r.status === 'widowed');
      if (relation === 'single' && hasPartner) return false;
      if (relation === 'partnered' && !hasPartner) return false;
      if (relation === 'widowed' && !isWidowed) return false;
      
      if (rankFilter && c.activeRankId !== rankFilter) return false;
      if (roleFilter && c.role !== roleFilter) return false;
      if (birthLocFilter && c.birthplaceId !== birthLocFilter) return false;
      if (currentLocFilter) {
        const currentLoc = getCurrentLocation(c);
        const loc = masterData.data.places.find(p => p.id === currentLocFilter);
        if (currentLoc !== loc?.displayName) return false;
      }
      return true;
    });
    
    if (!filtered.length) { container.innerHTML = '<div class="empty-state">No characters found</div>'; return; }
    
    container.innerHTML = filtered.map(c => {
      const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
      const rankDisplay = getActiveRankDisplay(c);
      const location = getCurrentLocation(c);
      return `
        <div class="char-item ${selectedCharId === c.id ? 'selected' : ''}" data-id="${c.id}">
          <div class="char-name">
            <span class="${c.isDeceased ? 'deceased' : ''}">${rankDisplay ? `${rankDisplay.display} ` : ''}${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</span>
          </div>
          <div class="char-details">
            <span>${c.gender === 'male' ? '♂' : c.gender === 'female' ? '♀' : '⚥'}</span>
            <span>${age} yrs</span>
            <span>${location}</span>
            ${c.isDeceased ? '<span>†</span>' : ''}
          </div>
        </div>
      `;
    }).join('');
    document.querySelectorAll('.char-item').forEach(el => el.addEventListener('click', () => selectCharacter(el.dataset.id)));
  }
  
  function selectCharacter(id) { 
    selectedCharId = id; 
    renderCharList(); 
    renderCurrentTab();
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.remove('mobile-visible');
      document.getElementById('menuOverlay').classList.remove('active');
    }
  }
  
  function renderCurrentTab() {
    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'view';
    if (activeTab === 'view') renderViewTab();
    else if (activeTab === 'edit') renderEditTab();
    else if (activeTab === 'family') renderFamilyTab();
    else if (activeTab === 'love') renderLoveTab();
    else if (activeTab === 'friends') renderFriendsTab();
    else if (activeTab === 'roles') renderRolesTab();
    else if (activeTab === 'overview') renderOverviewTab();
  }
  
  // ==================== VIEW TAB ====================
  function renderViewTab() {
    const c = masterData.data.characters.find(c => c.id === selectedCharId);
    if (!c) { document.getElementById('panelContent').innerHTML = '<div class="empty-state">Character not found</div>'; return; }
    const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
    const rankDisplay = getActiveRankDisplay(c);
    const birthplace = masterData.data.places.find(l => l.id === c.birthplaceId);
    const currentLoc = getCurrentLocation(c);
    
    document.getElementById('panelContent').innerHTML = `
      <div class="view-section">
        <h2>${rankDisplay ? `${rankDisplay.display} ` : ''}${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</h2>
        <div class="warning-badge">🆔 ${c.id}</div>
        <div class="info-grid">
          <div class="info-label">Gender</div><div class="info-value">${c.gender || 'Unknown'}</div>
          <div class="info-label">Attraction</div><div class="info-value">${c.attraction || 'Unknown'}</div>
          <div class="info-label">Born</div><div class="info-value">Year ${c.birthYear || '?'}</div>
          <div class="info-label">Age</div><div class="info-value">${age} years</div>
          <div class="info-label">Status</div><div class="info-value">${c.isDeceased ? `Deceased (${c.deathYear})` : 'Living'}</div>
          ${c.deathCause ? `<div class="info-label">Cause of Death</div><div class="info-value">${escapeHtml(c.deathCause)}</div>` : ''}
          <div class="info-label">Rank</div><div class="info-value">${rankDisplay ? `${rankDisplay.symbol} ${rankDisplay.name}${c.activeRankNumber ? ` #${c.activeRankNumber}` : ''}` : 'None'}</div>
          <div class="info-label">Role</div><div class="info-value">${c.role || 'None'}</div>
          <div class="info-label">Birthplace</div><div class="info-value">${birthplace?.displayName || 'Unknown'}</div>
          <div class="info-label">Current Location</div><div class="info-value">${currentLoc}</div>
          <div class="info-label">Household</div><div class="info-value">${c.household || 'None'}</div>
        </div>
        ${c.notes ? `<div class="collapsible-section"><div class="section-header">Notes <span class="arrow">▶</span></div><div class="section-content"><div>${escapeHtml(c.notes)}</div></div></div>` : ''}
      </div>`;
    
    document.querySelectorAll('.collapsible-section .section-header').forEach(h => {
      const content = h.nextElementSibling;
      const arrow = h.querySelector('.arrow');
      h.addEventListener('click', () => { content.classList.toggle('expanded'); arrow?.classList.toggle('expanded'); });
    });
  }
  
  // ==================== EDIT TAB with Random Name Button ====================
  function renderEditTab() {
    const c = masterData.data.characters.find(c => c.id === selectedCharId);
    if (!c) { document.getElementById('panelContent').innerHTML = '<div class="empty-state">Character not found</div>'; return; }
    
    const places = masterData.data.places;
    const ranks = masterData.data.ranks;
    const wasDeceased = c.isDeceased;
    
    // Get ordered locations for dropdown
    const orderedLocations = getOrderedLocations();
    const locationOptions = orderedLocations.map(p => {
      const indent = '  '.repeat(p.depth);
      return `<option value="${p.id}" ${c.birthplaceId === p.id ? 'selected' : ''}>${indent}${escapeHtml(p.displayName)}</option>`;
    }).join('');
    
    document.getElementById('panelContent').innerHTML = `
      <div class="edit-tab">
        <form id="editForm">
          <div class="collapsible-section"><div class="section-header">Identity <span class="arrow">▶</span></div><div class="section-content">
            <div class="form-row">
              <div class="form-group">
                <label>First Name</label>
                <div class="name-input-wrapper">
                  <input id="firstName" value="${escapeHtml(c.name)}">
                  <button type="button" id="randomFirstNameBtn" class="random-name-btn" title="Random name">🎲</button>
                </div>
              </div>
              <div class="form-group">
                <label>Surname</label>
                <div class="name-input-wrapper">
                  <input id="surname" value="${escapeHtml(c.surname || '')}">
                  <button type="button" id="randomSurnameBtn" class="random-name-btn" title="Random surname">🎲</button>
                </div>
              </div>
            </div>
            <div class="form-row"><div

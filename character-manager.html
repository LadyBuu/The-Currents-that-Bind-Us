<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Character Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    .char-app {
      display: flex;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    .sidebar {
      width: 320px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin: 0;
    }
    
    .filter-toggle {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.7rem;
    }
    
    .filter-container {
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    
    .filter-bar {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
    }
    
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .filter-group label {
      font-size: 0.6rem;
      font-family: 'Cinzel', serif;
      color: var(--accent);
    }
    
    .filter-group select {
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      font-size: 0.7rem;
    }
    
    .char-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .char-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .char-item:hover, .char-item.selected {
      border-color: var(--accent);
      background: var(--bg3);
    }
    
    .char-name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      justify-content: space-between;
    }
    
    .char-details {
      font-size: 0.65rem;
      color: var(--dim);
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .deceased {
      color: var(--deceased);
      text-decoration: line-through;
    }
    
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      padding: 0 16px;
      overflow-x: auto;
    }
    
    .tab-btn {
      padding: 10px 16px;
      background: none;
      border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      cursor: pointer;
      color: var(--dim);
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .collapsible-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    
    .section-header {
      padding: 12px 16px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: var(--accent);
      background: var(--bg3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .section-header .arrow {
      transition: transform 0.2s;
    }
    
    .section-header .arrow.expanded {
      transform: rotate(90deg);
    }
    
    .section-content {
      padding: 16px;
      display: none;
    }
    
    .section-content.expanded {
      display: block;
    }
    
    .family-card, .love-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .family-card .name, .love-card .name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
    }
    
    .family-card .name:hover, .love-card .name:hover {
      text-decoration: underline;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-group label {
      display: block;
      font-size: 0.65rem;
      font-family: 'Cinzel', serif;
      color: var(--accent);
      margin-bottom: 4px;
    }
    
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 6px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      font-size: 0.8rem;
    }
    
    .rank-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .rank-btn {
      padding: 4px 12px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 20px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    
    .assigned-rank {
      background: var(--bg3);
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .move-item {
      background: var(--bg3);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .action-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    
    .warning-badge {
      background: rgba(200,112,64,0.2);
      border: 1px solid var(--warn);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 0.7rem;
      margin-bottom: 16px;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .info-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--accent);
    }
    
    .clickable-name {
      cursor: pointer;
      color: var(--accent);
    }
    
    .clickable-name:hover {
      text-decoration: underline;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    
    .filter-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    
    .partner-option {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    
    .partner-option:hover {
      background: var(--bg3);
    }
    
    .partner-option.selected {
      background: var(--accent-dim);
    }
    
    .warning-text {
      color: var(--warn);
      font-size: 0.6rem;
      margin-top: 4px;
    }
    
    @media (max-width: 768px) {
      .char-app { flex-direction: column; height: auto; }
      .sidebar { width: 100%; max-height: 400px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">👥 CHARACTER MANAGER</div>
  <div style="flex:1"></div>
  <div style="display:flex; align-items:center; gap:8px;">
    <span style="font-size:0.7rem;">📅 Year:</span>
    <input type="number" id="currentYear" value="1250" style="width:80px;">
  </div>
  <button id="importCharsBtn" class="tb-btn">📂 Import</button>
  <button id="exportCharsBtn" class="tb-btn primary">💾 Export</button>
  <button id="addPersonBtn" class="tb-btn primary">+ Add Person</button>
  <button id="generatePersonBtn" class="tb-btn">🎲 Generate</button>
</div>

<div class="char-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>📋 CHARACTERS</h3>
      <button id="filterToggleBtn" class="filter-toggle">▼ Filters</button>
    </div>
    <div id="filterContainer" class="filter-container">
      <div class="filter-bar">
        <div class="filter-group"><label>Life Stage</label><select id="filterLifeStage"><option value="">All</option><option value="child">Child (0-12)</option><option value="youth">Youth (13-17)</option><option value="adult">Adult (18-59)</option><option value="elder">Elder (60+)</option></select></div>
        <div class="filter-group"><label>Relationship Status</label><select id="filterRelation"><option value="">All</option><option value="single">Single</option><option value="partnered">Partnered</option><option value="widowed">Widowed</option></select></div>
        <div class="filter-group"><label>Current Location</label><select id="filterLocation"><option value="">All</option></select></div>
        <button id="clearFilters" class="btn small">Clear Filters</button>
      </div>
    </div>
    <div class="char-list" id="charList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="view">📖 View</button>
      <button class="tab-btn" data-tab="edit">✏️ Edit</button>
      <button class="tab-btn" data-tab="family">👪 Family</button>
      <button class="tab-btn" data-tab="love">❤️ Love</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-state">Select a character or add a new one</div>
    </div>
  </div>
</div>

<script>
  // Data stores
  let characters = [];
  let locations = [];
  let ranks = [];
  let roles = [];
  let nameLists = {};
  let selectedCharId = null;
  let currentYear = 1250;
  
  function generateId() { return 'char_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  function generateRelId() { return 'rel_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  function calculateAge(birthYear, isDeceased, deathYear) {
    if (!birthYear) return 0;
    if (isDeceased && deathYear) return deathYear - birthYear;
    return currentYear - birthYear;
  }
  
  function getCurrentLocation(char) {
    if (char.moves?.length) return char.moves[char.moves.length-1].locationId;
    return char.birthplaceId;
  }
  
  function areRelated(id1, id2) {
    if (id1 === id2) return true;
    const c1 = characters.find(c => c.id === id1);
    const c2 = characters.find(c => c.id === id2);
    if (!c1 || !c2) return false;
    if (c1.motherId === id2 || c1.fatherId === id2) return true;
    if (c2.motherId === id1 || c2.fatherId === id1) return true;
    if ((c1.motherId && c1.motherId === c2.motherId) || (c1.fatherId && c1.fatherId === c2.fatherId)) return true;
    return false;
  }
  
  function getChildren(id) { return characters.filter(c => c.motherId === id || c.fatherId === id); }
  function getSiblings(id) {
    const c = characters.find(c => c.id === id);
    if (!c) return [];
    return characters.filter(c2 => c2.id !== id && ((c2.motherId && c2.motherId === c.motherId) || (c2.fatherId && c2.fatherId === c.fatherId)));
  }
  
  function getRandomName(countryId, gender) {
    for (let id in nameLists) {
      const lists = nameLists[id];
      if (gender === 'male' && lists.male?.length) return lists.male[Math.floor(Math.random() * lists.male.length)];
      if (gender === 'female' && lists.female?.length) return lists.female[Math.floor(Math.random() * lists.female.length)];
      if (lists.male?.length) return lists.male[Math.floor(Math.random() * lists.male.length)];
    }
    return gender === 'male' ? 'Aron' : 'Elara';
  }
  
  function getRandomSurname() {
    for (let id in nameLists) {
      if (nameLists[id]?.surnames?.length) return nameLists[id].surnames[Math.floor(Math.random() * nameLists[id].surnames.length)];
    }
    return 'Stormborn';
  }
  
  function loadAllData() {
    const stored = localStorage.getItem('stillwaters_characters');
    characters = stored ? JSON.parse(stored) : [];
    characters.forEach(c => { if (!c.relationships) c.relationships = []; if (!c.childrenIds) c.childrenIds = []; });
    locations = JSON.parse(localStorage.getItem('stillwaters_places') || '[]');
    ranks = JSON.parse(localStorage.getItem('stillwaters_ranks') || '[]');
    roles = JSON.parse(localStorage.getItem('stillwaters_roles') || '[]');
    const names = localStorage.getItem('stillwaters_namelists');
    if (names) nameLists = JSON.parse(names).nameLists || {};
    currentYear = parseInt(localStorage.getItem('stillwaters_currentYear') || '1250');
    document.getElementById('currentYear').value = currentYear;
  }
  
  function saveAllData() { localStorage.setItem('stillwaters_characters', JSON.stringify(characters)); localStorage.setItem('stillwaters_currentYear', currentYear); }
  
  function renderCharList() {
    const container = document.getElementById('charList');
    const lifeStage = document.getElementById('filterLifeStage').value;
    const relation = document.getElementById('filterRelation').value;
    const locationFilter = document.getElementById('filterLocation').value;
    
    let filtered = characters.filter(c => {
      const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
      if (lifeStage === 'child' && age >= 13) return false;
      if (lifeStage === 'youth' && (age < 13 || age >= 18)) return false;
      if (lifeStage === 'adult' && (age < 18 || age >= 60)) return false;
      if (lifeStage === 'elder' && age < 60) return false;
      
      const hasPartner = c.relationships?.some(r => r.status === 'ongoing');
      if (relation === 'single' && hasPartner) return false;
      if (relation === 'partnered' && !hasPartner) return false;
      
      if (locationFilter) {
        const loc = getCurrentLocation(c);
        if (loc !== locationFilter) return false;
      }
      return true;
    });
    
    if (!filtered.length) { container.innerHTML = '<div class="empty-state">No characters found</div>'; return; }
    
    container.innerHTML = filtered.map(c => {
      const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
      const rank = c.rankAssignments?.find(r => r.isActive);
      const rankData = rank ? ranks.find(r => r.id === rank.rankId) : null;
      const loc = locations.find(l => l.id === getCurrentLocation(c));
      return `<div class="char-item ${selectedCharId === c.id ? 'selected' : ''}" data-id="${c.id}">
        <div class="char-name"><span class="${c.isDeceased ? 'deceased' : ''}">${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</span><span>${rankData?.symbol || ''}${rank?.rankNumber || ''}</span></div>
        <div class="char-details"><span>${c.gender === 'male' ? '♂' : c.gender === 'female' ? '♀' : '⚥'}</span><span>${age} yrs</span><span>${loc?.displayName || '?'}</span>${c.isDeceased ? '<span>💀</span>' : ''}</div>
      </div>`;
    }).join('');
    document.querySelectorAll('.char-item').forEach(el => el.addEventListener('click', () => selectCharacter(el.dataset.id)));
  }
  
  function selectCharacter(id) { selectedCharId = id; renderCharList(); renderViewTab(); }
  
  function renderViewTab() {
    const c = characters.find(c => c.id === selectedCharId);
    if (!c) { document.getElementById('panelContent').innerHTML = '<div class="empty-state">Character not found</div>'; return; }
    const age = calculateAge(c.birthYear, c.isDeceased, c.deathYear);
    const rank = c.rankAssignments?.find(r => r.isActive);
    const rankData = rank ? ranks.find(r => r.id === rank.rankId) : null;
    const birthplace = locations.find(l => l.id === c.birthplaceId);
    const currentLoc = locations.find(l => l.id === getCurrentLocation(c));
    const mother = c.motherId ? characters.find(m => m.id === c.motherId) : null;
    const father = c.fatherId ? characters.find(f => f.id === c.fatherId) : null;
    const children = getChildren(c.id);
    const partners = c.relationships?.filter(r => r.status === 'ongoing').map(r => characters.find(p => p.id === r.partnerId)) || [];
    
    document.getElementById('panelContent').innerHTML = `
      <div class="view-section">
        <h2>${escapeHtml(c.name)} ${escapeHtml(c.surname || '')}</h2>
        <div class="warning-badge">🆔 ${c.id}</div>
        <div class="info-grid">
          <div class="info-label">Gender</div><div class="info-value">${c.gender || 'Unknown'}</div>
          <div class="info-label">Attraction</div><div class="info-value">${c.attraction || 'Unknown'}</div>
          <div class="info-label">Born</div><div class="info-value">Year ${c.birthYear || '?'}</div>
          <div class="info-label">Age</div><div class="info-value">${age} years</div>
          <div class="info-label">Status</div><div class="info-value">${c.isDeceased ? `Deceased (${c.deathYear})` : 'Living'}</div>
          <div class="info-label">Rank</div><div class="info-value">${rankData ? `${rankData.symbol} ${rankData.name}` : 'None'}</div>
          <div class="info-label">Birthplace</div><div class="info-value">${birthplace?.displayName || 'Unknown'}</div>
          <div class="info-label">Current Location</div><div class="info-value">${currentLoc?.displayName || 'Unknown'}</div>
        </div>
        ${(mother || father) ? `<div class="collapsible-section"><div class="section-header">👪 Parents <span class="arrow">▶</span></div><div class="section-content">${mother ? `<div><strong>Mother:</strong> <span class="clickable-name" data-id="${mother.id}">${escapeHtml(mother.name)}</span></div>` : ''}${father ? `<div><strong>Father:</strong> <span class="clickable-name" data-id="${father.id}">${escapeHtml(father.name)}</span></div>` : ''}</div></div>` : ''}
        ${partners.length ? `<div class="info-grid"><div class="info-label">Partners</div><div class="info-value">${partners.map(p => `<span class="clickable-name" data-id="${p.id}">${escapeHtml(p.name)}</span>`).join(', ')}</div></div>` : ''}
        ${children.length ? `<div class="info-grid"><div class="info-label">Children</div><div class="info-value">${children.slice(0,3).map(ch => `<span class="clickable-name" data-id="${ch.id}">${escapeHtml(ch.name)}</span>`).join(', ')}${children.length > 3 ? ` +${children.length-3}` : ''}</div></div>` : ''}
      </div>`;
    document.querySelectorAll('.clickable-name').forEach(el => el.addEventListener('click', () => selectCharacter(el.dataset.id)));
    document.querySelectorAll('.collapsible-section .section-header').forEach(h => { const content = h.nextElementSibling; const arrow = h.querySelector('.arrow'); h.addEventListener('click', () => { content.classList.toggle('expanded'); arrow?.classList.toggle('expanded'); }); });
  }
  
  function renderEditTab() { /* Keep existing edit tab implementation */ }
  function renderFamilyTab() { /* Keep existing family tab implementation */ }
  
  function renderLoveTab() {
    const c = characters.find(c => c.id === selectedCharId);
    if (!c) return;
    
    document.getElementById('panelContent').innerHTML = `
      <div><div class="collapsible-section"><div class="section-header">💕 Partners <span class="arrow expanded">▶</span></div><div class="section-content expanded">
        ${c.relationships?.length ? c.relationships.map((rel, idx) => {
          const partner = characters.find(p => p.id === rel.partnerId);
          if (!partner) return '';
          return `<div class="love-card"><div class="love-card-header" style="display:flex;justify-content:space-between;align-items:center;"><span class="name" data-id="${partner.id}">${escapeHtml(partner.name)} ${escapeHtml(partner.surname || '')}</span><span>${rel.status === 'ongoing' ? '💚 Ongoing' : rel.status === 'widowed' ? '💔 Widowed' : '⚫ Terminated'}</span><div><button class="btn small" data-action="edit" data-idx="${idx}">✏️</button> <button class="btn small danger" data-action="remove" data-idx="${idx}">🗑️</button></div></div><div class="love-card-details" style="font-size:0.7rem;margin-top:6px;">${rel.type} | Started: ${rel.startYear}${rel.endYear ? ` | Ended: ${rel.endYear}` : ''}${rel.notes ? `<br>📝 ${escapeHtml(rel.notes)}` : ''}</div></div>`;
        }).join('') : '<div class="empty-state" style="padding:20px;">No partners</div>'}
        <button id="addPartnerBtn" class="btn primary" style="margin-top:16px;">+ Add Partner</button>
      </div></div></div>`;
    
    document.querySelectorAll('.love-card .name').forEach(el => el.addEventListener('click', () => selectCharacter(el.dataset.id)));
    document.querySelectorAll('[data-action="edit"]').forEach(btn => btn.addEventListener('click', () => openRelModal(c.id, parseInt(btn.dataset.idx))));
    document.querySelectorAll('[data-action="remove"]').forEach(btn => btn.addEventListener('click', () => { if(confirm('Remove relationship?')){ c.relationships.splice(parseInt(btn.dataset.idx),1); saveAllData(); renderLoveTab(); } }));
    document.getElementById('addPartnerBtn')?.addEventListener('click', () => openAddPartnerModal(c.id));
    document.querySelectorAll('.collapsible-section .section-header').forEach(h => { const content = h.nextElementSibling; const arrow = h.querySelector('.arrow'); h.addEventListener('click', () => { content.classList.toggle('expanded'); arrow.classList.toggle('expanded'); }); });
  }
  
  function openRelModal(charId, relIdx) {
    const c = characters.find(c => c.id === charId);
    const rel = c.relationships[relIdx];
    const partner = characters.find(p => p.id === rel.partnerId);
    const modal = document.createElement('div'); modal.className = 'modal active';
    modal.innerHTML = `<div class="modal-content"><h3>💕 ${escapeHtml(partner.name)}</h3><form><div class="form-group"><label>Type</label><select id="type"><option ${rel.type==='Casual'?'selected':''}>Casual</option><option ${rel.type==='Serious'?'selected':''}>Serious</option><option ${rel.type==='Promised'?'selected':''}>Promised</option><option ${rel.type==='Affair'?'selected':''}>Affair</option><option ${rel.type==='Other'?'selected':''}>Other</option></select></div><div class="form-group"><label>Status</label><select id="status"><option ${rel.status==='ongoing'?'selected':''}>ongoing</option><option ${rel.status==='terminated'?'selected':''}>terminated</option><option ${rel.status==='widowed'?'selected':''}>widowed</option></select></div><div class="form-row"><div class="form-group"><label>Started</label><input type="number" id="startYear" value="${rel.startYear||''}"></div><div class="form-group"><label>Ended</label><input type="number" id="endYear" value="${rel.endYear||''}"></div></div><div class="form-group"><label>Notes</label><textarea id="notes" rows="2">${escapeHtml(rel.notes||'')}</textarea></div><div class="modal-buttons"><button type="submit" class="btn primary">Save</button><button type="button" id="closeModal" class="btn">Cancel</button></div></form></div>`;
    document.body.appendChild(modal);
    modal.querySelector('form').addEventListener('submit', (e) => {
      e.preventDefault();
      rel.type = modal.querySelector('#type').value;
      rel.status = modal.querySelector('#status').value;
      rel.startYear = parseInt(modal.querySelector('#startYear').value) || null;
      rel.endYear = parseInt(modal.querySelector('#endYear').value) || null;
      rel.notes = modal.querySelector('#notes').value;
      const partnerRel = partner.relationships?.find(r => r.partnerId === charId);
      if (partnerRel) { partnerRel.type = rel.type; partnerRel.status = rel.status; partnerRel.startYear = rel.startYear; partnerRel.endYear = rel.endYear; partnerRel.notes = rel.notes; }
      saveAllData(); modal.remove(); renderLoveTab();
    });
    modal.querySelector('#closeModal').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
  }
  
  function openAddPartnerModal(charId) {
    const c = characters.find(c => c.id === charId);
    let filters = { gender: 'all', peersOnly: true, sameLocation: false, showDeceased: false };
    let selectedId = null;
    
    const modal = document.createElement('div'); modal.className = 'modal active';
    modal.innerHTML = `<div class="modal-content" style="max-width:600px;"><h3>➕ Add Partner for ${escapeHtml(c.name)}</h3><div class="filter-row"><div class="form-group"><label>Gender</label><select id="genderFilter"><option value="all">All</option><option value="male">Male</option><option value="female">Female</option></select></div><div class="form-group"><label><input type="checkbox" id="peersFilter" checked> Peers (±15yrs)</label></div><div class="form-group"><label><input type="checkbox" id="locationFilter"> Same location</label></div><div class="form-group"><label><input type="checkbox" id="deceasedFilter"> Show deceased</label></div></div><div id="partnerList" style="max-height:300px;overflow-y:auto;margin:16px 0;"></div><div class="form-group"><label>Relationship Type</label><select id="relType"><option>Casual</option><option>Serious</option><option>Promised</option><option>Affair</option><option>Other</option></select></div><div class="form-group"><label>Year Started</label><input type="number" id="startYear" value="${currentYear}"></div><div class="form-group"><label>Notes</label><textarea id="notes" rows="2"></textarea></div><div class="modal-buttons"><button id="confirmBtn" class="btn primary">Add</button><button id="closeModal" class="btn">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    
    function updateList() {
      const list = modal.querySelector('#partnerList');
      const available = characters.filter(p => {
        if (p.id === c.id) return false;
        if (!modal.querySelector('#deceasedFilter').checked && p.isDeceased) return false;
        const gender = modal.querySelector('#genderFilter').value;
        if (gender !== 'all' && p.gender !== gender) return false;
        if (modal.querySelector('#peersFilter').checked) { const diff = Math.abs((p.birthYear||0) - (c.birthYear||0)); if (diff > 15) return false; }
        if (modal.querySelector('#locationFilter').checked && getCurrentLocation(p) !== getCurrentLocation(c)) return false;
        if (c.relationships?.some(r => r.partnerId === p.id)) return false;
        return true;
      });
      list.innerHTML = available.map(p => `<div class="partner-option ${selectedId === p.id ? 'selected' : ''}" data-id="${p.id}"><strong>${escapeHtml(p.name)} ${escapeHtml(p.surname||'')}</strong><div style="font-size:0.7rem;">${p.gender==='male'?'♂':p.gender==='female'?'♀':'⚥'} | Age: ${calculateAge(p.birthYear,p.isDeceased,p.deathYear)}${areRelated(c.id,p.id) ? '<span class="warning-text"> ⚠️ Related!</span>' : ''}</div></div>`).join('');
      list.querySelectorAll('.partner-option').forEach(el => el.addEventListener('click', () => { selectedId = el.dataset.id; list.querySelectorAll('.partner-option').forEach(opt => opt.classList.remove('selected')); el.classList.add('selected'); }));
    }
    
    modal.querySelectorAll('select, input').forEach(el => el.addEventListener('change', updateList));
    updateList();
    
    modal.querySelector('#confirmBtn').addEventListener('click', () => {
      if (!selectedId) { alert('Select a partner'); return; }
      const partner = characters.find(p => p.id === selectedId);
      const rel = { id: generateRelId(), partnerId: selectedId, type: modal.querySelector('#relType').value, status: partner.isDeceased ? 'widowed' : 'ongoing', startYear: parseInt(modal.querySelector('#startYear').value), endYear: partner.isDeceased ? partner.deathYear : null, notes: modal.querySelector('#notes').value };
      if (!c.relationships) c.relationships = [];
      c.relationships.push(rel);
      const partnerRel = { id: generateRelId(), partnerId: c.id, type: rel.type, status: c.isDeceased ? 'widowed' : 'ongoing', startYear: rel.startYear, endYear: c.isDeceased ? c.deathYear : null, notes: rel.notes };
      if (!partner.relationships) partner.relationships = [];
      partner.relationships.push(partnerRel);
      saveAllData(); modal.remove(); renderLoveTab();
    });
    modal.querySelector('#closeModal').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
  }
  
  function addNewPerson() {
    const newChar = { id: generateId(), name: 'New Character', surname: '', gender: 'unknown', attraction: 'both', birthYear: currentYear - 25, isDeceased: false, deathYear: null, deathCause: '', rankAssignments: [], birthplaceId: null, moves: [], appearance: {}, notes: '', motherId: null, fatherId: null, relationships: [], childrenIds: [] };
    characters.push(newChar); saveAllData(); renderCharList(); selectCharacter(newChar.id);
  }
  
  function generateRandomPerson() {
    const gender = ['male','female','unknown'][Math.floor(Math.random()*3)];
    return { id: generateId(), name: getRandomName(null, gender), surname: getRandomSurname(), gender: gender, attraction: ['men','women','both','neither'][Math.floor(Math.random()*4)], birthYear: currentYear - Math.floor(Math.random()*80) - 10, isDeceased: false, deathYear: null, deathCause: '', rankAssignments: [], birthplaceId: null, moves: [], appearance: {}, notes: '', motherId: null, fatherId: null, relationships: [], childrenIds: [] };
  }
  
  function exportData() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({characters},null,2)],{type:'application/json'})); a.download = `characters_${Date.now()}.json`; a.click(); }
  function importData() { const i = document.createElement('input'); i.type='file'; i.accept='application/json'; i.onchange=e=>{const f=e.target.files[0]; const r=new FileReader(); r.onload=ev=>{const d=JSON.parse(ev.target.result); if(d.characters){characters=d.characters; characters.forEach(c=>{if(!c.relationships)c.relationships=[];}); saveAllData(); renderCharList();}}; r.readAsText(f);}; i.click(); }
  function showToast(m){let c=document.getElementById('toast-container');if(!c){c=document.createElement('div');c.id='toast-container';document.body.appendChild(c);}const t=document.createElement('div');t.className='toast';t.innerText=m;c.appendChild(t);setTimeout(()=>t.remove(),2500);}
  function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,m=>{if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
  function updateLocationFilter(){const s=document.getElementById('filterLocation');s.innerHTML='<option value="">All</option>'+locations.filter(l=>l.variableKey).map(l=>`<option value="${l.id}">${escapeHtml(l.displayName)}</option>`).join('');}
  
  function init() {
    loadAllData(); updateLocationFilter(); renderCharList();
    document.getElementById('currentYear').addEventListener('change',()=>{currentYear=parseInt(document.getElementById('currentYear').value);localStorage.setItem('stillwaters_currentYear',currentYear);renderCharList();if(selectedCharId)renderViewTab();});
    document.getElementById('clearFilters').addEventListener('click',()=>{document.querySelectorAll('.filter-bar select').forEach(s=>s.value='');renderCharList();});
    document.getElementById('addPersonBtn').addEventListener('click',addNewPerson);
    document.getElementById('generatePersonBtn').addEventListener('click',()=>{const p=generateRandomPerson();characters.push(p);saveAllData();renderCharList();selectCharacter(p.id);});
    document.getElementById('importCharsBtn').addEventListener('click',importData);
    document.getElementById('exportCharsBtn').addEventListener('click',exportData);
    let fc=false; document.getElementById('filterToggleBtn').addEventListener('click',()=>{const cont=document.getElementById('filterContainer');fc=!fc;cont.style.maxHeight=fc?'0':'300px';document.getElementById('filterToggleBtn').textContent=fc?'▶ Filters':'▼ Filters';});
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(selectedCharId){const t=btn.dataset.tab;if(t==='view')renderViewTab();else if(t==='edit')renderEditTab();else if(t==='family')renderFamilyTab();else if(t==='love')renderLoveTab();}}));
    document.getElementById('filterLifeStage').addEventListener('change',renderCharList);
    document.getElementById('filterRelation').addEventListener('change',renderCharList);
    document.getElementById('filterLocation').addEventListener('change',renderCharList);
    if(characters.length===0)document.getElementById('panelContent').innerHTML=`<div class="empty-state">👤 No characters<br><br><button id="quickAdd" class="btn primary">+ Add First</button><button id="quickGen" class="btn">🎲 Generate</button></div>`;
    const qa=document.getElementById('quickAdd'); if(qa)qa.addEventListener('click',addNewPerson);
    const qg=document.getElementById('quickGen'); if(qg)qg.addEventListener('click',()=>{const p=generateRandomPerson();characters.push(p);saveAllData();renderCharList();selectCharacter(p.id);});
  }
  
  function renderEditTab() {
    const c = characters.find(c => c.id === selectedCharId);
    if (!c) return;
    const locs = locations.filter(l => l.variableKey);
    document.getElementById('panelContent').innerHTML = `<form id="editForm"><div class="collapsible-section"><div class="section-header">🆔 Identity <span class="arrow expanded">▶</span></div><div class="section-content expanded"><div class="form-row"><div class="form-group"><label>Name</label><input id="name" value="${escapeHtml(c.name)}"></div><div class="form-group"><label>Surname</label><input id="surname" value="${escapeHtml(c.surname||'')}"></div></div><div class="form-row"><div class="form-group"><label>Gender</label><select id="gender"><option ${c.gender==='male'?'selected':''}>male</option><option ${c.gender==='female'?'selected':''}>female</option><option ${c.gender==='unknown'?'selected':''}>unknown</option></select></div><div class="form-group"><label>Attraction</label><select id="attraction"><option ${c.attraction==='men'?'selected':''}>men</option><option ${c.attraction==='women'?'selected':''}>women</option><option ${c.attraction==='both'?'selected':''}>both</option><option ${c.attraction==='neither'?'selected':''}>neither</option></select></div></div><div class="form-row"><div class="form-group"><label>Birth Year</label><input type="number" id="birthYear" value="${c.birthYear}"></div><div class="form-group"><label>Age</label><input type="number" id="age" value="${calculateAge(c.birthYear,c.isDeceased,c.deathYear)}" readonly></div></div><div class="form-group"><label><input type="checkbox" id="deceased" ${c.isDeceased?'checked':''}> Deceased</label></div><div id="deathFields" style="display:${c.isDeceased?'block':'none'}"><div class="form-row"><div class="form-group"><label>Death Year</label><input type="number" id="deathYear" value="${c.deathYear||''}"></div><div class="form-group"><label>Cause</label><input id="deathCause" value="${escapeHtml(c.deathCause||'')}"></div></div></div></div></div>
    <div class="collapsible-section"><div class="section-header">📍 Location <span class="arrow">▶</span></div><div class="section-content"><div class="form-group"><label>Birthplace</label><select id="birthplace"><option value="">None</option>${locs.map(l=>`<option value="${l.id}" ${c.birthplaceId===l.id?'selected':''}>${l.displayName}</option>`).join('')}</select></div><div id="movesList"></div><button type="button" id="addMove" class="btn small">+ Add Move</button></div></div>
    <div class="action-buttons"><button type="submit" class="btn primary">Save</button><button type="button" id="deleteChar" class="btn danger">Delete</button></div></form>`;
    if(c.moves?.length) document.getElementById('movesList').innerHTML = c.moves.map((m,i)=>`<div class="move-item">${m.year}: ${locations.find(l=>l.id===m.locationId)?.displayName||'?'} - ${m.note||''} <button data-idx="${i}" class="remove-move">✖</button></div>`).join('');
    document.querySelectorAll('.remove-move')?.forEach(b=>b.addEventListener('click',()=>{c.moves.splice(parseInt(b.dataset.idx),1);renderEditTab();}));
    document.getElementById('addMove')?.addEventListener('click',()=>{const loc=prompt('Location ID:',locations[0]?.id);const yr=parseInt(prompt('Year:',currentYear));const nt=prompt('Note:');if(!c.moves)c.moves=[];c.moves.push({locationId:loc,year:yr,note:nt});c.moves.sort((a,b)=>a.year-b.year);renderEditTab();});
    document.getElementById('deceased')?.addEventListener('change',e=>document.getElementById('deathFields').style.display=e.target.checked?'block':'none');
    document.getElementById('birthYear')?.addEventListener('input',()=>{const by=parseInt(document.getElementById('birthYear').value);const dec=document.getElementById('deceased').checked;const dy=dec?parseInt(document.getElementById('deathYear').value):null;document.getElementById('age').value=calculateAge(by,dec,dy);});
    document.getElementById('deathYear')?.addEventListener('input',()=>{const by=parseInt(document.getElementById('birthYear').value);const dy=parseInt(document.getElementById('deathYear').value);document.getElementById('age').value=dy-by;});
    document.getElementById('editForm').addEventListener('submit',e=>{e.preventDefault();c.name=document.getElementById('name').value;c.surname=document.getElementById('surname').value;c.gender=document.getElementById('gender').value;c.attraction=document.getElementById('attraction').value;c.birthYear=parseInt(document.getElementById('birthYear').value);c.isDeceased=document.getElementById('deceased').checked;c.deathYear=c.isDeceased?parseInt(document.getElementById('deathYear').value)||null:null;c.deathCause=document.getElementById('deathCause').value;c.birthplaceId=document.getElementById('birthplace').value||null;saveAllData();renderCharList();renderViewTab();});
    document.getElementById('deleteChar')?.addEventListener('click',()=>{if(confirm('Delete?')){characters=characters.filter(ch=>ch.id!==c.id);saveAllData();selectedCharId=null;renderCharList();document.getElementById('panelContent').innerHTML='<div class="empty-state">Character deleted</div>';}});
    document.querySelectorAll('.collapsible-section .section-header').forEach(h=>{const content=h.nextElementSibling;const arrow=h.querySelector('.arrow');h.addEventListener('click',()=>{content.classList.toggle('expanded');arrow?.classList.toggle('expanded');});});
  }
  
  function renderFamilyTab() {
    const c = characters.find(c => c.id === selectedCharId);
    if (!c) return;
    const mother = c.motherId ? characters.find(m=>m.id===c.motherId) : null;
    const father = c.fatherId ? characters.find(f=>f.id===c.fatherId) : null;
    const children = getChildren(c.id);
    const siblings = getSiblings(c.id);
    const availableMothers = characters.filter(m=>m.id!==c.id && (m.gender==='female'||m.gender==='unknown') && (!m.birthYear||m.birthYear<c.birthYear));
    const availableFathers = characters.filter(f=>f.id!==c.id && (f.gender==='male'||f.gender==='unknown') && (!f.birthYear||f.birthYear<c.birthYear));
    document.getElementById('panelContent').innerHTML = `<div><div class="collapsible-section"><div class="section-header">👪 Parents <span class="arrow expanded">▶</span></div><div class="section-content expanded"><div class="parent-selector" style="display:flex;gap:12px;margin-bottom:16px;"><div class="form-group" style="flex:1"><label>Mother</label><select id="motherSelect"><option value="">None</option>${availableMothers.map(m=>`<option value="${m.id}" ${c.motherId===m.id?'selected':''}>${escapeHtml(m.name)}</option>`).join('')}</select></div><button id="removeMother" class="btn small" ${!mother?'disabled':''}>Remove</button></div><div class="parent-selector" style="display:flex;gap:12px;"><div class="form-group" style="flex:1"><label>Father</label><select id="fatherSelect"><option value="">None</option>${availableFathers.map(f=>`<option value="${f.id}" ${c.fatherId===f.id?'selected':''}>${escapeHtml(f.name)}</option>`).join('')}</select></div><button id="removeFather" class="btn small" ${!father?'disabled':''}>Remove</button></div></div></div>
    <div class="collapsible-section"><div class="section-header">👥 Siblings <span class="arrow expanded">▶</span></div><div class="section-content expanded">${siblings.length ? siblings.map(s=>`<div class="family-card"><span class="name" data-id="${s.id}">${escapeHtml(s.name)}</span><div class="details">${s.gender==='male'?'♂':'♀'} Age: ${calculateAge(s.birthYear,s.isDeceased,s.deathYear)}</div></div>`).join('') : '<div class="empty-state">No siblings</div>'}</div></div>
    <div class="collapsible-section"><div class="section-header">👶 Children <span class="arrow expanded">▶</span></div><div class="section-content expanded">${children.length ? children.map(ch=>`<div class="family-card"><span class="name" data-id="${ch.id}">${escapeHtml(ch.name)}</span><div class="details">Age: ${calculateAge(ch.birthYear,ch.isDeceased,ch.deathYear)} | You were ${ch.birthYear-c.birthYear} at birth</div></div>`).join('') : '<div class="empty-state">No children</div>'}
    <div class="add-child-row" style="margin-top:16px;"><div class="form-group"><label>Add Existing Child</label><select id="addChildSelect"><option value="">Select</option>${characters.filter(ch=>ch.id!==c.id && ch.birthYear>c.birthYear && ch.fatherId!==c.id && ch.motherId!==c.id).map(ch=>`<option value="${ch.id}">${escapeHtml(ch.name)} (Born ${ch.birthYear})</option>`).join('')}</select></div><button id="addChildBtn" class="btn small">Add Child</button></div>
    <div class="add-child-row" style="margin-top:12px;"><div class="form-group"><label>Generate Newborn</label><select id="partnerSelect"><option value="">Select partner</option>${characters.filter(p=>p.id!==c.id && !p.isDeceased).map(p=>`<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('')}</select></div><button id="generateChildBtn" class="btn primary">🎲 Generate</button></div></div></div></div>`;
    
    document.getElementById('motherSelect')?.addEventListener('change',e=>{c.motherId=e.target.value||null;if(c.motherId){const m=characters.find(m=>m.id===c.motherId);if(m){if(!m.childrenIds)m.childrenIds=[];if(!m.childrenIds.includes(c.id))m.childrenIds.push(c.id);}}saveAllData();renderFamilyTab();});
    document.getElementById('fatherSelect')?.addEventListener('change',e=>{c.fatherId=e.target.value||null;if(c.fatherId){const f=characters.find(f=>f.id===c.fatherId);if(f){if(!f.childrenIds)f.childrenIds=[];if(!f.childrenIds.includes(c.id))f.childrenIds.push(c.id);}}saveAllData();renderFamilyTab();});
    document.getElementById('removeMother')?.addEventListener('click',()=>{c.motherId=null;saveAllData();renderFamilyTab();});
    document.getElementById('removeFather')?.addEventListener('click',()=>{c.fatherId=null;saveAllData();renderFamilyTab();});
    document.getElementById('addChildBtn')?.addEventListener('click',()=>{const childId=document.getElementById('addChildSelect').value;if(childId){const ch=characters.find(ch=>ch.id===childId);if(ch){if(c.gender==='female'||c.gender==='unknown')ch.motherId=c.id;if(c.gender==='male'||c.gender==='unknown')ch.fatherId=c.id;saveAllData();renderFamilyTab();showToast(`Added ${ch.name} as child`);}}});
    document.getElementById('generateChildBtn')?.addEventListener('click',()=>{const partnerId=document.getElementById('partnerSelect').value;const partner=partnerId?characters.find(p=>p.id===partnerId):null;let birthYear=currentYear-1;for(let i=0;i<50;i++){birthYear=currentYear-Math.floor(Math.random()*30)-1;const mAge=c.gender==='female'?birthYear-c.birthYear:(partner?birthYear-partner.birthYear:null);const fAge=c.gender==='male'?birthYear-c.birthYear:(partner?birthYear-partner.birthYear:null);if((!mAge||(mAge>=14&&mAge<=45))&&(!fAge||(fAge>=15&&fAge<=70)))break;}const gender=['male','female','unknown'][Math.floor(Math.random()*3)];const newChild={id:generateId(),name:getRandomName(null,gender),surname:getRandomSurname(),gender:gender,attraction:['men','women','both','neither'][Math.floor(Math.random()*4)],birthYear:birthYear,isDeceased:false,deathYear:null,deathCause:'',rankAssignments:[],birthplaceId:c.birthplaceId||partner?.birthplaceId||null,moves:[],appearance:{},notes:'',motherId:c.gender==='female'?c.id:(partner?.gender==='female'?partner.id:null),fatherId:c.gender==='male'?c.id:(partner?.gender==='male'?partner.id:null),relationships:[],childrenIds:[]};characters.push(newChild);saveAllData();renderFamilyTab();showToast(`Generated ${newChild.name}`);});
    document.querySelectorAll('.family-card .name').forEach(el=>el.addEventListener('click',()=>selectCharacter(el.dataset.id)));
    document.querySelectorAll('.collapsible-section .section-header').forEach(h=>{const content=h.nextElementSibling;const arrow=h.querySelector('.arrow');h.addEventListener('click',()=>{content.classList.toggle('expanded');arrow?.classList.toggle('expanded');});});
  }
  
  init();
</script>
</body>

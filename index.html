<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Still Waters — The Currents That Bind Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    /* ============================================
       LANDING PAGE - UNIQUE STYLES
       ============================================ */

    /* Hero Section */
    .hero {
      position: relative;
      padding: 40px 20px 30px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(9,12,18,0.95) 0%, var(--bg) 100%);
    }

    .hero h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(106,158,207,0.2);
    }

    .hero .sub {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--tdim);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero .tagline {
      font-size: 0.9rem;
      font-style: italic;
      color: var(--tmut);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Main Grid */
    .tools-grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
    }

    /* Tool Cards */
    .tool-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.25s ease;
      backdrop-filter: blur(2px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .tool-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent2);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
    }

    .card-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }

    .card-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header .icon {
      font-size: 1.4rem;
    }

    .card-body {
      padding: 18px 20px;
      flex: 1;
    }

    .card-body p {
      font-size: 0.85rem;
      color: var(--tdim);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .badge-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .badge {
      font-size: 0.6rem;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--tdim);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.05em;
    }

    .badge.accent {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .badge.warning {
      border-color: var(--warning);
      color: var(--warning);
      background: rgba(200,112,64,0.1);
    }

    .card-footer {
      padding: 14px 20px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 30px;
      color: var(--tdim);
      padding: 8px 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: scale(0.98);
    }

    .btn.primary {
      background: var(--accent-dim);
      border-color: var(--accent2);
      color: var(--accent);
    }

    .btn.primary:hover {
      background: rgba(74,122,176,0.25);
    }

    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      font-size: 0.6rem;
      color: var(--tmut);
      letter-spacing: 0.1em;
    }

    @media (max-width: 700px) {
      .hero h1 { font-size: 1.2rem; letter-spacing: 0.1em; }
      .tools-grid { grid-template-columns: 1fr; gap: 16px; padding: 20px; }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>STILL WATERS</h1>
  <div class="sub">the currents that bind us</div>
  <div class="tagline">census · characters · gatherings · locations · family tree · professions</div>
</div>

<div class="tools-grid" id="toolsGrid"></div>

<footer>
  STILL WATERS — Tools for worldbuilding & chronicle keeping
</footer>

<script>
  // ====================== TOOL CARDS ======================
  const tools = [
    { 
      name: "Census & Analytics", 
      desc: "Population statistics, age distribution, compound viewer, and demographic charts.", 
      icon: "📊", 
      file: "Census.html", 
      tags: ["stats", "filter", "charts", "demographics"] 
    },
    { 
      name: "Character Manager", 
      desc: "Create, edit, ranks, relationships, professions, friendships, and life events.", 
      icon: "👥", 
      file: "character-manager.html", 
      tags: ["editor", "family", "romance", "professions"] 
    },
    { 
      name: "Gatherings", 
      desc: "Festival seating diagram and Council of Elders view by district.", 
      icon: "⛩️", 
      file: "gatherings.html", 
      tags: ["festival", "council", "diagram", "ceremony"] 
    },
    { 
      name: "Locations", 
      desc: "Hierarchical map: countries, districts, towns, compounds, with household management.", 
      icon: "🗺️", 
      file: "Locations.html", 
      tags: ["geography", "households", "map", "compounds"] 
    },
    { 
      name: "Family Tree", 
      desc: "Ancestors, descendants, relationship finder, and historical population view.", 
      icon: "🌳", 
      file: "Tree.html", 
      tags: ["genealogy", "historical", "ancestors", "finder"] 
    },
    { 
      name: "Professions Editor", 
      desc: "Daily & ritual roles, specializations, associated spots, and apprenticeship management.", 
      icon: "⚒️", 
      file: "Professions_standalone(1).html", 
      tags: ["crafts", "jobs", "skills", "specializations"] 
    },
    { 
      name: "Inconsistencies Checker", 
      desc: "Find and fix data issues: age problems, unpartnered parents, orphans, timeline errors, rank conflicts, location issues, and more.", 
      icon: "🔍", 
      file: "inconsistencies.html", 
      tags: ["validation", "cleanup", "errors", "data quality", "fixer"],
      warning: true
    }
  ];

  const grid = document.getElementById('toolsGrid');
  
  tools.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'tool-card';
    card.onclick = () => {
      window.open(tool.file, '_blank');
    };
    
    const warningBadge = tool.warning ? '<span class="badge warning">⚠️ Checker</span>' : '';
    
    card.innerHTML = `
      <div class="card-header">
        <h2>
          <span class="icon">${tool.icon}</span> 
          ${tool.name}
        </h2>
      </div>
      <div class="card-body">
        <p>${tool.desc}</p>
        <div class="badge-group">
          ${tool.tags.map(t => `<span class="badge">${t}</span>`).join('')}
          ${warningBadge}
        </div>
      </div>
      <div class="card-footer">
        <span class="btn primary">Launch →</span>
      </div>
    `;
    grid.appendChild(card);
  });
</script>
</body>
</html>

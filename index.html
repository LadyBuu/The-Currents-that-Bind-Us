<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Worldbuilding - The Currents That Bind Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    /* ============================================
       LANDING PAGE - MINIMAL STRUCTURAL OVERRIDES
       All visual styles (colors, typography, buttons, badges, borders)
       are pulled directly from stillwaters.css
       ============================================ */

    /* Hero Section - extends base background, spacing only */
    .hero {
      position: relative;
      padding: 48px 20px 40px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(9,12,18,0.96) 0%, var(--bg) 100%);
    }

    .hero h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      letter-spacing: 0.22em;
      margin-bottom: 12px;
      text-shadow: 0 0 12px rgba(106,158,207,0.25);
    }

    .hero .sub {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      margin-bottom: 24px;
    }

    .hero .tagline {
      font-size: 0.9rem;
      font-style: italic;
      max-width: 620px;
      margin: 0 auto;
      border-top: 1px dashed var(--border2);
      padding-top: 20px;
      display: inline-block;
    }

    /* Tools Grid - layout only, colors from base */
    .tools-grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 24px 56px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
    }

    /* Tool Cards - using base background/border from CSS variables */
    .tool-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.25s ease;
      backdrop-filter: blur(2px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .tool-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent2);
      box-shadow: 0 12px 28px rgba(0,0,0,0.4);
      background: var(--bg3);
    }

    .card-header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }

    .card-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
    }

    .card-header .icon {
      font-size: 1.5rem;
    }

    .card-body {
      padding: 20px 24px;
      flex: 1;
    }

    .card-body p {
      font-size: 0.85rem;
      color: var(--tdim);
      line-height: 1.5;
      margin-bottom: 14px;
    }

    /* Badge group layout - actual badge styles come from stillwaters.css */
    .badge-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    /* Ensure badge uses the base .badge class from stillwaters.css */
    .badge {
      /* inherits all from stillwaters.css */
    }

    .card-footer {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }

    /* Button styles fully inherited from stillwaters.css, just ensure spacing */
    .btn {
      /* base styles come from stillwaters.css */
    }

    footer {
      text-align: center;
      padding: 28px 20px;
      border-top: 1px solid var(--border);
      font-family: 'Cinzel', serif;
    }

    @media (max-width: 768px) {
      .hero h1 { font-size: 1.4rem; letter-spacing: 0.12em; }
      .tools-grid { grid-template-columns: 1fr; gap: 20px; padding: 28px 18px; }
      .card-header h2 { font-size: 0.85rem; }
    }

    @media (max-width: 480px) {
      .hero { padding: 32px 16px; }
      .hero h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>Worldbuilding</h1>
  <div class="sub">the currents that bind us</div>
  <div class="tagline">chronicle · lineage · governance · census · diagnostics</div>
</div>

<div class="tools-grid" id="toolsGrid"></div>
<footer>
  Still Waters — Tools for Worldbuilding & Chronicle Keeping
</footer>

<script>
  // ============================================================
  // COMPLETE TOOL LIST — All managers for the Still Waters suite
  // ============================================================
  const tools = [
    { 
      name: "Character Manager", 
      desc: "Create and edit characters, manage relationships, life events, professions, friendships, and intimate bonds. Deep profile editor for all denizens.", 
      icon: "👥", 
      file: "character-manager.html", 
      tags: ["editor", "relationships", "biography", "portraits"] 
    },
    { 
      name: "Locations", 
      desc: "Hierarchical geography: countries, districts, towns, compounds, and households. Manage settlements, landmarks, and administrative zones.", 
      icon: "🗺️", 
      file: "Locations.html", 
      tags: ["map", "compounds", "households", "territory"] 
    },
    { 
      name: "Roles", 
      desc: "Daily & ritual roles, specializations, associated stations, apprenticeship paths, and guild assignments. Define ceremonial duties and vocational tracks.", 
      icon: "⚒️", 
      file: "roles.html", 
      tags: ["vocations", "crafts", "specializations", "apprentices"] 
    },
    { 
      name: "Ranks", 
      desc: "Hierarchy of power: Chiefs, Sacred Sons, Elders, Consorts, Masters, and Commoners. Rank color codes, privileges, and succession tracking.", 
      icon: "🏅", 
      file: "Ranks.html", 
      tags: ["hierarchy", "privilege", "succession", "social standing"],
      accent: true
    },
    { 
      name: "Names Manager", 
      desc: "Upload and manage name lists for characters and cities. Assign name lists to countries for cultural naming conventions. Generate random names for characters and places.", 
      icon: "📜", 
      file: "names.html", 
      tags: ["names", "surnames", "city names", "generator", "culture"],
      accent: true
    },
    { 
      name: "Diagnostics", 
      desc: "Inconsistency scanner: age anomalies, orphan detection, timeline conflicts, rank mismatches, broken relationships, location orphans, and fix suggestions.", 
      icon: "🔍", 
      file: "inconsistencies.html", 
      tags: ["validator", "data quality", "errors", "cleanup", "fixer"],
      warning: true
    },
    { 
      name: "Census", 
      desc: "Population analytics, age pyramids, compound demographics, mortality trends, gender distribution, and interactive charts for the whole realm.", 
      icon: "📊", 
      file: "Census.html", 
      tags: ["statistics", "demographics", "charts", "population"] 
    },
    { 
      name: "Family Tree", 
      desc: "Ancestral lineages, descendants web, relationship finder, historical bloodlines, and multi-generation viewer. Discover how blood binds the world.", 
      icon: "🌳", 
      file: "Tree.html", 
      tags: ["genealogy", "ancestors", "descendants", "heritage"] 
    }
  ];

  const grid = document.getElementById('toolsGrid');
  
  tools.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'tool-card';
    // Open in new tab when clicking anywhere on card
    card.onclick = () => {
      window.open(tool.file, '_blank');
    };
    
    // Optional badges for special categories
    let extraBadges = '';
    if (tool.accent) {
      extraBadges += '<span class="badge accent">✨ Featured</span>';
    }
    if (tool.warning) {
      extraBadges += '<span class="badge warning">⚠️ Integrity scan</span>';
    }
    if (tool.name === "Roles") {
      extraBadges += '<span class="badge">⚒️ Professions</span>';
    }
    if (tool.name === "Ranks") {
      extraBadges += '<span class="badge accent">👑 Hierarchy</span>';
    }
    if (tool.name === "Names Manager") {
      extraBadges += '<span class="badge accent">📖 Cultural naming</span>';
      extraBadges += '<span class="badge">🎲 Random generator</span>';
    }
    
    card.innerHTML = `
      <div class="card-header">
        <h2>
          <span class="icon">${tool.icon}</span> 
          ${tool.name}
        </h2>
      </div>
      <div class="card-body">
        <p>${tool.desc}</p>
        <div class="badge-group">
          ${tool.tags.map(t => `<span class="badge">${t}</span>`).join('')}
          ${extraBadges}
        </div>
      </div>
      <div class="card-footer">
        <span class="btn primary">Enter →</span>
      </div>
    `;
    grid.appendChild(card);
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Still Waters — Family Tree & Historical View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #6a9ecf;
    --accent-dark: #4a7aa5;
    --accent-dim: #1a2d48;
    --bg: #090c12;
    --bg2: #0d1119;
    --bg3: #121820;
    --bg4: #1a2432;
    --border: #1e2738;
    --border2: #2a3a50;
    --text: #cdd5e0;
    --dim: #8aabb8;
    --tmut: #6a8098;
    --deceased: #8f5e5e;
    --warn: #c87040;
    --sidebar-width: 280px;
    
    /* Rank colors */
    --rank-chief: #c9a87c;
    --rank-sacred-sons: #a87898;
    --rank-sacred: #7a9eb0;
    --rank-sacred-daughters: #b88aa8;
    --rank-consort: #c89880;
    --rank-elder: #6a9ecf;
    --rank-master: #8a9eb0;
    --rank-commoner: #6a8098;
    
    /* Relationship colors */
    --rel-parent: #4a7ab0;
    --rel-child: #4a9060;
    --rel-partner: #c89880;
    --rel-sibling: #9a7ab0;
    --rel-grandparent: #6a9ecf;
    --rel-grandchild: #6aac80;
    
    /* Status colors */
    --rel-ongoing: #4a9060;
    --rel-ended: #8b4040;
    --rel-widowed: #8f5e5e;
    
    /* Tooltip */
    --tooltip-bg: #1a2432;
    --tooltip-border: #4a7ab0;
    
    /* Modal colors */
    --modal-overlay: rgba(0,0,0,0.95);
    --modal-bg: #0d1119;
    --modal-border: #2a3a50;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  /* Top Bar */
  #topbar {
    background: var(--bg2);
    padding: 8px 12px;
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-wrap: wrap;
  }
  
  #topbar h1 {
    font-family: 'Cinzel', serif;
    color: var(--accent);
    margin: 0;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  
  .tb-btn {
    background: #1e2738;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    transition: all 0.2s;
    white-space: nowrap;
  }
  
  .tb-btn:hover {
    background: #2a3448;
    border-color: var(--accent);
  }
  
  .tb-btn.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  
  .tb-btn.validate-btn {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  
  .tb-btn.warning {
    background: #2a2a1a;
    border-color: #c87040;
    color: #c87040;
  }
  
  .tb-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }
  
  #menu-toggle {
    display: none;
    background: transparent;
    border: none;
    font-size: 1.3rem;
    padding: 2px 8px;
    color: var(--accent);
    cursor: pointer;
  }
  
  /* Main Layout */
  #main-container {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }
  
  /* Sidebar */
  #sidebar {
    width: var(--sidebar-width);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.3s ease;
    z-index: 20;
    flex-shrink: 0;
  }
  
  #sidebar-header {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  #sidebar-header h3 {
    margin: 0;
    font-family: 'Cinzel', serif;
    color: var(--accent);
    font-size: 0.85rem;
  }
  
  #close-sidebar {
    display: none;
    background: transparent;
    border: none;
    font-size: 1.1rem;
    padding: 0 6px;
    color: var(--dim);
    cursor: pointer;
  }
  
  #close-sidebar:hover {
    color: var(--accent);
  }
  
  #search-box {
    padding: 10px;
    border-bottom: 1px solid var(--border);
  }
  
  #search-box input {
    width: 100%;
    padding: 6px 8px;
    background: #121820;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-size: 0.85rem;
  }
  
  #person-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
    scrollbar-width: thin;
  }
  
  .person-item {
    padding: 8px 10px;
    margin: 2px 0;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    position: relative;
  }
  
  .person-item:hover {
    background: var(--bg3);
  }
  
  .person-item:hover::after {
    content: attr(data-stable-id);
    position: absolute;
    left: 100%;
    top: 0;
    margin-left: 8px;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: monospace;
    font-size: 0.65rem;
    color: var(--accent);
    white-space: nowrap;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  
  .person-item.selected {
    background: var(--bg3);
    border-left-color: var(--accent);
  }
  
  .person-item.deceased {
    opacity: 0.6;
  }
  
  .person-name {
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  
  .gender-symbol {
    font-family: monospace;
    color: var(--dim);
    font-size: 0.85rem;
  }
  
  .deceased-mark {
    color: var(--deceased);
    margin-left: 2px;
    font-size: 0.85rem;
  }
  
  /* Rank display */
  .rank-icons {
    display: inline-flex;
    gap: 2px;
    margin-right: 2px;
  }
  
  .rank-icon {
    font-size: 0.7rem;
  }
  
  .rank-chief { color: var(--rank-chief); }
  .rank-sacred-sons { color: var(--rank-sacred-sons); }
  .rank-sacred { color: var(--rank-sacred); }
  .rank-sacred-daughters { color: var(--rank-sacred-daughters); }
  .rank-consort { color: var(--rank-consort); }
  .rank-elder { color: var(--rank-elder); }
  .rank-master { color: var(--rank-master); }
  .rank-commoner { color: var(--rank-commoner); }
  
  .rank-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid currentColor;
    font-size: 0.5rem;
    margin-left: 1px;
  }
  
  .rank-title {
    font-size: 0.6rem;
    color: var(--dim);
    font-style: italic;
    margin-left: 4px;
  }
  
  .status-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  
  .status-ongoing { background-color: var(--rel-ongoing); }
  .status-ended { background-color: var(--rel-ended); }
  .status-widowed { background-color: var(--rel-widowed); }
  
  .person-detail {
    font-size: 0.7rem;
    color: var(--dim);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }
  
  /* Content Area */
  #content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  
  /* Toolbar */
  #toolbar {
    padding: 8px 12px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  
  .view-mode {
    display: flex;
    gap: 4px;
  }
  
  .mode-btn {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    border-radius: 4px;
    transition: all 0.15s;
  }
  
  .mode-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  
  .mode-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  
  /* Tree View */
  #tree-view {
    flex: 1;
    overflow: auto;
    padding: 20px;
    position: relative;
    background: var(--bg);
  }
  
  #tree-container {
    min-width: min-content;
    min-height: min-content;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .tree-generation {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 10px 0;
    position: relative;
  }
  
  .tree-row {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 5px 0;
    position: relative;
    flex-wrap: wrap;
  }
  
  .tree-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    min-width: 150px;
    max-width: 180px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  
  .tree-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  
  .tree-card:hover::after {
    content: attr(data-stable-id);
    position: absolute;
    left: 100%;
    top: 0;
    margin-left: 8px;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: monospace;
    font-size: 0.65rem;
    color: var(--accent);
    white-space: nowrap;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  
  .tree-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }
  
  .tree-card.deceased {
    opacity: 0.7;
    border-color: var(--deceased);
  }
  
  .tree-header {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  
  .tree-name {
    font-weight: 600;
    font-size: 0.8rem;
    flex: 1;
  }
  
  .tree-detail {
    font-size: 0.65rem;
    color: var(--dim);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  
  .tree-detail span {
    color: var(--text);
  }
  
  .tree-relation-badge {
    font-size: 0.55rem;
    padding: 2px 6px;
    border-radius: 10px;
    background: var(--bg);
    border: 1px solid;
    display: inline-block;
    margin-top: 4px;
  }
  
  .tree-relation-badge.parent { border-color: var(--rel-parent); color: var(--rel-parent); }
  .tree-relation-badge.child { border-color: var(--rel-child); color: var(--rel-child); }
  .tree-relation-badge.partner { border-color: var(--rel-partner); color: var(--rel-partner); }
  .tree-relation-badge.sibling { border-color: var(--rel-sibling); color: var(--rel-sibling); }
  .tree-relation-badge.grandparent { border-color: var(--rel-grandparent); color: var(--rel-grandparent); }
  .tree-relation-badge.grandchild { border-color: var(--rel-grandchild); color: var(--rel-grandchild); }
  
  .generation-connector {
    width: 2px;
    height: 20px;
    background: var(--border2);
    margin: 0 auto;
  }
  
  /* Relationship Finder View */
  #finder-view {
    flex: 1;
    overflow: auto;
    padding: 20px;
    display: none;
    background: var(--bg);
  }
  
  .finder-container {
    max-width: 800px;
    margin: 0 auto;
  }
  
  .finder-selectors {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  
  .selector {
    flex: 1;
    min-width: 200px;
  }
  
  .selector label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--dim);
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  
  .selector select {
    width: 100%;
    padding: 6px 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-size: 0.8rem;
  }
  
  .selector select:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  .relationship-result {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-top: 20px;
    text-align: center;
  }
  
  .relationship-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 10px;
  }
  
  /* Historical View */
  #historical-view {
    flex: 1;
    overflow: auto;
    padding: 20px;
    display: none;
    background: var(--bg);
  }
  
  .historical-controls {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-end;
    gap: 15px;
    flex-wrap: wrap;
  }
  
  .historical-controls .year-control {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  
  .historical-controls .year-control label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--dim);
    text-transform: uppercase;
  }
  
  .historical-controls .year-control input {
    width: 120px;
    padding: 6px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    font-size: 0.9rem;
  }
  
  .historical-controls button {
    padding: 6px 16px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
  }
  
  .historical-controls button:hover {
    background: rgba(74,122,176,0.25);
  }
  
  .compound-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  
  .compound-group {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  
  .compound-header {
    background: var(--bg3);
    padding: 12px 15px;
    border-bottom: 1px solid var(--border);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  
  .compound-name {
    font-weight: 600;
  }
  
  .compound-population {
    font-size: 0.7rem;
    color: var(--dim);
  }
  
  .compound-residents {
    padding: 10px 15px;
  }
  
  .resident-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    margin: 5px 0;
    background: var(--bg);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  
  .resident-card:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }
  
  .resident-info {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  .resident-name {
    font-weight: 600;
    color: var(--accent);
  }
  
  .resident-details {
    font-size: 0.7rem;
    color: var(--dim);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  
  .resident-status {
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 10px;
    border: 1px solid;
  }
  
  .resident-status.alive { border-color: var(--ok); color: var(--ok); }
  .resident-status.deceased { border-color: var(--deceased); color: var(--deceased); }
  .resident-status.not-born { border-color: var(--warn); color: var(--warn); }
  
  .empty-compound {
    padding: 20px;
    text-align: center;
    color: var(--dim);
    font-style: italic;
  }
  
  /* Toast */
  #toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
  }
  
  .toast {
    background: var(--bg2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 8px 16px;
    color: var(--accent);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    margin-top: 8px;
    animation: slideIn 0.3s forwards;
  }
  
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
  }
  
  /* Storage Manager Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 15px;
    overflow-y: auto;
  }
  
  .modal-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 90%;
    max-width: 700px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 20px;
  }
  
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: var(--accent);
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  
  .storage-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }
  
  .storage-table th {
    text-align: left;
    padding: 8px 6px;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
  }
  
  .storage-table td {
    padding: 8px 6px;
    border-bottom: 1px solid var(--border2);
  }
  
  .storage-table tr.has-data { background: rgba(74, 144, 96, 0.05); }
  .storage-table tr.warning { background: rgba(200, 112, 64, 0.05); }
  .storage-table tr.danger { background: rgba(139, 64, 64, 0.05); }
  .storage-table .key-name { font-family: monospace; font-size: 0.65rem; color: var(--dim); }
  
  /* Relationship Stats Modal */
  #rel-stats-modal .modal-box { max-width: 500px; }
  
  /* Mobile */
  @media (max-width: 768px) {
    #menu-toggle { display: block; }
    #close-sidebar { display: block; }
    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      transform: translateX(-100%);
      z-index: 30;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }
    #sidebar.mobile-visible { transform: translateX(0); }
    .tree-row { flex-direction: column; gap: 10px; }
    .finder-selectors { flex-direction: column; gap: 10px; }
    .historical-controls { flex-direction: column; align-items: stretch; }
    .historical-controls .year-control input { width: 100%; }
    .tree-card:hover::after,
    .person-item:hover::after {
      left: auto;
      right: 100%;
      margin-left: 0;
      margin-right: 8px;
    }
    .resident-card { flex-direction: column; align-items: flex-start; gap: 8px; }
    .resident-details { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div id="toast-container"></div>

<div id="topbar">
  <button id="menu-toggle" onclick="toggleMobileSidebar()">☰</button>
  <h1>STILL WATERS · FAMILY TREE</h1>
  <div class="tb-sep"></div>
  <label class="tb-btn" style="cursor:pointer">📂 Load JSON<input type="file" accept=".json" style="display:none" onchange="loadJSON(event)"></label>
  <button class="tb-btn" onclick="loadFromStorage()">⟳ From Storage</button>
  <button class="tb-btn validate-btn" onclick="validateData()">🔍 Validate</button>
  <button class="tb-btn" onclick="showRelationshipStats()">❤️ Stats</button>
  <button class="tb-btn" onclick="openStorageManager()">💾 Storage Manager</button>
  <button class="tb-btn" onclick="diagnoseData()">🔬 Diagnose</button>
  <div style="flex:1"></div>
  <span id="status-lbl" style="color:var(--dim); font-size:0.7rem;">No data loaded</span>
</div>

<div id="main-container">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h3>Characters</h3>
      <button id="close-sidebar" onclick="toggleMobileSidebar()">✕</button>
    </div>
    
    <div id="search-box">
      <input type="text" id="person-search" placeholder="Search..." oninput="filterPersonList()">
    </div>
    
    <div id="person-list"></div>
  </div>

  <!-- Content Area -->
  <div id="content-area">
    <div id="toolbar">
      <div class="view-mode">
        <button class="mode-btn active" onclick="switchMode('tree')">🌳 Family Tree</button>
        <button class="mode-btn" onclick="switchMode('finder')">🔍 Relationship Finder</button>
        <button class="mode-btn" onclick="switchMode('historical')">📜 Historical View</button>
      </div>
    </div>
    
    <!-- Tree View -->
    <div id="tree-view">
      <div id="tree-container">
        <div style="text-align:center; color:var(--dim); padding:40px;">Select a person to view their family tree</div>
      </div>
    </div>
    
    <!-- Relationship Finder View -->
    <div id="finder-view">
      <div class="finder-container">
        <h3 style="font-family:'Cinzel'; color:var(--accent); margin-bottom:15px;">🔍 Relationship Finder</h3>
        
        <div class="finder-selectors">
          <div class="selector">
            <label>Person A</label>
            <select id="finder-person-a" onchange="findRelationship()">
              <option value="">Select a person...</option>
            </select>
          </div>
          
          <div class="selector">
            <label>Person B</label>
            <select id="finder-person-b" onchange="findRelationship()">
              <option value="">Select a person...</option>
            </select>
          </div>
        </div>
        
        <div id="relationship-result" class="relationship-result" style="display:none;"></div>
      </div>
    </div>
    
    <!-- Historical View -->
    <div id="historical-view">
      <div class="historical-controls">
        <div class="year-control">
          <label>Select Year</label>
          <input type="number" id="historical-year" value="1560" min="1000" max="2000" step="1">
        </div>
        <button onclick="renderHistoricalView()">📜 View Population by Compound</button>
      </div>
      <div id="historical-content"></div>
    </div>
  </div>
</div>

<!-- Person Popup -->
<div id="person-popup" style="display:none;"></div>

<!-- Storage Manager Modal -->
<div id="storage-manager-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">Storage Manager</div>
    <div style="margin-bottom: 15px;"><p style="color:var(--dim); font-size:0.8rem;">View and clear localStorage data from all Still Waters apps.</p></div>
    <div id="storage-list" style="max-height: 350px; overflow-y: auto; margin-bottom: 15px; background: var(--bg); padding: 10px; border-radius: 4px;"></div>
    <div style="display:flex; gap:8px; flex-wrap: wrap; margin-bottom: 15px;">
      <button class="tb-btn danger" onclick="clearAllStorage()" style="flex:1;">🗑️ Clear All</button>
      <button class="tb-btn warning" onclick="clearCurrentApp()" style="flex:1;">📝 Clear Current App</button>
      <button class="tb-btn" onclick="refreshStorageList()" style="flex:1;">🔄 Refresh</button>
      <button class="tb-btn primary" onclick="closeStorageManager()" style="flex:1;">Close</button>
    </div>
  </div>
</div>

<!-- Relationship Stats Modal -->
<div id="rel-stats-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">Relationship Statistics</div>
    <div id="rel-stats-content" style="margin-bottom:20px;"></div>
    <button class="tb-btn primary" onclick="closeRelStats()">Close</button>
  </div>
</div>

<script>
// ====================== STORAGE KEYS CONSTANTS ======================
const STORAGE_KEYS = [
  'stillwaters_editor',
  'stillwaters_connections',
  'stillwaters_locations',
  'stillwaters_professions',
  'stillwaters_tree',
  'stillwaters_gatherings'
];

// ====================== DATA STRUCTURE ======================
let DATA = {
  version: "1.0",
  currentYear: 1560,
  people: {},
  relationships: {},
  locations: {},
  professions: [],
  stableIdIndex: {}
};

let selectedPerson = null;
let currentMode = 'tree';
let mobileSidebarVisible = false;

// ====================== RANK CONSTANTS ======================
const RANK_SYMBOLS = {
  'Chief': '★',
  'Sacred Sons': '⌾',
  'Sacred': '◈',
  'Sacred Daughters': '◉',
  'Sacred Consort': '⌇',
  'Elder': '▲',
  'Master': '◆',
  'Commoner': '·'
};

const RANK_ORDER = [
  'Chief', 'Sacred Sons', 'Elder', 'Sacred', 
  'Sacred Daughters', 'Master', 'Sacred Consort', 'Commoner'
];

// ====================== UTILITY FUNCTIONS ======================
function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/[&<>"]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    if (m === '"') return '&quot;';
    return m;
  });
}

function showToast(message) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function getOrdinalSuffix(n) {
  if (!n) return '';
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return s[(v - 20) % 10] || s[v] || s[0];
}

function getRankSymbol(rank) { return RANK_SYMBOLS[rank] || '·'; }
function getRankClass(rank) { return rank ? rank.toLowerCase().replace(/\s+/g, '-') : ''; }

function renderRankIcons(ranks) {
  if (!ranks || ranks.length === 0) return '';
  const sortedRanks = [...ranks].sort((a, b) => {
    const indexA = RANK_ORDER.indexOf(a.value);
    const indexB = RANK_ORDER.indexOf(b.value);
    return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
  });
  return sortedRanks.map(r => {
    const symbol = getRankSymbol(r.value);
    const rankClass = getRankClass(r.value);
    const numberHtml = r.number ? `<span class="rank-number">${r.number}</span>` : '';
    return symbol ? `<span class="rank-icon ${rankClass}" title="${r.value}${r.number ? ' ' + r.number : ''}">${symbol}${numberHtml}</span>` : '';
  }).join('');
}

function getHighestRank(ranks) {
  if (!ranks || ranks.length === 0) return null;
  const sorted = [...ranks].sort((a, b) => {
    const indexA = RANK_ORDER.indexOf(a.value);
    const indexB = RANK_ORDER.indexOf(b.value);
    return (indexA === -1 ? 999 : indexA) - (indexB === -1 ? 999 : indexB);
  });
  return sorted[0];
}

function getPersonId(input) {
  if (DATA.people[input]) return input;
  if (DATA.stableIdIndex && DATA.stableIdIndex[input]) return DATA.stableIdIndex[input];
  return input;
}

// ====================== DATA ACCESS ======================
function getPerson(id) {
  const actualId = getPersonId(id);
  return DATA.people[actualId] || {};
}

function getRelationships(id) {
  const actualId = getPersonId(id);
  return DATA.relationships[actualId] || {};
}

function getPersonDisplay(id) {
  const actualId = getPersonId(id);
  const core = getPerson(actualId);
  const rel = getRelationships(actualId);
  
  let age = core.age;
  if (!age && core.birthYear) {
    age = DATA.currentYear - core.birthYear;
    if (core.deceased && core.deathYear) {
      age = core.deathYear - core.birthYear;
    }
  }
  
  return {
    id: actualId,
    stableId: core.stableId || actualId,
    name: core.name || actualId,
    gender: core.gender || 'unknown',
    birthYear: core.birthYear ? parseInt(core.birthYear) : null,
    age: age,
    stage: core.stage || '',
    role: core.role || '',
    ranks: core.ranks || [],
    deceased: !!(core.deceased || rel.deceased),
    deathYear: core.deathYear || rel.deathYear,
    birthComp: core.birthComp || '',
    currComp: core.currComp || core.birthComp || '',
    household: core.household || '',
    father: rel.father || '',
    mother: rel.mother || '',
    ongoing: rel.ongoing || [],
    ended: rel.ended || [],
    widowed: rel.widowed || [],
    details: rel.details || {}
  };
}

function getPersonAtYear(id, year) {
  const person = getPersonDisplay(id);
  if (!person.birthYear) return { ...person, ageAtYear: null, alive: false, status: 'unknown' };
  
  const isBorn = year >= person.birthYear;
  const isDead = person.deceased && person.deathYear && year > person.deathYear;
  const isAlive = isBorn && !isDead;
  const ageAtYear = isBorn ? year - person.birthYear : null;
  
  let status = 'unknown';
  if (isDead) status = 'deceased';
  else if (isAlive) status = 'alive';
  else if (!isBorn) status = 'not-born';
  
  return {
    ...person,
    ageAtYear,
    alive: isAlive,
    status
  };
}

function getRelationshipStatus(id) {
  const rel = getRelationships(id);
  if (rel.ongoing?.length > 0) return 'ongoing';
  if (rel.widowed?.length > 0) return 'widowed';
  if (rel.ended?.length > 0) return 'ended';
  return 'single';
}

// ====================== STORAGE MANAGER FUNCTIONS ======================
function openStorageManager() { refreshStorageList(); document.getElementById('storage-manager-modal').style.display = 'flex'; }
function closeStorageManager() { document.getElementById('storage-manager-modal').style.display = 'none'; }
function refreshStorageList() {
  const listEl = document.getElementById('storage-list');
  let html = '<table class="storage-table">';
  html += '面板<th>App</th><th>Size</th><th>People</th><th>Actions</th>;</tr>';
  let totalSize = 0, totalPeople = 0;
  STORAGE_KEYS.forEach(key => {
    const raw = localStorage.getItem(key);
    const size = raw ? new Blob([raw]).size : 0;
    totalSize += size;
    let peopleCount = 0, status = '❌ Empty', rowClass = '';
    if (raw) {
      try { const data = JSON.parse(raw); if (data.people) { peopleCount = Object.keys(data.people).length; totalPeople += peopleCount; status = `✅ ${peopleCount} people`; rowClass = 'has-data'; } else { status = '⚠️ Invalid format'; rowClass = 'warning'; } } 
      catch(e) { status = '⚠️ Corrupted'; rowClass = 'danger'; }
    }
    const sizeKB = (size / 1024).toFixed(2);
    const appName = key.replace('stillwaters_', '').charAt(0).toUpperCase() + key.replace('stillwaters_', '').slice(1);
    html += `<tr class="${rowClass}"><td>${appName}<br><span class="key-name">${key}</span><\/td><td style="text-align:right;">${sizeKB} KB<\/td><td style="text-align:right;">${status}<\/td><td style="text-align:right;"><button class="tb-btn danger" onclick="clearStorageKey('${key}')" style="padding:2px 6px;">Clear</button>${raw ? `<button class="tb-btn" onclick="viewStorageKey('${key}')" style="padding:2px 6px;">View</button>` : ''}<\/td><\/tr>`;
  });
  html += `<tr style="border-top:2px solid var(--acc);"><td><strong>TOTAL</strong><\/td><td style="text-align:right;">${(totalSize/1024).toFixed(2)} KB<\/td><td style="text-align:right;">${totalPeople} people<\/td><td><\/td><\/tr>`;
  html += '<\/table>';
  listEl.innerHTML = html;
}
function clearStorageKey(key) { if (confirm(`Clear ${key}?`)) { localStorage.removeItem(key); refreshStorageList(); showToast(`Cleared ${key}`); if (key === 'stillwaters_tree') setTimeout(() => window.location.reload(), 1500); } }
function clearAllStorage() { if (confirm('Clear ALL Still Waters data?')) { STORAGE_KEYS.forEach(key => localStorage.removeItem(key)); refreshStorageList(); showToast('All storage cleared'); setTimeout(() => window.location.reload(), 1500); } }
function clearCurrentApp() { if (confirm('Clear current app data?')) { localStorage.removeItem('stillwaters_tree'); refreshStorageList(); showToast('Cleared tree data'); setTimeout(() => window.location.reload(), 1500); } }
function viewStorageKey(key) { const raw = localStorage.getItem(key); if (!raw) return; try { const data = JSON.parse(raw); const content = JSON.stringify(data, null, 2); const viewModal = document.createElement('div'); viewModal.className = 'modal-overlay'; viewModal.style.display = 'flex'; viewModal.innerHTML = `<div class="modal-box" style="max-width:800px;"><div class="modal-title">${key} - Raw Data</div><pre style="background:var(--bg); padding:10px; overflow:auto; max-height:60vh; font-size:0.7rem; border:1px solid var(--border); border-radius:4px;">${escapeHtml(content)}</pre><div style="display:flex; gap:8px;"><button class="tb-btn primary" onclick="this.closest('.modal-overlay').remove()">Close</button><button class="tb-btn" onclick="copyToClipboard('${escapeHtml(content.replace(/'/g, "\\'"))}')">Copy</button></div></div>`; document.body.appendChild(viewModal); } catch(e) { showToast('Error parsing data'); } }
function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard')); }
document.addEventListener('click', function(e) { const modal = document.getElementById('storage-manager-modal'); if (modal && modal.style.display === 'flex') { const modalBox = modal.querySelector('.modal-box'); if (modalBox && !modalBox.contains(e.target) && !e.target.closest('[onclick="openStorageManager()"]')) closeStorageManager(); } });
function diagnoseData() { console.log('People:', Object.keys(DATA.people).length); showToast('Diagnostic - check console'); }

// ====================== VALIDATION ======================
function validateData() {
  let issues = 0;
  Object.entries(DATA.relationships || {}).forEach(([id, rel]) => {
    if (!DATA.people[id]) { console.warn(`Orphaned relationship for missing person: ${id}`); issues++; }
    ['ongoing', 'ended', 'widowed'].forEach(arr => {
      (rel[arr] || []).forEach(pid => { if (!DATA.people[pid] && !DATA.people[getPersonId(pid)]) { console.warn(`Relationship ${id} references missing person: ${pid}`); issues++; } });
    });
  });
  if (issues > 0) showToast(`Found ${issues} issues (see console)`);
  else showToast('All data is valid');
}

// ====================== RELATIONSHIP STATS ======================
function showRelationshipStats() {
  const modal = document.getElementById('rel-stats-modal');
  const content = document.getElementById('rel-stats-content');
  let totalRelationships = 0;
  let statusCounts = { ongoing: 0, ended: 0, widowed: 0 };
  let relationshipTypes = {};
  
  Object.entries(DATA.relationships || {}).forEach(([id, rel]) => {
    if (rel.ongoing) { statusCounts.ongoing += rel.ongoing.length; totalRelationships += rel.ongoing.length; }
    if (rel.ended) { statusCounts.ended += rel.ended.length; totalRelationships += rel.ended.length; }
    if (rel.widowed) { statusCounts.widowed += rel.widowed.length; totalRelationships += rel.widowed.length; }
    if (rel.details) {
      Object.values(rel.details).forEach(d => { if (d.type) relationshipTypes[d.type] = (relationshipTypes[d.type] || 0) + 1; });
    }
  });
  
  let typeHtml = '';
  Object.entries(relationshipTypes).sort((a,b) => b[1] - a[1]).forEach(([type, count]) => {
    typeHtml += `<div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--border2);"><span>${escapeHtml(type)}</span><span style="color:var(--accent);">${count}</span></div>`;
  });
  
  content.innerHTML = `
    <div style="margin-bottom:15px;"><h4 style="font-family:'Cinzel'; color:var(--accent); margin-bottom:8px;">Relationship Overview</h4><div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"><div style="background:var(--bg); padding:8px; border-radius:4px;"><div style="font-size:0.6rem; color:var(--dim);">Total Relationships</div><div style="font-size:1.2rem; color:var(--accent);">${totalRelationships}</div></div><div style="background:var(--bg); padding:8px; border-radius:4px;"><div style="font-size:0.6rem; color:var(--dim);">People in DB</div><div style="font-size:1.2rem; color:var(--accent);">${Object.keys(DATA.people).length}</div></div></div></div>
    <div style="margin-bottom:15px;"><h4 style="font-family:'Cinzel'; color:var(--accent); margin-bottom:8px;">Relationship Status</h4><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;"><div style="background:var(--bg); padding:8px; border-radius:4px;"><div style="font-size:0.6rem; color:var(--dim);">Ongoing</div><div style="font-size:1.2rem; color:#4a9060;">${statusCounts.ongoing}</div></div><div style="background:var(--bg); padding:8px; border-radius:4px;"><div style="font-size:0.6rem; color:var(--dim);">Ended</div><div style="font-size:1.2rem; color:#8b4040;">${statusCounts.ended}</div></div><div style="background:var(--bg); padding:8px; border-radius:4px;"><div style="font-size:0.6rem; color:var(--dim);">Widowed</div><div style="font-size:1.2rem; color:#8f5e5e;">${statusCounts.widowed}</div></div></div></div>
    ${typeHtml ? `<div><h4 style="font-family:'Cinzel'; color:var(--accent); margin-bottom:8px;">Relationship Types</h4><div style="background:var(--bg); padding:8px; border-radius:4px; max-height:200px; overflow-y:auto;">${typeHtml}</div></div>` : ''}
  `;
  modal.style.display = 'flex';
}
function closeRelStats() { document.getElementById('rel-stats-modal').style.display = 'none'; }

// ====================== FAMILY TREE FUNCTIONS ======================
function getParents(id) { const rel = getRelationships(id); const parents = []; if (rel.father && DATA.people[rel.father]) parents.push(rel.father); if (rel.mother && DATA.people[rel.mother]) parents.push(rel.mother); return parents; }
function getSiblings(id) { const parents = getParents(id); const siblings = []; const seen = new Set([id]); if (parents.length === 0) return siblings; Object.entries(DATA.relationships).forEach(([pid, rel]) => { if (seen.has(pid)) return; const sharesFather = parents.includes(rel.father); const sharesMother = parents.includes(rel.mother); if ((sharesFather || sharesMother) && DATA.people[pid]) { seen.add(pid); siblings.push(pid); } }); return siblings; }
function getPartners(id) { const rel = getRelationships(id); const partners = []; (rel.ongoing || []).forEach(pid => { if (DATA.people[getPersonId(pid)]) partners.push({ id: pid, status: 'ongoing' }); }); (rel.ended || []).forEach(pid => { if (DATA.people[getPersonId(pid)]) partners.push({ id: pid, status: 'ended' }); }); (rel.widowed || []).forEach(pid => { if (DATA.people[getPersonId(pid)]) partners.push({ id: pid, status: 'widowed' }); }); return partners; }
function groupAncestorsByGeneration(rootId) { const generations = { '-3': new Set(), '-2': new Set(), '-1': new Set() }; const parents = getParents(rootId); parents.forEach(p => generations['-1'].add(p)); parents.forEach(parentId => { const grandparents = getParents(parentId); grandparents.forEach(gp => generations['-2'].add(gp)); grandparents.forEach(gpId => { const greatGrandparents = getParents(gpId); greatGrandparents.forEach(ggp => generations['-3'].add(ggp)); }); }); return generations; }
function groupDescendantsByGeneration(rootId) { const generations = { '1': new Set(), '2': new Set(), '3': new Set() }; const children = []; Object.entries(DATA.relationships).forEach(([pid, rel]) => { if ((rel.father === rootId || rel.mother === rootId) && DATA.people[pid]) { children.push(pid); generations['1'].add(pid); } }); children.forEach(childId => { Object.entries(DATA.relationships).forEach(([pid, rel]) => { if ((rel.father === childId || rel.mother === childId) && DATA.people[pid]) generations['2'].add(pid); }); }); const grandchildren = Array.from(generations['2']); grandchildren.forEach(gcId => { Object.entries(DATA.relationships).forEach(([pid, rel]) => { if ((rel.father === gcId || rel.mother === gcId) && DATA.people[pid]) generations['3'].add(pid); }); }); return generations; }

// ====================== HISTORICAL VIEW ======================
function renderHistoricalView() {
  const year = parseInt(document.getElementById('historical-year').value) || DATA.currentYear;
  const content = document.getElementById('historical-content');
  
  // Group people by compound at the given year
  const compounds = {};
  
  Object.keys(DATA.people).forEach(id => {
    const personAtYear = getPersonAtYear(id, year);
    if (!personAtYear.name) return;
    
    // Determine where they were at this year
    let compound = personAtYear.currComp || personAtYear.birthComp;
    
    // If they haven't been born yet or are deceased, track separately
    if (personAtYear.status === 'not-born') {
      compound = '_not_born';
    } else if (personAtYear.status === 'deceased') {
      compound = '_deceased';
    } else if (!compound) {
      compound = '_homeless';
    }
    
    if (!compounds[compound]) compounds[compound] = [];
    compounds[compound].push(personAtYear);
  });
  
  // Sort compounds
  const sortedCompounds = Object.keys(compounds).sort((a, b) => {
    if (a === '_not_born') return 1;
    if (b === '_not_born') return -1;
    if (a === '_deceased') return 1;
    if (b === '_deceased') return -1;
    if (a === '_homeless') return 1;
    if (b === '_homeless') return -1;
    return a.localeCompare(b);
  });
  
  let html = '<div class="compound-list">';
  
  sortedCompounds.forEach(compKey => {
    const residents = compounds[compKey].sort((a, b) => (a.ageAtYear || 999) - (b.ageAtYear || 999));
    let displayName = compKey;
    let populationNote = '';
    
    if (compKey === '_not_born') {
      displayName = '🌟 Not Yet Born';
      populationNote = ` (${residents.length} people not born yet)`;
    } else if (compKey === '_deceased') {
      displayName = '⚰️ Deceased';
      populationNote = ` (${residents.length} deceased)`;
    } else if (compKey === '_homeless') {
      displayName = '🏠 No Fixed Residence';
      populationNote = ` (${residents.length} people)`;
    } else {
      // Get full compound name with district context
      const fullName = getFullCompoundName(compKey);
      displayName = fullName;
    }
    
    html += `
      <div class="compound-group">
        <div class="compound-header">
          <span class="compound-name">${escapeHtml(displayName)}</span>
          <span class="compound-population">👥 ${residents.length} residents</span>
        </div>
        <div class="compound-residents">
    `;
    
    residents.forEach(resident => {
      const gender = resident.gender === 'male' ? '♂' : resident.gender === 'female' ? '♀' : '·';
      const rankIcons = renderRankIcons(resident.ranks);
      const highestRank = getHighestRank(resident.ranks);
      let rankTitle = '';
      if (highestRank) {
        rankTitle = highestRank.value;
        if (highestRank.number) rankTitle += ' ' + highestRank.number + getOrdinalSuffix(highestRank.number);
      }
      const ageDisplay = resident.ageAtYear !== null ? `${resident.ageAtYear} yrs` : (resident.birthYear ? `b.${resident.birthYear}` : 'age ?');
      const statusClass = resident.status === 'alive' ? 'alive' : resident.status === 'deceased' ? 'deceased' : 'not-born';
      const statusText = resident.status === 'alive' ? 'Alive' : resident.status === 'deceased' ? 'Deceased' : 'Not born';
      const household = resident.household ? ` · 🏠 ${escapeHtml(resident.household)}` : '';
      
      html += `
        <div class="resident-card" onclick="selectPerson('${resident.id}')">
          <div class="resident-info">
            <span class="gender-symbol">${gender}</span>
            ${rankIcons}
            <span class="resident-name">${escapeHtml(resident.name)}${resident.deceased ? ' †' : ''}</span>
            <div class="resident-details">
              <span>${ageDisplay}</span>
              ${resident.role ? `<span>· ${escapeHtml(resident.role)}</span>` : ''}
              ${household}
            </div>
          </div>
          <span class="resident-status ${statusClass}">${statusText}</span>
        </div>
      `;
    });
    
    html += `</div></div>`;
  });
  
  html += '</div>';
  content.innerHTML = html;
  
  if (sortedCompounds.length === 0) {
    content.innerHTML = '<div class="empty-msg" style="text-align:center; padding:40px;">No data available for this year</div>';
  }
}

function getFullCompoundName(compKey) {
  if (!compKey || !DATA.locations) return compKey || 'Unknown';
  const compound = Object.entries(DATA.locations).find(([, loc]) => loc.compKey === compKey);
  if (!compound) return compKey;
  const loc = compound[1];
  let name = loc.name;
  if (loc.parentId && DATA.locations[loc.parentId]) {
    const parent = DATA.locations[loc.parentId];
    name += ` (${parent.name})`;
    if (parent.parentId && DATA.locations[parent.parentId] && DATA.locations[parent.parentId].level === 'district') {
      const grandparent = DATA.locations[parent.parentId];
      name += `, ${grandparent.name}`;
    }
  }
  return name;
}

// ====================== DATA LOADING ======================
function loadJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.version || imported.people) {
        DATA = {
          version: imported.version || "1.0",
          currentYear: imported.currentYear || 1560,
          people: imported.people || {},
          relationships: imported.relationships || {},
          locations: imported.locations || {},
          professions: imported.professions || [],
          stableIdIndex: imported.stableIdIndex || {}
        };
      } else {
        DATA.people = imported;
      }
      rebuildStableIdIndex();
      updateStatus();
      buildPersonList();
      buildSelectorOptions();
      showToast(`Loaded ${Object.keys(DATA.people).length} people`);
      if (currentMode === 'historical') renderHistoricalView();
    } catch (err) { showToast('Error: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function loadFromStorage() {
  const keys = ['stillwaters_editor', 'stillwaters_connections', 'stillwaters_locations'];
  let loaded = false;
  for (let key of keys) {
    const raw = localStorage.getItem(key);
    if (!raw) continue;
    try {
      const imported = JSON.parse(raw);
      if (imported.people) {
        DATA = {
          version: imported.version || "1.0",
          currentYear: imported.currentYear || 1560,
          people: imported.people || {},
          relationships: imported.relationships || {},
          locations: imported.locations || {},
          professions: imported.professions || [],
          stableIdIndex: imported.stableIdIndex || {}
        };
        loaded = true;
        break;
      }
    } catch (e) {}
  }
  if (!loaded) {
    const treeRaw = localStorage.getItem('stillwaters_tree');
    if (treeRaw) { try { DATA = JSON.parse(treeRaw); loaded = true; } catch (e) {} }
  }
  rebuildStableIdIndex();
  updateStatus();
  buildPersonList();
  buildSelectorOptions();
  showToast(`Loaded ${Object.keys(DATA.people).length} people`);
  if (currentMode === 'historical') renderHistoricalView();
}

function rebuildStableIdIndex() {
  DATA.stableIdIndex = {};
  Object.entries(DATA.people).forEach(([id, person]) => { if (person.stableId) DATA.stableIdIndex[person.stableId] = id; });
}

function updateStatus() { document.getElementById('status-lbl').textContent = Object.keys(DATA.people).length + ' people loaded'; }

// ====================== PERSON LIST ======================
function buildPersonList() {
  const list = document.getElementById('person-list');
  const people = Object.keys(DATA.people).map(id => ({ id, display: getPersonDisplay(id) })).filter(p => p.display.name).sort((a, b) => a.display.name.localeCompare(b.display.name));
  let html = '';
  people.forEach(p => {
    const d = p.display;
    const g = d.gender === 'male' ? '♂' : d.gender === 'female' ? '♀' : '·';
    const rankIcons = renderRankIcons(d.ranks);
    const deceased = d.deceased ? '<span class="deceased-mark">†</span>' : '';
    const selected = p.id === selectedPerson ? 'selected' : '';
    const compound = d.currComp || d.birthComp || '?';
    const age = d.age ? d.age + ' yrs' : (d.birthYear ? 'b.' + d.birthYear : '');
    const stableId = d.stableId || '';
    const highestRank = getHighestRank(d.ranks);
    let rankTitle = '';
    if (highestRank) { rankTitle = highestRank.value; if (highestRank.number) rankTitle += ' ' + highestRank.number + getOrdinalSuffix(highestRank.number); }
    const status = getRelationshipStatus(p.id);
    const statusClass = status === 'ongoing' ? 'status-ongoing' : status === 'ended' ? 'status-ended' : status === 'widowed' ? 'status-widowed' : '';
    html += `<div class="person-item ${selected} ${d.deceased ? 'deceased' : ''}" onclick="selectPerson('${p.id}')" data-stable-id="${stableId}"><div class="person-name">${statusClass ? `<span class="status-indicator ${statusClass}" title="${status}"></span>` : ''}<span class="gender-symbol">${g}</span>${rankIcons}${escapeHtml(d.name)} ${deceased}${rankTitle ? `<span class="rank-title">${rankTitle}</span>` : ''}</div><div class="person-detail"><span class="person-compound">${escapeHtml(compound)}</span><span class="person-age">${age}</span></div></div>`;
  });
  list.innerHTML = html || '<div style="padding:15px;text-align:center;color:var(--dim);">No people loaded</div>';
}

function filterPersonList() {
  const search = document.getElementById('person-search').value.toLowerCase();
  const items = document.querySelectorAll('#person-list .person-item');
  items.forEach(item => { const name = item.querySelector('.person-name').textContent.toLowerCase(); item.style.display = name.includes(search) ? '' : 'none'; });
}

function selectPerson(id) {
  selectedPerson = id;
  buildPersonList();
  if (currentMode === 'tree') renderFullFamilyTree(id);
  if (window.innerWidth <= 768) toggleMobileSidebar();
}

// ====================== FAMILY TREE RENDERING ======================
function renderFullFamilyTree(id) {
  const container = document.getElementById('tree-container');
  const person = getPersonDisplay(id);
  if (!person.name) { container.innerHTML = '<div style="text-align:center; color:var(--dim); padding:40px;">Person not found</div>'; return; }
  
  const ancestors = groupAncestorsByGeneration(id);
  const descendants = groupDescendantsByGeneration(id);
  const partners = getPartners(id);
  const siblings = getSiblings(id);
  
  let html = '';
  
  if (ancestors['-3'].size > 0) {
    html += `<div class="tree-generation"><div style="font-family:Cinzel; color:var(--tdim); font-size:0.55rem; letter-spacing:0.15em; margin-bottom:5px;">GREAT-GRANDPARENTS</div><div class="tree-row">`;
    Array.from(ancestors['-3']).forEach(gpId => { html += renderTreeCard(getPersonDisplay(gpId), 'great-grandparent'); });
    html += `</div><div class="generation-connector"></div></div>`;
  }
  if (ancestors['-2'].size > 0) {
    html += `<div class="tree-generation"><div style="font-family:Cinzel; color:var(--tdim); font-size:0.55rem; letter-spacing:0.15em; margin-bottom:5px;">GRANDPARENTS</div><div class="tree-row">`;
    Array.from(ancestors['-2']).forEach(gpId => { html += renderTreeCard(getPersonDisplay(gpId), 'grandparent'); });
    html += `</div><div class="generation-connector"></div></div>`;
  }
  if (ancestors['-1'].size > 0) {
    html += `<div class="tree-generation"><div style="font-family:Cinzel; color:var(--tdim); font-size:0.55rem; letter-spacing:0.15em; margin-bottom:5px;">PARENTS</div><div class="tree-row">`;
    Array.from(ancestors['-1']).forEach(pId => { const p = getPersonDisplay(pId); const relation = p.gender === 'male' ? 'father' : p.gender === 'female' ? 'mother' : 'parent'; html += renderTreeCard(p, relation); });
    html += `</div><div class="generation-connector"></div></div>`;
  }
  
  html += `<div class="tree-generation"><div style="font-family:Cinzel; color:var(--tdim); font-size:0.55rem; letter-spacing:0.15em; margin-bottom:5px;">SELF & PARTNERS</div><div class="tree-row">`;
  if (partners.length > 0) {
    const midPoint = Math.floor(partners.length / 2);
    const leftPartners = partners.slice(0, midPoint);
    const rightPartners = partners.slice(midPoint);
    leftPartners.forEach(p => { html += renderTreeCard(p, p.status === 'ongoing' ? 'partner' : 'ex-partner'); });
    html += renderTreeCard(person, 'self');
    rightPartners.forEach(p => { html += renderTreeCard(p, p.status === 'ongoing' ? 'partner' : 'ex-partner'); });
  } else { html += renderTreeCard(person, 'self'); }
  html += `</div>${descendants['1'].size > 0 || descendants['2'].size > 0 || descendants['3'].size > 0 ? `<div class="generation-connector"></div>` : ''}</div>`;
  
  if (descendants['1'].size > 0) {
    html += `<div class="tree-generation"><div style="font-family:Cinzel; color:var(--tdim); font-size:0.55rem; letter-spacing:0.15em; margin-bottom:5px;">CHILDREN</div><div class="tree-row">`;
    Array.from(descendants['1']).forEach(cId => { const c = getPersonDisplay(cId); const relation = c.gender === 'male' ? 'son' : c.gender === 'female' ? 'daughter' : 'child'; html += renderTreeCard(c, relation); });
    html += `</div>${descendants['2'].size > 0 || descendants['3'].size > 0 ? `<div class="generation-connector"></div>` : ''}</div>`;
  }
  if (descendants['2'].size > 0) {
    html += `<div class="tree-generation"><div style="font-family:Cinzel; color:var(--tdim); font-size:0.55rem; letter-spacing:0.15em; margin-bottom:5px;">GRANDCHILDREN</div><div class="tree-row">`;
    Array.from(descendants['2']).forEach(gcId => { html += renderTreeCard(getPersonDisplay(gcId), 'grandchild'); });
    html += `</div>${descendants['3'].size > 0 ? `<div class="generation-connector"></div>` : ''}</div>`;
  }
  if (descendants['3'].size > 0) {
    html += `<div class="tree-generation"><div style="font-family:Cinzel; color:var(--tdim); font-size:0.55rem; letter-spacing:0.15em; margin-bottom:5px;">GREAT-GRANDCHILDREN</div><div class="tree-row">`;
    Array.from(descendants['3']).forEach(ggcId => { html += renderTreeCard(getPersonDisplay(ggcId), 'great-grandchild'); });
    html += `</div></div>`;
  }
  
  if (siblings.length > 0) {
    html += `<div style="margin-top:30px; border-top:1px dashed var(--border); padding-top:15px;"><div style="font-family:Cinzel; color:var(--tdim); font-size:0.6rem; margin-bottom:10px;">SIBLINGS</div><div class="tree-row">`;
    siblings.forEach(sId => { html += renderTreeCard(getPersonDisplay(sId), 'sibling'); });
    html += `</div></div>`;
  }
  
  container.innerHTML = html || '<div style="text-align:center; color:var(--dim); padding:40px;">No family tree available</div>';
}

function renderTreeCard(person, type) {
  if (!person || !person.id) return '';
  const rankIcons = renderRankIcons(person.ranks || []);
  const highestRank = getHighestRank(person.ranks || []);
  let rankTitle = '';
  if (highestRank && highestRank.value) { rankTitle = highestRank.value; if (highestRank.number) rankTitle += ' ' + highestRank.number + getOrdinalSuffix(highestRank.number); }
  const age = person.age ? `${person.age} yrs` : (person.birthYear ? `b.${person.birthYear}` : '');
  const comp = person.currComp || person.birthComp || '?';
  const deceased = person.deceased ? 'deceased' : '';
  const selected = person.id === selectedPerson ? 'selected' : '';
  const gender = person.gender === 'male' ? '♂' : person.gender === 'female' ? '♀' : '·';
  let relationClass = '', relationText = '';
  if (type === 'self') relationText = '';
  else if (type === 'father' || type === 'mother' || type === 'parent') { relationText = type === 'father' ? 'Father' : type === 'mother' ? 'Mother' : 'Parent'; relationClass = 'parent'; }
  else if (type === 'son' || type === 'daughter' || type === 'child') { relationText = type === 'son' ? 'Son' : type === 'daughter' ? 'Daughter' : 'Child'; relationClass = 'child'; }
  else if (type === 'grandparent') { relationText = person.gender === 'male' ? 'Grandfather' : person.gender === 'female' ? 'Grandmother' : 'Grandparent'; relationClass = 'grandparent'; }
  else if (type === 'great-grandparent') { relationText = person.gender === 'male' ? 'G-Grandfather' : person.gender === 'female' ? 'G-Grandmother' : 'G-Grandparent'; relationClass = 'grandparent'; }
  else if (type === 'grandchild') { relationText = person.gender === 'male' ? 'Grandson' : person.gender === 'female' ? 'Granddaughter' : 'Grandchild'; relationClass = 'grandchild'; }
  else if (type === 'great-grandchild') { relationText = person.gender === 'male' ? 'G-Grandson' : person.gender === 'female' ? 'G-Granddaughter' : 'G-Grandchild'; relationClass = 'grandchild'; }
  else if (type === 'partner') { relationText = person.gender === 'male' ? 'Husband' : person.gender === 'female' ? 'Wife' : 'Partner'; relationClass = 'partner'; }
  else if (type === 'ex-partner') { relationText = 'Ex-Partner'; relationClass = 'partner'; }
  else if (type === 'sibling') { relationText = person.gender === 'male' ? 'Brother' : person.gender === 'female' ? 'Sister' : 'Sibling'; relationClass = 'sibling'; }
  const stableId = person.stableId || '';
  return `<div class="tree-card ${deceased} ${selected}" onclick="selectPerson('${person.id}')" data-stable-id="${stableId}"><div class="tree-header"><span class="gender-symbol">${gender}</span><span class="tree-rank-icons">${rankIcons}</span><span class="tree-name">${escapeHtml(person.name || 'Unknown')}</span>${person.deceased ? '<span class="deceased-mark">†</span>' : ''}</div><div class="tree-detail"><div>Age: <span>${age || '?'}</span></div><div>Compound: <span>${escapeHtml(comp)}</span></div>${rankTitle ? `<div>Rank: <span class="rank-${getRankClass(highestRank.value)}">${rankTitle}</span></div>` : ''}</div>${relationText ? `<div class="tree-relation-badge ${relationClass}">${relationText}</div>` : ''}</div>`;
}

// ====================== RELATIONSHIP FINDER ======================
function buildSelectorOptions() {
  const people = Object.keys(DATA.people).map(id => ({ id, display: getPersonDisplay(id) })).filter(p => p.display.name).sort((a, b) => a.display.name.localeCompare(b.display.name));
  let options = '<option value="">Select a person...</option>';
  people.forEach(p => { const d = p.display; const compound = d.currComp || d.birthComp || '?'; const age = d.age ? `${d.age} yrs` : (d.birthYear ? `b.${d.birthYear}` : '?'); const deceased = d.deceased ? ' †' : ''; const status = getRelationshipStatus(p.id); const statusSymbol = status === 'ongoing' ? ' ❤️' : status === 'ended' ? ' 💔' : status === 'widowed' ? ' ✝️' : ''; options += `<option value="${p.id}">${escapeHtml(d.name)}${deceased}${statusSymbol} — ${escapeHtml(compound)} · ${age}</option>`; });
  const selectorA = document.getElementById('finder-person-a'); if (selectorA) selectorA.innerHTML = options;
  const selectorB = document.getElementById('finder-person-b'); if (selectorB) selectorB.innerHTML = options;
}

function findRelationship() {
  const idA = document.getElementById('finder-person-a')?.value;
  const idB = document.getElementById('finder-person-b')?.value;
  const resultDiv = document.getElementById('relationship-result');
  if (!resultDiv) return;
  if (!idA || !idB) { resultDiv.style.display = 'none'; return; }
  if (idA === idB) { resultDiv.style.display = 'block'; resultDiv.innerHTML = `<div class="relationship-name">Same Person</div><div class="relationship-detail">You selected the same person twice</div>`; return; }
  const personA = getPersonDisplay(idA);
  const personB = getPersonDisplay(idB);
  let relationship = null;
  if (getParents(idA).includes(idB)) relationship = 'child';
  else if (getParents(idB).includes(idA)) relationship = 'parent';
  else if (getParents(getParents(idA)).includes(idB)) relationship = 'grandchild';
  else if (getParents(getParents(idB)).includes(idA)) relationship = 'grandparent';
  else if (getSiblings(idA).includes(idB)) relationship = 'sibling';
  else { const partners = getPartners(idA); if (partners.some(p => p.id === idB)) { const status = partners.find(p => p.id === idB).status; relationship = status === 'ongoing' ? 'partner' : 'ex-partner'; } }
  if (!relationship) { resultDiv.style.display = 'block'; resultDiv.innerHTML = `<div class="relationship-name">No Relation Found</div><div class="relationship-detail">These two are not related</div>`; return; }
  let relationshipName = relationship === 'ex-partner' ? 'Ex-Partner' : relationship === 'partner' ? 'Partner' : relationship;
  const status = relationship === 'partner' ? ' (Ongoing)' : relationship === 'ex-partner' ? ' (Ended)' : '';
  resultDiv.style.display = 'block'; resultDiv.innerHTML = `<div class="relationship-name">${relationshipName}${status}</div><div class="relationship-detail">${escapeHtml(personA.name)} is ${escapeHtml(personB.name)}'s ${relationshipName}</div>`;
}

// ====================== UI FUNCTIONS ======================
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  const treeView = document.getElementById('tree-view');
  const finderView = document.getElementById('finder-view');
  const historicalView = document.getElementById('historical-view');
  if (treeView) treeView.style.display = mode === 'tree' ? 'block' : 'none';
  if (finderView) finderView.style.display = mode === 'finder' ? 'block' : 'none';
  if (historicalView) historicalView.style.display = mode === 'historical' ? 'block' : 'none';
  if (mode === 'tree' && selectedPerson) renderFullFamilyTree(selectedPerson);
  if (mode === 'historical') renderHistoricalView();
}

function toggleMobileSidebar() {
  mobileSidebarVisible = !mobileSidebarVisible;
  const sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.classList.toggle('mobile-visible', mobileSidebarVisible);
}

document.addEventListener('click', (e) => { if (window.innerWidth <= 768 && mobileSidebarVisible) { const sidebar = document.getElementById('sidebar'); const toggle = document.getElementById('menu-toggle'); if (sidebar && toggle && !sidebar.contains(e.target) && e.target !== toggle && !toggle.contains(e.target)) toggleMobileSidebar(); } });
window.addEventListener('resize', () => { if (window.innerWidth > 768 && mobileSidebarVisible) toggleMobileSidebar(); });

// ====================== INIT ======================
window.addEventListener('load', () => { loadFromStorage(); document.getElementById('historical-year').value = DATA.currentYear || 1560; });
</script>

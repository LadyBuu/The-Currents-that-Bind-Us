<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Rank Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    .rank-container { max-width: 1400px; margin: 20px auto; padding: 0 20px 40px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; padding: 16px 20px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; align-items: center; }
    .toolbar .btn-group { display: flex; gap: 8px; margin-left: auto; }
    .rank-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
    .rank-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; transition: all 0.2s; overflow: hidden; }
    .rank-card:hover { border-color: var(--accent); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .rank-header { padding: 16px 20px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .rank-name-field { flex: 2; min-width: 160px; }
    .rank-name-field input { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600; background: var(--bg); border: 1px solid var(--border2); padding: 8px 12px; width: 100%; }
    .rank-priority { width: 100px; }
    .rank-priority input { text-align: center; font-weight: bold; }
    .delete-rank { background: rgba(139,64,64,0.2); border-color: var(--danger); color: var(--danger-lt); padding: 6px 14px; }
    .rank-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 18px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .toggle-label { display: flex; align-items: center; gap: 10px; font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.05em; color: var(--dim); }
    .symbol-selector { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .symbol-dropdown { background: var(--bg); border: 1px solid var(--border2); padding: 6px 10px; font-size: 1.2rem; font-family: monospace; border-radius: 6px; color: var(--accent); cursor: pointer; }
    .symbol-preview { font-size: 1.4rem; background: var(--bg); padding: 4px 12px; border-radius: 8px; border: 1px solid var(--border); min-width: 60px; text-align: center; }
    .location-assignment { display: flex; flex-direction: column; gap: 12px; padding-top: 8px; border-top: 1px dashed var(--border); }
    .loc-type-group, .loc-specific-group { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
    .info-note { font-size: 0.65rem; color: var(--tmut); margin-top: 4px; font-style: italic; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--dim); font-family: 'Cinzel', serif; border: 1px dashed var(--border2); border-radius: 20px; background: var(--bg2); }
    .warning-badge { background: rgba(200,112,64,0.2); border: 1px solid var(--warn); border-radius: 4px; padding: 8px 12px; font-size: 0.7rem; margin-bottom: 16px; }
    @media (max-width: 700px) { .rank-grid { grid-template-columns: 1fr; } .toolbar { flex-direction: column; align-items: stretch; } .toolbar .btn-group { margin-left: 0; justify-content: center; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">RANK MANAGER</div>
  <div style="flex:1"></div>
  <button id="importBtn" class="tb-btn">Import JSON</button>
  <button id="exportBtn" class="tb-btn primary">Export JSON</button>
</div>

<div class="rank-container">
  <div class="toolbar">
    <button id="addRankBtn" class="btn primary">+ Add New Rank</button>
    <div class="btn-group">
      <span class="tb-sep"></span>
      <span class="text-dim" style="font-size:0.7rem;">Priority: lower number = higher rank</span>
    </div>
  </div>
  
  <div id="ranksGrid" class="rank-grid"></div>
</div>

<script>
  // ==================== UNIFIED DATA STRUCTURE ====================
  // This matches the SAME structure used by Locations Manager and Character Manager
  let masterData = {
    version: "2.0",
    lastUpdated: new Date().toISOString(),
    data: {
      characters: [],
      locationTypes: [],
      governments: [],
      places: [],
      ranks: [],
      roles: [],
      nameLists: {},
      cityNameParts: { prefixes: [], roots: [], suffixes: [] },
      currentYear: 1250
    }
  };
  
  const SYMBOLS = ["🜲", "🜋", "🜍", "🜏", "🝆", "🝕", "🝪", "✪", "✦", "✧", "🟊", "⚝", "𖤓", "✴", "✺", "✵", "🞡", "🞢", "🞭", "◎", "◉", "◍", "◯", "⊙", "◐", "◑", "◒", "◓", "◖", "◗", "⨀", "⚬", "⊕", "🜨", "⚲", "⌾", "⫷", "⟁", "⟐", "⌇", "≋", "⌁", "▲", "▽", "■", "▥", "▣", "⬔", "⬖", "⟡", "⬟", "⎔", "⌘", "❖", "♡", "✿", "❀", "❆", "❦", "❧", "☙", "❝", "❞", "☯", "⚜", "✠", "ⴾ", "⦚", "⳩", "𐃏", "⛤", "ᨒ", "꤮", "𑁍", "𖦹", "⚴", "⚷", "⚳", "☉", "☾", "☋"];
  
  function generateId() { return 'rank_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  // ==================== LOAD FROM UNIFIED STORAGE ====================
  function loadMasterData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        // Merge with existing structure to preserve all data
        masterData = {
          version: parsed.version || "2.0",
          lastUpdated: parsed.lastUpdated || new Date().toISOString(),
          data: {
            characters: parsed.data?.characters || [],
            locationTypes: parsed.data?.locationTypes || [],
            governments: parsed.data?.governments || [],
            places: parsed.data?.places || [],
            ranks: parsed.data?.ranks || [],
            roles: parsed.data?.roles || [],
            nameLists: parsed.data?.nameLists || {},
            cityNameParts: parsed.data?.cityNameParts || { prefixes: [], roots: [], suffixes: [] },
            currentYear: parsed.data?.currentYear || 1250
          }
        };
      } catch(e) { console.error('Error loading master data', e); }
    } else {
      // Initialize with default ranks if none exist
      masterData.data.ranks = [
        { id: generateId(), name: "High King", priority: 1, numbered: false, symbol: "✦", locationType: null, locationId: null },
        { id: generateId(), name: "Prince", priority: 2, numbered: true, symbol: "✪", locationType: null, locationId: null },
        { id: generateId(), name: "District Warden", priority: 3, numbered: false, symbol: "▲", locationType: null, locationId: null },
        { id: generateId(), name: "Elder", priority: 4, numbered: false, symbol: "⌇", locationType: null, locationId: null },
        { id: generateId(), name: "Master", priority: 5, numbered: false, symbol: "◆", locationType: null, locationId: null },
        { id: generateId(), name: "Commoner", priority: 10, numbered: false, symbol: "·", locationType: null, locationId: null }
      ];
      saveMasterData();
    }
  }
  
  function saveMasterData() {
    masterData.lastUpdated = new Date().toISOString();
    localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
  }
  
  // ==================== RANK OPERATIONS ====================
  function getRanks() { return masterData.data.ranks; }
  function setRanks(ranks) { masterData.data.ranks = ranks; saveMasterData(); }
  
  function addRank() {
    const newRank = {
      id: generateId(),
      name: "New Rank",
      priority: getRanks().length ? Math.max(...getRanks().map(r => r.priority), 0) + 1 : 5,
      numbered: false,
      symbol: "✦",
      locationType: null,
      locationId: null
    };
    const ranks = getRanks();
    ranks.push(newRank);
    setRanks(ranks);
    renderRanks();
  }
  
  function deleteRank(rankId) {
    if (confirm('Delete this rank?')) {
      const ranks = getRanks().filter(r => r.id !== rankId);
      setRanks(ranks);
      renderRanks();
    }
  }
  
  function updateRank(rankId, updates) {
    const ranks = getRanks().map(r => r.id === rankId ? { ...r, ...updates } : r);
    setRanks(ranks);
    renderRanks();
  }
  
  // ==================== GET LOCATION TYPES FROM PLACES ====================
  function getLocationTypesFromPlaces() {
    const locationTypes = [];
    const typeMap = new Map();
    
    // Get all unique location type display names from places
    masterData.data.places.forEach(place => {
      const type = masterData.data.locationTypes.find(t => t.id === place.typeId);
      if (type && !typeMap.has(type.displayName)) {
        typeMap.set(type.displayName, type);
        locationTypes.push(type);
      }
    });
    
    return locationTypes.sort((a, b) => a.priority - b.priority);
  }
  
  // ==================== RENDER ====================
  function renderRanks() {
    const grid = document.getElementById('ranksGrid');
    const ranks = getRanks();
    const locationTypes = getLocationTypesFromPlaces();
    
    if (!ranks.length) {
      grid.innerHTML = `<div class="empty-state">No ranks defined. Click "Add New Rank" to create hierarchies.<br>Ranks define titles like King, Prince, Chief, etc.</div>`;
      return;
    }
    
    grid.innerHTML = ranks.map(rank => {
      // Sort ranks by priority for display
      const sortedRanks = [...ranks].sort((a, b) => a.priority - b.priority);
      const rankNumber = sortedRanks.findIndex(r => r.id === rank.id) + 1;
      
      return `
      <div class="rank-card" data-rank-id="${rank.id}">
        <div class="rank-header">
          <div class="rank-name-field">
            <input type="text" class="rank-name-input" value="${escapeHtml(rank.name)}" placeholder="Rank name" data-field="name">
          </div>
          <div class="rank-priority">
            <input type="number" class="rank-priority-input" value="${rank.priority}" step="1" min="1" max="1000" data-field="priority">
          </div>
          <button class="btn delete-rank" data-action="delete">Delete</button>
        </div>
        <div class="rank-body">
          <div class="toggle-row">
            <label class="toggle-label">
              <input type="checkbox" class="rank-numbered-toggle" ${rank.numbered ? 'checked' : ''} data-field="numbered">
              <span>Numbered rank</span>
              <span class="info-note" style="display:inline; margin-left:6px;">(e.g., 1st Prince, 2nd Prince)</span>
            </label>
          </div>
          
          <div class="symbol-selector">
            <label>Title symbol:</label>
            <select class="symbol-dropdown" data-field="symbol">
              ${SYMBOLS.map(sym => `<option value="${sym}" ${rank.symbol === sym ? 'selected' : ''}>${sym}</option>`).join('')}
            </select>
            <div class="symbol-preview">${rank.symbol}</div>
          </div>
          
          <div class="location-assignment">
            <div class="loc-type-group">
              <label>Location Type (from Locations Manager):</label>
              <select class="location-type-select" data-field="locationType">
                <option value="">— No restriction —</option>
                ${locationTypes.map(type => `<option value="${type.displayName}" ${rank.locationType === type.displayName ? 'selected' : ''}>${type.displayName} (Priority ${type.priority})</option>`).join('')}
              </select>
            </div>
            ${locationTypes.length === 0 ? '<div class="info-note" style="color:var(--warn);">No location types found. Create locations in Locations Manager first.</div>' : '<div class="info-note">Assigning a location type is optional. If selected, rank applies to that specific place type.</div>'}
          </div>
          
          <div class="info-note" style="margin-top:8px; border-top:1px solid var(--border2); padding-top:8px;">
            Rank ID: <code style="font-size:0.6rem;">${rank.id}</code> | Position: ${rankNumber} of ${ranks.length}
          </div>
        </div>
      </div>
    `}).join('');
    
    // Attach event listeners
    document.querySelectorAll('.rank-card').forEach(card => {
      const rankId = card.getAttribute('data-rank-id');
      
      card.querySelector('.rank-name-input')?.addEventListener('change', (e) => {
        updateRank(rankId, { name: e.target.value });
      });
      
      card.querySelector('.rank-priority-input')?.addEventListener('change', (e) => {
        updateRank(rankId, { priority: parseInt(e.target.value) || 10 });
      });
      
      card.querySelector('.rank-numbered-toggle')?.addEventListener('change', (e) => {
        updateRank(rankId, { numbered: e.target.checked });
      });
      
      card.querySelector('.symbol-dropdown')?.addEventListener('change', (e) => {
        updateRank(rankId, { symbol: e.target.value });
      });
      
      card.querySelector('.location-type-select')?.addEventListener('change', (e) => {
        updateRank(rankId, { locationType: e.target.value || null });
      });
      
      card.querySelector('[data-action="delete"]')?.addEventListener('click', () => deleteRank(rankId));
    });
  }
  
  // ==================== IMPORT/EXPORT (UNIFIED) ====================
  function exportData() {
    // Export the COMPLETE unified master data
    const exportObj = {
      type: "master",
      version: "2.0",
      exportDate: new Date().toISOString(),
      data: masterData.data
    };
    const dataStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_master_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Complete master data exported (ranks + locations + all data)');
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          let importedMaster = null;
          
          // Case 1: New unified format with type "master"
          if (imported.type === "master" && imported.data) {
            importedMaster = imported;
          }
          // Case 2: Old format with just data object
          else if (imported.data && (imported.data.ranks || imported.data.places)) {
            importedMaster = imported;
          }
          // Case 3: Direct array of ranks (old rank manager export)
          else if (Array.isArray(imported)) {
            // This is an old rank-only export, merge into master
            importedMaster = {
              type: "master",
              version: "2.0",
              data: {
                ...masterData.data,
                ranks: imported
              }
            };
          }
          // Case 4: Object with ranks array
          else if (imported.ranks && Array.isArray(imported.ranks)) {
            importedMaster = {
              type: "master",
              version: "2.0",
              data: {
                ...masterData.data,
                ranks: imported.ranks
              }
            };
          }
          // Case 5: Locations export format
          else if (imported.places || imported.locationTypes) {
            importedMaster = {
              type: "master",
              version: "2.0",
              data: {
                ...masterData.data,
                places: imported.places || masterData.data.places,
                locationTypes: imported.locationTypes || masterData.data.locationTypes,
                governments: imported.governments || masterData.data.governments
              }
            };
          }
          
          if (importedMaster && importedMaster.data) {
            let ranksImported = 0;
            let placesImported = 0;
            let typesImported = 0;
            let govsImported = 0;
            
            // Merge ranks
            if (importedMaster.data.ranks && Array.isArray(importedMaster.data.ranks)) {
              const currentRanks = masterData.data.ranks;
              importedMaster.data.ranks.forEach(importedRank => {
                const existingIndex = currentRanks.findIndex(r => r.id === importedRank.id);
                if (existingIndex !== -1) {
                  // Update existing rank
                  currentRanks[existingIndex] = { ...currentRanks[existingIndex], ...importedRank };
                } else {
                  // Add new rank (ensure it has an ID)
                  if (!importedRank.id) importedRank.id = generateId();
                  currentRanks.push(importedRank);
                }
                ranksImported++;
              });
            }
            
            // Merge places
            if (importedMaster.data.places && Array.isArray(importedMaster.data.places)) {
              const currentPlaces = masterData.data.places;
              importedMaster.data.places.forEach(importedPlace => {
                const existingIndex = currentPlaces.findIndex(p => p.id === importedPlace.id);
                if (existingIndex !== -1) {
                  currentPlaces[existingIndex] = { ...currentPlaces[existingIndex], ...importedPlace };
                } else {
                  if (!importedPlace.id) importedPlace.id = 'loc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                  currentPlaces.push(importedPlace);
                }
                placesImported++;
              });
            }
            
            // Merge location types
            if (importedMaster.data.locationTypes && Array.isArray(importedMaster.data.locationTypes)) {
              const currentTypes = masterData.data.locationTypes;
              importedMaster.data.locationTypes.forEach(importedType => {
                const existingIndex = currentTypes.findIndex(t => t.id === importedType.id);
                if (existingIndex !== -1) {
                  currentTypes[existingIndex] = { ...currentTypes[existingIndex], ...importedType };
                } else {
                  if (!importedType.id) importedType.id = 'type_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                  currentTypes.push(importedType);
                }
                typesImported++;
              });
            }
            
            // Merge governments
            if (importedMaster.data.governments && Array.isArray(importedMaster.data.governments)) {
              const currentGovs = masterData.data.governments;
              importedMaster.data.governments.forEach(importedGov => {
                const existingIndex = currentGovs.findIndex(g => g.id === importedGov.id);
                if (existingIndex !== -1) {
                  currentGovs[existingIndex] = { ...currentGovs[existingIndex], ...importedGov };
                } else {
                  if (!importedGov.id) importedGov.id = 'gov_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                  currentGovs.push(importedGov);
                }
                govsImported++;
              });
            }
            
            // Merge current year
            if (importedMaster.data.currentYear) {
              masterData.data.currentYear = importedMaster.data.currentYear;
            }
            
            saveMasterData();
            renderRanks();
            
            let message = `Imported: ${ranksImported} ranks, ${placesImported} places, ${typesImported} types, ${govsImported} governments`;
            showToast(message);

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Names Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    /* Additional Names Manager specific styles */
    .names-app {
      display: flex;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    .sidebar {
      width: 320px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin: 0;
      font-family: 'Cinzel', serif;
    }
    
    .country-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .country-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    
    .country-header {
      padding: 12px;
      background: var(--bg3);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
    }
    
    .country-header:hover {
      background: var(--bg4);
    }
    
    .country-content {
      padding: 12px;
      display: none;
    }
    
    .country-content.expanded {
      display: block;
    }
    
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      padding: 0 16px;
    }
    
    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      color: var(--dim);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .name-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    
    .section-title {
      padding: 12px 16px;
      background: var(--bg3);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    
    .name-grid {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    
    .name-tag {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-family: 'Crimson Pro', serif;
    }
    
    .name-tag button {
      background: none;
      border: none;
      color: var(--danger-lt);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 0 4px;
      margin-left: 4px;
      transition: color 0.2s;
    }
    
    .name-tag button:hover {
      color: var(--danger);
    }
    
    .upload-area {
      border: 2px dashed var(--border2);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      margin: 16px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.7rem;
    }
    
    .upload-area:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    
    .city-builder {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .city-part {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    
    .city-part input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
    }
    
    .generated-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    
    .helper-text {
      font-size: 0.65rem;
      color: var(--tmut);
      margin-top: 4px;
      margin-left: 16px;
      margin-bottom: 16px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    
    .debug-info {
      font-size: 0.6rem;
      color: var(--dim);
      padding: 8px;
      border-top: 1px solid var(--border);
      background: var(--bg3);
      font-family: monospace;
    }
    
    .btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: var(--bg4);
      border-color: var(--accent);
    }
    
    .btn.primary {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .btn.danger {
      background: rgba(139, 64, 64, 0.2);
      border-color: var(--danger);
      color: var(--danger-lt);
    }
    
    .btn.small {
      padding: 3px 8px;
      font-size: 0.6rem;
    }
    
    @media (max-width: 768px) {
      .names-app {
        flex-direction: column;
        height: auto;
      }
      .sidebar {
        width: 100%;
        max-height: 300px;
      }
      .name-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">📜 NAMES MANAGER</div>
  <div style="flex:1"></div>
  <button id="loadMasterDataBtn" class="tb-btn primary">📂 Load Master JSON</button>
  <button id="importNamesBtn" class="tb-btn">📥 Import Names Only</button>
  <button id="exportNamesBtn" class="tb-btn primary">💾 Export Master JSON</button>
</div>

<div class="names-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🌍 COUNTRIES</h3>
      <button id="refreshCountriesBtn" class="btn small">⟳ Refresh</button>
    </div>
    <div class="country-list" id="countryList"></div>
    <div class="debug-info" id="debugInfo">
      Loading...
    </div>
  </div>
  
  <div class="main-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="character">👤 Character Names</button>
      <button class="tab-btn" data-tab="city">🏙️ City Names</button>
    </div>
    <div class="panel-content" id="panelContent"></div>
  </div>
</div>

<script>
  // ==================== MASTER DATA STRUCTURE (matches your JSON exactly) ====================
  let masterData = {
    type: "master",
    version: "2.0",
    exportDate: new Date().toISOString(),
    data: {
      characters: [],
      locationTypes: [],
      governments: [],
      places: [],
      ranks: [],
      roles: [],
      nameLists: {},
      cityNameParts: { prefixes: [], roots: [], suffixes: [] },
      currentYear: 1250
    }
  };
  
  let countries = [];
  let selectedCountryId = null;
  
  // ==================== PERSISTENCE ====================
  function saveMasterData() {
    masterData.exportDate = new Date().toISOString();
    localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
    console.log('Master data saved to localStorage');
  }
  
  function loadFromLocalStorage() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        // Handle various formats
        if (parsed.type === "master" && parsed.data) {
          masterData = parsed;
        } else if (parsed.data && parsed.data.places) {
          masterData = {
            type: "master",
            version: parsed.version || "2.0",
            exportDate: parsed.exportDate || new Date().toISOString(),
            data: parsed.data
          };
        } else if (parsed.places) {
          masterData = {
            type: "master",
            version: "2.0",
            exportDate: new Date().toISOString(),
            data: parsed
          };
        }
        
        // Ensure required structures exist
        if (!masterData.data.nameLists) masterData.data.nameLists = {};
        if (!masterData.data.cityNameParts) {
          masterData.data.cityNameParts = { prefixes: [], roots: [], suffixes: [] };
        }
        console.log('Loaded from localStorage:', masterData.data.nameLists);
      } catch(e) { console.error('Error loading master data', e); }
    }
    
    // Initialize default city name parts if empty
    if (!masterData.data.cityNameParts.prefixes || masterData.data.cityNameParts.prefixes.length === 0) {
      masterData.data.cityNameParts = {
        prefixes: ['Ash', 'Black', 'Blue', 'Bright', 'Cold', 'Dark', 'Deep', 'Fair', 'Gold', 'Green', 'High', 'Iron', 'Kings', 'Long', 'Mist', 'North', 'Red', 'Silver', 'South', 'Star', 'Storm', 'Sun', 'West', 'White', 'Wind'],
        roots: ['bridge', 'brook', 'burg', 'chester', 'cross', 'dale', 'field', 'ford', 'gate', 'ham', 'haven', 'hill', 'holm', 'hurst', 'mere', 'mill', 'mouth', 'pool', 'port', 'stead', 'ton', 'vale', 'wall', 'wick', 'worth'],
        suffixes: ['ia', 'land', 'shire', 'gard', 'heim', 'grad', 'polis', 'burg', 'city', 'town', 'fell', 'moor', 'wood', 'bury', 'caster', 'cester', 'by', 'thorpe', 'stoke']
      };
      saveMasterData();
    }
  }
  
  // ==================== LOAD MASTER JSON FILE ====================
  function loadMasterFromFile() {
    console.log('loadMasterFromFile called');
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      console.log('File selected:', file.name);
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          console.log('Imported JSON structure:', Object.keys(imported));
          
          // Handle the exact master JSON format from your file
          if (imported.type === "master" && imported.data) {
            masterData = imported;
            console.log('Loaded as master format');
          } else if (imported.data && imported.data.places) {
            masterData = {
              type: "master",
              version: imported.version || "2.0",
              exportDate: imported.exportDate || new Date().toISOString(),
              data: imported.data
            };
            console.log('Loaded as data wrapper format');
          } else if (imported.places) {
            masterData = {
              type: "master",
              version: "2.0",
              exportDate: new Date().toISOString(),
              data: imported
            };
            console.log('Loaded as raw data format');
          } else {
            throw new Error('Unrecognized JSON format');
          }
          
          // Ensure nameLists exists
          if (!masterData.data.nameLists) masterData.data.nameLists = {};
          if (!masterData.data.cityNameParts) {
            masterData.data.cityNameParts = { prefixes: [], roots: [], suffixes: [] };
          }
          
          saveMasterData();
          refreshCountries();
          showToast(`Loaded ${countries.length} countries from "${file.name}"`);
          updateDebugInfo();
        } catch(err) { 
          console.error('Parse error:', err);
          alert('Invalid JSON: ' + err.message); 
        }
      };
      reader.onerror = () => { alert('Error reading file'); };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function updateDebugInfo() {
    const debugEl = document.getElementById('debugInfo');
    if (debugEl) {
      const placesCount = masterData.data.places?.length || 0;
      const locationTypesCount = masterData.data.locationTypes?.length || 0;
      const countryType = masterData.data.locationTypes?.find(t => t.displayName === 'Country');
      const nameListsCount = Object.keys(masterData.data.nameLists || {}).length;
      
      debugEl.innerHTML = `
        📍 Places: ${placesCount}<br>
        🏷️ Location Types: ${locationTypesCount}<br>
        🏛️ Country Type: ${countryType?.displayName || 'Not found'}<br>
        🌍 Countries: ${countries.length}<br>
        📋 Name Lists: ${nameListsCount} countries have names<br>
        ${placesCount === 0 ? '<span style="color:#c88040;">⚠️ Load a Master JSON file to begin</span>' : ''}
      `;
    }
  }
  
  // ==================== COUNTRY FUNCTIONS ====================
  function refreshCountries() {
    const places = masterData.data.places || [];
    const locationTypes = masterData.data.locationTypes || [];
    
    const countryType = locationTypes.find(t => t.displayName === 'Country');
    
    if (countryType) {
      countries = places.filter(p => p.typeId === countryType.id).map(p => ({ 
        id: p.id, 
        displayName: p.displayName 
      }));
    } else {
      // Fallback: places with no parent
      countries = places.filter(p => !p.parentId).map(p => ({ 
        id: p.id, 
        displayName: p.displayName 
      }));
    }
    
    countries.sort((a, b) => a.displayName.localeCompare(b.displayName));
    
    console.log('Countries refreshed:', countries.length);
    updateDebugInfo();
    renderCountryList();
  }
  
  function renderCountryList() {
    const container = document.getElementById('countryList');
    const nameLists = masterData.data.nameLists || {};
    
    if (!countries.length) {
      container.innerHTML = `
        <div class="empty-state">
          🌍 No countries found.<br><br>
          <button id="loadMasterBtn" class="btn primary">📂 Load Master JSON</button><br>
          <small style="display:block; margin-top:12px;">Load your stillwaters_master_*.json file</small>
        </div>
      `;
      const loadBtn = document.getElementById('loadMasterBtn');
      if (loadBtn) loadBtn.addEventListener('click', loadMasterFromFile);
      return;
    }
    
    container.innerHTML = countries.map(country => {
      const lists = nameLists[country.id] || { male: [], female: [], surnames: [] };
      const totalNames = (lists.male?.length || 0) + (lists.female?.length || 0) + (lists.surnames?.length || 0);
      return `
        <div class="country-card" data-country-id="${country.id}">
          <div class="country-header" data-country-id="${country.id}">
            <span>${escapeHtml(country.displayName)}</span>
            <span>${selectedCountryId === country.id ? '✓' : '▼'}</span>
          </div>
          <div class="country-content" data-country-id="${country.id}">
            <div style="margin-bottom:12px;">
              <button class="btn small edit-names-btn" data-country-id="${country.id}">✏️ Edit Names</button>
            </div>
            <div style="font-size:0.7rem; color:var(--dim);">
              <div>👨 Male: ${lists.male?.length || 0}</div>
              <div>👩 Female: ${lists.female?.length || 0}</div>
              <div>👪 Surnames: ${lists.surnames?.length || 0}</div>
              ${totalNames === 0 ? '<div style="margin-top:8px; color:#c88040;">⚠️ No names yet. Click Edit to add.</div>' : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    // Expand/collapse handlers
    document.querySelectorAll('.country-header').forEach(header => {
      header.removeEventListener('click', header._clickHandler);
      header._clickHandler = (e) => {
        e.stopPropagation();
        const countryId = header.getAttribute('data-country-id');
        const content = document.querySelector(`.country-content[data-country-id="${countryId}"]`);
        if (content) {
          content.classList.toggle('expanded');
          const arrow = header.querySelector('span:last-child');
          if (arrow) arrow.textContent = content.classList.contains('expanded') ? '▲' : '▼';
        }
      };
      header.addEventListener('click', header._clickHandler);
    });
    
    // Edit buttons
    document.querySelectorAll('.edit-names-btn').forEach(btn => {
      btn.removeEventListener('click', btn._editHandler);
      btn._editHandler = (e) => {
        e.stopPropagation();
        const countryId = btn.getAttribute('data-country-id');
        selectedCountryId = countryId;
        renderCharacterNamesTab();
        // Switch to character tab
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const charTab = document.querySelector('.tab-btn[data-tab="character"]');
        if (charTab) charTab.classList.add('active');
        renderCountryList(); // refresh checkmark
      };
      btn.addEventListener('click', btn._editHandler);
    });
  }
  
  // ==================== CHARACTER NAMES TAB ====================
  function renderCharacterNamesTab() {
    if (!selectedCountryId) {
      document.getElementById('panelContent').innerHTML = `
        <div class="empty-state">
          🌍 Select a country from the left sidebar to manage its names.
        </div>
      `;
      return;
    }
    
    const country = countries.find(c => c.id === selectedCountryId);
    if (!masterData.data.nameLists[selectedCountryId]) {
      masterData.data.nameLists[selectedCountryId] = { male: [], female: [], surnames: [] };
    }
    const lists = masterData.data.nameLists[selectedCountryId];
    
    const content = `
      <div style="max-width: 900px; margin: 0 auto;">
        <h2 style="margin-bottom: 20px;">${escapeHtml(country?.displayName || 'Country')} — Name Lists</h2>
        
        <div class="name-section">
          <div class="section-title">👨 Male Given Names</div>
          <div class="name-grid" id="maleNamesList">
            ${(lists.male || []).map(name => `<span class="name-tag">${escapeHtml(name)} <button class="delete-name" data-name="${escapeHtml(name)}" data-type="male">✖</button></span>`).join('')}
          </div>
          <div class="upload-area" data-type="male">📂 Upload male names (one per line)<input type="file" accept=".txt" style="display:none;"></div>
        </div>
        
        <div class="name-section">
          <div class="section-title">👩 Female Given Names</div>
          <div class="name-grid" id="femaleNamesList">
            ${(lists.female || []).map(name => `<span class="name-tag">${escapeHtml(name)} <button class="delete-name" data-name="${escapeHtml(name)}" data-type="female">✖</button></span>`).join('')}
          </div>
          <div class="upload-area" data-type="female">📂 Upload female names (one per line)<input type="file" accept=".txt" style="display:none;"></div>
        </div>
        
        <div class="name-section">
          <div class="section-title">👪 Surnames</div>
          <div class="name-grid" id="surnamesList">
            ${(lists.surnames || []).map(name => `<span class="name-tag">${escapeHtml(name)} <button class="delete-name" data-name="${escapeHtml(name)}" data-type="surnames">✖</button></span>`).join('')}
          </div>
          <div class="upload-area" data-type="surnames">📂 Upload surnames (one per line)<input ty

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Locations Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    .locations-app {
      display: flex;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    .sidebar {
      width: 340px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .sidebar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .place-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .tree-node {
      margin-left: 0;
      list-style: none;
    }
    
    .tree-item {
      margin: 4px 0;
    }
    
    .tree-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
    }
    
    .tree-header:hover {
      background: var(--bg3);
    }
    
    .tree-header .toggle-icon {
      width: 18px;
      font-size: 0.7rem;
      color: var(--dim);
    }
    
    .tree-header .capital-star {
      color: gold;
      font-size: 0.8rem;
    }
    
    .tree-header .place-name {
      flex: 1;
      font-size: 0.8rem;
    }
    
    .tree-header .status-badge {
      font-size: 0.55rem;
      padding: 2px 6px;
      border-radius: 12px;
      background: var(--bg);
    }
    
    .tree-header .id-hint {
      font-size: 0.5rem;
      color: var(--tmut);
      font-family: monospace;
      margin-left: 4px;
    }
    
    .tree-children {
      margin-left: 24px;
      overflow: hidden;
    }
    
    .tree-children.collapsed {
      display: none;
    }
    
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      padding: 0 16px;
    }
    
    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      color: var(--dim);
      border-bottom: 2px solid transparent;
    }
    
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .view-section, .edit-section {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .info-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    
    .info-value {
      font-size: 0.85rem;
      color: var(--text);
    }
    
    .form-group {
      margin-bottom: 18px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 6px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    
    .empty-selection {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    
    .warning-badge {
      background: rgba(200,112,64,0.2);
      border: 1px solid var(--warn);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 0.7rem;
      margin-bottom: 16px;
    }
    
    .helper-text {
      font-size: 0.6rem;
      color: var(--tmut);
      margin-top: 4px;
      font-style: italic;
    }
    
    .id-display {
      font-family: monospace;
      font-size: 0.6rem;
      color: var(--tmut);
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
    }
    
    /* Management Cards */
    .management-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    
    .management-header {
      padding: 16px 20px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .management-header h3 {
      margin: 0;
      font-size: 0.8rem;
    }
    
    .management-list {
      padding: 16px;
    }
    
    .management-item {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .management-item-info {
      flex: 1;
    }
    
    .management-item-name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--accent);
    }
    
    .management-item-details {
      font-size: 0.65rem;
      color: var(--dim);
      margin-top: 4px;
    }
    
    .management-item-actions {
      display: flex;
      gap: 8px;
    }
    
    .edit-mode {
      display: flex;
      gap: 8px;
      flex: 1;
      align-items: center;
    }
    
    .edit-mode input {
      flex: 1;
      padding: 6px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
    }
    
    @media (max-width: 768px) {
      .locations-app {
        flex-direction: column;
        height: auto;
      }
      .sidebar {
        width: 100%;
        max-height: 300px;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
      .management-item {
        flex-direction: column;
        align-items: stretch;
      }
      .management-item-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">🗺️ LOCATIONS MANAGER</div>
  <div style="flex:1"></div>
  <button id="importLocBtn" class="tb-btn">📂 Import JSON</button>
  <button id="exportLocBtn" class="tb-btn primary">💾 Export JSON</button>
</div>

<div class="locations-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🏛️ PLACE HIERARCHY</h3>
      <div class="sidebar-actions">
        <button id="addTypeBtn" class="btn small">+ Add Type</button>
        <button id="addGovBtn" class="btn small">+ Add Government</button>
        <button id="addPlaceBtn" class="btn primary small">+ Add Place</button>
      </div>
    </div>
    <div class="place-list" id="placeList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="view">📖 View</button>
      <button class="tab-btn" data-tab="edit">✏️ Edit</button>
      <button class="tab-btn" data-tab="manage">⚙️ Manage Types</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-selection">Select a place from the list to view or edit details</div>
    </div>
  </div>
</div>

<script>
  // ==================== UNIFIED DATA STRUCTURE ====================
  let masterData = {
    version: "2.0",
    lastUpdated: new Date().toISOString(),
    data: {
      characters: [],
      locationTypes: [],
      governments: [],
      places: [],
      ranks: [],
      roles: [],
      nameLists: {},
      cityNameParts: { prefixes: [], roots: [], suffixes: [] },
      currentYear: 1250
    }
  };
  
  let currentPlaceId = null;
  
  function generateId() { return 'loc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  // ==================== LOAD FROM UNIFIED STORAGE ====================
  function loadMasterData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        masterData = {
          version: parsed.version || "2.0",
          lastUpdated: parsed.lastUpdated || new Date().toISOString(),
          data: {
            characters: parsed.data?.characters || [],
            locationTypes: parsed.data?.locationTypes || [],
            governments: parsed.data?.governments || [],
            places: parsed.data?.places || [],
            ranks: parsed.data?.ranks || [],
            roles: parsed.data?.roles || [],
            nameLists: parsed.data?.nameLists || {},
            cityNameParts: parsed.data?.cityNameParts || { prefixes: [], roots: [], suffixes: [] },
            currentYear: parsed.data?.currentYear || 1250
          }
        };
      } catch(e) { console.error('Error loading master data', e); }
    } else {
      // Initialize with default data
      masterData.data.locationTypes = [
        { id: generateId(), displayName: 'Country', priority: 1 },
        { id: generateId(), displayName: 'District', priority: 2 },
        { id: generateId(), displayName: 'Town', priority: 3 },
        { id: generateId(), displayName: 'Compound', priority: 4 }
      ];
      
      masterData.data.governments = [
        { id: generateId(), displayName: 'Monarchy', priority: 1, leaderRankId: null },
        { id: generateId(), displayName: 'Chiefdom', priority: 2, leaderRankId: null },
        { id: generateId(), displayName: 'Republic', priority: 3, leaderRankId: null }
      ];
      
      masterData.data.places = [];
      saveMasterData();
    }
  }
  
  function saveMasterData() {
    masterData.lastUpdated = new Date().toISOString();
    localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
  }
  
  // ==================== GETTERS ====================
  function getLocationTypes() { return masterData.data.locationTypes; }
  function setLocationTypes(types) { masterData.data.locationTypes = types; saveMasterData(); }
  
  function getGovernments() { return masterData.data.governments; }
  function setGovernments(govs) { masterData.data.governments = govs; saveMasterData(); }
  
  function getPlaces() { return masterData.data.places; }
  function setPlaces(places) { masterData.data.places = places; saveMasterData(); }
  
  function getPlaceById(id) { return getPlaces().find(p => p.id === id); }
  function getTypeById(id) { return getLocationTypes().find(t => t.id === id); }
  function getGovernmentById(id) { return getGovernments().find(g => g.id === id); }
  
  // ==================== HIERARCHY BUILDING ====================
  function buildHierarchy() {
    const places = getPlaces();
    const placeMap = new Map();
    places.forEach(p => placeMap.set(p.id, { ...p, children: [] }));
    const roots = [];
    places.forEach(p => {
      if (p.parentId && placeMap.has(p.parentId)) {
        placeMap.get(p.parentId).children.push(placeMap.get(p.id));
      } else {
        roots.push(placeMap.get(p.id));
      }
    });
    const sortChildren = (node) => {
      node.children.sort((a, b) => a.displayName.localeCompare(b.displayName));
      node.children.forEach(sortChildren);
    };
    roots.forEach(sortChildren);
    return roots;
  }
  
  function renderPlaceList() {
    const container = document.getElementById('placeList');
    const hierarchy = buildHierarchy();
    container.innerHTML = renderTree(hierarchy, 0);
    attachTreeEvents();
  }
  
  function renderTree(nodes, level) {
    if (!nodes.length) return '<div class="empty-msg" style="padding:20px;">No places defined. Click "+ Add Place" to begin.</div>';
    return `<ul class="tree-node" style="list-style:none; padding-left:0;">${nodes.map(node => renderNode(node, level)).join('')}</ul>`;
  }
  
  function renderNode(node, level) {
    const statusColors = { active: '#4a9060', disputed: '#c87040', abandoned: '#8f5e5e', occupied: '#8b4040' };
    const star = node.isCapital ? '<span class="capital-star">★</span>' : '';
    const statusText = node.status || 'active';
    const shortId = node.id.slice(-6);
    
    return `
      <li class="tree-item" data-place-id="${node.id}">
        <div class="tree-header" data-place-id="${node.id}">
          <span class="toggle-icon" data-toggle>${node.children.length ? '▼' : '○'}</span>
          ${star}
          <span class="place-name">${escapeHtml(node.displayName)}</span>
          <span class="id-hint" title="Permanent ID: ${node.id}">#${shortId}</span>
          <span class="status-badge" style="border-color:${statusColors[statusText]}; color:${statusColors[statusText]}">${statusText}</span>
        </div>
        ${node.children.length ? `<div class="tree-children" data-children="${node.id}">${renderTree(node.children, level + 1)}</div>` : ''}
      </li>
    `;
  }
  
  function attachTreeEvents() {
    document.querySelectorAll('.tree-header').forEach(header => {
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        const placeId = header.getAttribute('data-place-id');
        if (placeId) selectPlace(placeId);
      });
    });
    document.querySelectorAll('.toggle-icon').forEach(icon => {
      icon.addEventListener('click', (e) => {
        e.stopPropagation();
        const childrenDiv = icon.closest('.tree-header')?.nextElementSibling;
        if (childrenDiv && childrenDiv.classList) {
          childrenDiv.classList.toggle('collapsed');
          icon.textContent = childrenDiv.classList.contains('collapsed') ? '▶' : '▼';
        }
      });
    });
  }
  
  // ==================== SELECT PLACE ====================
  function selectPlace(placeId) {
    currentPlaceId = placeId;
    renderPlaceList();
    renderViewTab();
  }
  
  function renderViewTab() {
    const place = getPlaceById(currentPlaceId);
    if (!place) {
      document.getElementById('panelContent').innerHTML = '<div class="empty-selection">Select a place from the list to view details</div>';
      return;
    }
    
    const type = getTypeById(place.typeId);
    const parent = getPlaceById(place.parentId);
    const gov = getGovernmentById(place.governmentId);
    
    const content = `
      <div class="view-section">
        <h2 style="margin-bottom:20px;">${escapeHtml(place.displayName)}</h2>
        <div class="warning-badge">
          🔒 Permanent ID: <code class="id-display">${place.id}</code><br>
          <small>Characters reference this ID. You can rename this place freely without breaking any links.</small>
        </div>
        <div class="info-grid">
          <div class="info-label">Type</div><div class="info-value">${type ? type.displayName : 'Unknown'} (Priority ${type?.priority || '-'})</div>
          <div class="info-label">Parent</div><div class="info-value">${parent ? parent.displayName : '— Root —'}</div>
          <div class="info-label">Status</div><div class="info-value">${place.status || 'active'}</div>
          <div class="info-label">Capital</div><div class="info-value">${place.isCapital ? '✓ Yes' : '✗ No'}</div>
          <div class="info-label">Variable Key</div><div class="info-value">${place.variableKey || '— Not assignable —'}</div>
          <div class="info-label">Government</div><div class="info-value">${gov ? gov.displayName : '— None —'}</div>
          <div class="info-label">Subtype</div><div class="info-value">${place.subtype || '—'}</div>
          <div class="info-label">Economy</div><div class="info-value">${place.economy || '—'}</div>
          <div class="info-label">Main Export</div><div class="info-value">${place.export || '—'}</div>
          <div class="info-label">Notes</div><div class="info-value">${place.notes || '—'}</div>
        </div>
      </div>
    `;
    document.getElementById('panelContent').innerHTML = content;
  }
  
  function renderEditTab() {
    const place = getPlaceById(currentPlaceId);
    if (!place) {
      document.getElementById('panelContent').innerHTML = '<div class="empty-selection">Select a place to edit</div>';
      return;
    }
    
    const locationTypes = getLocationTypes();
    const places = getPlaces();
    const governments = getGovernments();
    
    const typeOptions = locationTypes.map(t => `<option value="${t.id}" ${place.typeId === t.id ? 'selected' : ''}>${escapeHtml(t.displayName)} (Prio ${t.priority})</option>`).join('');
    const parentOptions = `<option value="">— None (Root) —</option>${places.filter(p => p.id !== place.id).map(p => `<option value="${p.id}" ${place.parentId === p.id ? 'selected' : ''}>${escapeHtml(p.displayName)}</option>`).join('')}`;
    const govOptions = `<option value="">— None —</option>${governments.map(g => `<option value="${g.id}" ${place.governmentId === g.id ? 'selected' : ''}>${escapeHtml(g.displayName)}</option>`).join('')}`;
    
    const content = `
      <div class="edit-section">
        <div class="warning-badge">
          🔒 Permanent ID: <code class="id-display">${place.id}</code>
        </div>
        <form id="editPlaceForm">
          <div class="form-group">
            <label>Place Name</label>
            <input type="text" id="editDisplayName" value="${escapeHtml(place.displayName)}" required>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Type</label><select id="editTypeId">${typeOptions}</select></div>
            <div class="form-group"><label>Parent Place</label><select id="editParentId">${parentOptions}</select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Status</label><select id="editStatus">
              <option ${place.status === 'active' ? 'selected' : ''}>active</option>
              <option ${place.status === 'disputed' ? 'selected' : ''}>disputed</option>
              <option ${place.status === 'abandoned' ? 'selected' : ''}>abandoned</option>
              <option ${place.status === 'occupied' ? 'selected' : ''}>occupied</option>
            </select></div>
            <div class="form-group"><label><input type="checkbox" id="editIsCapital" ${place.isCapital ? 'checked' : ''}> Capital City</label></div>
          </div>
          <div class="form-group"><label>Variable Key</label><input type="text" id="editVariableKey" value="${place.variableKey || ''}"></div>
          <div class="form-row">
            <div class="form-group"><label>Government</label><select id="editGovernmentId">${govOptions}</select></div>
          </div>
          <div class="form-group"><label>Subtype</label><input type="text" id="editSubtype" value="${place.subtype || ''}"></div>
          <div class="form-row">
            <div class="form-group"><label>Economy</label><input type="text" id="editEconomy" value="${place.economy || ''}"></div>
            <div class="form-group"><label>Main Export</label><input type="text" id="editExport" value="${place.export || ''}"></div>
          </div>
          <div class="form-group"><label>Notes</label><textarea id="editNotes" rows="3">${place.notes || ''}</textarea></div>
          <div class="action-buttons">
            <button type="submit" class="btn primary">💾 Save</button>
            <button type="button" id="deletePlaceBtn" class="btn danger">🗑️ Delete</button>
          </div>
        </form>
      </div>
    `;
    document.getElementById('panelContent').innerHTML = content;
    
    document.getElementById('editPlaceForm').addEventListener('submit', (e) => {
      e.preventDefault();
      savePlaceEdit(place.id);
    });
    document.getElementById('deletePlaceBtn').addEventListener('click', () => deletePlace(place.id));
  }
  
  function savePlaceEdit(placeId) {
    const place = getPlaceById(placeId);
    if (!place) return;
    
    place.displayName = document.getElementById('editDisplayName').value;
    place.typeId = document.getElementById('editTypeId').value;
    place.parentId = document.getElementById('editParentId').value || null;
    place.status = document.getElementById('editStatus').value;
    place.isCapital = document.getElementById('editIsCapital').checked;
    place.variableKey = document.getElementById('editVariableKey').value || null;
    place.governmentId = document.getElementById('editGovernmentId').value || null;
    place.subtype = document.getElementById('editSubtype').value;
    place.economy = document.getElementById('editEconomy').value;
    place.export = document.getElementById('editExport').value;
    place.notes = document.getElementById('editNotes').value;
    
    setPlaces(getPlaces());
    renderPlaceList();
    selectPlace(placeId);
    showToast(`Place saved`);
  }
  
  function deletePlace(placeId) {
    if (!confirm('Delete this place and all its sub-places?')) return;
    const places = getPlaces();
    const toDelete = [placeId];
    const findChildren = (parentId) => {
      places.filter(p => p.parentId === parentId).forEach(child => {
        toDelete.push(child.id);
        findChildren(child.id);
      });
    };
    findChildren(placeId);
    setPlaces(places.filter(p => !toDelete.includes(p.id)));
    renderPlaceList();
    document.getElementById('panelContent').innerHTML = '<div class="empty-selection">Place deleted</div>';
    currentPlaceId = null;
  }
  
  // ==================== MANAGE TYPES (NEW) ====================
  function renderManageTab() {
    const locationTypes = getLocationTypes();
    const governments = getGovernments();
    
    const content = `
      <div class="manage-section">
        <div class="management-section">
          <div class="management-header">
            <h3>🏷️ Location Types</h3>
            <button id="addLocationTypeBtn" class="btn small primary">+ Add Type</button>
          </div>
          <div class="management-list" id="locationTypesList">
            ${renderLocationTypesList(locationTypes)}
          </div>
        </div>
        
        <div class="management-section">
          <div class="management-header">
            <h3>🏛️ Government Types</h3>
            <button id="addGovernmentTypeBtn" class="btn small primary">+ Add Government</button>
          </div>
          <div class="management-list" id="governmentsList">
            ${renderGovernmentsList(governments)}
          </div>
        </div>
      </div>
    `;
    
    document.getElementById('panelContent').innerHTML = content;
    
    document.getElementById('addLocationTypeBtn')?.addEventListener('click', () => addLocationType());
    document.getElementById('addGovernmentTypeBtn')?.addEventListener('click', () => addGovernmentType());
    
    attachTypeEditHandlers();
    attachGovernmentEditHandlers();
  }
  
  function renderLocationTypesList(types) {
    if (!types.length) {
      return '<div class="empty-state" style="padding:20px;">No location types defined. Click "Add Type" to create one.</div>';
    }
    
    return types.sort((a, b) => a.priority - b.priority).map(type => `
      <div class="management-item" data-type-id="${type.id}" data-type="location">
        <div class="management-item-info" id="view-mode-${type.id}">
          <div class="management-item-name">${escapeHtml(type.displayName)}</div>
          <div class="management-item-details">Priority: ${type.priority} | ID: ${type.id.slice(-6)}</div>
        </div>
        <div class="edit-mode" id="edit-mode-${type.id}" style="display:none;">
          <input type="text" id="edit-name-${type.id}" value="${escapeHtml(type.displayName)}" placeholder="Type name">
          <input type="number" id="edit-priority-${type.id}" value="${type.priority}" placeholder="Priority" style="width:80px;">
        </div>
        <div class="management-item-actions">
          <button class="btn small" data-action="edit" data-type-id="${type.id}" data-type="location">✏️ Edit</button>
          <button class="btn small danger" data-action="delete" data-type-id="${type.id}" data-type="location">🗑️ Delete</button>
          <button class="btn small success" data-action="save" data-type-id="${type.id}" data-type="location" style="display:none;">💾 Save</button>
          <button class="btn small" data-action="cancel" data-type-id="${type.id}" data-type="location" style="display:none;">Cancel</button>
        </div>
      </div>
    `).join('');
  }
  
  function renderGovernmentsList(govs) {
    if (!govs.length) {
      return '<div class="empty-state" style="padding:20px;">No government types defined. Click "Add Government" to create one.</div>';
    }
    
    return govs.sort((a, b) => a.priority - b.priority).map(gov => `
      <div class="management-item" data-gov-id="${gov.id}" data-type="government">
        <div class="management-item-info" id="view-mode-${gov.id}">
          <div class="management-item-name">${escapeHtml(gov.displayName)}</div>
          <div class="management-item-details">Priority: ${gov.priority} | ID: ${gov.id.slice(-6)}</div>
        </div>
        <div class="edit-mode" id="edit-mode-${gov.id}" style="display:none;">
          <input type="text" id="edit-name-${gov.id}" value="${escapeHtml(gov.displayName)}" placeholder="Government name">
          <input type="number" id="edit-priority-${gov.id}" value="${gov.priority}" placeholder="Priority" style="width:80px;">
        </div>
        <div class="management-item-actions">
          <button class="btn small" data-action="edit" data-gov-id="${gov.id}" data-type="government">✏️ Edit</button>
          <button class="btn small danger" data-action="delete" data-gov-id="${gov.id}" data-type="government">🗑️ Delete</button>
          <button class="btn small success" data-action="save" data-gov-id="${gov.id}" data-type="government" style="display:none;">💾 Save</button>
          <button class="btn small" data-action="cancel" data-gov-id="${gov.id}" data-type="government" style="display:none;">Cancel</button>
        </div>
      </div>
    `).join('');
  }
  
  function attachTypeEditHandlers() {
    // Edit button handlers
    document.querySelectorAll('[data-action="edit"][data-type="location"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const typeId = btn.getAttribute('data-type-id');
        document.getElementById(`view-mode-${typeId}`).style.display = 'none';
        document.getElementById(`edit-mode-${typeId}`).style.display = 'flex';
        btn.style.display = 'none';
        btn.nextElementSibling.style.display = 'none'; // delete button
        btn.nextElementSibling.nextElementSibling.style.display = 'inline-block'; // save button
        btn.nextElementSibling.nextElementSibling.nextElementSibling.style.display = 'inline-block'; // cancel button
      });
    });
    
    // Save button handlers
    document.querySelectorAll('[data-action="save"][data-type="location"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const typeId = btn.getAttribute('data-type-id');
        const newName = document.getElementById(`edit-name-${typeId}`).value.trim();
        const newPriority = parseInt(document.getElementById(`edit-priority-${typeId}`).value);
        
        if (!newName) {
          showToast('Name cannot be empty');
          return;
        }
        
        const types = getLocationTypes();
        const typeIndex = types.findIndex(t => t.id === typeId);
        if (typeIndex !== -1) {
          types[typeIndex].displayName = newName;
          types[typeIndex].priority = newPriority;
          setLocationTypes(types);
          showToast(`Updated location type to "${newName}"`);
          renderManageTab();
        }
      });
    });
    
    // Cancel button handlers
    document.querySelectorAll('[data-action="cancel"][data-type="location"]').forEach(btn => {
      btn.addEventListener('click', () => {
        renderManageTab();
      });
    });
    
    // Delete button handlers
    document.querySelectorAll('[data-action="delete"][data-type="location"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const typeId = btn.getAttribute('data-type-id');
        const type = getLocationTypes().find(t => t.id === typeId);
        
        // Check if any places use this type
        const placesUsingType = getPlaces().filter(p => p.typeId === typeId);
        if (placesUsingType.length) {
          if (!confirm(`Warning: ${placesUsingType.length} place(s) use this type. Deleting it will remove the type reference from those places. Continue?`)) {
            return;
          }
          // Remove type reference from places
          placesUsingType.forEach(place => {
            place.typeId = null;
          });
          setPlaces(getPlaces());
        }
        
        if (confirm(`Delete location type "${type.displayName}"?`)) {
          const types = getLocationTypes().filter(t => t.id !== typeId);
          setLocationTypes(types);
          showToast(`Deleted location type "${type.displayName}"`);
          renderManageTab();
        }
      });
    });
  }
  
  function attachGovernmentEditHandlers() {
    // Edit button handlers
    document.querySelectorAll('[data-action="edit"][data-type="government"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const govId = btn.getAttribute('data-gov-id');
        document.getElementById(`view-mode-${govId}`).style.display = 'none';
        document.getElementById(`edit-mode-${govId}`).style.display = 'flex';
        btn.style.display = 'none';
        btn.nextElementSibling.style.display = 'none'; // delete button
        btn.nextElementSibling.nextElementSibling.style.display = 'inline-block'; // save button
        btn.nextElementSibling.nextElementSibling.nextElementSibling.style.display = 'inline-block'; // cancel button
      });
    });
    
    // Save button handlers
    document.querySelectorAll('[data-action="save"][data-type="government"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const govId = btn.getAttribute('data-gov-id');
        const newName = document.getElementById(`edit-name-${govId}`).value.trim();
        const newPriority = parseInt(document.getElementById(`edit-priority-${govId}`).value);
        
        if (!newName) {
          showToast('Name cannot be empty');
          return;
        }
        
        const govs = getGovernments();
        const govIndex = govs.findIndex(g => g.id === govId);
        if (govIndex !== -1) {
          govs[govIndex].displayName = newName;
          govs[govIndex].priority = newPriority;
          setGovernments(govs);
          showToast(`Updated government to "${newName}"`);
          renderManageTab();
        }
      });
    });
    
    // Cancel button handlers
    document.querySelectorAll('[data-action="cancel"][data-type="government"]').forEach(btn => {
      btn.addEventListener('click', () => {
        renderManageTab();
      });
    });
    
    // Delete button handlers
    document.querySelectorAll('[data-action="delete"][data-type="government"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const govId = btn.getAttribute('data-gov-id');
        const gov = getGovernments().find(g => g.id === govId);
        
        // Check if any places use this government
        const placesUsingGov = getPlaces().filter(p => p.governmentId === govId);
        if (placesUsingGov.length) {
          if (!confirm(`Warning: ${placesUsingGov.length} place(s) use this government. Deleting it will remove the government reference from those places. Continue?`)) {
            return;
          }
          placesUsingGov.forEach(place => {
            place.governmentId = null;
          });
          setPlaces(getPlaces());
        }
        
        if (confirm(`Delete government type "${gov.displayName}"?`)) {
          const govs = getGovernments().filter(g => g.id !== govId);
          setGovernments(govs);
          showToast(`Deleted government "${gov.displayName}"`);
          renderManageTab();
        }
      });
    });
  }
  
  function addLocationType() {
    const name = prompt('Enter location type name (e.g., Region, Province, Barony):');
    if (!name) return;
    const priority = parseInt(prompt('Priority (1 = highest):', getLocationTypes().length + 1) || '10');
    const types = getLocationTypes();
    types.push({ id: generateId(), displayName: name, priority });
    setLocationTypes(types);
    renderManageTab();
    showToast(`Added location type: ${name}`);
  }
  
  function addGovernmentType() {
    const name = prompt('Enter government type name (e.g., Republic, Theocracy, Merchant League):');
    if (!name) return;
    const priority = parseInt(prompt('Priority (1 = highest):', getGovernments().length + 1) || '10');
    const govs = getGovernments();
    govs.push({ id: generateId(), displayName: name, priority, leaderRankId: null });
    setGovernments(govs);
    renderManageTab();
    showToast(`Added government: ${name}`);
  }
  
  function addPlace() {
    const name = prompt('Place name:');
    if (!name) return;
    
    const types = getLocationTypes();
    if (!types.length) { alert('Please add a location type first.'); return; }
    
    const typeOptions = types.map(t => `${t.displayName} (Prio ${t.priority})`).join(', ');
    const typeName = prompt(`Select type:\n${typeOptions}`);
    const type = types.find(t => t.displayName.toLowerCase() === typeName?.toLowerCase());
    if (!type) { alert('Invalid type'); return; }
    
    const places = getPlaces();
    const parentOptions = places.map(p => p.displayName).join(', ');
    const parentName = prompt(`Parent place (optional):\n${parentOptions || 'No existing places'}`);
    const parent = places.find(p => p.displayName.toLowerCase() === parentName?.toLowerCase());
    
    const variableKey = prompt('Variable key:', name.toLowerCase().replace(/\s/g, '_'));
    
    const newPlace = {
      id: generateId(),
      displayName: name,
      typeId: type.id,
      parentId: parent?.id || null,
      variableKey: variableKey || null,
      status: 'active',
      isCapital: false,
      leaderId: null,
      leaderHistory: [],
      subtype: '',
      economy: '',
      export: '',
      notes: '',
      governmentId: null,
      nameListId: null,
      cityNameStyle: null
    };
    
    places.push(newPlace);
    setPlaces(places);
    renderPlaceList();
    selectPlace(newPlace.id);
    showToast(`Added place: ${name}`);
  }
  
  // ==================== IMPORT/EXPORT ====================
  function exportData() {
    const exportObj = {
      type: "master",
      version: "2.0",
      exportDate: new Date().toISOString(),
      data: masterData.data
    };
    const dataStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_master_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Master data exported');
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          let newMasterData = null;
          
          if (imported.type === "master" && imported.data) {
            newMasterData = imported;
          } else if (imported.data && (imported.data.places || imported.data.locationTypes)) {
            newMasterData = imported;
          } else if (imported.places || imported.locationTypes) {
            newMasterData = {
              type: "master",
              version: "2.0",
              data: {
                ...masterData.data,
                places: imported.places || masterData.data.places,
                locationTypes: imported.locationTypes || masterData.data.locationTypes,
                governments: imported.governments || masterData.data.governments
              }
            };
          }
          
          if (newMasterData) {
            // Merge data
            if (newMasterData.data.places) {
              const currentPlaces = masterData.data.places;
              newMasterData.data.places.forEach(importedPlace => {
                const existing = currentPlaces.find(p => p.id === importedPlace.id);
                if (existing) Object.assign(existing, importedPlace);
                else currentPlaces.push(importedPlace);
              });
            }
            if (newMasterData.data.locationTypes) {
              const currentTypes = masterData.data.locationTypes;
              newMasterData.data.locationTypes.forEach(importedType => {
                const existing = currentTypes.find(t => t.id === importedType.id);
                if (existing) Object.assign(existing, importedType);
                else currentTypes.push(importedType);
              });
            }
            if (newMasterData.data.governments) {
              const currentGovs = masterData.data.governments;
              newMasterData.data.governments.forEach(importedGov => {
                const existing = currentGovs.find(g => g.id === importedGov.id);
                if (existing) Object.assign(existing, importedGov);
                else currentGovs.push(importedGov);
              });
            }
            
            saveMasterData();
            renderPlaceList();
            showToast('Data imported and merged successfully');
          } else {
            alert('Unable to parse file format');
          }
        } catch(err) { alert('Invalid JSON: ' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
  }
  
  // ==================== INIT ====================
  function init() {
    loadMasterData();
    renderPlaceList();
    
    document.getElementById('addTypeBtn').addEventListener('click', addLocationType);
    document.getElementById('addGovBtn').addEventListener('click', addGovernmentType);
    document.getElementById('addPlaceBtn').addEventListener('click', addPlace);
    document.getElementById('importLocBtn').addEventListener('click', importData);
    document.getElementById('exportLocBtn').addEventListener('click', exportData);
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.getAttribute('data-tab');
        if (tab === 'view' && currentPlaceId) renderViewTab();
        else if (tab === 'edit' && currentPlaceId) renderEditTab();
        else if (tab === 'manage') renderManageTab();
        else if (!currentPlaceId && (tab === 'view' || tab === 'edit')) {
          document.getElementById('panelContent').innerHTML = '<div class="empty-selection">Select a place from the list first</div>';
        }
      });
    });
    
    window.addEventListener('storage', (e) => {
      if (e.key === 'stillwaters_master') {
        loadMasterData();
        renderPlaceList();
        if (currentPlaceId && getPlaceById(currentPlaceId)) renderViewTab();
      }
    });
  }
  
  init();
</script>

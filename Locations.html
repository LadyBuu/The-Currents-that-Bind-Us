<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Locations Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    .locations-app {
      display: flex;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    .sidebar {
      width: 340px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .sidebar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .place-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    .tree-node {
      margin-left: 0;
      list-style: none;
    }
    
    .tree-item {
      margin: 4px 0;
    }
    
    .tree-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
    }
    
    .tree-header:hover {
      background: var(--bg3);
    }
    
    .tree-header .toggle-icon {
      width: 18px;
      font-size: 0.7rem;
      color: var(--dim);
    }
    
    .tree-header .capital-star {
      color: gold;
      font-size: 0.8rem;
    }
    
    .tree-header .place-name {
      flex: 1;
      font-size: 0.8rem;
    }
    
    .tree-header .status-badge {
      font-size: 0.55rem;
      padding: 2px 6px;
      border-radius: 12px;
      background: var(--bg);
    }
    
    .tree-header .id-hint {
      font-size: 0.5rem;
      color: var(--tmut);
      font-family: monospace;
      margin-left: 4px;
    }
    
    .tree-children {
      margin-left: 24px;
      overflow: hidden;
    }
    
    .tree-children.collapsed {
      display: none;
    }
    
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      padding: 0 16px;
    }
    
    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      color: var(--dim);
      border-bottom: 2px solid transparent;
    }
    
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .view-section, .edit-section {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .info-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    
    .info-value {
      font-size: 0.85rem;
      color: var(--text);
    }
    
    .population-stat {
      background: var(--bg3);
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid var(--border);
    }
    
    .form-group {
      margin-bottom: 18px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 6px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    
    .empty-selection {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    
    .warning-badge {
      background: rgba(200,112,64,0.2);
      border: 1px solid var(--warn);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 0.7rem;
      margin-bottom: 16px;
    }
    
    .helper-text {
      font-size: 0.6rem;
      color: var(--tmut);
      margin-top: 4px;
      font-style: italic;
    }
    
    .id-display {
      font-family: monospace;
      font-size: 0.6rem;
      color: var(--tmut);
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
    }
    
    @media (max-width: 768px) {
      .locations-app {
        flex-direction: column;
        height: auto;
      }
      .sidebar {
        width: 100%;
        max-height: 300px;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">🗺️ LOCATIONS MANAGER</div>
  <div style="flex:1"></div>
  <button id="importLocBtn" class="tb-btn">📂 Import JSON</button>
  <button id="exportLocBtn" class="tb-btn primary">💾 Export JSON</button>
</div>

<div class="locations-app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>🏛️ PLACE HIERARCHY</h3>
      <div class="sidebar-actions">
        <button id="addTypeBtn" class="btn small">+ Add Type</button>
        <button id="addGovBtn" class="btn small">+ Add Government</button>
        <button id="addPlaceBtn" class="btn primary small">+ Add Place</button>
      </div>
    </div>
    <div class="place-list" id="placeList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="view">📖 View</button>
      <button class="tab-btn" data-tab="edit">✏️ Edit</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-selection">Select a place from the list to view or edit details</div>
    </div>
  </div>
</div>

<script>
  // ==================== UNIFIED DATA STRUCTURE ====================
  let masterData = {
    version: "2.0",
    lastUpdated: new Date().toISOString(),
    data: {
      characters: [],
      locationTypes: [],
      governments: [],
      places: [],
      ranks: [],
      roles: [],
      nameLists: {},
      cityNameParts: { prefixes: [], roots: [], suffixes: [] },
      currentYear: 1250
    }
  };
  
  let currentPlaceId = null;
  
  function generateId() { return 'loc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  // ==================== LOAD FROM UNIFIED STORAGE ====================
  function loadMasterData() {
    const stored = localStorage.getItem('stillwaters_master');
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        masterData = {
          version: parsed.version || "2.0",
          lastUpdated: parsed.lastUpdated || new Date().toISOString(),
          data: {
            characters: parsed.data?.characters || [],
            locationTypes: parsed.data?.locationTypes || [],
            governments: parsed.data?.governments || [],
            places: parsed.data?.places || [],
            ranks: parsed.data?.ranks || [],
            roles: parsed.data?.roles || [],
            nameLists: parsed.data?.nameLists || {},
            cityNameParts: parsed.data?.cityNameParts || { prefixes: [], roots: [], suffixes: [] },
            currentYear: parsed.data?.currentYear || 1250
          }
        };
      } catch(e) { console.error('Error loading master data', e); }
    } else {
      // Initialize with default data
      const countryId = generateId();
      const districtId = generateId();
      const townId = generateId();
      
      masterData.data.locationTypes = [
        { id: generateId(), displayName: 'Country', priority: 1 },
        { id: generateId(), displayName: 'District', priority: 2 },
        { id: generateId(), displayName: 'Town', priority: 3 },
        { id: generateId(), displayName: 'Compound', priority: 4 }
      ];
      
      masterData.data.governments = [
        { id: generateId(), displayName: 'Monarchy', priority: 1, leaderRankId: null },
        { id: generateId(), displayName: 'Chiefdom', priority: 2, leaderRankId: null },
        { id: generateId(), displayName: 'Republic', priority: 3, leaderRankId: null }
      ];
      
      masterData.data.places = [
        { 
          id: countryId, displayName: 'Aethelgard', typeId: masterData.data.locationTypes[0].id, parentId: null, 
          variableKey: 'aethelgard', status: 'active', isCapital: true, leaderId: null, 
          leaderHistory: [], subtype: 'Imperial Seat', economy: 'Trade hub', 
          export: 'Textiles, Grain', notes: 'Heart of the realm', governmentId: masterData.data.governments[0].id,
          nameListId: null, cityNameStyle: null
        },
        { 
          id: districtId, displayName: 'Ironhold', typeId: masterData.data.locationTypes[1].id, parentId: countryId, 
          variableKey: 'ironhold', status: 'active', isCapital: false, leaderId: null, 
          leaderHistory: [], subtype: 'Mining region', economy: 'Mining', 
          export: 'Iron ore', notes: '', governmentId: null,
          nameListId: null, cityNameStyle: null
        },
        { 
          id: townId, displayName: 'Riversmeet', typeId: masterData.data.locationTypes[2].id, parentId: districtId, 
          variableKey: 'riversmeet', status: 'active', isCapital: false, leaderId: null, 
          leaderHistory: [], subtype: 'Fishing village', economy: 'Fishing', 
          export: 'Fish', notes: '', governmentId: null,
          nameListId: null, cityNameStyle: null
        }
      ];
      
      saveMasterData();
    }
  }
  
  function saveMasterData() {
    masterData.lastUpdated = new Date().toISOString();
    localStorage.setItem('stillwaters_master', JSON.stringify(masterData));
  }
  
  // ==================== GETTERS ====================
  function getLocationTypes() { return masterData.data.locationTypes; }
  function setLocationTypes(types) { masterData.data.locationTypes = types; saveMasterData(); }
  
  function getGovernments() { return masterData.data.governments; }
  function setGovernments(govs) { masterData.data.governments = govs; saveMasterData(); }
  
  function getPlaces() { return masterData.data.places; }
  function setPlaces(places) { masterData.data.places = places; saveMasterData(); }
  
  function getPlaceById(id) { return getPlaces().find(p => p.id === id); }
  function getTypeById(id) { return getLocationTypes().find(t => t.id === id); }
  function getGovernmentById(id) { return getGovernments().find(g => g.id === id); }
  function getCharacterById(id) { return masterData.data.characters.find(c => c.id === id); }
  
  // ==================== NAME LIST HELPERS ====================
  function getNameListOptions(selectedId) {
    const nameLists = masterData.data.nameLists;
    const countriesWithLists = Object.keys(nameLists).filter(countryId => {
      const lists = nameLists[countryId];
      return lists && (lists.male?.length || lists.female?.length || lists.surnames?.length);
    });
    
    if (!countriesWithLists.length) {
      return '<option value="" disabled>No name lists found. Create in Names Manager first.</option>';
    }
    
    return countriesWithLists.map(countryId => {
      const country = getPlaceById(countryId);
      const lists = nameLists[countryId];
      const nameCount = (lists.male?.length || 0) + (lists.female?.length || 0) + (lists.surnames?.length || 0);
      const countryName = country ? country.displayName : countryId.slice(-6);
      return `<option value="${countryId}" ${selectedId === countryId ? 'selected' : ''}>${escapeHtml(countryName)} (${nameCount} names)</option>`;
    }).join('');
  }
  
  function generateRandomPlaceName(countryId, style) {
    const cityNameParts = masterData.data.cityNameParts;
    const nameLists = masterData.data.nameLists;
    
    let prefixes = [...(cityNameParts.prefixes || [])];
    let roots = [...(cityNameParts.roots || [])];
    let suffixes = [...(cityNameParts.suffixes || [])];
    
    if (countryId && nameLists[countryId]) {
      const countryLists = nameLists[countryId];
      if (countryLists.male?.length) prefixes = [...prefixes, ...countryLists.male];
      if (countryLists.female?.length) prefixes = [...prefixes, ...countryLists.female];
      if (countryLists.surnames?.length) roots = [...roots, ...countryLists.surnames];
    }
    
    if (!prefixes.length || !roots.length) return null;
    
    let name = '';
    switch(style) {
      case 'prefix_root':
        name = prefixes[Math.floor(Math.random() * prefixes.length)] + roots[Math.floor(Math.random() * roots.length)];
        break;
      case 'prefix_root_suffix':
        name = prefixes[Math.floor(Math.random() * prefixes.length)] + roots[Math.floor(Math.random() * roots.length)];
        if (suffixes.length) name += suffixes[Math.floor(Math.random() * suffixes.length)];
        break;
      case 'root_suffix':
        name = roots[Math.floor(Math.random() * roots.length)];
        if (suffixes.length) name += suffixes[Math.floor(Math.random() * suffixes.length)];
        break;
      case 'prefix_suffix':
        name = prefixes[Math.floor(Math.random() * prefixes.length)];
        if (suffixes.length) name += suffixes[Math.floor(Math.random() * suffixes.length)];
        break;
      default:
        name = prefixes[Math.floor(Math.random() * prefixes.length)] + roots[Math.floor(Math.random() * roots.length)];
    }
    
    return name.charAt(0).toUpperCase() + name.slice(1);
  }
  
  // ==================== HIERARCHY BUILDING ====================
  function buildHierarchy() {
    const places = getPlaces();
    const placeMap = new Map();
    places.forEach(p => placeMap.set(p.id, { ...p, children: [] }));
    const roots = [];
    places.forEach(p => {
      if (p.parentId && placeMap.has(p.parentId)) {
        placeMap.get(p.parentId).children.push(placeMap.get(p.id));
      } else {
        roots.push(placeMap.get(p.id));
      }
    });
    const sortChildren = (node) => {
      node.children.sort((a, b) => a.displayName.localeCompare(b.displayName));
      node.children.forEach(sortChildren);
    };
    roots.forEach(sortChildren);
    return roots;
  }
  
  function renderPlaceList() {
    const container = document.getElementById('placeList');
    const hierarchy = buildHierarchy();
    container.innerHTML = renderTree(hierarchy, 0);
    attachTreeEvents();
  }
  
  function renderTree(nodes, level) {
    if (!nodes.length) return '<div class="empty-msg" style="padding:20px;">No places defined. Click "+ Add Place" to begin.</div>';
    return `<ul class="tree-node" style="list-style:none; padding-left:0;">${nodes.map(node => renderNode(node, level)).join('')}</ul>`;
  }
  
  function renderNode(node, level) {
    const statusColors = { active: '#4a9060', disputed: '#c87040', abandoned: '#8f5e5e', occupied: '#8b4040' };
    const star = node.isCapital ? '<span class="capital-star">★</span>' : '';
    const statusText = node.status || 'active';
    const shortId = node.id.slice(-6);
    
    return `
      <li class="tree-item" data-place-id="${node.id}">
        <div class="tree-header" data-place-id="${node.id}">
          <span class="toggle-icon" data-toggle>${node.children.length ? '▼' : '○'}</span>
          ${star}
          <span class="place-name">${escapeHtml(node.displayName)}</span>
          <span class="id-hint" title="Permanent ID: ${node.id}">#${shortId}</span>
          <span class="status-badge" style="border-color:${statusColors[statusText]}; color:${statusColors[statusText]}">${statusText}</span>
        </div>
        ${node.children.length ? `<div class="tree-children" data-children="${node.id}">${renderTree(node.children, level + 1)}</div>` : ''}
      </li>
    `;
  }
  
  function attachTreeEvents() {
    document.querySelectorAll('.tree-header').forEach(header => {
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        const placeId = header.getAttribute('data-place-id');
        if (placeId) selectPlace(placeId);
      });
    });
    document.querySelectorAll('.toggle-icon').forEach(icon => {
      icon.addEventListener('click', (e) => {
        e.stopPropagation();
        const childrenDiv = icon.closest('.tree-header')?.nextElementSibling;
        if (childrenDiv && childrenDiv.classList) {
          childrenDiv.classList.toggle('collapsed');
          icon.textContent = childrenDiv.classList.contains('collapsed') ? '▶' : '▼';
        }
      });
    });
  }
  
  // ==================== SELECT PLACE & RENDER ====================
  function selectPlace(placeId) {
    currentPlaceId = placeId;
    renderPlaceList();
    renderViewTab();
  }
  
  function renderViewTab() {
    const place = getPlaceById(currentPlaceId);
    if (!place) return;
    
    const type = getTypeById(place.typeId);
    const parent = getPlaceById(place.parentId);
    const gov = getGovernmentById(place.governmentId);
    const leader = getCharacterById(place.leaderId);
    const nameListPlace = place.nameListId ? getPlaceById(place.nameListId) : null;
    
    const content = `
      <div class="view-section">
        <h2 style="margin-bottom:20px;">${escapeHtml(place.displayName)}</h2>
        <div class="warning-badge">
          🔒 Permanent ID: <code class="id-display">${place.id}</code><br>
          <small>Characters reference this ID. You can rename this place freely without breaking any links.</small>
        </div>
        <div class="info-grid">
          <div class="info-label">Type</div><div class="info-value">${type ? type.displayName : 'Unknown'} (Priority ${type?.priority || '-'})</div>
          <div class="info-label">Parent</div><div class="info-value">${parent ? parent.displayName : '— Root / Capital Region —'}</div>
          <div class="info-label">Status</div><div class="info-value">${place.status || 'active'}</div>
          <div class="info-label">Capital</div><div class="info-value">${place.isCapital ? '✓ Yes' : '✗ No'}</div>
          <div class="info-label">Variable Key</div><div class="info-value">${place.variableKey || '— Not assignable —'}</div>
          <div class="info-label">Government</div><div class="info-value">${gov ? gov.displayName : '— None —'}</div>
          <div class="info-label">Current Leader</div><div class="info-value">${leader ? leader.name : '— Vacant —'}</div>
          <div class="info-label">Name List</div><div class="info-value">${nameListPlace ? nameListPlace.displayName : (place.nameListId ? 'Custom list' : '— None —')}</div>
          <div class="info-label">Name Style</div><div class="info-value">${place.cityNameStyle || '— Default —'}</div>
          <div class="info-label">Subtype</div><div class="info-value">${place.subtype || '—'}</div>
          <div class="info-label">Economy</div><div class="info-value">${place.economy || '—'}</div>
          <div class="info-label">Main Export</div><div class="info-value">${place.export || '—'}</div>
          <div class="info-label">Notes</div><div class="info-value">${place.notes || '—'}</div>
        </div>
        ${place.leaderHistory?.length ? `<div class="info-grid"><div class="info-label">Former Leaders</div><div class="info-value">${place.leaderHistory.map(h => `${h.name} (${h.period})`).join(', ')}</div></div>` : ''}
      </div>
    `;
    document.getElementById('panelContent').innerHTML = content;
  }
  
  function renderEditTab() {
    const place = getPlaceById(currentPlaceId);
    if (!place) return;
    
    const locationTypes = getLocationTypes();
    const places = getPlaces();
    const governments = getGovernments();
    
    const typeOptions = locationTypes.map(t => `<option value="${t.id}" ${place.typeId === t.id ? 'selected' : ''}>${escapeHtml(t.displayName)} (Prio ${t.priority})</option>`).join('');
    const parentOptions = `<option value="">— None (Root) —</option>${places.filter(p => p.id !== place.id).map(p => `<option value="${p.id}" ${place.parentId === p.id ? 'selected' : ''}>${escapeHtml(p.displayName)}</option>`).join('')}`;
    const govOptions = `<option value="">— None —</option>${governments.map(g => `<option value="${g.id}" ${place.governmentId === g.id ? 'selected' : ''}>${escapeHtml(g.displayName)}</option>`).join('')}`;
    const nameListOptions = getNameListOptions(place.nameListId);
    
    const content = `
      <div class="edit-section">
        <div class="warning-badge">
          🔒 Permanent ID: <code class="id-display">${place.id}</code><br>
          <small>This ID never changes. All character assignments and references remain intact even if you rename the place.</small>
        </div>
        <form id="editPlaceForm">
          <div class="form-group">
            <label>Place Name (Display Name)</label>
            <div style="display: flex; gap: 8px;">
              <input type="text" id="editDisplayName" value="${escapeHtml(place.displayName)}" required style="flex:1;">
              <button type="button" id="randomizeNameBtn" class="btn small">🎲 Random</button>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Type</label><select id="editTypeId">${typeOptions}</select></div>
            <div class="form-group"><label>Parent Place</label><select id="editParentId">${parentOptions}</select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Status</label><select id="editStatus">
              <option ${place.status === 'active' ? 'selected' : ''}>active</option>
              <option ${place.status === 'disputed' ? 'selected' : ''}>disputed</option>
              <option ${place.status === 'abandoned' ? 'selected' : ''}>abandoned</option>
              <option ${place.status === 'occupied' ? 'selected' : ''}>occupied</option>
            </select></div>
            <div class="form-group"><label><input type="checkbox" id="editIsCapital" ${place.isCapital ? 'checked' : ''}> Capital City</label></div>
          </div>
          <div class="form-group"><label>Variable Key (for character assignment)</label><input type="text" id="editVariableKey" value="${place.variableKey || ''}" placeholder="e.g., aethelgard"></div>
          <div class="form-row">
            <div class="form-group"><label>Government Type</label><select id="editGovernmentId">${govOptions}</select></div>
            <div class="form-group"><label>Current Leader</label><select id="editLeaderId"><option value="">— Vacant —</option></select></div>
          </div>
          <div class="form-group">
            <label>🏷️ Name List for Places</label>
            <select id="editNameListId">
              <option value="">— None (manual naming only) —</option>
              ${nameListOptions}
            </select>
            <div class="helper-text">Assign a name list to generate random names for sub-locations in this area</div>
          </div>
          <div class="form-group">
            <label>🎲 Name Generation Style</label>
            <select id="editCityNameStyle">
              <option value="">— Default (Prefix+Root) —</option>
              <option value="prefix_root" ${place.cityNameStyle === 'prefix_root' ? 'selected' : ''}>Prefix + Root (e.g., Ashfield)</option>
              <option value="prefix_root_suffix" ${place.cityNameStyle === 'prefix_root_suffix' ? 'selected' : ''}>Prefix + Root + Suffix (e.g., Ashfieldia)</option>
              <option value="root_suffix" ${place.cityNameStyle === 'root_suffix' ? 'selected' : ''}>Root + Suffix (e.g., Fieldia)</option>
              <option value="prefix_suffix" ${place.cityNameStyle === 'prefix_suffix' ? 'selected' : ''}>Prefix + Suffix (e.g., Ashia)</option>
            </select>
            <div class="helper-text">How random names should be constructed</div>
          </div>
          <div class="form-group"><label>Subtype (e.g., market town, fishing village)</label><input type="text" id="editSubtype" value="${place.subtype || ''}"></div>
          <div class="form-row">
            <div class="form-group"><label>Economy</label><input type="text" id="editEconomy" value="${place.economy || ''}"></div>
            <div class="form-group"><label>Main Export</label><input type="text" id="editExport" value="${place.export || ''}"></div>
          </div>
          <div class="form-group"><label>Notes</label><textarea id="editNotes" rows="3">${place.notes || ''}</textarea></div>
          <div class="action-buttons">
            <button type="submit" class="btn primary">💾 Save Changes</button>
            <button type="button" id="deletePlaceBtn" class="btn danger">🗑️ Delete Place</button>
          </div>
        </form>
      </div>
    `;
    document.getElementById('panelContent').innerHTML = content;
    
    document.getElementById('randomizeNameBtn')?.addEventListener('click', () => {
      const nameListId = document.getElementById('editNameListId')?.value;
      const style = document.getElementById('editCityNameStyle')?.value;
      const randomName = generateRandomPlaceName(nameListId, style);
      if (randomName) {
        document.getElementById('editDisplayName').value = randomName;
        showToast(`Random name generated: ${randomName}`);
      } else {
        showToast('No name list available. Create one in Names Manager first.');
      }
    });
    
    document.getElementById('editPlaceForm').addEventListener('submit', (e) => {
      e.preventDefault();
      savePlaceEdit(place.id);
    });
    document.getElementById('deletePlaceBtn').addEventListener('click', () => deletePlace(place.id));
  }
  
  function savePlaceEdit(placeId) {
    const place = getPlaceById(placeId);
    if (!place) return;
    
    const newDisplayName = document.getElementById('editDisplayName').value;
    const oldName = place.displayName;
    place.displayName = newDisplayName;
    place.typeId = document.getElementById('editTypeId').value;
    place.parentId = document.getElementById('editParentId').value || null;
    place.status = document.getElementById('editStatus').value;
    place.isCapital = document.getElementById('editIsCapital').checked;
    place.variableKey = document.getElementById('editVariableKey').value || null;
    place.governmentId = document.getElementById('editGovernmentId').value || null;
    place.nameListId = document.getElementById('editNameListId')?.value || null;
    place.cityNameStyle = document.getElementById('editCityNameStyle')?.value || null;
    place.subtype = document.getElementById('editSubtype').value;
    place.economy = document.getElementById('editEconomy').value;
    place.export = document.getElementById('editExport').value;
    place.notes = document.getElementById('editNotes').value;
    
    setPlaces(getPlaces());
    renderPlaceList();
    selectPlace(placeId);
    showToast(oldName !== newDisplayName ? `Place renamed from "${oldName}" to "${newDisplayName}"` : `Place saved`);
  }
  
  function deletePlace(placeId) {
    if (!confirm('Delete this place and all its sub-places?')) return;
    const places = getPlaces();
    const toDelete = [placeId];
    const findChildren = (parentId) => {
      places.filter(p => p.parentId === parentId).forEach(child => {
        toDelete.push(child.id);
        findChildren(child.id);
      });
    };
    findChildren(placeId);
    setPlaces(places.filter(p => !toDelete.includes(p.id)));
    renderPlaceList();
    document.getElementById('panelContent').innerHTML = '<div class="empty-selection">Place deleted. Select another from the list.</div>';
    currentPlaceId = null;
  }
  
  // ==================== MODALS ====================
  function addLocationType() {
    const name = prompt('Enter type name:');
    if (!name) return;
    const priority = parseInt(prompt('Priority (1 = highest):', getLocationTypes().length + 1) || '10');
    const types = getLocationTypes();
    types.push({ id: generateId(), displayName: name, priority });
    setLocationTypes(types);
    renderPlaceList();
    showToast(`Added location type: ${name}`);
  }
  
  function addGovernment() {
    const name = prompt('Enter government type:');
    if (!name) return;
    const priority = parseInt(prompt('Priority:', getGovernments().length + 1) || '10');
    const govs = getGovernments();
    govs.push({ id: generateId(), displayName: name, priority, leaderRankId: null });
    setGovernments(govs);
    showToast(`Added government: ${name}`);
  }
  
  function addPlace() {
    let name = prompt('Place name (or leave blank for random):');
    if (!name || name.trim() === '') {
      const useRandom = confirm('Generate random name?');
      if (useRandom) {
        const randomName = generateRandomPlaceName(null, 'prefix_root');
        if (randomName) name = randomName;
        else name = prompt('Enter place name:', 'New Place');
        if (!name) return;
      } else {
        name = prompt('Enter place name:', 'New Place');
        if (!name) return;
      }
    }
    
    const types = getLocationTypes();
    if (!types.length) { alert('Please add a location type first.'); return; }
    
    const typeOptions = types.map(t => `${t.displayName} (Prio ${t.priority})`).join(', ');
    const typeName = prompt(`Select type:\n${typeOptions}`);
    const type = types.find(t => t.displayName.toLowerCase() === typeName?.toLowerCase());
    if (!type) { alert('Invalid type'); return; }
    
    const places = getPlaces();
    const parentOptions = places.map(p => p.displayName).join(', ');
    const parentName = prompt(`Parent place (optional):\n${parentOptions || 'No existing places'}`);
    const parent = places.find(p => p.displayName.toLowerCase() === parentName?.toLowerCase());
    
    const variableKey = prompt('Variable key:', name.toLowerCase().replace(/\s/g, '_'));
    
    const newPlace = {
      id: generateId(),
      displayName: name,
      typeId: type.id,
      parentId: parent?.id || null,
      variableKey: variableKey || null,
      status: 'active',
      isCapital: false,
      leaderId: null,
      leaderHistory: [],
      subtype: '',
      economy: '',
      export: '',
      notes: '',
      governmentId: null,
      nameListId: null,
      cityNameStyle: null
    };
    
    places.push(newPlace);
    setPlaces(places);
    renderPlaceList();
    selectPlace(newPlace.id);
    showToast(`Added place: ${name}`);
  }
  
  // ==================== IMPORT/EXPORT (UNIFIED) ====================
  function exportData() {
    const exportObj = {
      type: "locations",
      version: "2.0",
      exportDate: new Date().toISOString(),
      data: {
        locationTypes: getLocationTypes(),
        governments: getGovernments(),
        places: getPlaces()
      }
    };
    const dataStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `stillwaters_locations_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Locations exported successfully');
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          let newTypes = null, newGovs = null, newPlaces = null;
          
          // Case 1: New unified format with type field
          if (imported.type === 'locations' && imported.data) {
            newTypes = imported.data.locationTypes;
            newGovs = imported.data.governments;
            newPlaces = imported.data.places;
          }
          // Case 2: Old format with separate arrays
          else if (imported.locationTypes || imported.governments || imported.places) {
            newTypes = imported.locationTypes;
            newGovs = imported.governments;
            newPlaces = imported.places;
          }
          // Case 3: Master data format
          else if (imported.data && (imported.data.locationTypes || imported.data.places)) {
            newTypes = imported.data.locationTypes;
            newGovs = imported.data.governments;
            newPlaces = imported.data.places;
          }
          
          // MERGE location types
          if (newTypes && newTypes.length) {
            const currentTypes = getLocationTypes();
            newTypes.forEach(importedType => {
              const existing = currentTypes.find(t => t.id === importedType.id);
              if (!existing && importedType.id) currentTypes.push(importedType);
              else if (!existing) currentTypes.push({ ...importedType, id: generateId() });
            });
            setLocationTypes(currentTypes);
          }
          
          // MERGE governments
          if (newGovs && newGovs.length) {
            const currentGovs = getGovernments();
            newGovs.forEach(importedGov => {
              const existing = currentGovs.find(g => g.id === importedGov.id);
              if (!existing && importedGov.id) currentGovs.push(importedGov);
              else if (!existing) currentGovs.push({ ...importedGov, id: generateId() });
            });
            setGovernments(currentGovs);
          }
          
          // MERGE places
          if (newPlaces && newPlaces.length) {
            const currentPlaces = getPlaces();
            newPlaces.forEach(importedPlace => {
              const existing = currentPlaces.find(p => p.id === importedPlace.id);
              if (existing) {
                Object.assign(existing, importedPlace);
              } else {
                if (!importedPlace.id) importedPlace.id = generateId();
                currentPlaces.push(importedPlace);
              }
            });
            setPlaces(currentPlaces);
          }
          
          renderPlaceList();
          showToast(`Imported and merged locations data`);
        } catch(err) { 
          alert('Invalid JSON: ' + err.message); 
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  function showToast(msg) {
    let container = document.getElementById('toast-container');
    if (!container) {
      container = document.createElement('div');
      container.id = 'toast-container';
      document.body.appendChild(container);
    }
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
  }
  
  // ==================== INIT ====================
  function init() {
    loadMasterData();
    renderPlaceList();
    
    document.getElementById('addTypeBtn').addEventListener('click', addLocationType);
    document.getElementById('addGovBtn').addEventListener('click', addGovernment);
    document.getElementById('addPlaceBtn').addEventListener('click', addPlace);
    document.getElementById('importLocBtn').addEventListener('click', importData);
    document.getElementById('exportLocBtn').addEventListener('click', exportData);
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (currentPlaceId) {
          if (btn.getAttribute('data-tab') === 'view') renderViewTab();
          else renderEditTab();
        }
      });
    });
    
    window.addEventListener('storage', (e) => {
      if (e.key === 'stillwaters_master') {
        loadMasterData();
        renderPlaceList();
        if (currentPlaceId && getPlaceById(currentPlaceId)) {
          renderViewTab();
        }
      }
    });
  }
  
  init();
</script>
</body>
</html>

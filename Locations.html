<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Still Waters — Locations Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stillwaters.css">
  <style>
    /* locations-specific layout */
    .locations-app {
      display: flex;
      height: calc(100vh - 44px);
      overflow: hidden;
    }
    
    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    
    .sidebar-header h3 {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }
    
    .sidebar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .place-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    
    /* hierarchical tree */
    .tree-node {
      margin-left: 0;
      list-style: none;
    }
    
    .tree-item {
      margin: 4px 0;
    }
    
    .tree-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
    }
    
    .tree-header:hover {
      background: var(--bg3);
    }
    
    .tree-header .toggle-icon {
      width: 18px;
      font-size: 0.7rem;
      color: var(--dim);
    }
    
    .tree-header .capital-star {
      color: gold;
      font-size: 0.8rem;
    }
    
    .tree-header .place-name {
      flex: 1;
      font-size: 0.8rem;
    }
    
    .tree-header .status-badge {
      font-size: 0.55rem;
      padding: 2px 6px;
      border-radius: 12px;
      background: var(--bg);
    }
    
    .tree-children {
      margin-left: 24px;
      overflow: hidden;
      transition: max-height 0.2s;
    }
    
    .tree-children.collapsed {
      display: none;
    }
    
    /* Main Panel */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      padding: 0 16px;
    }
    
    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      color: var(--dim);
      border-bottom: 2px solid transparent;
    }
    
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    .view-section, .edit-section {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .info-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    
    .info-value {
      font-size: 0.85rem;
      color: var(--text);
    }
    
    .population-stat {
      background: var(--bg3);
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid var(--border);
    }
    
    .form-group {
      margin-bottom: 18px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 6px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    
    .empty-selection {
      text-align: center;
      padding: 60px 20px;
      color: var(--dim);
    }
    
    @media (max-width: 768px) {
      .locations-app {
        flex-direction: column;
        height: auto;
      }
      .sidebar {
        width: 100%;
        max-height: 300px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .sidebar.collapsed {
        display: none;
      }
      .mobile-toggle {
        display: block;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
      }
    }
    
    .mobile-toggle {
      display: none;
    }
    
    @media (max-width: 768px) {
      .mobile-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="title">🗺️ LOCATIONS MANAGER</div>
  <div style="flex:1"></div>
  <button id="importLocBtn" class="tb-btn">📂 Import JSON</button>
  <button id="exportLocBtn" class="tb-btn primary">💾 Export JSON</button>
</div>

<div class="locations-app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>🏛️ PLACE HIERARCHY</h3>
      <div class="sidebar-actions">
        <button id="addTypeBtn" class="btn small">+ Add Type</button>
        <button id="addGovBtn" class="btn small">+ Add Government</button>
        <button id="addPlaceBtn" class="btn primary small">+ Add Place</button>
      </div>
    </div>
    <div class="place-list" id="placeList"></div>
  </div>
  
  <div class="main-panel">
    <div class="panel-tabs">
      <button class="tab-btn active" data-tab="view">📖 View</button>
      <button class="tab-btn" data-tab="edit">✏️ Edit</button>
    </div>
    <div class="panel-content" id="panelContent">
      <div class="empty-selection">Select a place from the list to view or edit details</div>
    </div>
  </div>
</div>

<button class="mobile-toggle btn small" id="mobileToggle">☰ Places</button>

<script>
  // ==================== DATA STRUCTURES ====================
  let locationTypes = [];      // { id, name, priority }
  let governments = [];        // { id, name, priority, leaderRankId }
  let places = [];             // { id, name, typeId, parentId, variableKey, status, isCapital, leaderId, leaderHistory, subtype, economy, export, notes }
  let ranks = [];              // pulled from shared ranks storage
  let characters = [];         // pulled from shared characters storage
  
  // Helper: generate ID
  function generateId() { return 'loc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }
  
  // ==================== LOAD/SAVE ====================
  function loadAllData() {
    // Load location types
    const storedTypes = localStorage.getItem('stillwaters_locationTypes');
    if (storedTypes) locationTypes = JSON.parse(storedTypes);
    else locationTypes = [{ id: 'type1', name: 'Country', priority: 1 }, { id: 'type2', name: 'District', priority: 2 }, { id: 'type3', name: 'Town', priority: 3 }];
    
    // Load governments
    const storedGovs = localStorage.getItem('stillwaters_governments');
    if (storedGovs) governments = JSON.parse(storedGovs);
    else governments = [{ id: 'gov1', name: 'Monarchy', priority: 1, leaderRankId: null }, { id: 'gov2', name: 'Chiefdom', priority: 2, leaderRankId: null }];
    
    // Load places
    const storedPlaces = localStorage.getItem('stillwaters_places');
    if (storedPlaces) places = JSON.parse(storedPlaces);
    else {
      places = [
        { id: 'p1', name: 'Aethelgard', typeId: 'type1', parentId: null, variableKey: 'aethelgard', status: 'active', isCapital: true, leaderId: null, leaderHistory: [], subtype: 'Imperial Seat', economy: 'Trade hub', export: 'Textiles, Grain', notes: 'Heart of the realm' },
        { id: 'p2', name: 'Ironhold', typeId: 'type2', parentId: 'p1', variableKey: 'ironhold', status: 'active', isCapital: false, leaderId: null, leaderHistory: [], subtype: 'Mining town', economy: 'Mining', export: 'Iron ore', notes: '' },
        { id: 'p3', name: 'Riversmeet', typeId: 'type3', parentId: 'p2', variableKey: 'riversmeet', status: 'active', isCapital: false, leaderId: null, leaderHistory: [], subtype: 'Fishing village', economy: 'Fishing', export: 'Fish', notes: '' }
      ];
    }
    
    // Load ranks from shared storage
    const storedRanks = localStorage.getItem('stillwaters_ranks');
    if (storedRanks) ranks = JSON.parse(storedRanks);
    else ranks = [];
    
    // Load characters from shared storage
    const storedChars = localStorage.getItem('stillwaters_characters');
    if (storedChars) characters = JSON.parse(storedChars);
    else characters = [];
    
    saveAllData();
  }
  
  function saveAllData() {
    localStorage.setItem('stillwaters_locationTypes', JSON.stringify(locationTypes));
    localStorage.setItem('stillwaters_governments', JSON.stringify(governments));
    localStorage.setItem('stillwaters_places', JSON.stringify(places));
    // Ranks and characters are shared, we don't overwrite them here
  }
  
  // ==================== HIERARCHY BUILDING ====================
  function buildHierarchy() {
    const placeMap = new Map();
    places.forEach(p => placeMap.set(p.id, { ...p, children: [] }));
    const roots = [];
    places.forEach(p => {
      if (p.parentId && placeMap.has(p.parentId)) placeMap.get(p.parentId).children.push(placeMap.get(p.id));
      else roots.push(placeMap.get(p.id));
    });
    return roots;
  }
  
  function renderPlaceList() {
    const container = document.getElementById('placeList');
    const hierarchy = buildHierarchy();
    container.innerHTML = renderTree(hierarchy, 0);
    attachTreeEvents();
  }
  
  function renderTree(nodes, level) {
    if (!nodes.length) return '<div class="empty-msg" style="padding:20px;">No places defined</div>';
    return `<ul class="tree-node" style="list-style:none; padding-left:0;">${nodes.map(node => renderNode(node, level)).join('')}</ul>`;
  }
  
  function renderNode(node, level) {
    const type = locationTypes.find(t => t.id === node.typeId);
    const statusColors = { active: '#4a9060', disputed: '#c87040', abandoned: '#8f5e5e', occupied: '#8b4040' };
    const star = node.isCapital ? '<span class="capital-star">★</span>' : '';
    const statusText = node.status || 'active';
    
    return `
      <li class="tree-item" data-place-id="${node.id}">
        <div class="tree-header" data-place-id="${node.id}">
          <span class="toggle-icon" data-toggle>${node.children.length ? '▼' : '○'}</span>
          ${star}
          <span class="place-name">${escapeHtml(node.name)}</span>
          <span class="status-badge" style="border-color:${statusColors[statusText]}; color:${statusColors[statusText]}">${statusText}</span>
        </div>
        ${node.children.length ? `<div class="tree-children" data-children="${node.id}">${renderTree(node.children, level + 1)}</div>` : ''}
      </li>
    `;
  }
  
  function attachTreeEvents() {
    document.querySelectorAll('.tree-header').forEach(header => {
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        const placeId = header.getAttribute('data-place-id');
        if (placeId) selectPlace(placeId);
      });
    });
    document.querySelectorAll('.toggle-icon').forEach(icon => {
      icon.addEventListener('click', (e) => {
        e.stopPropagation();
        const childrenDiv = icon.closest('.tree-header')?.nextElementSibling;
        if (childrenDiv && childrenDiv.classList) {
          childrenDiv.classList.toggle('collapsed');
          icon.textContent = childrenDiv.classList.contains('collapsed') ? '▶' : '▼';
        }
      });
    });
  }
  
  // ==================== POPULATION CALCULATION ====================
  function calculatePopulation(placeId) {
    // This would normally aggregate character locations
    // For now, returns placeholder count based on characters assigned via variableKey
    const place = places.find(p => p.id === placeId);
    if (!place) return 0;
    let count = characters.filter(c => c.locationKey === place.variableKey).length;
    const children = places.filter(p => p.parentId === placeId);
    children.forEach(child => { count += calculatePopulation(child.id); });
    return count;
  }
  
  // ==================== SELECT PLACE & RENDER ====================
  let currentPlaceId = null;
  
  function selectPlace(placeId) {
    currentPlaceId = placeId;
    const place = places.find(p => p.id === placeId);
    if (!place) return;
    renderViewTab(place);
    document.querySelector('.tab-btn[data-tab="view"]').click();
  }
  
  function renderViewTab(place) {
    const type = locationTypes.find(t => t.id === place.typeId);
    const parent = places.find(p => p.id === place.parentId);
    const gov = place.governmentId ? governments.find(g => g.id === place.governmentId) : null;
    const leader = place.leaderId ? characters.find(c => c.id === place.leaderId) : null;
    const population = calculatePopulation(place.id);
    
    const content = `
      <div class="view-section">
        <h2 style="margin-bottom:20px;">${escapeHtml(place.name)}</h2>
        <div class="info-grid">
          <div class="info-label">Type</div><div class="info-value">${type ? type.name : 'Unknown'} (Priority ${type?.priority || '-'})</div>
          <div class="info-label">Parent</div><div class="info-value">${parent ? parent.name : '— Root —'}</div>
          <div class="info-label">Status</div><div class="info-value">${place.status || 'active'}</div>
          <div class="info-label">Capital</div><div class="info-value">${place.isCapital ? '✓ Yes' : '✗ No'}</div>
          <div class="info-label">Variable Key</div><div class="info-value">${place.variableKey || '— Not assignable —'}</div>
          <div class="info-label">Government</div><div class="info-value">${gov ? gov.name : '— None —'}</div>
          <div class="info-label">Current Leader</div><div class="info-value">${leader ? leader.name : '— Vacant —'}</div>
          <div class="info-label">Subtype</div><div class="info-value">${place.subtype || '—'}</div>
          <div class="info-label">Economy</div><div class="info-value">${place.economy || '—'}</div>
          <div class="info-label">Main Export</div><div class="info-value">${place.export || '—'}</div>
          <div class="info-label">Notes</div><div class="info-value">${place.notes || '—'}</div>
        </div>
        <div class="population-stat">
          <strong>📊 Population</strong><br>
          <span style="font-size:1.5rem; color:var(--accent);">${population}</span> inhabitants (including all sub-regions)
        </div>
        ${place.leaderHistory?.length ? `<div class="info-grid"><div class="info-label">Former Leaders</div><div class="info-value">${place.leaderHistory.map(h => `${h.name} (${h.period})`).join(', ')}</div></div>` : ''}
      </div>
    `;
    document.getElementById('panelContent').innerHTML = content;
  }
  
  function renderEditTab(place) {
    const typeOptions = locationTypes.map(t => `<option value="${t.id}" ${place.typeId === t.id ? 'selected' : ''}>${t.name} (Prio ${t.priority})</option>`).join('');
    const parentOptions = `<option value="">— None (Root) —</option>${places.filter(p => p.id !== place.id).map(p => `<option value="${p.id}" ${place.parentId === p.id ? 'selected' : ''}>${p.name}</option>`).join('')}`;
    const govOptions = `<option value="">— None —</option>${governments.map(g => `<option value="${g.id}" ${place.governmentId === g.id ? 'selected' : ''}>${g.name}</option>`).join('')}`;
    const rankFilteredChars = characters.filter(c => {
      if (!place.governmentId) return true;
      const gov = governments.find(g => g.id === place.governmentId);
      if (!gov || !gov.leaderRankId) return true;
      return c.rankId === gov.leaderRankId;
    });
    const leaderOptions = `<option value="">— Vacant —</option>${rankFilteredChars.map(c => `<option value="${c.id}" ${place.leaderId === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}`;
    
    const content = `
      <div class="edit-section">
        <form id="editPlaceForm">
          <div class="form-group"><label>Place Name</label><input type="text" id="editName" value="${escapeHtml(place.name)}" required></div>
          <div class="form-row">
            <div class="form-group"><label>Type</label><select id="editTypeId">${typeOptions}</select></div>
            <div class="form-group"><label>Parent Place</label><select id="editParentId">${parentOptions}</select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Status</label><select id="editStatus"><option ${place.status === 'active' ? 'selected' : ''}>active</option><option ${place.status === 'disputed' ? 'selected' : ''}>disputed</option><option ${place.status === 'abandoned' ? 'selected' : ''}>abandoned</option><option ${place.status === 'occupied' ? 'selected' : ''}>occupied</option></select></div>
            <div class="form-group"><label><input type="checkbox" id="editIsCapital" ${place.isCapital ? 'checked' : ''}> Capital City</label></div>
          </div>
          <div class="form-group"><label>Variable Key (for character assignment)</label><input type="text" id="editVariableKey" value="${place.variableKey || ''}" placeholder="e.g., aethelgard"></div>
          <div class="form-row">
            <div class="form-group"><label>Government Type</label><select id="editGovernmentId">${govOptions}</select></div>
            <div class="form-group"><label>Current Leader</label><select id="editLeaderId">${leaderOptions}</select></div>
          </div>
          <div class="form-group"><label>Subtype (e.g., market town, fishing village)</label><input type="text" id="editSubtype" value="${place.subtype || ''}"></div>
          <div class="form-row">
            <div class="form-group"><label>Economy</label><input type="text" id="editEconomy" value="${place.economy || ''}"></div>
            <div class="form-group"><label>Main Export</label><input type="text" id="editExport" value="${place.export || ''}"></div>
          </div>
          <div class="form-group"><label>Notes</label><textarea id="editNotes" rows="3">${place.notes || ''}</textarea></div>
          <div class="action-buttons">
            <button type="submit" class="btn primary">💾 Save Changes</button>
            <button type="button" id="deletePlaceBtn" class="btn danger">🗑️ Delete Place</button>
          </div>
        </form>
      </div>
    `;
    document.getElementById('panelContent').innerHTML = content;
    
    document.getElementById('editPlaceForm').addEventListener('submit', (e) => {
      e.preventDefault();
      savePlaceEdit(place.id);
    });
    document.getElementById('deletePlaceBtn').addEventListener('click', () => deletePlace(place.id));
  }
  
  function savePlaceEdit(placeId) {
    const place = places.find(p => p.id === placeId);
    if (!place) return;
    place.name = document.getElementById('editName').value;
    place.typeId = document.getElementById('editTypeId').value;
    place.parentId = document.getElementById('editParentId').value || null;
    place.status = document.getElementById('editStatus').value;
    place.isCapital = document.getElementById('editIsCapital').checked;
    place.variableKey = document.getElementById('editVariableKey').value || null;
    place.governmentId = document.getElementById('editGovernmentId').value || null;
    const newLeaderId = document.getElementById('editLeaderId').value || null;
    if (newLeaderId !== place.leaderId && newLeaderId) {
      if (!place.leaderHistory) place.leaderHistory = [];
      if (place.leaderId) {
        const oldLeader = characters.find(c => c.id === place.leaderId);
        if (oldLeader) place.leaderHistory.unshift({ id: place.leaderId, name: oldLeader.name, period: 'until ' + new Date().toLocaleDateString() });
      }
      place.leaderId = newLeaderId;
    }
    place.subtype = document.getElementById('editSubtype').value;
    place.economy = document.getElementById('editEconomy').value;
    place.export = document.getElementById('editExport').value;
    place.notes = document.getElementById('editNotes').value;
    saveAllData();
    renderPlaceList();
    selectPlace(placeId);
  }
  
  function deletePlace(placeId) {
    if (!confirm('Delete this place and all its sub-places? This cannot be undone.')) return;
    const toDelete = [placeId];
    const children = places.filter(p => p.parentId === placeId);
    children.forEach(c => toDelete.push(c.id));
    places = places.filter(p => !toDelete.includes(p.id));
    saveAllData();
    renderPlaceList();
    document.getElementById('panelContent').innerHTML = '<div class="empty-selection">Place deleted. Select another from the list.</div>';
    currentPlaceId = null;
  }
  
  // ==================== MODALS FOR TYPES/GOVS/PLACES ====================
  function showAddTypeModal() {
    const name = prompt('Enter type name (e.g., Region, Province):');
    if (!name) return;
    const priority = parseInt(prompt('Priority (1 = highest):', locationTypes.length + 1) || '10');
    locationTypes.push({ id: generateId(), name, priority });
    saveAllData();
    renderPlaceList();
  }
  
  function showAddGovModal() {
    const name = prompt('Enter government type (e.g., Republic, Theocracy):');
    if (!name) return;
    const priority = parseInt(prompt('Priority:', governments.length + 1) || '10');
    const rankOptions = ranks.map(r => `${r.name} (priority ${r.priority})`).join(', ');
    const rankName = prompt(`Optional: assign leader rank (from ranks list)\nAvailable: ${rankOptions || 'none'}\nEnter rank name or leave blank:`);
    const leaderRank = ranks.find(r => r.name.toLowerCase() === rankName?.toLowerCase());
    governments.push({ id: generateId(), name, priority, leaderRankId: leaderRank?.id || null });
    saveAllData();
  }
  
  function showAddPlaceModal() {
    const name = prompt('Place name:');
    if (!name) return;
    const typeOptions = locationTypes.map(t => `${t.name} (Prio ${t.priority})`).join(', ');
    const typeName = prompt(`Select type:\n${typeOptions}`);
    const type = locationTypes.find(t => t.name.toLowerCase() === typeName?.toLowerCase());
    if (!type) { alert('Invalid type'); return; }
    const parentOptions = places.map(p => p.name).join(', ');
    const parentName = prompt(`Parent place (optional, leave blank for root):\n${parentOptions}`);
    const parent = places.find(p => p.name.toLowerCase() === parentName?.toLowerCase());
    const variableKey = prompt('Variable key (optional, for character assignment):', name.toLowerCase().replace(/\s/g, '_'));
    const newPlace = {
      id: generateId(), name, typeId: type.id, parentId: parent?.id || null, variableKey: variableKey || null,
      status: 'active', isCapital: false, leaderId: null, leaderHistory: [], subtype: '', economy: '', export: '', notes: ''
    };
    places.push(newPlace);
    saveAllData();
    renderPlaceList();
    selectPlace(newPlace.id);
  }
  
  // ==================== IMPORT/EXPORT ====================
  function exportData() {
    const exportObj = { locationTypes, governments, places, version: '1.0' };
    const dataStr = JSON.stringify(exportObj, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `stillwaters_locations_${new Date().toISOString().slice(0,19)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }
  
  function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.locationTypes) locationTypes = imported.locationTypes;
          if (imported.governments) governments = imported.governments;
          if (imported.places) places = imported.places;
          saveAllData();
          renderPlaceList();
          alert('Import successful!');
        } catch(err) { alert('Invalid JSON'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }
  
  // ==================== INIT ====================
  function init() {
    loadAllData();
    renderPlaceList();
    
    document.getElementById('addTypeBtn').addEventListener('click', showAddTypeModal);
    document.getElementById('addGovBtn').addEventListener('click', showAddGovModal);
    document.getElementById('addPlaceBtn').addEventListener('click', showAddPlaceModal);
    document.getElementById('importLocBtn').addEventListener('click', importData);
    document.getElementById('exportLocBtn').addEventListener('click', exportData);
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (currentPlaceId) {
          const place = places.find(p => p.id === currentPlaceId);
          if (place) {
            if (btn.getAttribute('data-tab') === 'view') renderViewTab(place);
            else renderEditTab(place);
          }
        }
      });
    });
    
    document.getElementById('mobileToggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });
  }
  
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
  
  init();
</script>
</body>
</html>
